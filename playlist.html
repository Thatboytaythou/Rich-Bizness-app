<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness — Playlists</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
        url('/images/brand/logo-music-label.png') center/cover no-repeat fixed;
    }

    .container {
      max-width: 1300px;
      margin: auto;
      padding: 20px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .nav a, .btn {
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: bold;
      cursor: pointer;
    }

    .btn {
      background: gold;
      color: black;
    }

    .hero {
      padding: 30px;
      border-radius: 20px;
      background: rgba(0,0,0,0.6);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 42px;
      margin: 0;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      max-width: 400px;
    }

    .filters button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
      gap: 16px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .card h3 {
      margin: 0 0 6px;
    }

    .card p {
      font-size: 13px;
      color: #ccc;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    .actions button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .actions button:first-child {
      background: gold;
      color: black;
    }

    .actions button:last-child {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .notice {
      display: none;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .error {
      background: #ff3b5c;
    }

    .success {
      background: #28d17c;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="nav">
      <div>
        <a href="/index.html">Home</a>
        <a href="/music.html">Music</a>
        <a href="/artist/">Artist</a>
      </div>

      <div>
        <a href="/live.html" class="btn">WE LIT 🔥</a>
        <div id="global-session-nav"></div>
      </div>
    </div>

    <div id="playlist-error" class="notice error"></div>
    <div id="playlist-success" class="notice success"></div>

    <div class="hero">
      <h1>Playlist System</h1>
      <p>Build playlists, run radio, control your music flow.</p>

      <div style="margin-top:15px;">
        <button class="btn" id="create-playlist-btn">Create Playlist</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="playlist-search" placeholder="Search playlists..." />

      <div class="filters">
        <button data-filter="all">All</button>
        <button data-filter="featured">Featured</button>
        <button data-filter="artist">Artist</button>
        <button data-filter="night">Night</button>
      </div>
    </div>

    <div id="playlist-grid" class="grid"></div>

    <div id="playlist-empty" style="display:none;text-align:center;margin-top:40px;">
      <h3>No playlists yet</h3>
      <p>Create one to get started.</p>
    </div>

  </div>

  <!-- PLAYLIST SYSTEM -->
  <script type="module" src="/src/music/playlist-client.js"></script>

  <!-- NAVBAR SESSION -->
  <script type="module" src="/src/shared/navbar-session.js"></script>
</body>
</html>
