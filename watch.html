<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Live</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }
    .panel, .stage {
      background: #111;
      border-radius: 18px;
      border: 1px solid #1f1f1f;
      padding: 20px;
    }
    h1, h2 {
      color: #39ff14;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
    }
    input {
      background: #1d1d1d;
      color: #fff;
    }
    button {
      font-weight: 800;
      cursor: pointer;
    }
    .green {
      background: #39ff14;
      color: #000;
    }
    .dark {
      background: #222;
      color: #fff;
    }
    .video-shell {
      min-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: #080808;
      overflow: hidden;
    }
    .video-shell video {
      width: 100%;
      max-height: 75vh;
      object-fit: cover;
      display: block;
      background: black;
    }
    #status {
      margin-top: 14px;
      color: #39ff14;
    }
    #errorBox {
      margin-top: 10px;
      color: #ff6b6b;
    }
    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <p><a href="index.html" style="color:white;">← Home</a></p>

  <div class="wrap">
    <div class="panel">
      <h1>Watch Stream</h1>
      <input id="roomName" value="richbizness-live-room" placeholder="Room name" />
      <input id="identity" placeholder="Viewer identity" />
      <input id="displayName" value="Fan Viewer" placeholder="Display name" />
      <button id="joinBtn" class="green">Join Stream</button>
      <button id="leaveBtn" class="dark">Leave</button>
      <div id="status">Not connected</div>
      <div id="errorBox"></div>
    </div>

    <div class="stage">
      <h2>Live Watch</h2>
      <div id="videoShell" class="video-shell">
        <p id="placeholder">Waiting for host video...</p>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      Room,
      RoomEvent,
      Track
    } from "https://esm.sh/livekit-client";

    const roomNameInput = document.getElementById("roomName");
    const identityInput = document.getElementById("identity");
    const displayNameInput = document.getElementById("displayName");
    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const status = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const videoShell = document.getElementById("videoShell");
    const placeholder = document.getElementById("placeholder");

    let room = null;

    function makeIdentity() {
      return "viewer-" + Math.random().toString(36).slice(2, 10);
    }

    if (!identityInput.value) {
      identityInput.value = makeIdentity();
    }

    function attachTrack(track) {
      const el = track.attach();

      if (track.kind === Track.Kind.Video) {
        const oldVideos = videoShell.querySelectorAll("video");
        oldVideos.forEach(v => v.remove());
        placeholder.style.display = "none";
        videoShell.appendChild(el);
      }

      if (track.kind === Track.Kind.Audio) {
        el.style.display = "none";
        videoShell.appendChild(el);
      }
    }

    function detachTrack(track) {
      track.detach().forEach(el => el.remove());
      const remaining = videoShell.querySelectorAll("video");
      if (!remaining.length) {
        placeholder.style.display = "block";
      }
    }

    joinBtn.addEventListener("click", async () => {
      errorBox.textContent = "";

      try {
        const roomName = roomNameInput.value.trim();
        const identity = identityInput.value.trim() || makeIdentity();
        const displayName = displayNameInput.value.trim() || identity;

        const response = await fetch("/get-livekit-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            roomName,
            identity,
            name: displayName,
            role: "viewer"
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to get token");
        }

        room = new Room({ adaptiveStream: true, dynacast: true });

        room.on(RoomEvent.TrackSubscribed, (track) => {
          attachTrack(track);
        });

        room.on(RoomEvent.TrackUnsubscribed, (track) => {
          detachTrack(track);
        });

        room.on(RoomEvent.Disconnected, () => {
          status.textContent = "Disconnected";
          placeholder.style.display = "block";
        });

        await room.connect(data.url, data.token, { autoSubscribe: true });

        room.remoteParticipants.forEach(participant => {
          participant.trackPublications.forEach(publication => {
            if (publication.isSubscribed && publication.track) {
              attachTrack(publication.track);
            }
          });
        });

        status.textContent = "Watching stream";
      } catch (error) {
        console.error(error);
        status.textContent = "Connection failed";
        errorBox.textContent = error.message;
      }
    });

    leaveBtn.addEventListener("click", () => {
      if (room) {
        room.disconnect();
        room = null;
      }
      videoShell.querySelectorAll("video,audio").forEach(el => el.remove());
      placeholder.style.display = "block";
      status.textContent = "Not connected";
    });
  </script>
</body>
</html>
