<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music | Rich Bizness</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial;background:#050505;color:#fff;padding:24px;}
    .container{max-width:1380px;margin:0 auto;}

    .topbar{display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:24px;}
    .brand{display:flex;align-items:center;gap:12px;font-size:30px;font-weight:900;color:#39ff14;}
    .top-links{display:flex;gap:10px;flex-wrap:wrap;}
    .top-links a{background:#111;padding:10px 14px;border-radius:10px;border:1px solid #222;}

    .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
    input,select{padding:12px;border-radius:10px;background:#111;color:#fff;border:1px solid #333;}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}

    .card{background:#0d0d0d;border-radius:18px;border:1px solid #222;overflow:hidden;}
    .cover{height:220px;background:#111;}
    .cover img{width:100%;height:100%;object-fit:cover;}

    .body{padding:16px;}
    .title{font-size:20px;color:#39ff14;font-weight:900;margin-bottom:6px;}

    .artist{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .artist img{width:36px;height:36px;border-radius:10px;}

    .desc{font-size:13px;color:#ccc;margin-bottom:10px;}

    audio{width:100%;margin-bottom:10px;}

    .row{display:flex;justify-content:space-between;margin-bottom:10px;}
    .price{color:#39ff14;font-weight:900;}

    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    button{padding:10px;border-radius:10px;font-weight:900;border:none;cursor:pointer;}
    .green{background:#39ff14;color:#000;}
    .dark{background:#111;color:#fff;border:1px solid #333;}
  </style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <div class="brand">🎵 Music</div>
    <div class="top-links">
      <a href="index.html">Home</a>
      <a href="upload-music.html">Upload</a>
      <a href="gallery.html">Gallery</a>
      <a href="gaming.html">Gaming</a>
      <a href="messages.html">Messages</a>
    </div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search music..." />
    <select id="genre">
      <option value="all">All Genres</option>
      <option>Hip-Hop</option>
      <option>R&B</option>
      <option>Pop</option>
      <option>Rock</option>
      <option>Other</option>
    </select>
    <select id="sort">
      <option value="new">Newest</option>
      <option value="price-low">Price Low</option>
      <option value="price-high">Price High</option>
    </select>
  </div>

  <div id="grid" class="grid"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
);

let allMusic = [];
let profiles = {};

async function loadProfiles(ids){
  const {data} = await supabase.from("profiles")
    .select("id,display_name,avatar_url")
    .in("id",ids);

  data.forEach(p=>profiles[p.id]=p);
}

function name(id){
  return profiles[id]?.display_name || "Artist";
}

function avatar(id){
  return profiles[id]?.avatar_url || "https://placehold.co/100";
}

async function loadMusic(){
  const {data} = await supabase.from("music")
    .select("*")
    .order("created_at",{ascending:false});

  allMusic = data || [];
  await loadProfiles(allMusic.map(x=>x.user_id));
  render();
}

function render(){
  const search = document.getElementById("search").value.toLowerCase();
  const genre = document.getElementById("genre").value;
  const sort = document.getElementById("sort").value;

  let list = [...allMusic];

  if(genre!=="all"){
    list = list.filter(x=>x.genre===genre);
  }

  if(search){
    list = list.filter(x=>
      (x.title||"").toLowerCase().includes(search) ||
      name(x.user_id).toLowerCase().includes(search)
    );
  }

  if(sort==="price-low"){
    list.sort((a,b)=>a.price_cents-b.price_cents);
  }else if(sort==="price-high"){
    list.sort((a,b)=>b.price_cents-a.price_cents);
  }

  document.getElementById("grid").innerHTML = list.map(x=>`
    <div class="card">
      <div class="cover">
        <img src="${x.cover_url||'https://placehold.co/400'}">
      </div>

      <div class="body">
        <div class="title">${x.title}</div>

        <div class="artist">
          <img src="${avatar(x.user_id)}">
          <div>${name(x.user_id)}</div>
        </div>

        <div class="desc">${x.description||""}</div>

        <audio controls src="${x.audio_url}"></audio>

        <div class="row">
          ${
            x.is_for_sale && x.price_cents>0
            ? `<div class="price">$${(x.price_cents/100).toFixed(2)}</div>`
            : `<div>Free</div>`
          }
          <a href="artist.html?id=${x.user_id}">Artist</a>
        </div>

        <div class="btns">
          <button class="dark" onclick="msg('${x.user_id}')">Message</button>
          ${
            x.is_for_sale && x.price_cents>0
            ? `<button class="green" onclick="buy(${x.id},${x.price_cents},'${x.title}','${x.user_id}')">Buy</button>`
            : `<button class="green">Play</button>`
          }
        </div>

      </div>
    </div>
  `).join("");
}

async function msg(id){
  const {data} = await supabase.auth.getUser();
  if(!data.user) return location="auth.html";

  localStorage.setItem("openConversationId",id);
  location="messages.html";
}

async function buy(id,price,title,seller){
  const {data} = await supabase.auth.getUser();
  if(!data.user) return location="auth.html";

  const res = await fetch("/api/create-checkout-session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      buyerUserId:data.user.id,
      sellerUserId:seller,
      contentType:"music",
      contentId:id,
      title:title,
      amountCents:price
    })
  });

  const j = await res.json();
  location = j.url;
}

document.getElementById("search").oninput=render;
document.getElementById("genre").onchange=render;
document.getElementById("sort").onchange=render;

loadMusic();
</script>

</body>
</html>
