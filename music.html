<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music — Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/styles/main.css" />

  <style>
    #music-feed {
      padding-bottom: 120px;
    }

    .music-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      margin: 10px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      cursor: pointer;
    }

    .music-card img {
      width: 60px;
      height: 60px;
      object-fit: cover;
    }

    .music-actions {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .music-actions button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* PLAYER */
    #player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #000;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid #333;
      z-index: 9999;
    }

    #player-bar img {
      width: 50px;
      height: 50px;
      object-fit: cover;
    }

    #player-controls button {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #player-progress {
      width: 100%;
    }
  </style>
</head>

<body>

<div id="elite-platform-nav"></div>

<div class="page-shell">
  <h1>🎧 Music</h1>
  <div id="music-feed"></div>
</div>

<!-- 🔥 PLAYER -->
<div id="player-bar">
  <img id="player-cover" />
  <div style="flex:1;">
    <div id="player-title"></div>
    <div id="player-artist"></div>
    <input type="range" id="player-progress" value="0">
  </div>

  <div id="player-controls">
    <button id="player-prev">⏮</button>
    <button id="player-play">⏸</button>
    <button id="player-next">⏭</button>
  </div>

  <audio id="player-audio"></audio>
</div>

<script type="module" src="/core/pages/music.js"></script>

</body>
</html>
