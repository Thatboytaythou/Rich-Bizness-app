<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music | Rich Bizness</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: #fff;
      min-height: 100vh;
      padding: 24px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      color: #39ff14;
    }

    .top-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-links a {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
    }

    .hero {
      margin-bottom: 24px;
      padding: 28px;
      border-radius: 24px;
      background: rgba(10,10,10,0.82);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero h1 {
      font-size: 44px;
      color: #39ff14;
      margin-bottom: 12px;
    }

    .hero p {
      color: #d4d4d4;
      font-size: 17px;
      line-height: 1.5;
      max-width: 840px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 14px;
      margin-bottom: 24px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(12,12,12,0.84);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .controls input,
    .controls select {
      width: 100%;
      background: #121212;
      color: #fff;
      border: 1px solid #2c2c2c;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
    }

    .music-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
    }

    .cover {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #141414;
      display: block;
    }

    .card-body {
      padding: 16px;
    }

    .track-title {
      font-size: 20px;
      font-weight: 800;
      color: #39ff14;
      margin-bottom: 8px;
    }

    .track-meta {
      color: #d0d0d0;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .track-description {
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
      min-height: 44px;
    }

    audio {
      width: 100%;
      margin-top: 6px;
    }

    .empty {
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 36px 22px;
      text-align: center;
      color: #d7d7d7;
      grid-column: 1 / -1;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 36px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .brand {
        font-size: 28px;
      }

      .hero h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">Rich Bizness Music</div>

      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="upload.html">Upload Art</a>
        <a href="profile.html">Profile</a>
        <a href="upload-music.html">Upload Music</a>
        <a href="sports.html">Sports</a>
        <a href="live.html">Go Live</a>
      </div>
    </div>

    <div class="hero">
      <h1>Music Library</h1>
      <p>Stream tracks, discover artists, and build your sound catalog on Rich Bizness.</p>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by title, artist, genre, or description" />

      <select id="genreFilter">
        <option value="all">All Genres</option>
        <option value="Hip-Hop">Hip-Hop</option>
        <option value="R&B">R&B</option>
        <option value="Pop">Pop</option>
        <option value="Rock">Rock</option>
        <option value="Gospel">Gospel</option>
        <option value="Trap">Trap</option>
        <option value="Afrobeats">Afrobeats</option>
        <option value="Other">Other</option>
      </select>

      <select id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="title-az">Title A to Z</option>
        <option value="title-za">Title Z to A</option>
      </select>
    </div>

    <div id="musicGrid" class="music-grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const musicGrid = document.getElementById("musicGrid");
    const searchInput = document.getElementById("searchInput");
    const genreFilter = document.getElementById("genreFilter");
    const sortSelect = document.getElementById("sortSelect");

    let allTracks = [];

    function getFilteredTracks() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const selectedGenre = genreFilter.value;
      const sortValue = sortSelect.value;

      let filtered = [...allTracks];

      if (selectedGenre !== "all") {
        filtered = filtered.filter(item => (item.genre || "") === selectedGenre);
      }

      if (searchTerm) {
        filtered = filtered.filter(item => {
          const title = (item.title || "").toLowerCase();
          const artist = (item.artist_name || "").toLowerCase();
          const genre = (item.genre || "").toLowerCase();
          const description = (item.description || "").toLowerCase();

          return (
            title.includes(searchTerm) ||
            artist.includes(searchTerm) ||
            genre.includes(searchTerm) ||
            description.includes(searchTerm)
          );
        });
      }

      filtered.sort((a, b) => {
        switch (sortValue) {
          case "oldest":
            return new Date(a.created_at || 0) - new Date(b.created_at || 0);
          case "title-az":
            return (a.title || "").localeCompare(b.title || "");
          case "title-za":
            return (b.title || "").localeCompare(a.title || "");
          case "newest":
          default:
            return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        }
      });

      return filtered;
    }

    function renderMusic() {
      const filtered = getFilteredTracks();

      if (!filtered.length) {
        musicGrid.innerHTML = `
          <div class="empty">
            <h2 style="color:#39ff14; margin-bottom:10px;">No music found</h2>
            <p>Try another search or upload some tracks.</p>
          </div>
        `;
        return;
      }

      musicGrid.innerHTML = filtered.map(track => `
        <div class="card">
          <img
            class="cover"
            src="${track.cover_url || "https://placehold.co/600x600?text=No+Cover"}"
            alt="${track.title || "Track Cover"}"
            onerror="this.src='https://placehold.co/600x600?text=No+Cover';"
          />
          <div class="card-body">
            <div class="track-title">${track.title || "Untitled"}</div>
            <div class="track-meta">${track.artist_name || "Unknown Artist"} • ${track.genre || "Other"}</div>
            <div class="track-description">${track.description || "No description added."}</div>
            <audio controls src="${track.audio_url || ""}"></audio>
          </div>
        </div>
      `).join("");
    }

    async function loadMusic() {
      const { data, error } = await supabaseClient
        .from("music")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        musicGrid.innerHTML = `<div class="empty">Failed to load music: ${error.message}</div>`;
        return;
      }

      allTracks = data || [];
      renderMusic();
    }

    searchInput.addEventListener("input", renderMusic);
    genreFilter.addEventListener("change", renderMusic);
    sortSelect.addEventListener("change", renderMusic);

    loadMusic();
  </script>
</body>
</html>
