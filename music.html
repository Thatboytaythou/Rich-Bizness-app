<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness — Music</title>

  <style>
    :root{
      --bg:#06100b;
      --card:rgba(255,255,255,0.04);
      --line:rgba(110,255,176,0.18);
      --text:#ecfff4;
      --muted:#97b8a6;
      --green:#43f59b;
    }

    body{
      margin:0;
      font-family:Inter,system-ui;
      background:
        linear-gradient(180deg,rgba(0,0,0,.6),rgba(0,0,0,.9)),
        url('/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png') center/cover;
      color:var(--text);
    }

    .wrap{
      width:min(1200px,95%);
      margin:auto;
      padding:20px 0 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav a{
      padding:10px 14px;
      border-radius:10px;
      background:var(--card);
      border:1px solid var(--line);
      font-weight:700;
    }

    .hero{
      padding:40px;
      border-radius:20px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.5);
      margin-bottom:20px;
    }

    .hero h1{
      margin:0;
      font-size:42px;
    }

    .hero p{
      color:var(--muted);
      margin-top:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:16px;
    }

    .card{
      padding:16px;
      border-radius:16px;
      background:var(--card);
      border:1px solid var(--line);
    }

    .card img{
      width:100%;
      height:160px;
      object-fit:cover;
      border-radius:12px;
      margin-bottom:10px;
    }

    .card h3{
      margin:0;
      font-size:18px;
    }

    .card span{
      color:var(--muted);
      font-size:13px;
    }

    .btn{
      margin-top:12px;
      padding:10px;
      width:100%;
      border:none;
      border-radius:10px;
      background:var(--green);
      color:#002b17;
      font-weight:900;
      cursor:pointer;
    }

  </style>
</head>

<body>
  <div class="wrap">

    <!-- NAV -->
    <div class="topbar">
      <h2>🎵 Rich Bizness Music</h2>

      <div class="nav">
        <a href="/index.html">Home</a>
        <a href="/profile.html">Profile</a>
        <a href="/live.html">Live</a>
        <a href="/watch.html">Watch</a>
      </div>
    </div>

    <!-- HERO -->
    <div class="hero">
      <h1>Music Empire</h1>
      <p>
        Upload, stream, and build your music brand.
        This is where artists grow their audience on Rich Bizness.
      </p>
    </div>

    <!-- MUSIC GRID -->
    <div id="music-grid" class="grid">

      <!-- Example Card -->
      <div class="card">
        <img src="https://picsum.photos/300/200" />
        <h3>Sample Track</h3>
        <span>Artist Name</span>
        <button class="btn">Play</button>
      </div>

    </div>

  </div>

  <!-- SUPABASE -->
  <script>
    window.NEXT_PUBLIC_SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";
  </script>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      window.NEXT_PUBLIC_SUPABASE_URL,
      window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
    );

    const grid = document.getElementById("music-grid");

    async function loadMusic(){
      const { data } = await supabase
        .from("tracks")
        .select("*")
        .order("created_at",{ ascending:false })
        .limit(20);

      if(!data) return;

      grid.innerHTML = data.map(track=>`
        <div class="card">
          <img src="${track.cover_url || 'https://picsum.photos/300/200'}"/>
          <h3>${track.title}</h3>
          <span>${track.artist_name}</span>
          <audio controls src="${track.audio_url}" style="width:100%;margin-top:10px;"></audio>
        </div>
      `).join("");
    }

    loadMusic();
  </script>
</body>
</html>
