<!DOCTYPE html>
<html>
<head>
<title>Rich Bizness Music</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 15px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.green { background:#7dff71; color:black; }

img { width:100%; border-radius:10px; }

audio { width:100%; margin-top:10px; }
</style>
</head>

<body>

<h1 style="color:#7dff71;">🎵 Rich Bizness Music</h1>

<div class="card">
<h2>Upload Track</h2>

<input type="text" id="title" placeholder="Track title"><br><br>
<input type="text" id="artist" placeholder="Artist name"><br><br>
<input type="file" id="audio"><br><br>
<input type="file" id="cover"><br><br>

<button class="green" onclick="uploadMusic()">Upload</button>
</div>

<div id="musicFeed"></div>

<script>
const supabase = window.supabase.createClient(
"https://ksvdequymkceevocgpdj.supabase.co",
"sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

async function uploadMusic(){

const { data: { user } } = await supabase.auth.getUser();

if(!user){
alert("Login first");
return;
}

const audioFile = document.getElementById("audio").files[0];
const coverFile = document.getElementById("cover").files[0];

if(!audioFile){
alert("Upload audio");
return;
}

// upload audio
const { data: audioData } = await supabase.storage
.from("music-audio")
.upload(Date.now()+"_"+audioFile.name, audioFile);

// upload cover
let coverUrl = "";
if(coverFile){
const { data: coverData } = await supabase.storage
.from("music-covers")
.upload(Date.now()+"_"+coverFile.name, coverFile);

coverUrl = supabase.storage
.from("music-covers")
.getPublicUrl(coverData.path).data.publicUrl;
}

const audioUrl = supabase.storage
.from("music-audio")
.getPublicUrl(audioData.path).data.publicUrl;

// insert db
await supabase.from("music_tracks").insert({
user_id: user.id,
title: document.getElementById("title").value,
artist_name: document.getElementById("artist").value,
audio_url: audioUrl,
cover_url: coverUrl
});

alert("Uploaded 🔥");
loadMusic();
}

async function playTrack(track){
await supabase.from("music_tracks")
.update({ plays: track.plays + 1 })
.eq("id", track.id);

// 💰 add earnings per play
await supabase.from("music_earnings").insert({
artist_user_id: track.user_id,
track_id: track.id,
gross_cents: 1,
source: "stream"
});
}

async function loadMusic(){

const { data } = await supabase
.from("music_tracks")
.select("*")
.order("created_at", { ascending:false });

document.getElementById("musicFeed").innerHTML =
data.map(track => `
<div class="card">
<h3>${track.title}</h3>
<p>${track.artist_name}</p>

${track.cover_url ? `<img src="${track.cover_url}">` : ""}

<audio controls onplay="playTrack(${JSON.stringify(track).replace(/"/g,'&quot;')})">
<source src="${track.audio_url}">
</audio>

<p>🔥 Plays: ${track.plays}</p>
</div>
`).join("");

}

loadMusic();
</script>

</body>
</html>
