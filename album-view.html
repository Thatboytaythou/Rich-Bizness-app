<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album View | Rich Bizness</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --green: #7dff71;
      --bg: rgba(0,0,0,0.48);
      --border: rgba(125,255,113,0.18);
      --soft: rgba(255,255,255,0.08);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      padding-bottom: 120px;
      background:
        linear-gradient(rgba(0,0,0,0.58), rgba(0,0,0,0.84)),
        url("images/brand/logo-music-label.png") center center / cover no-repeat fixed;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar, .hero, .panel, .player-shell {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      padding: 14px 16px;
    }

    .brand {
      color: var(--green);
      font-size: 1.8rem;
      font-weight: 800;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      text-decoration: none;
      color: white;
      background: var(--soft);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
    }

    .hero, .panel {
      padding: 22px;
      margin-bottom: 18px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }

    .cover {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 18px;
      background: black;
    }

    .cover-fallback {
      width: 100%;
      height: 320px;
      border-radius: 18px;
      background: rgba(125,255,113,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
      font-size: 2rem;
      font-weight: 900;
    }

    .hero h1 {
      margin: 0 0 10px;
      color: var(--green);
      font-size: 3rem;
    }

    .subtle {
      color: #f1f1f1;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin: 12px 0 8px;
      color: var(--green);
      font-weight: 800;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #2c2c2c;
      background: rgba(0,0,0,0.72);
      color: white;
      font-size: 16px;
      outline: none;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button, .btn {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    .btn-green {
      background: var(--green);
      color: black;
    }

    .btn-dark {
      background: var(--soft);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(125,255,113,0.08);
      border: 1px solid rgba(125,255,113,0.20);
      font-weight: 700;
    }

    .tracks {
      display: grid;
      gap: 12px;
    }

    .track {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      grid-template-columns: 70px 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .track-number {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      background: rgba(125,255,113,0.08);
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.3rem;
    }

    .track-title {
      color: var(--green);
      font-weight: 900;
      margin-bottom: 6px;
    }

    .track-text {
      color: #f1f1f1;
      line-height: 1.55;
    }

    .track-actions {
      display: grid;
      gap: 8px;
    }

    .empty-box {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      font-weight: 700;
      text-align: center;
    }

    .player-shell {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 12px;
      padding: 14px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .player-cover {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      background: black;
    }

    .player-cover-fallback {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: rgba(125,255,113,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
      font-weight: 900;
    }

    .player-title {
      color: var(--green);
      font-weight: 900;
      margin-bottom: 6px;
    }

    .player-meta {
      color: #f1f1f1;
      margin-bottom: 8px;
    }

    .player-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .player-controls audio {
      width: min(520px, 100%);
    }

    @media (max-width: 1000px) {
      .hero-grid, .track, .player-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .row {
        grid-template-columns: 1fr;
      }
      .hero h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">Rich Bizness Album</div>
      <div class="nav">
        <a href="music.html">Music</a>
        <a href="playlists.html">Playlists</a>
        <a href="albums.html">Albums</a>
        <a href="upload-music.html">Upload Music</a>
      </div>
    </div>

    <div class="hero">
      <div class="hero-grid">
        <div id="coverWrap">
          <div class="cover-fallback">RB</div>
        </div>

        <div>
          <h1 id="albumTitle">Loading release...</h1>
          <div id="albumMeta" class="subtle">Loading release details...</div>

          <div class="row">
            <button id="playAllBtn" class="btn-green" type="button">Play All</button>
            <button id="refreshBtn" class="btn-dark" type="button">Refresh Release</button>
          </div>

          <div id="ownerTools" class="panel" style="margin-top:16px; display:none;">
            <h2 style="font-size:1.4rem;">Owner Tools</h2>

            <label for="trackSelect">Add Track To Release</label>
            <select id="trackSelect">
              <option value="">Choose a track</option>
            </select>

            <label for="trackNumberInput">Track Number</label>
            <input id="trackNumberInput" type="number" min="1" value="1" />

            <div class="row">
              <button id="addTrackBtn" class="btn-green" type="button">Add Track</button>
              <button id="reloadOwnerBtn" class="btn-dark" type="button">Reload Track List</button>
            </div>
          </div>

          <div id="statusBox" class="status-box">Loading release...</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Tracklist</h2>
      <div id="tracksWrap" class="tracks"></div>
    </div>
  </div>

  <div class="player-shell">
    <div class="player-grid">
      <div id="playerCoverWrap">
        <div class="player-cover-fallback">RB</div>
      </div>

      <div>
        <div id="playerTitle" class="player-title">Nothing playing</div>
        <div id="playerMeta" class="player-meta">Play a track from this release.</div>

        <div class="player-controls">
          <button id="prevBtn" class="btn-dark" type="button">Prev</button>
          <button id="nextBtn" class="btn-dark" type="button">Next</button>
          <audio id="globalAudio" controls preload="none"></audio>
        </div>
      </div>

      <div>
        <button id="queueCountBtn" class="btn-dark" type="button">Queue 0</button>
      </div>
    </div>
  </div>

  <script>
    try {
      const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      });

      const albumTitle = document.getElementById("albumTitle");
      const albumMeta = document.getElementById("albumMeta");
      const coverWrap = document.getElementById("coverWrap");
      const statusBox = document.getElementById("statusBox");
      const tracksWrap = document.getElementById("tracksWrap");

      const playAllBtn = document.getElementById("playAllBtn");
      const refreshBtn = document.getElementById("refreshBtn");

      const ownerTools = document.getElementById("ownerTools");
      const trackSelect = document.getElementById("trackSelect");
      const trackNumberInput = document.getElementById("trackNumberInput");
      const addTrackBtn = document.getElementById("addTrackBtn");
      const reloadOwnerBtn = document.getElementById("reloadOwnerBtn");

      const playerCoverWrap = document.getElementById("playerCoverWrap");
      const playerTitleBox = document.getElementById("playerTitle");
      const playerMetaBox = document.getElementById("playerMeta");
      const globalAudio = document.getElementById("globalAudio");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const queueCountBtn = document.getElementById("queueCountBtn");

      let currentUser = null;
      let currentAlbum = null;
      let currentTracks = [];
      let currentIndex = -1;

      function setStatus(message) {
        statusBox.textContent = message;
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function getAlbumId() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
      }

      async function loadSession() {
        const { data } = await supabase.auth.getSession();
        currentUser = data?.session?.user || null;
      }

      function renderPlayer(track) {
        if (!track) {
          playerCoverWrap.innerHTML = `<div class="player-cover-fallback">RB</div>`;
          playerTitleBox.textContent = "Nothing playing";
          playerMetaBox.textContent = "Play a track from this release.";
          globalAudio.removeAttribute("src");
          globalAudio.load();
          return;
        }

        playerCoverWrap.innerHTML = track.cover_url
          ? `<img class="player-cover" src="${escapeHtml(track.cover_url)}" alt="cover" />`
          : `<div class="player-cover-fallback">RB</div>`;

        playerTitleBox.textContent = track.title || "Untitled Track";
        playerMetaBox.textContent = `${track.artist_name || "Unknown Artist"} • ${track.genre || "--"}`;
        globalAudio.src = track.audio_url || "";
        globalAudio.load();
      }

      async function playTrack(index) {
        if (index < 0 || index >= currentTracks.length) return;
        currentIndex = index;
        const track = currentTracks[index];
        renderPlayer(track);
        try {
          await globalAudio.play();
        } catch (error) {
          console.error(error);
        }
      }

      function playNext() {
        if (!currentTracks.length) return;
        const next = (currentIndex + 1) % currentTracks.length;
        playTrack(next);
      }

      function playPrev() {
        if (!currentTracks.length) return;
        const prev = (currentIndex - 1 + currentTracks.length) % currentTracks.length;
        playTrack(prev);
      }

      async function loadTrackSelect() {
        if (!currentAlbum || !currentUser || currentAlbum.user_id !== currentUser.id) return;

        const { data, error } = await supabase
          .from("music_tracks")
          .select("*")
          .eq("user_id", currentUser.id)
          .order("created_at", { ascending: false });

        if (error) {
          console.error(error.message);
          return;
        }

        const existingIds = new Set(currentTracks.map(track => Number(track.id)));

        trackSelect.innerHTML = `<option value="">Choose a track</option>` + (data || [])
          .filter(track => !existingIds.has(Number(track.id)))
          .map(track => `<option value="${track.id}">${escapeHtml(track.title || "Untitled")} — ${escapeHtml(track.artist_name || "Unknown")}</option>`)
          .join("");
      }

      async function addTrackToAlbum() {
        try {
          if (!currentAlbum || !currentUser || currentAlbum.user_id !== currentUser.id) {
            throw new Error("Only the release owner can add tracks.");
          }

          const trackId = Number(trackSelect.value);
          const trackNumber = Number(trackNumberInput.value);

          if (!trackId) throw new Error("Choose a track first.");
          if (!trackNumber || trackNumber < 1) throw new Error("Track number must be 1 or higher.");

          const { error } = await supabase
            .from("album_tracks")
            .insert({
              album_id: currentAlbum.id,
              track_id: trackId,
              track_number: trackNumber
            });

          if (error) throw error;

          setStatus("Track added to release.");
          await loadAlbum();
        } catch (error) {
          setStatus("Add track error: " + error.message);
        }
      }

      async function removeTrackFromAlbum(albumTrackId) {
        try {
          if (!currentAlbum || !currentUser || currentAlbum.user_id !== currentUser.id) {
            throw new Error("Only the release owner can remove tracks.");
          }

          const { error } = await supabase
            .from("album_tracks")
            .delete()
            .eq("id", albumTrackId);

          if (error) throw error;

          setStatus("Track removed.");
          await loadAlbum();
        } catch (error) {
          setStatus("Remove track error: " + error.message);
        }
      }

      async function loadAlbum() {
        try {
          setStatus("Loading release...");
          await loadSession();

          const albumId = getAlbumId();
          if (!albumId) throw new Error("Missing release id in URL.");

          const { data: album, error: albumError } = await supabase
            .from("albums")
            .select("*")
            .eq("id", albumId)
            .maybeSingle();

          if (albumError) throw albumError;
          if (!album) throw new Error("Release not found.");

          currentAlbum = album;

          albumTitle.textContent = album.title || "Untitled Release";
          albumMeta.textContent = `Artist: ${album.artist_name || "Unknown Artist"} • Type: ${album.release_type || "album"} • Release Date: ${album.release_date || "--"} • ${album.description || "No description yet."}`;

          coverWrap.innerHTML = album.cover_url
            ? `<img class="cover" src="${escapeHtml(album.cover_url)}" alt="album cover" />`
            : `<div class="cover-fallback">RB</div>`;

          ownerTools.style.display = currentUser && currentAlbum.user_id === currentUser.id ? "block" : "none";

          const { data: relations, error: relationError } = await supabase
            .from("album_tracks")
            .select("*")
            .eq("album_id", album.id)
            .order("track_number", { ascending: true });

          if (relationError) throw relationError;

          const relationRows = relations || [];
          const trackIds = relationRows.map(row => row.track_id);

          if (!trackIds.length) {
            currentTracks = [];
            queueCountBtn.textContent = "Queue 0";
            tracksWrap.innerHTML = `<div class="empty-box">No tracks in this release yet.</div>`;
            await loadTrackSelect();
            setStatus("Release loaded.");
            return;
          }

          const { data: tracks, error: tracksError } = await supabase
            .from("music_tracks")
            .select("*")
            .in("id", trackIds);

          if (tracksError) throw tracksError;

          const map = new Map((tracks || []).map(track => [Number(track.id), track]));
          currentTracks = relationRows
            .map(row => {
              const track = map.get(Number(row.track_id));
              return track ? { ...track, _albumTrackId: row.id, _trackNumber: row.track_number } : null;
            })
            .filter(Boolean);

          queueCountBtn.textContent = `Queue ${currentTracks.length}`;

          tracksWrap.innerHTML = currentTracks.map((track, index) => `
            <div class="track">
              <div class="track-number">${track._trackNumber}</div>

              <div>
                <div class="track-title">${escapeHtml(track.title || "Untitled Track")}</div>
                <div class="track-text">
                  ${escapeHtml(track.artist_name || "Unknown Artist")} • ${escapeHtml(track.genre || "--")}<br>
                  ${escapeHtml(track.description || "")}
                </div>
              </div>

              <div class="track-actions">
                <button class="btn-green" type="button" onclick="window.__playAlbumTrack(${index})">Play</button>
                <a class="btn btn-dark" href="artist.html?id=${encodeURIComponent(track.user_id || "")}">Artist</a>
                ${
                  currentUser && currentAlbum.user_id === currentUser.id
                    ? `<button class="btn-dark" type="button" onclick="window.__removeAlbumTrack(${track._albumTrackId})">Remove</button>`
                    : ``
                }
              </div>
            </div>
          `).join("");

          const nextTrackNumber = currentTracks.length ? Math.max(...currentTracks.map(track => Number(track._trackNumber || 0))) + 1 : 1;
          trackNumberInput.value = nextTrackNumber;

          await loadTrackSelect();
          setStatus("Release loaded.");
        } catch (error) {
          setStatus("Release error: " + error.message);
          tracksWrap.innerHTML = `<div class="empty-box">Could not load release.</div>`;
        }
      }

      window.__playAlbumTrack = (index) => playTrack(index);
      window.__removeAlbumTrack = (albumTrackId) => removeTrackFromAlbum(albumTrackId);

      playAllBtn.addEventListener("click", () => {
        if (!currentTracks.length) {
          setStatus("No tracks in this release yet.");
          return;
        }
        playTrack(0);
      });

      refreshBtn.addEventListener("click", loadAlbum);
      addTrackBtn.addEventListener("click", addTrackToAlbum);
      reloadOwnerBtn.addEventListener("click", loadTrackSelect);
      prevBtn.addEventListener("click", playPrev);
      nextBtn.addEventListener("click", playNext);
      globalAudio.addEventListener("ended", playNext);

      loadAlbum();
    } catch (error) {
      document.body.innerHTML = `
        <div style="padding:30px;background:#111;color:white;min-height:100vh;">
          <h1 style="color:#7dff71;">Album View Startup Error</h1>
          <p>${error.message}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
