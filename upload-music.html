<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Music — Rich Bizness</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Inter;
  color:#fff;
  background:linear-gradient(#000,#000a),url('/images/brand/A4F9E199-6D52-4DD4-BFAB-3430A9C13074.png') center/cover fixed;
}

.app{padding:20px;max-width:800px;margin:auto;}

input,textarea,select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00ff88;
  font-weight:bold;
}

.status{margin-top:10px;padding:10px;border-radius:10px;display:none;}
.success{background:#00ff88;color:#000;}
.error{background:#ff4d4d;}
</style>
</head>

<body>

<div class="app">

<h2>Upload Track</h2>

<form id="uploadForm">

<input id="title" placeholder="Title" required>
<input id="artist" placeholder="Artist Name" required>

<select id="genre">
<option>Hip-Hop</option>
<option>Rap</option>
<option>R&B</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<input type="file" id="audioFile" accept="audio/*" required>
<input type="file" id="coverFile" accept="image/*">

<button>Upload</button>

</form>

<div id="status" class="status"></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

let user = null;

async function init(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(!user){
    alert("Login required");
  }
}

document.getElementById("uploadForm").onsubmit = async e=>{
  e.preventDefault();

  const status = document.getElementById("status");

  try{
    if(!user) throw "Not logged in";

    const audio = document.getElementById("audioFile").files[0];
    const cover = document.getElementById("coverFile").files[0];

    if(!audio) throw "No audio file";

    // 🔥 STEP 1: UPLOAD AUDIO
    const audioPath = `${user.id}/${Date.now()}-${audio.name}`;

    const { error: audioError } = await supabase
      .storage.from("music-files")
      .upload(audioPath, audio);

    if(audioError) throw audioError;

    const { data: audioUrlData } =
      supabase.storage.from("music-files").getPublicUrl(audioPath);

    // 🔥 STEP 2: UPLOAD COVER
    let coverUrl = null;

    if(cover){
      const coverPath = `${user.id}/${Date.now()}-${cover.name}`;

      const { error: coverError } = await supabase
        .storage.from("music-covers")
        .upload(coverPath, cover);

      if(coverError) throw coverError;

      const { data } =
        supabase.storage.from("music-covers").getPublicUrl(coverPath);

      coverUrl = data.publicUrl;
    }

    // 🔥 STEP 3: INSERT INTO DB
    const { error: insertError } = await supabase
      .from("tracks")
      .insert([{
        creator_id: user.id,
        title: document.getElementById("title").value,
        artist_name: document.getElementById("artist").value,
        genre: document.getElementById("genre").value,
        description: document.getElementById("description").value,
        audio_url: audioUrlData.publicUrl,
        cover_url: coverUrl,
        play_count:0,
        like_count:0,
        is_featured:false,
        is_explicit:false,
        metadata:{}
      }]);

    if(insertError) throw insertError;

    status.className = "status success";
    status.style.display="block";
    status.innerText = "UPLOAD SUCCESS 🔥";

    e.target.reset();

  }catch(err){
    console.error(err);
    status.className = "status error";
    status.style.display="block";
    status.innerText = "UPLOAD FAILED ❌";
  }
};

init();
</script>

</body>
</html>
