<!DOCTYPE html>
<html>
<head>
  <title>Upload Music</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;padding:20px;">

<h1>Upload Music</h1>

<input type="text" id="title" placeholder="Song Title"><br><br>
<input type="text" id="artist" placeholder="Artist Name"><br><br>
<input type="file" id="audio"><br><br>

<button onclick="uploadMusic()">Upload</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

async function uploadMusic() {
  const file = document.getElementById("audio").files[0];
  const title = document.getElementById("title").value;
  const artist = document.getElementById("artist").value;

  const fileName = Date.now() + "-" + file.name;

  const { error: uploadError } = await supabase.storage
    .from("music-files")
    .upload(fileName, file);

  if (uploadError) {
    alert(uploadError.message);
    return;
  }

  const { data } = supabase.storage
    .from("music-files")
    .getPublicUrl(fileName);

  const { error: dbError } = await supabase
    .from("music")
    .insert([
      {
        title,
        artist_name: artist,
        audio_url: data.publicUrl
      }
    ]);

  if (dbError) {
    alert(dbError.message);
    return;
  }

  alert("Music uploaded!");
}
</script>

</body>
</html>
