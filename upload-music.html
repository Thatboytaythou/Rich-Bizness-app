<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Music</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.page{padding:20px;max-width:900px;margin:auto}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#7dff71;
  font-weight:900;
  cursor:pointer;
}

.status{
  margin-top:15px;
  padding:10px;
  background:#111;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="page">
<h1>Upload Music</h1>

<input id="title" placeholder="Track Title">
<input id="artist" placeholder="Artist Name">
<input id="album" placeholder="Album Name">
<input id="genre" placeholder="Genre">

<select id="locked">
  <option value="false">Free Track</option>
  <option value="true">Locked (Paid)</option>
</select>

<input id="price" type="number" placeholder="Price in cents (e.g. 299)">
<input id="audio" type="file" accept="audio/*">
<input id="cover" type="file" accept="image/*">

<button id="uploadBtn">Upload Track</button>

<div id="status" class="status"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
)

const statusBox = document.getElementById("status")

function status(msg){statusBox.textContent=msg}

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g,"-")
}

async function upload(){

  try{
    status("Uploading...")

    const {data} = await supabase.auth.getSession()
    const user = data.session?.user

    if(!user) throw new Error("Login required")

    const title = document.getElementById("title").value
    const artist = document.getElementById("artist").value
    const album = document.getElementById("album").value
    const genre = document.getElementById("genre").value
    const locked = document.getElementById("locked").value === "true"
    const price = Number(document.getElementById("price").value || 0)

    const audioFile = document.getElementById("audio").files[0]
    const coverFile = document.getElementById("cover").files[0]

    if(!title || !audioFile) throw new Error("Missing title or audio")

    const slug = slugify(title + "-" + Date.now())

    // upload audio
    const audioPath = `${user.id}/${slug}.mp3`

    const {error:audioErr} = await supabase.storage
      .from("music-files")
      .upload(audioPath, audioFile)

    if(audioErr) throw audioErr

    const {data:audioUrlData} = supabase.storage
      .from("music-files")
      .getPublicUrl(audioPath)

    let coverUrl = ""

    if(coverFile){
      const coverPath = `${user.id}/${slug}.jpg`

      await supabase.storage
        .from("music-covers")
        .upload(coverPath, coverFile)

      const {data:coverUrlData} = supabase.storage
        .from("music-covers")
        .getPublicUrl(coverPath)

      coverUrl = coverUrlData.publicUrl
    }

    // save to database
    const {error:dbErr} = await supabase
      .from("music_uploads")
      .insert([{
        user_id:user.id,
        title,
        artist_name:artist,
        album_name:album,
        genre,
        file_url:audioUrlData.publicUrl,
        cover_url:coverUrl,
        slug,
        album_slug: slugify(album || ""),
        price_cents:price,
        is_locked:locked
      }])

    if(dbErr) throw dbErr

    status("SUCCESS uploaded")

  }catch(err){
    status("ERROR: "+err.message)
  }
}

document.getElementById("uploadBtn").onclick = upload
</script>

</body>
</html>
