<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Music | Rich Bizness</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: #fff;
      min-height: 100vh;
      padding: 24px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      color: #39ff14;
    }

    .top-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-links a {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 22px;
    }

    .card {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px;
    }

    h1, h2 {
      color: #39ff14;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      background: #121212;
      color: #fff;
      border: 1px solid #2b2b2b;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-green {
      background: #39ff14;
      color: #000;
    }

    .btn-dark {
      background: #1c1c1c;
      color: #fff;
    }

    .preview-box {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      padding: 18px;
    }

    .preview-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      background: #141414;
      display: none;
      margin-bottom: 14px;
    }

    .preview-placeholder {
      color: #bfbfbf;
      text-align: center;
      padding: 28px;
    }

    audio {
      width: 100%;
      margin-top: 12px;
      display: none;
    }

    #statusBox {
      margin-top: 14px;
      font-weight: 700;
    }

    @media (max-width: 950px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .brand {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">Rich Bizness Upload Music</div>

      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="music.html">Music</a>
        <a href="gallery.html">Gallery</a>
        <a href="profile.html">Profile</a>
        <a href="live.html">Go Live</a>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h1>Upload Music</h1>

        <div class="form-group">
          <label for="titleInput">Track Title</label>
          <input id="titleInput" type="text" placeholder="Track title" />
        </div>

        <div class="form-group">
          <label for="artistNameInput">Artist Name</label>
          <input id="artistNameInput" type="text" placeholder="Artist name" />
        </div>

        <div class="form-group">
          <label for="genreInput">Genre</label>
          <select id="genreInput">
            <option value="Hip-Hop">Hip-Hop</option>
            <option value="R&B">R&B</option>
            <option value="Pop">Pop</option>
            <option value="Rock">Rock</option>
            <option value="Gospel">Gospel</option>
            <option value="Trap">Trap</option>
            <option value="Afrobeats">Afrobeats</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="descriptionInput">Description</label>
          <textarea id="descriptionInput" placeholder="Track description"></textarea>
        </div>

        <div class="form-group">
          <label for="coverInput">Cover Image</label>
          <input id="coverInput" type="file" accept="image/*" />
        </div>

        <div class="form-group">
          <label for="audioInput">Audio File</label>
          <input id="audioInput" type="file" accept="audio/*" />
        </div>

        <div class="button-row">
          <button id="uploadBtn" class="btn-green">Upload Music</button>
          <button id="clearBtn" class="btn-dark" type="button">Clear</button>
        </div>

        <div id="statusBox"></div>
      </div>

      <div class="card">
        <h2>Preview</h2>
        <div class="preview-box">
          <img id="previewCover" class="preview-cover" alt="Cover Preview" />
          <div id="previewPlaceholder" class="preview-placeholder">
            Cover art and audio preview will show here.
          </div>
          <audio id="previewAudio" controls></audio>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const MUSIC_BUCKET = "music";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const titleInput = document.getElementById("titleInput");
    const artistNameInput = document.getElementById("artistNameInput");
    const genreInput = document.getElementById("genreInput");
    const descriptionInput = document.getElementById("descriptionInput");
    const coverInput = document.getElementById("coverInput");
    const audioInput = document.getElementById("audioInput");
    const statusBox = document.getElementById("statusBox");

    const previewCover = document.getElementById("previewCover");
    const previewAudio = document.getElementById("previewAudio");
    const previewPlaceholder = document.getElementById("previewPlaceholder");

    function showStatus(message) {
      statusBox.textContent = message;
    }

    function safeFileName(name) {
      return name.replace(/[^a-zA-Z0-9.\-_]/g, "_");
    }

    async function requireUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error || !data.user) {
        window.location.href = "auth.html";
        return null;
      }
      return data.user;
    }

    function previewCoverFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        previewCover.src = e.target.result;
        previewCover.style.display = "block";
        previewPlaceholder.style.display = "none";
      };
      reader.readAsDataURL(file);
    }

    function previewAudioFile(file) {
      if (!file) return;
      previewAudio.src = URL.createObjectURL(file);
      previewAudio.style.display = "block";
      previewPlaceholder.style.display = "none";
    }

    async function uploadMusic() {
      const user = await requireUser();
      if (!user) return;

      const title = titleInput.value.trim();
      const artistName = artistNameInput.value.trim();
      const genre = genreInput.value;
      const description = descriptionInput.value.trim();
      const coverFile = coverInput.files[0];
      const audioFile = audioInput.files[0];

      if (!title) return showStatus("Please enter a track title.");
      if (!artistName) return showStatus("Please enter an artist name.");
      if (!audioFile) return showStatus("Please choose an audio file.");

      showStatus("Uploading music...");

      try {
        let coverUrl = "";

        if (coverFile) {
          const coverName = safeFileName(coverFile.name);
          const coverExt = coverName.includes(".") ? coverName.split(".").pop() : "jpg";
          const coverPath = `${user.id}/cover-${Date.now()}-${Math.random().toString(36).slice(2)}.${coverExt}`;

          const { error: coverError } = await supabaseClient.storage
            .from(MUSIC_BUCKET)
            .upload(coverPath, coverFile, { cacheControl: "3600", upsert: false });

          if (coverError) throw coverError;

          const { data: coverPublic } = supabaseClient.storage
            .from(MUSIC_BUCKET)
            .getPublicUrl(coverPath);

          coverUrl = coverPublic.publicUrl;
        }

        const audioName = safeFileName(audioFile.name);
        const audioExt = audioName.includes(".") ? audioName.split(".").pop() : "mp3";
        const audioPath = `${user.id}/audio-${Date.now()}-${Math.random().toString(36).slice(2)}.${audioExt}`;

        const { error: audioError } = await supabaseClient.storage
          .from(MUSIC_BUCKET)
          .upload(audioPath, audioFile, { cacheControl: "3600", upsert: false });

        if (audioError) throw audioError;

        const { data: audioPublic } = supabaseClient.storage
          .from(MUSIC_BUCKET)
          .getPublicUrl(audioPath);

        const audioUrl = audioPublic.publicUrl;

        const { error: insertError } = await supabaseClient
          .from("music")
          .insert([{
            user_id: user.id,
            title: title,
            artist_name: artistName,
            description: description,
            audio_url: audioUrl,
            cover_url: coverUrl,
            genre: genre
          }]);

        if (insertError) throw insertError;

        showStatus("Music uploaded successfully.");
        setTimeout(() => {
          window.location.href = "music.html";
        }, 1200);

      } catch (error) {
        showStatus("Upload failed: " + error.message);
      }
    }

    coverInput.addEventListener("change", () => previewCoverFile(coverInput.files[0]));
    audioInput.addEventListener("change", () => previewAudioFile(audioInput.files[0]));

    document.getElementById("uploadBtn").addEventListener("click", uploadMusic);
    document.getElementById("clearBtn").addEventListener("click", () => {
      window.location.reload();
    });
  </script>
</body>
</html>
