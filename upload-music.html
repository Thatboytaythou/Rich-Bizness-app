<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artist Upload — Rich Bizness</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  color:#fff;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95)),
    url('/images/brand/A4F9E199-6D52-4DD4-BFAB-3430A9C13074.png') center/cover no-repeat fixed;
}

.app{max-width:1200px;margin:auto;padding:20px;}

.nav a{
  padding:10px 14px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  text-decoration:none;
  color:#fff;
}

.panel{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

.field input,.field textarea,.field select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

.btn{padding:12px;border:none;border-radius:10px;cursor:pointer;}
.btn-primary{background:#00ff88;color:#000;}

.status{margin-top:10px;padding:10px;border-radius:10px;display:none;}
.status.show{display:block;}
.success{background:#00ff88;color:#000;}
.error{background:#ff4d4d;}
</style>
</head>

<body>
<div class="app">

<h1>Upload Music</h1>

<div class="panel">
<form id="uploadForm">

<input id="title" placeholder="Track Title" required />
<input id="artist" placeholder="Artist Name" required />

<select id="genre">
<option>Hip-Hop</option>
<option>Rap</option>
<option>R&B</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<input type="file" id="audioFile" accept="audio/*" required />
<input type="file" id="coverFile" accept="image/*" />

<button class="btn btn-primary">Upload Track</button>

</form>

<div id="status" class="status"></div>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

let user = null;

async function init(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(!user){
    alert("You must be signed in");
  }
}

document.getElementById("uploadForm").onsubmit = async e=>{
  e.preventDefault();

  const status = document.getElementById("status");

  try{
    if(!user) throw "Not logged in";

    const audio = document.getElementById("audioFile").files[0];
    const cover = document.getElementById("coverFile").files[0];

    if(!audio) throw "Audio required";

    // ✅ CORRECT BUCKET
    const audioPath = `${user.id}/${Date.now()}-${audio.name}`;

    const { error: audioError } = await supabase
      .storage
      .from("music-files")
      .upload(audioPath, audio);

    if(audioError) throw audioError;

    const { data: audioUrlData } =
      supabase.storage.from("music-files").getPublicUrl(audioPath);

    let coverUrl = null;

    if(cover){
      const coverPath = `${user.id}/${Date.now()}-${cover.name}`;

      const { error: coverError } = await supabase
        .storage
        .from("music-covers")
        .upload(coverPath, cover);

      if(coverError) throw coverError;

      const { data } =
        supabase.storage.from("music-covers").getPublicUrl(coverPath);

      coverUrl = data.publicUrl;
    }

    // ✅ INSERT INTO YOUR TABLE
    const { error: insertError } = await supabase
      .from("tracks")
      .insert([{
        creator_id: user.id,
        title: document.getElementById("title").value,
        artist_name: document.getElementById("artist").value,
        genre: document.getElementById("genre").value,
        description: document.getElementById("description").value,
        audio_url: audioUrlData.publicUrl,
        cover_url: coverUrl,
        is_explicit:false,
        is_featured:false,
        play_count:0,
        like_count:0,
        metadata:{}
      }]);

    if(insertError) throw insertError;

    status.className = "status show success";
    status.innerText = "UPLOAD SUCCESS 🔥";

  }catch(err){
    console.error(err);
    status.className = "status show error";
    status.innerText = "UPLOAD FAILED ❌";
  }
};

init();
</script>

</body>
</html>
