<!DOCTYPE html>
<html>
  <head>
    <title>Artist Profile - Rich Bizness LLC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      function getArtistName() {
        const params = new URLSearchParams(window.location.search);
        return params.get("name") || "";
      }

      async function loadArtist() {
        const artistName = getArtistName();
        const title = document.getElementById("artistTitle");
        const grid = document.getElementById("artistGrid");
        const status = document.getElementById("status");

        if (!artistName) {
          status.textContent = "No artist selected.";
          return;
        }

        title.textContent = artistName;
        status.textContent = "Loading profile...";

        const { data, error } = await supabase
          .from("uploads")
          .select("*")
          .eq("artist", artistName)
          .order("created_at", { ascending: false });

        if (error) {
          status.textContent = `Could not load artist: ${error.message}`;
          return;
        }

        status.textContent = "";

        (data || []).forEach((item) => {
          const card = document.createElement("div");
          card.style.background = "#111";
          card.style.border = "1px solid #222";
          card.style.borderRadius = "20px";
          card.style.overflow = "hidden";

          const img = document.createElement("img");
          img.src = item.image_url;
          img.alt = item.artist;
          img.style.width = "100%";
          img.style.height = "320px";
          img.style.objectFit = "cover";
          img.style.display = "block";

          const body = document.createElement("div");
          body.style.padding = "14px";

          const cat = document.createElement("div");
          cat.textContent = item.category;
          cat.style.color = "#4da3ff";
          cat.style.marginBottom = "8px";

          const likes = document.createElement("div");
          likes.textContent = `❤️ ${item.likes ?? 0} likes`;

          body.appendChild(cat);
          body.appendChild(likes);

          card.appendChild(img);
          card.appendChild(body);
          grid.appendChild(card);
        });
      }

      window.addEventListener("DOMContentLoaded", loadArtist);
    </script>
  </head>

  <body style="margin:0; background:black; color:white; font-family:sans-serif; padding:24px;">
    <div style="max-width:1200px; margin:0 auto;">
      <div style="margin-bottom:20px;">
        <a href="/gallery.html" style="color:#4da3ff;">← Back to Gallery</a>
      </div>

      <h1 id="artistTitle" style="font-size:52px; margin-bottom:12px;">Artist</h1>
      <p id="status" style="margin-bottom:24px;"></p>

      <div
        id="artistGrid"
        style="
          display:grid;
          grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
          gap:24px;
        "
      ></div>
    </div>
  </body>
</html>
