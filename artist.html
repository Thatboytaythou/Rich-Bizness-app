<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artists | Rich Bizness</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
    url("images/brand/logo-music-label.png") center/cover no-repeat fixed;
}

.page { max-width:1400px; margin:auto; padding:20px; }

h1 {
  text-align:center;
  color:#7dff71;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}

.card {
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(125,255,113,0.2);
  border-radius:18px;
  padding:16px;
  text-align:center;
}

.avatar {
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  border:2px solid #7dff71;
}

.name {
  font-weight:900;
  color:#7dff71;
  font-size:1.2rem;
}

.meta {
  font-size:0.9rem;
  opacity:0.85;
}

.bio {
  margin-top:8px;
  font-size:0.95rem;
}

.empty {
  text-align:center;
  margin-top:40px;
}
</style>
</head>

<body>
<div class="page">
<h1>Artists</h1>
<div id="artistGrid" class="grid"></div>
</div>

<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const grid = document.getElementById("artistGrid");

function render(items){
  if(!items.length){
    grid.innerHTML = "<div class='empty'>No artists yet.</div>";
    return;
  }

  grid.innerHTML = items.map(user=>`
    <div class="card">
      ${
        user.avatar_url
        ? `<img src="${user.avatar_url}" class="avatar">`
        : `<div class="avatar" style="display:flex;align-items:center;justify-content:center;background:#111;">RB</div>`
      }
      <div class="name">${user.display_name || "Artist"}</div>
      <div class="meta">${user.email}</div>
      <div class="bio">${user.bio || ""}</div>
      <div class="meta">${user.favorite_genre || ""}</div>
    </div>
  `).join("");
}

async function load(){
  const {data,error} = await supabase
    .from("profiles")
    .select("*");

  if(error){
    grid.innerHTML="Error loading";
    return;
  }

  render(data || []);
}

load();
</script>
</body>
</html>
