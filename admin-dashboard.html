<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rich Bizness | Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="/styles/main.css" />
<link rel="stylesheet" href="/styles/mobile.css" />
<link rel="stylesheet" href="/styles/pages/admin-dashboard.css" />  

<style>
/* KEEPING YOUR STYLE EXACT */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.95)),
    url("images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png") center/cover fixed;
}

.page { max-width: 1800px; margin: auto; padding: 20px; }

.section {
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.item {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 10px;
}

.btn {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn-red { background: #ef5b55; }
.btn-blue { background: #67b7ff; }
.btn-green { background: #7dff71; color: black; }

.empty-box {
  text-align: center;
  opacity: 0.7;
}
</style>
</head>

<body>
<div class="page">

<h1>🔥 Admin Dashboard</h1>
<div id="statusBox">Loading...</div>

<!-- =========================
LIVE CONTROL (NEW CORE FIX)
========================= -->
<div class="section">
  <h2>Live Stream Control</h2>
  <div id="liveAdminList">
    <div class="empty-box">Loading live streams...</div>
  </div>
</div>

<!-- =========================
CREATORS
========================= -->
<div class="section">
  <h2>Creators</h2>
  <div id="creatorList"></div>
</div>

<!-- =========================
STORE
========================= -->
<div class="section">
  <h2>Store Moderation</h2>
  <div id="storeList"></div>
</div>

<!-- =========================
PAYOUTS
========================= -->
<div class="section">
  <h2>Payouts</h2>
  <div id="payoutList"></div>
</div>

</div>

<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const statusBox = document.getElementById("statusBox");

let liveStreams = [];
let creators = [];
let storeItems = [];
let payouts = [];

/* =========================
HELPERS
========================= */
function setStatus(msg){ statusBox.textContent = msg; }

function escapeHtml(t){
  return String(t || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* =========================
LIVE STREAMS (NEW CORE)
========================= */
async function loadLiveStreams(){
  const { data, error } = await supabase
    .from("live_streams")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(20);

  if(error){ console.error(error); return; }
  liveStreams = data || [];
}

function renderLiveStreams(){
  const el = document.getElementById("liveAdminList");

  if(!liveStreams.length){
    el.innerHTML = `<div class="empty-box">No live streams</div>`;
    return;
  }

  el.innerHTML = liveStreams.map(s=>`
    <div class="item">
      <strong>${escapeHtml(s.title)}</strong><br>
      Status: ${s.status}<br>
      Viewers: ${s.viewer_count || 0}<br>

      <br>
      <button class="btn btn-blue open" data-slug="${s.slug}">Open</button>
      <button class="btn btn-red end" data-id="${s.id}">End</button>
    </div>
  `).join("");

  document.querySelectorAll(".open").forEach(btn=>{
    btn.onclick=()=>window.open(`/watch.html?slug=${btn.dataset.slug}`);
  });

  document.querySelectorAll(".end").forEach(btn=>{
    btn.onclick=async ()=>{
      await supabase
        .from("live_streams")
        .update({ status:"ended" })
        .eq("id", btn.dataset.id);

      await boot();
    };
  });
}

/* =========================
CREATORS
========================= */
async function loadCreators(){
  const { data } = await supabase.from("profiles").select("*").limit(20);
  creators = data || [];
}

function renderCreators(){
  const el = document.getElementById("creatorList");

  if(!creators.length){
    el.innerHTML = `<div class="empty-box">No creators</div>`;
    return;
  }

  el.innerHTML = creators.map(c=>`
    <div class="item">
      ${escapeHtml(c.display_name || c.email)}<br>
      Role: ${c.role || "user"}
    </div>
  `).join("");
}

/* =========================
STORE
========================= */
async function loadStore(){
  const { data } = await supabase.from("artworks").select("*").limit(20);
  storeItems = data || [];
}

function renderStore(){
  const el = document.getElementById("storeList");

  el.innerHTML = storeItems.map(s=>`
    <div class="item">
      ${escapeHtml(s.title)}<br>
      ${s.is_hidden ? "Hidden" : "Visible"}
    </div>
  `).join("");
}

/* =========================
PAYOUTS
========================= */
async function loadPayouts(){
  const { data } = await supabase.from("payout_requests").select("*").limit(20);
  payouts = data || [];
}

function renderPayouts(){
  const el = document.getElementById("payoutList");

  el.innerHTML = payouts.map(p=>`
    <div class="item">
      ${p.user_id}<br>
      $${p.amount}<br>
      ${p.status}
    </div>
  `).join("");
}

/* =========================
BOOT
========================= */
async function boot(){
  try{
    setStatus("Loading admin...");

    await loadLiveStreams();
    await loadCreators();
    await loadStore();
    await loadPayouts();

    renderLiveStreams();
    renderCreators();
    renderStore();
    renderPayouts();

    setStatus("✅ Admin Ready");
  }catch(err){
    console.error(err);
    setStatus("❌ Error: " + err.message);
  }
}

boot();
</script>
</body>
</html>
