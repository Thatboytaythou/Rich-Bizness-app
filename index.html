<!DOCTYPE html>
<html>
  <head>
    <title>Artist Gallery - Rich Bizness LLC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function loadGallery() {
        const status = document.getElementById("status");
        const gallery = document.getElementById("gallery");

        status.textContent = "Loading gallery...";

        const { data, error } = await supabase.storage
          .from("Artist-uploads")
          .list("", {
            limit: 100,
            sortBy: { column: "created_at", order: "desc" }
          });

        if (error) {
          status.textContent = `Could not load gallery: ${error.message}`;
          return;
        }

        if (!data || data.length === 0) {
          status.textContent = "No uploads yet.";
          return;
        }

        status.textContent = "";

        data.forEach((file) => {
          if (!file.name) return;

          const { data: publicData } = supabase.storage
            .from("Artist-uploads")
            .getPublicUrl(file.name);

          const card = document.createElement("div");
          card.style.background = "#111";
          card.style.border = "1px solid #333";
          card.style.borderRadius = "18px";
          card.style.padding = "12px";
          card.style.boxSizing = "border-box";

          const img = document.createElement("img");
          img.src = publicData.publicUrl;
          img.alt = file.name;
          img.style.width = "100%";
          img.style.height = "260px";
          img.style.objectFit = "cover";
          img.style.borderRadius = "12px";
          img.style.display = "block";

          const name = document.createElement("p");
          name.textContent = file.name;
          name.style.color = "white";
          name.style.fontSize = "14px";
          name.style.marginTop = "10px";
          name.style.wordBreak = "break-word";

          const link = document.createElement("a");
          link.href = publicData.publicUrl;
          link.target = "_blank";
          link.textContent = "View Full Image";
          link.style.color = "#4da3ff";
          link.style.display = "inline-block";
          link.style.marginTop = "6px";

          card.appendChild(img);
          card.appendChild(name);
          card.appendChild(link);
          gallery.appendChild(card);
        });
      }

      window.addEventListener("DOMContentLoaded", loadGallery);
    </script>
  </head>

  <body style="margin:0; background:black; color:white; font-family:sans-serif; padding:24px;">
    <div style="max-width:1200px; margin:0 auto;">
      <h1 style="text-align:center; font-size:48px; margin-bottom:10px;">🔥 Artist Gallery 🔥</h1>
      <p style="text-align:center; font-size:22px; color:#ddd; margin-bottom:30px;">
        Tattoos, art, and 3D prints from the Rich Bizness community
      </p>

      <div style="text-align:center; margin-bottom:24px;">
        <a href="/" style="color:#4da3ff; margin-right:18px;">Home</a>
        <a href="/upload.html" style="color:#4da3ff;">Upload Your Work</a>
      </div>

      <p id="status" style="text-align:center; margin-bottom:24px;"></p>

      <div
        id="gallery"
        style="
          display:grid;
          grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
          gap:20px;
        "
      ></div>
    </div>
  </body>
</html>
