<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Rich Bizness</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  width:100%;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* BACKGROUND */
.bg {
  position:fixed;
  inset:0;
  background:url('/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png') center/cover no-repeat;
  transition: transform 0.6s ease, filter 0.6s ease;
}

/* DEPTH OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(0,255,170,0.25), rgba(0,0,0,0.9));
}

/* CENTER SYSTEM */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90vw;
  max-width:420px;
  aspect-ratio:1/1;
}

/* RINGS */
.ring, .ring2 {
  position:absolute;
  inset:0;
  border-radius:50%;
  transition: transform 0.2s ease-out;
}

.ring {
  border:6px solid #00ffaa;
  box-shadow:0 0 40px #00ffaa;
}

.ring2 {
  inset:12%;
  border:2px solid rgba(0,255,170,0.4);
}

/* ACTIVE PULSE */
.pulse {
  position:absolute;
  inset:0;
  border-radius:50%;
  box-shadow:0 0 80px #00ffaa;
  opacity:0.2;
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0% { transform:scale(1); opacity:0.2; }
  50% { transform:scale(1.1); opacity:0.4; }
  100% { transform:scale(1); opacity:0.2; }
}

/* CORE */
.core {
  position:absolute;
  inset:30%;
  border-radius:50%;
  background:#00ffaa;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:black;
  box-shadow:0 0 60px #00ffaa;
  transition:0.2s;
}

.core:active {
  transform:scale(0.8);
}

/* LABELS */
.label {
  position:absolute;
  color:#00ffaa;
  font-size:12px;
  text-shadow:0 0 10px #00ffaa;
  transition:0.2s;
}

.activeLabel {
  color:white;
  transform:scale(1.3);
}

/* POSITIONS */
.music { top:18%; left:20%; }
.gaming { left:5%; top:45%; }
.sports { top:18%; right:20%; }
.gallery { top:5%; left:50%; transform:translateX(-50%); }
.store { top:35%; right:5%; }
.meta { right:10%; bottom:25%; }
.upload { bottom:10%; right:30%; }

</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="center">

  <div class="pulse"></div>

  <div class="ring" id="ring"></div>
  <div class="ring2" id="ring2"></div>

  <div class="label music">MUSIC</div>
  <div class="label gaming">GAMING</div>
  <div class="label sports">SPORTS</div>
  <div class="label gallery">GALLERY</div>
  <div class="label store">STORE</div>
  <div class="label meta">META</div>
  <div class="label upload">UPLOAD</div>

  <div class="core" id="coreBtn">SELECT</div>

</div>

<script>
const core = document.getElementById("coreBtn");
const bg = document.getElementById("bg");
const ring = document.getElementById("ring");
const ring2 = document.getElementById("ring2");
const labels = document.querySelectorAll(".label");

const sections = [
  { name: "music", route: "/music.html" },
  { name: "gaming", route: "/gaming.html" },
  { name: "sports", route: "/sports.html" },
  { name: "gallery", route: "/gallery.html" },
  { name: "store", route: "/store.html" },
  { name: "meta", route: "/metaverse.html" },
  { name: "upload", route: "/upload.html" }
];

let angle = 0;
let velocity = 0;
let isDragging = false;
let startX = 0;

/* ROTATION */
function updateRotation() {
  ring.style.transform = `rotate(${angle}deg)`;
  ring2.style.transform = `rotate(${-angle}deg)`;
}

/* INDEX */
function getIndex() {
  let step = 360 / sections.length;
  let index = Math.round(angle / step) % sections.length;
  if (index < 0) index += sections.length;
  return index;
}

/* SNAP */
function snap() {
  let step = 360 / sections.length;
  let index = getIndex();

  angle = index * step;
  velocity = 0;

  updateRotation();

  labels.forEach(l => l.classList.remove("activeLabel"));
  labels[index].classList.add("activeLabel");

  core.innerText = sections[index].name.toUpperCase();
}

/* PHYSICS LOOP */
function animate() {
  if (!isDragging) {
    angle += velocity;
    velocity *= 0.95;

    if (Math.abs(velocity) < 0.01) velocity = 0;
    updateRotation();
  }
  requestAnimationFrame(animate);
}
animate();

/* TOUCH */
document.addEventListener("touchstart", (e) => {
  isDragging = true;
  startX = e.touches[0].clientX;
  velocity = 0;
});

document.addEventListener("touchmove", (e) => {
  if (!isDragging) return;

  let moveX = e.touches[0].clientX;
  let delta = moveX - startX;

  velocity = delta * 0.1;
  angle += velocity;

  startX = moveX;
  updateRotation();
});

document.addEventListener("touchend", () => {
  isDragging = false;
  setTimeout(snap, 150);
});

/* ENTER */
core.addEventListener("click", () => {
  let selected = sections[getIndex()];

  bg.style.transform = "scale(1.5)";
  bg.style.filter = "brightness(1.4)";

  core.innerText = "ENTERING";

  setTimeout(() => {
    window.location.href = selected.route;
  }, 700);
});

snap();
</script>

</body>
</html>
