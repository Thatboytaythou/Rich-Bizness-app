<!DOCTYPE html>
<html>
<head>
  <title>Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-top: 60px;
    }

    p {
      font-size: 20px;
      margin-bottom: 40px;
      color: #ccc;
    }

    .btn {
      padding: 16px 28px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .primary {
      background: #00ff99;
      color: black;
      font-weight: bold;
    }

    .secondary {
      background: #ddd;
      color: black;
    }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .user {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 14px;
      color: #00ffaa;
    }

    .logout {
      position: absolute;
      top: 40px;
      right: 15px;
      font-size: 12px;
      cursor: pointer;
      color: red;
    }
  </style>
</head>

<body>

  <!-- USER STATUS -->
  <div id="userStatus" class="user"></div>
  <div id="logoutBtn" class="logout"></div>

  <h1>🔥 Rich Bizness LLC 🔥</h1>

  <p>Welcome to the future of art, tattoos & 3D printing</p>

  <!-- AUTH -->
  <a href="auth">
    <button class="btn primary">Sign In / Sign Up</button>
  </a>

  <br>

  <!-- UPLOAD -->
  <a href="upload">
    <button class="btn secondary">Upload Your Work</button>
  </a>

  <br><br>

  <!-- NAV -->
  <div class="row">
    <a href="gallery">
      <button class="btn secondary">View Gallery</button>
    </a>

    <a href="profile">
      <button class="btn secondary">My Profile</button>
    </a>
  </div>

  <!-- SUPABASE -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkUser() {
      const { data: { session } } = await supabase.auth.getSession();

      const status = document.getElementById("userStatus");
      const logout = document.getElementById("logoutBtn");

      if (session) {
        status.innerText = "🔥 Logged in";
        logout.innerText = "Logout";

        logout.onclick = async () => {
          await supabase.auth.signOut();
          location.reload();
        };

      } else {
        status.innerText = "Not signed in";
        logout.innerText = "";
      }
    }

    checkUser();
  </script>

</body>
</html>
