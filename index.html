<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — Console UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;height:100%;background:#000;overflow:hidden;
  font-family:system-ui;
}

/* BACKGROUND */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(0,255,200,.25), transparent 60%),
    url("/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png")
    center/cover no-repeat;
}

/* STAGE */
.stage{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
}

.omni{
  width:92vw;max-width:460px;aspect-ratio:1;
  position:relative;
}

/* RING */
.outer{
  position:absolute;inset:0;border-radius:50%;
  background:#001;
  box-shadow:0 0 120px #00ffcc;
}

/* WHEEL */
.wheel{
  position:absolute;inset:0;
}

/* ICON */
.seg{
  position:absolute;
  left:50%;top:50%;
  translate:-50% -50%;
  font-size:30px;
  opacity:.5;
  transition:.25s;
}

/* ACTIVE */
.seg.active{
  scale:2;
  opacity:1;
  filter:drop-shadow(0 0 25px #00ffff);
}

/* CORE */
.core{
  position:absolute;inset:30%;
  border-radius:50%;
  background:#000;
  box-shadow:0 0 60px #00ffcc;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  cursor:pointer;
}

/* LABEL (CONSOLE UI) */
.label{
  position:absolute;
  bottom:-70px;
  width:100%;
  text-align:center;
  color:#00ffcc;
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
}

/* AVATAR */
.avatar{
  width:100%;height:100%;object-fit:cover;
}

/* PORTAL */
.portal{
  position:fixed;
  width:20px;height:20px;
  border-radius:50%;
  background:radial-gradient(circle,#00ffff,#000);
  transform:scale(0);
  z-index:999;
  transition:.7s ease;
}

.portal.expand{
  transform:scale(90);
  border-radius:0;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">
  <div class="omni">

    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <div class="core" id="core">
      <img class="avatar" id="avatar" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
    </div>

    <div class="label" id="label">LIVE</div>

  </div>
</div>

<script>

const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"ALERTS",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const label=document.getElementById("label");

let rot=0,vel=0,drag=false,lastX=0;
const step=(Math.PI*2)/WORLDS.length;

/* BUILD */
function build(){
  const r=Math.min(innerWidth,innerHeight)*0.33;

  WORLDS.forEach((w,i)=>{
    const el=document.createElement("div");
    el.className="seg";
    el.innerText=w.e;

    const a=i*step-Math.PI/2;
    const x=Math.cos(a)*r;
    const y=Math.sin(a)*r;

    el.style.transform=`translate(${x}px,${y}px)`;

    el.onclick=()=>openWorld(w, el);

    wheel.appendChild(el);
  });
}
build();

/* OPEN */
function openWorld(w, el){
  const rect=el.getBoundingClientRect();

  const portal=document.createElement("div");
  portal.className="portal";

  portal.style.left=rect.left+"px";
  portal.style.top=rect.top+"px";

  document.body.appendChild(portal);

  requestAnimationFrame(()=>portal.classList.add("expand"));

  setTimeout(()=>{
    location.href=w.u;
  },800);
}

/* UPDATE */
function update(){
  wheel.style.transform=`rotate(${rot}rad)`;

  let i=Math.round(-rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    s.classList.toggle("active",idx===i);
  });

  label.innerText=WORLDS[i].n;
}

/* LOOP */
function loop(){

  if(!drag){
    rot+=vel;
    vel*=0.90;

    /* SNAP LOCK (CONSOLE FEEL) */
    if(Math.abs(vel)<0.002){
      const snap=Math.round(rot/step)*step;
      rot += (snap-rot)*0.15;
    }
  }

  update();
  requestAnimationFrame(loop);
}
loop();

/* DRAG */
addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

addEventListener("pointermove",e=>{
  if(!drag)return;

  let dx=e.clientX-lastX;
  lastX=e.clientX;

  let force=dx/250;
  rot+=force;
  vel=force;
});

addEventListener("pointerup",()=>{
  drag=false;
});

/* CENTER CLICK */
document.getElementById("core").onclick=()=>{
  let i=Math.round(-rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  const selected=WORLDS[i];
  const el=document.querySelectorAll(".seg")[i];

  openWorld(selected, el);
};

</script>

</body>
</html>
