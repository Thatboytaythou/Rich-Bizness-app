<!DOCTYPE html>
<html>
<head>
  <title>Rich Bizness</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #010, #000);
      overflow: hidden;
      color: white;
      font-family: sans-serif;
    }

    .omni-wrap {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .ring {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 2px solid #00ff88;
      position: relative;
      transform: rotate(0deg);
      transition: transform 0.2s ease-out;
    }

    .item {
      position: absolute;
      width: 80px;
      text-align: center;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .active {
      color: #00ff88;
      font-weight: bold;
      transform: translate(-50%, -50%) scale(1.3);
    }

    .core {
      margin-top: 30px;
      padding: 18px 40px;
      border-radius: 40px;
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px #00ff88;
      transition: 0.2s;
    }

    .core:active {
      transform: scale(0.95);
      box-shadow: 0 0 40px #00ff88;
    }
  </style>
</head>

<body>

<div class="omni-wrap">

  <div class="ring" id="ring">
    <div class="item" data-page="/live.html" style="top:0%; left:50%">LIVE</div>
    <div class="item" data-page="/music.html" style="top:25%; left:90%">MUSIC</div>
    <div class="item" data-page="/gaming.html" style="top:75%; left:90%">GAMING</div>
    <div class="item" data-page="/sports.html" style="top:100%; left:50%">SPORTS</div>
    <div class="item" data-page="/metaverse.html" style="top:75%; left:10%">META</div>
    <div class="item" data-page="/upload.html" style="top:25%; left:10%">RUN IT UP</div>
  </div>

  <div class="core" id="enter">ACTIVATE</div>

</div>

<script>
const ring = document.getElementById("ring");
const items = document.querySelectorAll(".item");

let rotation = 0;
let velocity = 0;
let isDragging = false;
let lastX = 0;
let selectedIndex = 0;

const sections = [...items];

// DRAG ROTATION
ring.addEventListener("touchstart", e => {
  isDragging = true;
  lastX = e.touches[0].clientX;
});

ring.addEventListener("touchmove", e => {
  if (!isDragging) return;

  const x = e.touches[0].clientX;
  const delta = x - lastX;

  velocity = delta * 0.5;
  rotation += velocity;

  ring.style.transform = `rotate(${rotation}deg)`;

  lastX = x;
});

ring.addEventListener("touchend", () => {
  isDragging = false;
  snapToClosest();
});

// SNAP SYSTEM (🔥 THIS IS THE MAGIC)
function snapToClosest() {
  const segment = 360 / sections.length;

  selectedIndex = Math.round(rotation / segment);
  rotation = selectedIndex * segment;

  ring.style.transform = `rotate(${rotation}deg)`;

  updateActive();
}

// ACTIVE STATE
function updateActive() {
  items.forEach(i => i.classList.remove("active"));

  const index = ((selectedIndex % sections.length) + sections.length) % sections.length;
  sections[index].classList.add("active");
}

// ACTIVATE BUTTON
document.getElementById("enter").onclick = () => {
  const index = ((selectedIndex % sections.length) + sections.length) % sections.length;
  const target = sections[index].dataset.page;

  document.body.style.transition = "0.3s";
  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = target;
  }, 300);
};

// INIT
updateActive();
</script>

</body>
</html>
