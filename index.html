<!DOCTYPE html>
<html>
<head>
  <title>Upload — Rich Bizness</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/motion.css" />
  <link rel="stylesheet" href="/styles/upload.css" />

  <style>
    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
    }

    #upload-root{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .upload-stage{
      width:95vw;
      max-width:520px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
      z-index:5;
    }

    .upload-shell{
      width:100%;
    }

    /* 🧿 AVATAR */
    .upload-avatar{
      position:fixed;
      top:120px;
      left:50%;
      transform:translateX(-50%);
      width:90px;
      height:90px;
      border-radius:50%;
      overflow:hidden;
      z-index:10;
      box-shadow:0 0 25px #00ffcc;
      transition:.4s;
    }

    .upload-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* 🎯 TARGET (PREVIEW AREA) */
    #upload-preview{
      position:relative;
      min-height:120px;
    }

    #upload-preview img,
    #upload-preview video{
      max-width:100%;
      border-radius:12px;
      transition:.4s;
    }

    /* 🚀 ABSORB ANIMATION */
    .absorb{
      position:fixed !important;
      z-index:20;
      animation:absorbToAvatar .8s forwards;
    }

    @keyframes absorbToAvatar{
      0%{
        transform:scale(1) translate(0,0);
        opacity:1;
      }
      100%{
        transform:scale(.1) translate(0,-300px);
        opacity:0;
      }
    }

    /* 🌌 PORTAL FLASH */
    .avatar-pulse{
      animation:avatarPulse .5s;
    }

    @keyframes avatarPulse{
      0%{box-shadow:0 0 20px #00ffcc}
      50%{box-shadow:0 0 80px #00ffcc}
      100%{box-shadow:0 0 20px #00ffcc}
    }

  </style>
</head>

<body>

  <div class="upload-bg"></div>
  <div class="smoke-layer"></div>
  <div class="particles" id="particles"></div>

  <!-- 🧿 AVATAR -->
  <div class="upload-avatar" id="avatar">
    <img id="avatar-img" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
  </div>

  <div id="upload-root">
    <div class="upload-stage" id="upload-stage"></div>
  </div>

  <script>
    window.NEXT_PUBLIC_SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";
  </script>

  <script type="module">

    import { mountUploadUI } from "/core/features/upload/upload-ui.js";
    import { getAvatar } from "/core/features/avatar/avatar-state.js";

    const stage = document.getElementById("upload-stage");
    mountUploadUI(stage);

    /* 🔥 LOAD REAL AVATAR */
    (async () => {
      const avatar = await getAvatar();
      if (avatar) {
        document.getElementById("avatar-img").src = avatar;
      }
    })();

    const avatarEl = document.getElementById("avatar");

    /* ✨ PARTICLES */
    const container = document.getElementById("particles");
    for (let i = 0; i < 40; i++) {
      const p = document.createElement("span");
      p.style.left = Math.random() * 100 + "%";
      p.style.animationDuration = (8 + Math.random() * 6) + "s";
      container.appendChild(p);
    }

    /* 🎯 TRACK PREVIEW ELEMENT */
    let currentPreview = null;

    document.addEventListener("change",(e)=>{
      if(e.target.id === "upload-input"){
        setTimeout(()=>{
          const preview = document.querySelector("#upload-preview img, #upload-preview video");
          if(preview){
            currentPreview = preview;
          }
        },100);
      }
    });

    /* 🚀 RUN IT UP → PHYSICAL ABSORB */
    document.addEventListener("click",(e)=>{
      if(e.target.id === "run-upload" && currentPreview){

        const rect = currentPreview.getBoundingClientRect();

        const clone = currentPreview.cloneNode(true);
        clone.style.position = "fixed";
        clone.style.left = rect.left + "px";
        clone.style.top = rect.top + "px";
        clone.style.width = rect.width + "px";
        clone.style.height = rect.height + "px";

        document.body.appendChild(clone);

        requestAnimationFrame(()=>{
          clone.classList.add("absorb");
          avatarEl.classList.add("avatar-pulse");
        });

        setTimeout(()=>{
          clone.remove();
          avatarEl.classList.remove("avatar-pulse");
        },800);
      }
    });

  </script>

</body>
</html>
