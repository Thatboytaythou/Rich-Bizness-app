<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rich Bizness</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      padding: 16px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      background: #111;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      background: #222;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .hero {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .section {
      margin-bottom: 20px;
    }

    .card {
      background: #111;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
      gap: 12px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .green { background: lime; color: black; }
    .blue { background: deepskyblue; color: black; }
    .gold { background: gold; color: black; }

  </style>
</head>

<body>

<div class="container">

  <!-- NAV -->
  <div class="nav">
    <div id="userInfo">Loading...</div>

    <div>
      <a href="music.html">Music</a>
      <a href="gallery.html">Gallery</a>
      <a href="sports.html">Sports</a>
      <a href="gaming.html">Gaming</a>
      <a href="messages.html">Messages</a>
      <a href="notifications.html">Notifications</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Rich Bizness 🚀</h1>
    <p id="welcomeText">Loading...</p>

    <button class="green" onclick="goLive()">WE LIT 🔥</button>
    <button class="blue" onclick="window.location='upload.html'">Upload</button>
    <button class="gold" onclick="window.location='store.html'">Store</button>
  </div>

  <!-- CREATOR SPOTLIGHT -->
  <div class="section">
    <h2>Top Creators</h2>
    <div id="creators" class="grid"></div>
  </div>

  <!-- LIVE FEED -->
  <div class="section">
    <h2>Live Feed</h2>
    <div id="feed" class="grid"></div>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

let currentUser = null;

async function loadUser() {
  const { data } = await supabase.auth.getSession();
  currentUser = data.session?.user;

  if (currentUser) {
    document.getElementById("userInfo").innerText = currentUser.email;
    document.getElementById("welcomeText").innerText = "Welcome back 🔥";
    ensureProfile();
  } else {
    document.getElementById("userInfo").innerHTML =
      '<a href="auth.html">Login / Sign Up</a>';
    document.getElementById("welcomeText").innerText =
      "Join Rich Bizness 🚀";
  }
}

async function ensureProfile() {
  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  if (!data) {
    await supabase.from("profiles").insert([
      {
        id: currentUser.id,
        email: currentUser.email
      }
    ]);
  }
}

async function loadCreators() {
  const { data } = await supabase
    .from("profiles")
    .select("*")
    .limit(8);

  const el = document.getElementById("creators");
  el.innerHTML = "";

  data.forEach(user => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${user.display_name || user.email}</b><br/>
      <button onclick="openArtist('${user.username}')">View</button>
    `;
    el.appendChild(div);
  });
}

function openArtist(username) {
  window.location = "artist.html?u=" + username;
}

async function loadFeed() {
  const feedEl = document.getElementById("feed");
  feedEl.innerHTML = "Loading...";

  const { data: music } = await supabase
    .from("music_uploads")
    .select("*")
    .limit(6);

  const { data: art } = await supabase
    .from("artworks")
    .select("*")
    .limit(6);

  const combined = [...(music||[]), ...(art||[])];

  feedEl.innerHTML = "";

  combined.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${item.title || "Untitled"}</b><br/>
      <small>${item.artist_name || "Creator"}</small><br/>
      <button onclick="openContent(${item.id})">Open</button>
    `;

    feedEl.appendChild(div);
  });
}

function openContent(id) {
  window.location = "watch.html?id=" + id;
}

function goLive() {
  window.location = "live.html";
}

loadUser();
loadCreators();
loadFeed();
</script>

</body>
</html>
