<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness — Omnitrix</title>

  <!-- EXISTING GLOBAL STYLES (keep if you already use them) -->
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/motion.css" />

  <style>
    /* =========================
       OMNITRIX — FULL PAGE LOCK
    ========================= */

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .rb-scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* 🔥 BACKGROUND (your image) */
    .rb-bg {
      position: absolute;
      inset: 0;
      background: url("/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png") no-repeat center center;
      background-size: cover;
      filter: brightness(0.6) saturate(1.05);
    }

    /* CENTER DEVICE WRAP */
    .rb-omnitrx {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(85vw, 380px);
      height: min(85vw, 380px);
      transform: translate(-50%, -50%) perspective(900px) rotateX(15deg);
      border-radius: 50%;
    }

    /* RINGS */
    .rb-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .rb-ring.outer {
      inset: -12px;
      border: 8px solid rgba(0,255,150,0.5);
      box-shadow:
        0 0 40px rgba(0,255,150,0.8),
        inset 0 0 20px rgba(0,255,150,0.3);
    }

    .rb-ring.inner {
      inset: 20px;
      border: 2px solid rgba(0,255,150,0.3);
      box-shadow: inset 0 0 20px rgba(0,255,150,0.2);
    }

    /* WHEEL */
    .rb-wheel {
      position: absolute;
      inset: 0;
      animation: rb-spin 18s linear infinite;
    }

    .seg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center -140px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #69ffb4;
      text-shadow:
        0 0 6px #69ffb4,
        0 0 12px rgba(0,255,150,0.7);
      user-select: none;
      pointer-events: none;
    }

    /* 8 segments around circle */
    .seg1 { transform: rotate(0deg) translate(-50%, -50%); }
    .seg2 { transform: rotate(45deg) translate(-50%, -50%); }
    .seg3 { transform: rotate(90deg) translate(-50%, -50%); }
    .seg4 { transform: rotate(135deg) translate(-50%, -50%); }
    .seg5 { transform: rotate(180deg) translate(-50%, -50%); }
    .seg6 { transform: rotate(225deg) translate(-50%, -50%); }
    .seg7 { transform: rotate(270deg) translate(-50%, -50%); }
    .seg8 { transform: rotate(315deg) translate(-50%, -50%); }

    /* CORE */
    .rb-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.1;
      background: radial-gradient(circle at 50% 50%, #00ff99 0%, #003a2a 60%, #001a12 100%);
      box-shadow:
        0 0 40px #00ff99,
        0 0 100px rgba(0,255,150,0.8);
      animation: rb-pulse 2.5s infinite ease-in-out;
      z-index: 2;
    }

    /* ACTION BUTTON */
    .rb-action {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      border-radius: 12px;
      background: rgba(0,255,150,0.18);
      color: #69ffb4;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(0,255,150,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      user-select: none;
    }

    /* SIMPLE NAV MOUNT (kept) */
    #elite-platform-nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
    }

    /* ANIMS */
    @keyframes rb-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes rb-pulse {
      0%,100% { transform: translate(-50%, -50%) scale(1); }
      50%     { transform: translate(-50%, -50%) scale(1.15); }
    }
  </style>
</head>

<body>

<div class="rb-scene">

  <!-- NAV (your existing system) -->
  <div id="elite-platform-nav"></div>

  <!-- BACKGROUND -->
  <div class="rb-bg"></div>

  <!-- OMNITRIX -->
  <div class="rb-omnitrx">

    <div class="rb-ring outer"></div>
    <div class="rb-ring inner"></div>

    <div class="rb-wheel">
      <div class="seg seg1">LIVE</div>
      <div class="seg seg2">MUSIC</div>
      <div class="seg seg3">GAMING</div>
      <div class="seg seg4">SPORTS</div>
      <div class="seg seg5">GALLERY</div>
      <div class="seg seg6">STORE</div>
      <div class="seg seg7">META</div>
      <div class="seg seg8">UPLOAD</div>
    </div>

    <div class="rb-core">
      RICH<br/>BIZNESS
    </div>

  </div>

  <!-- BUTTON -->
  <div class="rb-action">RUN IT UP 🚀</div>

</div>
