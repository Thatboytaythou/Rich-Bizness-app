<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness LLC</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .nav a {
      margin-left: 16px;
      text-decoration: none;
      color: #fff;
      font-size: 14px;
    }

    .nav a:hover {
      color: #00ff99;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 80vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }

    .hero-text {
      position: absolute;
      bottom: 40px;
      left: 20px;
    }

    .hero-text h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero-text p {
      color: #ccc;
      font-size: 16px;
    }

    .section {
      padding: 40px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .section h2 {
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">RICH BIZNESS</div>
    <div class="nav">
      <a href="/gallery/index.html">Gallery</a>
      <a href="/artist/index.html">Artists</a>
      <a href="/watch.html">Live</a>
      <a href="/profile.html">Profile</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <img src="/images/19FB5229-30DD-40B0-9404-5136C27FEF6A.png" alt="Rich Bizness Hero" />
    <div class="hero-text">
      <h1>Rich Bizness LLC</h1>
      <p>Show your work. Own your spotlight.</p>
    </div>
  </div>

  <!-- Featured Section -->
  <div class="section">
    <h2>🔥 Featured</h2>

    <div class="cards">

      <div class="card">
        <img src="/images/19FB5229-30DD-40B0-9404-5136C27FEF6A.png" />
        <p>Official Rich Bizness Artwork</p>
      </div>

      <div class="card">
        <img src="/images/19FB5229-30DD-40B0-9404-5136C27FEF6A.png" />
        <p>Artist Highlight</p>
      </div>

      <div class="card">
        <img src="/images/19FB5229-30DD-40B0-9404-5136C27FEF6A.png" />
        <p>New Drop</p>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 Rich Bizness LLC
  </div>

</body>
</html>
