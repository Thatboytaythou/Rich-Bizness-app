<!DOCTYPE html>
<html>
<head>
  <title>Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .btn {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 15px auto;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: #00ffaa;
      color: black;
      font-weight: bold;
    }

    .secondary {
      background: #ccc;
      color: black;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .row a {
      flex: 1;
      max-width: 160px;
    }

    .status {
      position: absolute;
      top: 15px;
      right: 15px;
      color: #00ffaa;
      font-size: 14px;
    }

    .logout {
      position: absolute;
      top: 40px;
      right: 15px;
      color: red;
      font-size: 12px;
      cursor: pointer;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="status" id="userStatus">Checking...</div>
  <div class="logout" id="logoutBtn"></div>

  <h1>🔥 Rich Bizness LLC 🔥</h1>
  <p>Welcome to the future of art, tattoos & 3D printing</p>

  <a href="/auth.html">
    <button class="btn primary">Sign In / Sign Up</button>
  </a>

  <a href="/upload.html">
    <button class="btn secondary">Upload Your Work</button>
  </a>

  <div class="row">
    <a href="/gallery/index.html">
      <button class="btn secondary">View Gallery</button>
    </a>

    <a href="/profile.html">
      <button class="btn secondary">My Profile</button>
    </a>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkUser() {
      const { data } = await supabase.auth.getUser();
      const user = data.user;

      const status = document.getElementById("userStatus");
      const logoutBtn = document.getElementById("logoutBtn");

      if (user) {
        status.textContent = "Logged in";
        logoutBtn.textContent = "Logout";

        logoutBtn.onclick = async () => {
          await supabase.auth.signOut();
          window.location.reload();
        };
      } else {
        status.textContent = "Not signed in";
        logoutBtn.textContent = "";
      }
    }

    checkUser();
  </script>

</body>
</html>
