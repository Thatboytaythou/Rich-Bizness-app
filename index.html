<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Rich Bizness</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  width:100%;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* BACKGROUND */
.bg {
  position:fixed;
  inset:0;
  background:url('/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png') center/cover no-repeat;
  transition: transform 0.7s ease, filter 0.7s ease;
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(0,255,170,0.25), rgba(0,0,0,0.9));
}

/* CENTER */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:85vw;
  max-width:420px;
  aspect-ratio:1/1;
}

/* RINGS */
.ring, .ring2 {
  position:absolute;
  inset:0;
  border-radius:50%;
  will-change:transform;
}

.ring {
  border:6px solid #00ffaa;
  box-shadow:0 0 40px #00ffaa;
  animation:spin 10s linear infinite;
}

.ring2 {
  inset:12%;
  border:2px solid rgba(0,255,170,0.5);
  animation:spinReverse 8s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}

/* CORE */
.core {
  position:absolute;
  inset:30%;
  border-radius:50%;
  background:#00ffaa;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:black;
  box-shadow:0 0 50px #00ffaa;
  transition:0.2s;
}

.core:active {
  transform:scale(0.85);
}

/* FLASH */
.flash {
  position:fixed;
  inset:0;
  background:#00ffaa;
  opacity:0;
  pointer-events:none;
}

.flash.active {
  animation:flashAnim 0.3s ease;
}

@keyframes flashAnim {
  0% { opacity:0.8; }
  100% { opacity:0; }
}

/* LABELS */
.label {
  position:absolute;
  color:#00ffaa;
  font-size:12px;
  text-shadow:0 0 10px #00ffaa;
}

.music { top:18%; left:20%; transform:rotate(-30deg); }
.gaming { left:5%; top:45%; transform:rotate(-90deg); }
.sports { top:18%; right:20%; transform:rotate(30deg); }
.gallery { top:5%; left:50%; transform:translateX(-50%); }
.store { top:35%; right:5%; transform:rotate(90deg); }
.meta { right:10%; bottom:25%; transform:rotate(120deg); }
.upload { bottom:10%; right:30%; transform:rotate(160deg); }

</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="center">

  <div class="ring" id="ring"></div>
  <div class="ring2" id="ring2"></div>

  <div class="label music">MUSIC</div>
  <div class="label gaming">GAMING</div>
  <div class="label sports">SPORTS</div>
  <div class="label gallery">GALLERY</div>
  <div class="label store">STORE</div>
  <div class="label meta">META</div>
  <div class="label upload">UPLOAD</div>

  <div class="core" id="coreBtn">RUN IT UP 🚀</div>

</div>

<div class="flash" id="flash"></div>

<script>
const core = document.getElementById("coreBtn");
const flash = document.getElementById("flash");
const bg = document.getElementById("bg");
const ring = document.getElementById("ring");
const ring2 = document.getElementById("ring2");

const sections = [
  { name: "music", route: "/music.html" },
  { name: "gaming", route: "/gaming.html" },
  { name: "sports", route: "/sports.html" },
  { name: "gallery", route: "/gallery.html" },
  { name: "store", route: "/store.html" },
  { name: "meta", route: "/metaverse.html" },
  { name: "upload", route: "/upload.html" }
];

let currentIndex = 0;

/* ROTATION SIMULATION */
setInterval(() => {
  currentIndex = (currentIndex + 1) % sections.length;
}, 1500);

/* ACTIVATE */
function activate() {

  const selected = sections[currentIndex];

  // FLASH
  flash.classList.remove("active");
  void flash.offsetWidth;
  flash.classList.add("active");

  // LOCK TEXT
  core.innerText = selected.name.toUpperCase();
  core.style.background = "black";
  core.style.color = "#00ffaa";

  // STOP SPIN
  ring.style.animation = "none";
  ring2.style.animation = "none";

  // ZOOM
  bg.style.transform = "scale(1.4)";
  bg.style.filter = "brightness(1.3)";

  // ENTER
  setTimeout(() => {
    window.location.href = selected.route;
  }, 800);
}

core.addEventListener("click", activate);
core.addEventListener("touchstart", activate);

</script>

</body>
</html>
