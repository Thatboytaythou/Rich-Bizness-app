<!DOCTYPE html>
<html>
<head>
  <title>Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-top: 60px;
    }

    p {
      font-size: 20px;
      margin-bottom: 40px;
      color: #ccc;
    }

    .btn {
      padding: 18px 28px;
      font-size: 18px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      margin: 10px;
      width: 220px;
      transition: 0.2s ease;
    }

    .upload {
      background: #3b82f6;
      color: white;
    }

    .gallery {
      background: #10b981;
      color: black;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .glow {
      text-shadow: 0 0 20px rgba(0,255,150,0.6);
    }
  </style>
</head>

<body>

  <h1 class="glow">🔥 Rich Bizness LLC 🔥</h1>
  <p>Welcome to the future of art, tattoos & 3D printing</p>

  <div class="container">

    <a href="/upload.html">
      <button class="btn upload">Upload Your Work</button>
    </a>

    <a href="/gallery/index.html">
      <button class="btn gallery">View Gallery</button>
    </a>

  </div>

</body>
</html>
