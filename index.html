<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — PS5 Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;height:100%;background:#000;overflow:hidden;
  font-family:system-ui;
}

/* 🔥 BACKGROUND (SWAPS PER WORLD) */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(0,255,200,.25), transparent 60%),
    url("/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png")
    center/cover no-repeat;
  transition:1s ease;
}

/* 🎮 TOP STRIP (PS5 STYLE) */
.top-bar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
  z-index:50;
}

.tile{
  width:64px;height:64px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  border-radius:16px;
  background:rgba(255,255,255,.05);
  transition:.3s;
  cursor:pointer;
}

.tile.active{
  scale:1.4;
  background:rgba(0,255,200,.2);
  box-shadow:0 0 25px #00ffff;
}

/* 🎯 CENTER INFO */
.center-ui{
  position:fixed;
  bottom:80px;
  width:100%;
  text-align:center;
  z-index:40;
}

.title{
  font-size:38px;
  color:#00ffcc;
  font-weight:800;
}

.subtitle{
  font-size:14px;
  opacity:.6;
}

/* OMNI (UNCHANGED CORE SYSTEM) */
.stage{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
}

.omni{
  width:92vw;max-width:460px;aspect-ratio:1;
  position:relative;
}

.outer{
  position:absolute;inset:0;border-radius:50%;
  background:#001;
  box-shadow:0 0 120px #00ffcc;
}

.wheel{
  position:absolute;inset:0;
}

.seg{
  position:absolute;
  left:50%;top:50%;
  translate:-50% -50%;
  font-size:30px;
  opacity:.4;
  transition:.3s;
}

.seg.active{
  scale:2;
  opacity:1;
  filter:drop-shadow(0 0 30px #00ffff);
}

.core{
  position:absolute;inset:30%;
  border-radius:50%;
  background:#000;
  box-shadow:0 0 60px #00ffcc;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.avatar{
  width:100%;height:100%;object-fit:cover;
}

/* PORTAL */
.portal{
  position:fixed;
  width:20px;height:20px;
  border-radius:50%;
  background:radial-gradient(circle,#00ffff,#000);
  transform:scale(0);
  z-index:999;
  transition:.7s ease;
}
.portal.expand{
  transform:scale(90);
  border-radius:0;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<!-- 🎮 TOP STRIP -->
<div class="top-bar" id="topBar"></div>

<!-- 🎯 CENTER TEXT -->
<div class="center-ui">
  <div class="title" id="title">LIVE</div>
  <div class="subtitle">Rich Bizness Platform</div>
</div>

<!-- ORIGINAL OMNI -->
<div class="stage">
  <div class="omni">
    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <div class="core" id="core">
      <img class="avatar" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
    </div>
  </div>
</div>

<script>

const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html",bg:"/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"ALERTS",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const title=document.getElementById("title");
const bg=document.getElementById("bg");
const topBar=document.getElementById("topBar");

/* 🔊 SOUND */
const clickSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3");

let rot=0,vel=0,drag=false,lastX=0;
const step=(Math.PI*2)/WORLDS.length;

/* BUILD */
function build(){
  const r=Math.min(innerWidth,innerHeight)*0.33;

  WORLDS.forEach((w,i)=>{

    // wheel
    const el=document.createElement("div");
    el.className="seg";
    el.innerText=w.e;

    const a=i*step-Math.PI/2;
    el.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;

    el.onclick=()=>openWorld(w,el);
    wheel.appendChild(el);

    // top strip
    const tile=document.createElement("div");
    tile.className="tile";
    tile.innerText=w.e;
    tile.onclick=()=>openWorld(w,tile);
    topBar.appendChild(tile);
  });
}
build();

/* OPEN */
function openWorld(w,el){
  clickSound.currentTime=0;
  clickSound.play();

  if(navigator.vibrate) navigator.vibrate(40);

  const rect=el.getBoundingClientRect();

  const portal=document.createElement("div");
  portal.className="portal";
  portal.style.left=rect.left+"px";
  portal.style.top=rect.top+"px";

  document.body.appendChild(portal);
  requestAnimationFrame(()=>portal.classList.add("expand"));

  setTimeout(()=>location.href=w.u,800);
}

/* UPDATE */
function update(){
  wheel.style.transform=`rotate(${rot}rad)`;

  let i=Math.round(-rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    s.classList.toggle("active",idx===i);
  });

  document.querySelectorAll(".tile").forEach((t,idx)=>{
    t.classList.toggle("active",idx===i);
  });

  title.innerText=WORLDS[i].n;

  if(WORLDS[i].bg){
    bg.style.backgroundImage=`url(${WORLDS[i].bg})`;
  }
}

/* LOOP */
function loop(){
  if(!drag){
    rot+=vel;
    vel*=0.90;

    if(Math.abs(vel)<0.002){
      const snap=Math.round(rot/step)*step;
      rot+=(snap-rot)*0.15;
    }
  }
  update();
  requestAnimationFrame(loop);
}
loop();

/* DRAG */
addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

addEventListener("pointermove",e=>{
  if(!drag)return;
  let dx=e.clientX-lastX;
  lastX=e.clientX;
  let f=dx/250;
  rot+=f;
  vel=f;
});

addEventListener("pointerup",()=>drag=false);

/* 🎮 KEYBOARD (LIKE CONTROLLER) */
addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight") rot-=step;
  if(e.key==="ArrowLeft") rot+=step;

  if(e.key==="Enter"){
    let i=Math.round(-rot/step)%WORLDS.length;
    if(i<0)i+=WORLDS.length;
    openWorld(WORLDS[i],document.querySelectorAll(".seg")[i]);
  }
});

</script>

</body>
</html>
