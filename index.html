<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness Omnitrix — REAL FIX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(0,255,200,0.2), transparent 60%),
    #000;
}

/* STAGE */
.stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* DEVICE */
.omni{
  width:92vw;
  max-width:420px;
  aspect-ratio:1;
  position:relative;
}

/* OUTER */
.outer{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:#001;
  box-shadow:
    0 0 25px #00ffcc,
    inset 0 0 12px #00ffcc;
  z-index:1;
}

/* WHEEL */
.wheel{
  position:absolute;
  inset:0;
  z-index:10;
}

/* ICONS (FIXED — NO CENTER COLLAPSE) */
.seg{
  position:absolute;
  font-size:34px;
  cursor:pointer;
  z-index:20;
  /* IMPORTANT: NO TRANSLATE HERE */
}

/* ACTIVE */
.seg.active{
  transform:scale(1.4);
  filter:drop-shadow(0 0 20px #00ffcc);
}

/* CORE */
.core{
  position:absolute;
  width:45%;
  height:45%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 40px #00ffcc,
    inset 0 0 25px #00ffcc;
  z-index:15;
}

.avatar{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

.label{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
  color:#00ffcc;
  font-size:20px;
}

/* PORTAL */
.portal{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#00ffcc,#000);
  transform:scale(0);
  transition:.5s;
  z-index:999;
}

.portal.open{
  transform:scale(4);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">
  <div class="omni">

    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <div class="core">
      <img id="avatar-img" class="avatar" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
    </div>

    <div class="label" id="label">LIVE</div>

  </div>
</div>

<script type="module">

import { getAvatar } from "/core/features/avatar/avatar-state.js";

const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"NOTIFY",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const label=document.getElementById("label");

/* BUILD (CENTERED CORRECTLY) */
function build(){
  const size = wheel.offsetWidth;
  const center = size / 2;
  const radius = size * 0.35;

  WORLDS.forEach((w,i)=>{
    const el=document.createElement("div");
    el.className="seg";
    el.innerText=w.e;

    const angle=(i/WORLDS.length)*Math.PI*2 - Math.PI/2;

    const x = center + Math.cos(angle)*radius;
    const y = center + Math.sin(angle)*radius;

    el.style.left = x + "px";
    el.style.top = y + "px";

    el.onclick=()=>go(w);

    wheel.appendChild(el);
  });
}

/* wait for layout */
setTimeout(build, 50);

/* SPIN */
let rot=0,vel=0,drag=false,lastX=0;

function loop(){
  if(!drag){
    rot+=vel;
    vel*=0.93;
  }

  wheel.style.transform=`rotate(${rot}rad)`;
  update();

  requestAnimationFrame(loop);
}
loop();

/* ACTIVE */
function update(){
  let i=Math.round(rot/(Math.PI*2/WORLDS.length))%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    s.classList.toggle("active",idx===i);
  });

  label.innerText=WORLDS[i].n;
}

/* DRAG */
document.addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

document.addEventListener("pointermove",e=>{
  if(!drag)return;
  let dx=e.clientX-lastX;
  lastX=e.clientX;
  let f=dx/200;
  rot+=f;
  vel=f;
});

document.addEventListener("pointerup",()=>drag=false);

/* NAV */
function go(w){
  const portal=document.createElement("div");
  portal.className="portal";
  document.body.appendChild(portal);

  requestAnimationFrame(()=>portal.classList.add("open"));

  setTimeout(()=>{
    location.href=w.u;
  },500);
}

/* AVATAR */
(async()=>{
  const avatar=await getAvatar();
  if(avatar){
    document.getElementById("avatar-img").src=avatar;
  }
})();
</script>

</body>
</html>
