<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness Omnitrix — FINAL STABLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(0,255,200,0.2), transparent 60%),
    #000;
}

/* STAGE */
.stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* DEVICE */
.omni{
  width:92vw;
  max-width:420px;
  aspect-ratio:1;
  border-radius:50%;
  position:relative;
}

/* OUTER */
.outer{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:#001;
  box-shadow:
    0 0 30px #00ffcc,
    inset 0 0 15px #00ffcc;
  z-index:1;
}

/* WHEEL */
.wheel{
  position:absolute;
  inset:20%;
  z-index:5;
}

/* ICONS */
.seg{
  position:absolute;
  font-size:28px;
  cursor:pointer;
  z-index:10;
  transition:.2s;
}

/* ACTIVE ICON */
.seg.active{
  scale:1.5;
  filter:drop-shadow(0 0 15px #00ffcc);
}

/* CORE */
.core{
  position:absolute;
  inset:32%;
  border-radius:50%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 40px #00ffcc,
    inset 0 0 25px #00ffcc;
  overflow:hidden;
  z-index:6;
}

.avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LABEL */
.label{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
  color:#00ffcc;
  font-size:20px;
}

/* PORTAL */
.portal{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#00ffcc,#000);
  transform:scale(0);
  border-radius:50%;
  z-index:999;
  transition:0.5s;
}

.portal.open{
  transform:scale(4);
  border-radius:0;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">
  <div class="omni">

    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <div class="core">
      <img id="avatar-img" class="avatar" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
    </div>

    <div class="label" id="label">LIVE</div>

  </div>
</div>

<script type="module">

import { getAvatar } from "/core/features/avatar/avatar-state.js";

const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"NOTIFY",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const label=document.getElementById("label");

const step=(Math.PI*2)/WORLDS.length;

/* BUILD ICONS */
WORLDS.forEach((w,i)=>{
  const el=document.createElement("div");
  el.className="seg";
  el.innerText=w.e;

  const angle=i*step-Math.PI/2;
  const r=120;

  const x=Math.cos(angle)*r;
  const y=Math.sin(angle)*r;

  el.style.left=`calc(50% + ${x}px)`;
  el.style.top=`calc(50% + ${y}px)`;

  el.onclick=()=>go(w);

  wheel.appendChild(el);
});

/* SPIN SYSTEM */
let rot=0,vel=0,drag=false,lastX=0;

function loop(){
  if(!drag){
    rot+=vel;
    vel*=0.93;

    if(Math.abs(vel)<0.002){
      let snap=Math.round(rot/step)*step;
      rot+=(snap-rot)*0.15;
    }
  }

  wheel.style.transform=`rotate(${rot}rad)`;
  update();

  requestAnimationFrame(loop);
}
loop();

/* UPDATE ACTIVE */
function update(){
  let i=Math.round(rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    s.classList.toggle("active",idx===i);
  });

  label.innerText=WORLDS[i].n;
}

/* DRAG */
document.addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

document.addEventListener("pointermove",e=>{
  if(!drag)return;

  let dx=e.clientX-lastX;
  lastX=e.clientX;

  let force=dx/180;
  rot+=force;
  vel=force;
});

document.addEventListener("pointerup",()=>drag=false);

/* NAV */
function go(w){
  const portal=document.createElement("div");
  portal.className="portal";
  document.body.appendChild(portal);

  requestAnimationFrame(()=>portal.classList.add("open"));

  setTimeout(()=>{
    location.href=w.u;
  },500);
}

/* AVATAR LOAD */
(async()=>{
  const avatar=await getAvatar();
  if(avatar){
    document.getElementById("avatar-img").src=avatar;
  }
})();
</script>

</body>
</html>
