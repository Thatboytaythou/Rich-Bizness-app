<!DOCTYPE html>
<html>
<head>
  <title>Rich Bizness</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #010, #000);
      overflow: hidden;
      color: white;
      font-family: sans-serif;
    }

    .wrap {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      perspective: 1000px;
    }

    .ring {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 2px solid #00ff88;
      position: relative;
      transform: rotate(0deg);
      transition: transform 0.2s ease-out;
    }

    .item {
      position: absolute;
      width: 80px;
      text-align: center;
      transform: translate(-50%, -50%);
    }

    .active {
      color: #00ff88;
      transform: translate(-50%, -50%) scale(1.3);
      font-weight: bold;
    }

    .core {
      margin-top: 40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #00ff88;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;

      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px #00ff88;
    }

    /* 🔥 LIFT STATE */
    .lifted {
      transform: translateY(-80px) scale(1.2);
      box-shadow: 0 0 40px #00ff88;
    }

    /* 💥 SLAM FLASH */
    .flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #00ff88;
      opacity: 0;
      pointer-events: none;
    }

    .flash.active {
      animation: flashAnim 0.4s ease;
    }

    @keyframes flashAnim {
      0% { opacity: 0; }
      40% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="ring" id="ring">
    <div class="item" data-page="/live.html" style="top:0%; left:50%">LIVE</div>
    <div class="item" data-page="/music.html" style="top:25%; left:90%">MUSIC</div>
    <div class="item" data-page="/gaming.html" style="top:75%; left:90%">GAMING</div>
    <div class="item" data-page="/sports.html" style="top:100%; left:50%">SPORTS</div>
    <div class="item" data-page="/metaverse.html" style="top:75%; left:10%">META</div>
    <div class="item" data-page="/upload.html" style="top:25%; left:10%">RUN IT UP</div>
  </div>

  <div class="core" id="core">SELECT</div>

</div>

<div class="flash" id="flash"></div>

<script>
const ring = document.getElementById("ring");
const items = document.querySelectorAll(".item");
const core = document.getElementById("core");
const flash = document.getElementById("flash");

let rotation = 0;
let isDragging = false;
let lastX = 0;
let selectedIndex = 0;
let lifted = false;

const sections = [...items];

// ROTATE
ring.addEventListener("touchstart", e => {
  isDragging = true;
  lastX = e.touches[0].clientX;
});

ring.addEventListener("touchmove", e => {
  if (!isDragging) return;

  const x = e.touches[0].clientX;
  const delta = x - lastX;

  rotation += delta * 0.5;
  ring.style.transform = `rotate(${rotation}deg)`;

  lastX = x;
});

ring.addEventListener("touchend", () => {
  isDragging = false;
  snap();
});

// SNAP
function snap() {
  const segment = 360 / sections.length;

  selectedIndex = Math.round(rotation / segment);
  rotation = selectedIndex * segment;

  ring.style.transform = `rotate(${rotation}deg)`;

  updateActive();
}

// ACTIVE
function updateActive() {
  items.forEach(i => i.classList.remove("active"));

  const index = ((selectedIndex % sections.length) + sections.length) % sections.length;
  sections[index].classList.add("active");
}

// CORE INTERACTION (🔥 TWO STAGE)
core.onclick = () => {

  // 🟡 FIRST CLICK → LIFT
  if (!lifted) {
    core.classList.add("lifted");
    core.innerText = "LOCKED";
    lifted = true;
    return;
  }

  // 🔴 SECOND CLICK → SLAM + ENTER
  const index = ((selectedIndex % sections.length) + sections.length) % sections.length;
  const target = sections[index].dataset.page;

  core.classList.remove("lifted");
  core.innerText = "ACTIVATING";

  flash.classList.add("active");

  setTimeout(() => {
    document.body.style.opacity = "0";
  }, 150);

  setTimeout(() => {
    window.location.href = target;
  }, 400);
};

// INIT
updateActive();
</script>

</body>
</html>
