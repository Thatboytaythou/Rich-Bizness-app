<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Rich Bizness</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: black;
  font-family: serif;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: url('/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png') center/cover no-repeat;
  filter: brightness(0.55) contrast(1.2);
}

/* SMOKE / ENERGY */
.energy-overlay {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(0,255,170,0.2), rgba(0,0,0,0.95)),
    url("https://www.transparenttextures.com/patterns/smoke.png");
  animation: smokeMove 20s linear infinite;
  mix-blend-mode: screen;
}

@keyframes smokeMove {
  from { background-position: 0 0; }
  to { background-position: 500px 500px; }
}

/* CENTER */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 450px;
  aspect-ratio: 1/1;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-8px); }
  100% { transform: translate(-50%, -50%) translateY(0); }
}

/* OUTER RING */
.ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 5px solid rgba(0,255,170,0.9);
  box-shadow:
    0 0 40px rgba(0,255,170,1),
    inset 0 0 40px rgba(0,255,170,0.4);
  animation: rotate 15s linear infinite;
}

/* INNER RING */
.ring2 {
  position: absolute;
  inset: 10%;
  border-radius: 50%;
  border: 2px solid rgba(0,255,170,0.5);
  animation: rotateReverse 12s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes rotateReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}

/* CORE BUTTON */
.core {
  position: absolute;
  inset: 28%;
  border-radius: 50%;
  background: radial-gradient(circle, #00ffaa, #00c48c);
  display: flex;
  align-items: center;
  justify-content: center;
  color: black;
  font-weight: bold;
  font-size: 18px;
  text-align: center;
  box-shadow:
    0 0 50px rgba(0,255,170,1),
    inset 0 0 20px rgba(0,0,0,0.4);
  transition: all 0.2s ease;
}

.core:active {
  transform: scale(0.85);
}

/* BURST EFFECT */
.burst {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
}

.burst.active {
  animation: burst 0.4s ease;
}

@keyframes burst {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* LABELS */
.label {
  position: absolute;
  color: #00ffaa;
  font-size: 12px;
  text-shadow: 0 0 10px #00ffaa;
}

/* LABEL POSITIONS */
.music { top: 18%; left: 20%; transform: rotate(-30deg); }
.gaming { left: 6%; top: 45%; transform: rotate(-90deg); }
.sports { top: 18%; right: 20%; transform: rotate(30deg); }
.gallery { top: 5%; left: 50%; transform: translateX(-50%); }
.store { top: 35%; right: 5%; transform: rotate(90deg); }
.meta { right: 12%; bottom: 25%; transform: rotate(120deg); }
.upload { bottom: 12%; right: 30%; transform: rotate(160deg); }

</style>
</head>

<body>

<div class="bg"></div>
<div class="energy-overlay"></div>

<div class="center">

  <div class="ring"></div>
  <div class="ring2"></div>

  <div class="label music">MUSIC</div>
  <div class="label gaming">GAMING</div>
  <div class="label sports">SPORTS</div>
  <div class="label gallery">GALLERY</div>
  <div class="label store">STORE</div>
  <div class="label meta">META</div>
  <div class="label upload">UPLOAD</div>

  <div class="burst" id="burst"></div>

  <div class="core" id="coreBtn">RUN IT UP 🚀</div>

</div>

<script>
const core = document.getElementById("coreBtn");
const burst = document.getElementById("burst");

core.addEventListener("click", () => {

  burst.classList.remove("active");
  void burst.offsetWidth;
  burst.classList.add("active");

  core.innerText = "ACTIVATING...";
  core.style.background = "black";
  core.style.color = "#00ffaa";

  setTimeout(() => {
    core.innerText = "ENTER";
  }, 400);

});
</script>

</body>
</html>
