<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness LLC - Buy Artwork</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
      text-align: center;
    }

    .card {
      max-width: 420px;
      margin: auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      opacity: 0.92;
    }

    .status {
      margin-top: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://via.placeholder.com/400x250.png?text=Artwork" alt="Artwork">
    <h1>Premium Artwork</h1>
    <p>$20.00</p>
    <button id="checkout-button">Buy Now</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    // SAFE to use in frontend:
    const stripe = Stripe("pk_test_51THqPd5Xjow0u249RmNDvfpX5BETXPrGOdui99boDInAZx2PBWsT7tXRQmtCzIxMSfTYoYUsWArW3eqzPEvQDF0s001d2ziMGp");

    const button = document.getElementById("checkout-button");
    const status = document.getElementById("status");

    button.addEventListener("click", async () => {
      try {
        status.textContent = "Creating checkout session...";

        const res = await fetch("http://localhost:4242/create-checkout-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title: "Premium Artwork",
            price: 2000,
            image: "https://via.placeholder.com/400x250.png?text=Artwork"
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Failed to create checkout session.");
        }

        const result = await stripe.redirectToCheckout({
          sessionId: data.id
        });

        if (result.error) {
          status.textContent = result.error.message;
        }
      } catch (err) {
        status.textContent = err.message;
      }
    });
  </script>
</body>
</html>
