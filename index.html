<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness Omnitrix — Cinematic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

/* 🌌 BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(0,255,200,0.3), transparent 60%),
    #000;
}

/* 🎯 STAGE */
.stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1400px;
}

/* 🧿 DEVICE */
.omni{
  width:92vw;
  max-width:420px;
  aspect-ratio:1;
  border-radius:50%;
  position:relative;
  transform-style:preserve-3d;
}

/* 🔩 OUTER */
.outer{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:#001;
  box-shadow:
    0 0 80px #00ffcc,
    inset 0 0 40px #00ffcc;
  pointer-events:none;
}

/* ⚙️ WHEEL */
.wheel{
  position:absolute;
  inset:20%;
}

/* 🧿 ICONS */
.seg{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:0 0;
  font-size:28px;
  cursor:pointer;
  transition:.2s;
}

.seg.active{
  transform:scale(1.8);
  filter:drop-shadow(0 0 25px #00ffcc);
}

/* 🧑 CORE */
.core{
  position:absolute;
  inset:32%;
  border-radius:50%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 60px #00ffcc,
    inset 0 0 40px #00ffcc;
  overflow:hidden;
  pointer-events:none;
  transition:.2s;
}

.avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🏷 LABEL */
.label{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
  color:#00ffcc;
  font-size:20px;
}

/* 🌌 PORTAL */
.portal{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#00ffcc,#000);
  transform:scale(0);
  border-radius:50%;
  z-index:999;
  transition:0.6s;
}

.portal.open{
  transform:scale(4);
  border-radius:0;
}

/* ⚡ FLASH */
.flash{
  position:fixed;
  inset:0;
  background:#00ffcc;
  opacity:0;
  z-index:998;
}

.flash.active{
  animation:flashAnim .3s;
}

@keyframes flashAnim{
  0%{opacity:0}
  50%{opacity:0.5}
  100%{opacity:0}
}

/* 🧿 CORE BURST */
.core.burst{
  transform:scale(1.4);
  box-shadow:
    0 0 120px #00ffcc,
    inset 0 0 60px #00ffcc;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="flash" id="flash"></div>

<div class="stage">
  <div class="omni">

    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <div class="core" id="core">
      <img id="avatar-img" class="avatar" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
    </div>

    <div class="label" id="label">LIVE</div>

  </div>
</div>

<script type="module">

import { getAvatar } from "/core/features/avatar/avatar-state.js";

/* 🌍 ROUTES */
const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"NOTIFY",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const label=document.getElementById("label");
const core=document.getElementById("core");
const flash=document.getElementById("flash");

const step=(Math.PI*2)/WORLDS.length;

/* BUILD */
WORLDS.forEach((w,i)=>{
  const el=document.createElement("div");
  el.className="seg";
  el.innerText=w.e;

  const a=i*step-Math.PI/2;
  const r=120;

  el.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;

  el.onclick=()=>triggerPortal(w);

  wheel.appendChild(el);
});

/* REAL SPIN */
let rot=0,vel=0,drag=false,lastX=0;

function loop(){
  if(!drag){
    rot+=vel;
    vel*=0.94;

    if(Math.abs(vel)<0.002){
      let snap=Math.round(rot/step)*step;
      rot+=(snap-rot)*0.12;
    }
  }

  wheel.style.transform=`rotate(${rot}rad)`;
  updateActive();
  requestAnimationFrame(loop);
}
loop();

/* ACTIVE */
function updateActive(){
  let i=Math.round(rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    s.classList.toggle("active",idx===i);
  });

  label.innerText=WORLDS[i].n;

  core.style.transform=`scale(${1 + Math.sin(Date.now()/200)*0.04})`;
}

/* DRAG */
document.addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

document.addEventListener("pointermove",e=>{
  if(!drag)return;
  let dx=e.clientX-lastX;
  lastX=e.clientX;
  let f=dx/180;
  rot+=f;
  vel=f;
});

document.addEventListener("pointerup",()=>drag=false);

/* PORTAL */
function triggerPortal(w){

  core.classList.add("burst");
  flash.classList.add("active");

  const portal=document.createElement("div");
  portal.className="portal";
  document.body.appendChild(portal);

  requestAnimationFrame(()=>portal.classList.add("open"));

  setTimeout(()=>{
    location.href=w.u;
  },600);
}

/* AVATAR */
(async()=>{
  const avatar=await getAvatar();
  if(avatar){
    document.getElementById("avatar-img").src=avatar;
  }
})();
</script>

</body>
</html>
