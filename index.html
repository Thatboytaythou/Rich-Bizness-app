<!DOCTYPE html>
<html>
<head>
  <title>Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px 20px;
    }

    h1 {
      font-size: 56px;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      color: #ddd;
      margin-bottom: 50px;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 380px;
      margin: 18px auto;
      padding: 20px;
      border: none;
      border-radius: 18px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #11f0a5;
      color: black;
    }

    .secondary {
      background: #ddd;
      color: black;
    }

    .row {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .row .btn {
      max-width: 260px;
    }

    .user {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 14px;
      color: #00ffaa;
    }

    .logout {
      position: absolute;
      top: 40px;
      right: 15px;
      color: red;
      font-size: 12px;
      cursor: pointer;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="userStatus" class="user"></div>
  <div id="logoutBtn" class="logout"></div>

  <h1>🔥 Rich Bizness LLC 🔥</h1>
  <p>Welcome to the future of art, tattoos & 3D printing</p>

  <a href="/auth.html">
    <button class="btn primary">Sign In / Sign Up</button>
  </a>

  <a href="/upload.html">
    <button class="btn secondary">Upload Your Work</button>
  </a>

  <div class="row">
    <a href="/gallery/index.html">
      <button class="btn secondary">View Gallery</button>
    </a>

    <a href="/profile.html">
      <button class="btn secondary">My Profile</button>
    </a>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    async function checkUser() {
      const { data: { session } } = await supabase.auth.getSession();

      const userStatus = document.getElementById("userStatus");
      const logoutBtn = document.getElementById("logoutBtn");

      if (session?.user) {
        userStatus.textContent = session.user.email;
        logoutBtn.textContent = "Logout";

        logoutBtn.onclick = async () => {
          await supabase.auth.signOut();
          window.location.reload();
        };
      } else {
        userStatus.textContent = "Not signed in";
      }
    }

    checkUser();
  </script>
</body>
</html>
