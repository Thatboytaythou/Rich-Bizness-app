<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — Portal Core</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;height:100%;background:#000;overflow:hidden;
  font-family:system-ui;
}

/* 🌌 BACKGROUND */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(0,255,200,.25), transparent 60%),
    url("/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png")
    center/cover no-repeat;
  filter:brightness(.9);
}

/* 🎯 STAGE */
.stage{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  perspective:1400px;
}

/* 🧿 DEVICE */
.omni{
  width:92vw;max-width:460px;aspect-ratio:1;
  position:relative;
  transform-style:preserve-3d;
  transition:.2s;
}

/* 🔩 OUTER */
.outer{
  position:absolute;inset:0;border-radius:50%;
  background:#001;
  box-shadow:0 0 120px #00ffcc;
}

/* ⚙️ WHEEL */
.wheel{
  position:absolute;inset:0;
}

/* 🧿 SEGMENTS */
.seg{
  position:absolute;
  left:50%;top:50%;
  translate:-50% -50%;
  font-size:30px;
  transition:.2s;
  opacity:.6;
}

.seg.active{
  scale:1.9;
  opacity:1;
  filter:drop-shadow(0 0 20px #00ffcc);
}

/* 🧿 CORE */
.core{
  position:absolute;inset:30%;
  border-radius:50%;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 0 60px #00ffcc,
    inset 0 0 30px #00ffcc;
  cursor:pointer;
  transition:.2s;
}

.core:active{
  scale:.9;
}

/* 🏷 LABEL */
.label{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
  color:#00ffcc;
  font-size:20px;
}

/* 🌌 PORTAL EXPANSION */
.portal{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#00ffcc,#000);
  transform:scale(0);
  border-radius:50%;
  z-index:999;
  transition:.7s ease;
}

/* 🚀 WORLD ENTRY */
.portal.enter{
  transform:scale(8);
  border-radius:0;
  filter:blur(20px);
}

/* 🔥 LIGHT BURST */
.flash{
  position:fixed;
  inset:0;
  background:#00ffcc;
  opacity:0;
  z-index:998;
  transition:.2s;
}

.flash.show{
  opacity:.8;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">
  <div class="omni" id="omni">

    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <div class="core" id="core"></div>

    <div class="label" id="label">LIVE</div>

  </div>
</div>

<div class="portal" id="portal"></div>
<div class="flash" id="flash"></div>

<script>

const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"ALERTS",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const core=document.getElementById("core");
const label=document.getElementById("label");
const omni=document.getElementById("omni");
const portal=document.getElementById("portal");
const flash=document.getElementById("flash");

let rot=0,vel=0,drag=false,lastX=0;
const step=(Math.PI*2)/WORLDS.length;

/* 🔧 BUILD */
function build(){
  wheel.innerHTML="";
  const size=Math.min(innerWidth,innerHeight);
  const r=size*0.33;

  WORLDS.forEach((w,i)=>{
    const el=document.createElement("div");
    el.className="seg";
    el.innerText=w.e;

    const a=i*step-Math.PI/2;
    const x=Math.cos(a)*r;
    const y=Math.sin(a)*r;

    el.dataset.base=`translate(${x}px,${y}px)`;
    el.style.transform=el.dataset.base;

    wheel.appendChild(el);
  });
}
build();

/* 🔁 UPDATE */
function update(){
  wheel.style.transform=`rotate(${rot}rad)`;

  let i=Math.round(-rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    if(idx===i){
      s.classList.add("active");
      s.style.transform=`${s.dataset.base} scale(1.9)`;
    }else{
      s.classList.remove("active");
      s.style.transform=s.dataset.base;
    }
  });

  label.innerText=WORLDS[i].n;
  core.dataset.url=WORLDS[i].u;
}

/* 🔄 LOOP */
function loop(){
  if(!drag){
    rot+=vel;
    vel*=0.92;

    if(Math.abs(vel)<0.001){
      let snap=Math.round(rot/step)*step;
      rot=snap;
      vel=0;
    }
  }
  update();
  requestAnimationFrame(loop);
}
loop();

/* 🖐 DRAG */
addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

addEventListener("pointermove",e=>{
  if(!drag)return;

  let dx=e.clientX-lastX;
  lastX=e.clientX;

  let d=dx/300;
  rot+=d;
  vel=d;

  omni.style.transform=`rotateY(${dx/14}deg) rotateX(${dx/-20}deg)`;
});

addEventListener("pointerup",()=>{
  drag=false;
  omni.style.transform="rotateY(0) rotateX(0)";
});

/* 🚀 PORTAL ENTRY */
core.onclick=()=>{
  flash.classList.add("show");

  setTimeout(()=>{
    portal.classList.add("enter");
  },150);

  setTimeout(()=>{
    location.href=core.dataset.url;
  },700);
};

</script>

</body>
</html>
