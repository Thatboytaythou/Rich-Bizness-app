<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Rich Bizness</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url('/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png') center/cover no-repeat;
  transition:transform .3s ease, filter .5s ease;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:radial-gradient(circle,rgba(0,255,170,.25),rgba(0,0,0,.95));
}

/* PORTAL */
.portal{
  position:fixed;
  top:50%;left:50%;
  width:0;height:0;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,#00ffaa,black);
  opacity:0;
  z-index:10;
}

.portal.active{
  animation:portal 1s forwards;
}

@keyframes portal{
  0%{width:0;height:0;opacity:1;}
  100%{width:200vw;height:200vw;opacity:1;}
}

/* CENTER */
.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90vw;
  max-width:420px;
  aspect-ratio:1/1;
}

/* RINGS */
.ring,.ring2{
  position:absolute;
  inset:0;
  border-radius:50%;
  transition:transform .1s linear;
}

.ring{
  border:6px solid #00ffaa;
  box-shadow:0 0 50px #00ffaa;
}

.ring2{
  inset:12%;
  border:2px solid rgba(0,255,170,.4);
}

/* CORE */
.core{
  position:absolute;
  inset:30%;
  border-radius:50%;
  background:#00ffaa;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:black;
  box-shadow:0 0 60px #00ffaa;
  transition:.2s;
}

.core:active{
  transform:scale(.8);
}

/* ENERGY */
.pulse{
  position:absolute;
  inset:0;
  border-radius:50%;
  box-shadow:0 0 120px #00ffaa;
  opacity:.2;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* LABELS */
.label{
  position:absolute;
  color:#00ffaa;
  font-size:12px;
  text-shadow:0 0 10px #00ffaa;
  transition:.2s;
}

.activeLabel{
  color:white;
  transform:scale(1.4);
  text-shadow:0 0 20px white;
}

/* POSITIONS */
.music{top:18%;left:20%;}
.gaming{left:5%;top:45%;}
.sports{top:18%;right:20%;}
.gallery{top:5%;left:50%;transform:translateX(-50%);}
.store{top:35%;right:5%;}
.meta{right:10%;bottom:25%;}
.upload{bottom:10%;right:30%;}

</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>
<div class="portal" id="portal"></div>

<div class="center">

  <div class="pulse"></div>

  <div class="ring" id="ring"></div>
  <div class="ring2" id="ring2"></div>

  <div class="label music">MUSIC</div>
  <div class="label gaming">GAMING</div>
  <div class="label sports">SPORTS</div>
  <div class="label gallery">GALLERY</div>
  <div class="label store">STORE</div>
  <div class="label meta">META</div>
  <div class="label upload">UPLOAD</div>

  <div class="core" id="coreBtn">SELECT</div>

</div>

<script>
const core=document.getElementById("coreBtn");
const bg=document.getElementById("bg");
const portal=document.getElementById("portal");
const ring=document.getElementById("ring");
const ring2=document.getElementById("ring2");
const labels=document.querySelectorAll(".label");

const sections=[
{ name:"music",route:"/music.html"},
{ name:"gaming",route:"/gaming.html"},
{ name:"sports",route:"/sports.html"},
{ name:"gallery",route:"/gallery.html"},
{ name:"store",route:"/store.html"},
{ name:"meta",route:"/metaverse.html"},
{ name:"upload",route:"/upload.html"}
];

let angle=0;
let velocity=0;
let dragging=false;
let startX=0;

/* ROTATE */
function update(){
  ring.style.transform=`rotate(${angle}deg)`;
  ring2.style.transform=`rotate(${-angle}deg)`;
}

/* INDEX */
function index(){
  let step=360/sections.length;
  let i=Math.round(angle/step)%sections.length;
  if(i<0)i+=sections.length;
  return i;
}

/* UPDATE UI */
function ui(){
  let i=index();
  labels.forEach(l=>l.classList.remove("activeLabel"));
  labels[i].classList.add("activeLabel");
  core.innerText=sections[i].name.toUpperCase();
}

/* SNAP */
function snap(){
  let step=360/sections.length;
  let i=index();
  angle=i*step;
  velocity=0;
  update();
  ui();
}

/* LOOP */
function loop(){
  if(!dragging){
    angle+=velocity;
    velocity*=0.92;
    if(Math.abs(velocity)<0.01)velocity=0;
    update();
    ui();
  }
  requestAnimationFrame(loop);
}
loop();

/* TOUCH */
document.addEventListener("touchstart",e=>{
  dragging=true;
  startX=e.touches[0].clientX;
  velocity=0;
});

document.addEventListener("touchmove",e=>{
  if(!dragging)return;

  let x=e.touches[0].clientX;
  let delta=x-startX;

  velocity=delta*0.15;
  angle+=velocity;

  startX=x;

  update();
  ui();

  /* PARALLAX 🔥 */
  bg.style.transform=`scale(1.05) translate(${delta/10}px,0)`;
});

document.addEventListener("touchend",()=>{
  dragging=false;
  bg.style.transform="scale(1)";
  setTimeout(snap,80);
});

/* ENTER */
core.addEventListener("click",()=>{
  let s=sections[index()];

  bg.style.transform="scale(1.4)";
  bg.style.filter="blur(5px) brightness(1.3)";

  portal.classList.add("active");
  core.innerText="ENTERING";

  setTimeout(()=>{window.location.href=s.route;},900);
});

snap();
</script>

</body>
</html>
