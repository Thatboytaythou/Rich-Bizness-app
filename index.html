<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness Omnitrix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

/* 🌌 BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(0,255,200,0.25), transparent 60%),
    #000;
}

/* 🎯 STAGE */
.stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1400px;
}

/* 🧿 DEVICE */
.omni{
  width:92vw;
  max-width:420px;
  aspect-ratio:1;
  border-radius:50%;
  position:relative;
  transform-style:preserve-3d;
}

/* 🔩 OUTER */
.outer{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:#001;
  box-shadow:
    0 0 60px #00ffcc,
    inset 0 0 30px #00ffcc;
  pointer-events:none;
}

/* ⚙️ WHEEL */
.wheel{
  position:absolute;
  inset:20%;
  transition:transform 0.05s linear;
}

/* 🧿 ICONS */
.seg{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:0 0;
  font-size:28px;
  cursor:pointer;
  z-index:5;
  transition:0.2s;
}

.seg.active{
  transform:scale(1.7);
  filter:drop-shadow(0 0 20px #00ffcc);
}

/* 🧑 CORE */
.core{
  position:absolute;
  inset:32%;
  border-radius:50%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 50px #00ffcc,
    inset 0 0 30px #00ffcc;
  overflow:hidden;
  pointer-events:none;
  transition:0.2s;
}

.avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🏷 LABEL */
.label{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
  color:#00ffcc;
  font-size:18px;
}

/* 🌌 PORTAL */
.portal{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#00ffcc,#000);
  transform:scale(0);
  border-radius:50%;
  z-index:999;
  transition:0.6s;
}

.portal.open{
  transform:scale(3);
  border-radius:0;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">
  <div class="omni">

    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <div class="core" id="core">
      <img id="avatar-img" class="avatar" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
    </div>

    <div class="label" id="label">LIVE</div>

  </div>
</div>

<script type="module">

import { getAvatar } from "/core/features/avatar/avatar-state.js";

/* 🌍 ROUTES */
const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"NOTIFY",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const label=document.getElementById("label");
const core=document.getElementById("core");

const step=(Math.PI*2)/WORLDS.length;

/* 🔧 BUILD */
WORLDS.forEach((w,i)=>{
  const el=document.createElement("div");
  el.className="seg";
  el.innerText=w.e;

  const a=i*step-Math.PI/2;
  const r=120;

  el.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;

  el.onclick=()=>{
    triggerPortal(w.u);
  };

  wheel.appendChild(el);
});

/* 🌀 REAL PHYSICS */
let rot=0;
let vel=0;
let drag=false;
let lastX=0;

function loop(){
  if(!drag){
    rot += vel;
    vel *= 0.94;

    if(Math.abs(vel)<0.002){
      let snap = Math.round(rot/step)*step;
      rot += (snap - rot)*0.12;
    }
  }

  wheel.style.transform=`rotate(${rot}rad)`;

  updateActive();
  requestAnimationFrame(loop);
}
loop();

/* 🧲 ACTIVE SLOT */
function updateActive(){
  let i=Math.round(rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    s.classList.toggle("active", idx===i);
  });

  label.innerText=WORLDS[i].n;

  /* CORE ENERGY PULSE */
  core.style.transform = `scale(${1 + Math.sin(Date.now()/200)*0.03})`;
}

/* 🖐 DRAG CONTROL */
document.addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

document.addEventListener("pointermove",e=>{
  if(!drag)return;

  let dx=e.clientX-lastX;
  lastX=e.clientX;

  let force = dx/180;

  rot += force;
  vel = force;
});

document.addEventListener("pointerup",()=>{
  drag=false;
});

/* 🚀 PORTAL */
function triggerPortal(url){
  const portal=document.createElement("div");
  portal.className="portal";
  document.body.appendChild(portal);

  requestAnimationFrame(()=>portal.classList.add("open"));

  setTimeout(()=>{
    location.href=url;
  },600);
}

/* 🧿 LOAD AVATAR */
(async()=>{
  const avatar = await getAvatar();
  if(avatar){
    document.getElementById("avatar-img").src = avatar;
  }
})();

</script>

</body>
</html>
