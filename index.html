<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness Omnitrix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

/* 🌌 BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(0,255,200,0.2), transparent 60%),
    #000;
}

/* 🎯 STAGE */
.stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1200px;
}

/* 🧿 DEVICE */
.omni{
  width:92vw;
  max-width:420px;
  aspect-ratio:1;
  border-radius:50%;
  position:relative;
  transform-style:preserve-3d;
  transition:0.1s;
}

/* 🔩 OUTER */
.outer{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:#001;
  box-shadow:0 0 80px #00ffcc;
}

/* ⚙️ WHEEL */
.wheel{
  position:absolute;
  inset:20%;
}

/* 🧿 SEGMENTS */
.seg{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:0 0;
  font-size:28px;
}

.seg.active{
  transform:scale(1.7);
  filter:drop-shadow(0 0 12px #00ffcc);
}

/* 🧑 AVATAR CORE */
.core{
  position:absolute;
  inset:32%;
  border-radius:50%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 40px #00ffcc,
    inset 0 0 20px #00ffcc;
  overflow:hidden;
  cursor:pointer;
}

.avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🏷 LABEL */
.label{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
  color:#00ffcc;
}

/* 🌌 PORTAL */
.portal{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#00ffcc,#000);
  transform:scale(0);
  border-radius:50%;
  z-index:999;
  transition:0.7s;
}

.portal.open{
  transform:scale(3);
  border-radius:0;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">
  <div class="omni" id="omni">

    <div class="outer"></div>
    <div class="wheel" id="wheel"></div>

    <!-- 🧑 AVATAR CORE -->
    <div class="core" id="core">
      <img src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png" class="avatar">
    </div>

    <div class="label" id="label">LIVE</div>

  </div>
</div>

<script>
// 🌍 WORLDS
const WORLDS=[
{e:"📡",n:"LIVE",u:"/live.html"},
{e:"🎵",n:"MUSIC",u:"/music.html"},
{e:"🎮",n:"GAMING",u:"/gaming.html"},
{e:"🏆",n:"SPORTS",u:"/sports.html"},
{e:"🖼️",n:"GALLERY",u:"/gallery.html"},
{e:"🛒",n:"STORE",u:"/store.html"},
{e:"⬆️",n:"UPLOAD",u:"/upload.html"},
{e:"👤",n:"PROFILE",u:"/profile.html"},
{e:"💬",n:"MESSAGES",u:"/messages.html"},
{e:"🔔",n:"ALERTS",u:"/notifications.html"},
{e:"🌐",n:"META",u:"/metaverse.html"}
];

const wheel=document.getElementById("wheel");
const core=document.getElementById("core");
const label=document.getElementById("label");
const omni=document.getElementById("omni");

let rot=0,vel=0,drag=false,lastX=0;
const step=(Math.PI*2)/WORLDS.length;

// BUILD
WORLDS.forEach((w,i)=>{
  const el=document.createElement("div");
  el.className="seg";
  el.innerText=w.e;

  const a=i*step-Math.PI/2;
  const r=120;

  el.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;

  wheel.appendChild(el);
});

// UPDATE
function update(){
  wheel.style.transform=`rotate(${rot}rad)`;

  let i=Math.round(-rot/step)%WORLDS.length;
  if(i<0)i+=WORLDS.length;

  document.querySelectorAll(".seg").forEach((s,idx)=>{
    s.classList.toggle("active",idx===i);
  });

  label.innerText=WORLDS[i].n;
  core.dataset.url=WORLDS[i].u;
}

// LOOP
function loop(){
  if(!drag){
    rot+=vel;
    vel*=0.93;
    if(Math.abs(vel)<0.0002) vel=0;
  }
  update();
  requestAnimationFrame(loop);
}
loop();

// DRAG + 3D
document.addEventListener("pointerdown",e=>{
  drag=true;
  lastX=e.clientX;
});

document.addEventListener("pointermove",e=>{
  if(!drag)return;
  let dx=e.clientX-lastX;
  lastX=e.clientX;

  let d=dx/240;
  rot+=d;
  vel=d;

  omni.style.transform=`rotateY(${dx/5}deg) rotateX(${dx/-8}deg)`;
});

document.addEventListener("pointerup",()=>{
  drag=false;
  omni.style.transform="rotateY(0) rotateX(0)";
});

// ENTER WORLD
core.onclick=()=>{
  const portal=document.createElement("div");
  portal.className="portal";
  document.body.appendChild(portal);

  requestAnimationFrame(()=>portal.classList.add("open"));

  setTimeout(()=>{
    location.href=core.dataset.url;
  },700);
};
</script>

</body>
</html>
