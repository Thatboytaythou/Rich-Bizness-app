<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rich Bizness — Omnitrix</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* BACKGROUND */
.rb-bg {
  position:absolute;
  inset:0;
  background:url("/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png") center/cover no-repeat;
  filter:brightness(0.6);
}

/* OMNITRIX WRAP */
.rb-wrap {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) perspective(900px) rotateX(15deg);
  width:340px;
  height:340px;
}

/* RINGS */
.rb-ring {
  position:absolute;
  border-radius:50%;
}

.outer {
  inset:-12px;
  border:8px solid #00ff99;
  box-shadow:0 0 40px #00ff99, inset 0 0 20px #00ff99;
}

.inner {
  inset:20px;
  border:2px solid rgba(0,255,150,0.4);
}

/* WHEEL */
.rb-wheel {
  position:absolute;
  inset:0;
  transition:transform 0.5s ease;
}

/* SEGMENTS */
.seg {
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center -140px;
  color:#00ff99;
  font-weight:800;
  font-size:12px;
  text-shadow:0 0 10px #00ff99;
  cursor:pointer;
}

/* POSITIONS */
.seg[data-i="0"] { transform:rotate(0deg) translate(-50%,-50%); }
.seg[data-i="1"] { transform:rotate(45deg) translate(-50%,-50%); }
.seg[data-i="2"] { transform:rotate(90deg) translate(-50%,-50%); }
.seg[data-i="3"] { transform:rotate(135deg) translate(-50%,-50%); }
.seg[data-i="4"] { transform:rotate(180deg) translate(-50%,-50%); }
.seg[data-i="5"] { transform:rotate(225deg) translate(-50%,-50%); }
.seg[data-i="6"] { transform:rotate(270deg) translate(-50%,-50%); }
.seg[data-i="7"] { transform:rotate(315deg) translate(-50%,-50%); }

/* CORE BUTTON */
.rb-core {
  position:absolute;
  top:50%;
  left:50%;
  width:110px;
  height:110px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#00ff99;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  text-align:center;
  cursor:pointer;
  box-shadow:0 0 40px #00ff99;
  transition:0.2s;
}

.rb-core:active {
  transform:translate(-50%,-50%) scale(0.9);
}

/* LOCKED STATE */
.locked {
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0%{box-shadow:0 0 20px #00ff99;}
  50%{box-shadow:0 0 60px #00ff99;}
  100%{box-shadow:0 0 20px #00ff99;}
}
</style>
</head>

<body>

<div class="rb-bg"></div>

<div class="rb-wrap">
  <div class="rb-ring outer"></div>
  <div class="rb-ring inner"></div>

  <div class="rb-wheel" id="wheel">
    <div class="seg" data-i="0">LIVE</div>
    <div class="seg" data-i="1">MUSIC</div>
    <div class="seg" data-i="2">GAMING</div>
    <div class="seg" data-i="3">SPORTS</div>
    <div class="seg" data-i="4">GALLERY</div>
    <div class="seg" data-i="5">STORE</div>
    <div class="seg" data-i="6">META</div>
    <div class="seg" data-i="7">UPLOAD</div>
  </div>

  <div class="rb-core" id="core">SELECT</div>
</div>

<script>
const wheel = document.getElementById("wheel");
const core = document.getElementById("core");

let currentIndex = 0;
let locked = false;

/* ROUTES */
const routes = [
  "/live",
  "/music",
  "/gaming",
  "/sports",
  "/gallery",
  "/store",
  "/metaverse",
  "/upload"
];

/* ROTATE FUNCTION */
function rotateTo(index){
  currentIndex = index;
  const angle = index * -45;
  wheel.style.transform = `rotate(${angle}deg)`;
}

/* CLICK SEGMENT */
document.querySelectorAll(".seg").forEach(seg=>{
  seg.addEventListener("click",()=>{
    if(locked) return;
    const i = Number(seg.dataset.i);
    rotateTo(i);
  });
});

/* CORE BUTTON */
core.addEventListener("click",()=>{

  if(!locked){
    // FIRST CLICK = LOCK
    locked = true;
    core.classList.add("locked");
    core.innerText = "RUN IT UP 🚀";
  } else {
    // SECOND CLICK = ENTER
    window.location.href = routes[currentIndex];
  }

});

/* SWIPE / DRAG (mobile feel) */
let startX = 0;

window.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

window.addEventListener("touchend",e=>{
  let diff = e.changedTouches[0].clientX - startX;

  if(Math.abs(diff) > 40){
    if(diff > 0){
      rotateTo((currentIndex - 1 + 8) % 8);
    } else {
      rotateTo((currentIndex + 1) % 8);
    }
  }
});
</script>

</body>
</html>
