<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rich Bizness — GOD MODE</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* BACKGROUND */
.rb-bg{
  position:absolute;
  inset:0;
  background:url("/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png") center/cover no-repeat;
  filter:brightness(.55);
}

/* WRAP */
.rb-wrap{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) perspective(900px) rotateX(15deg);
  width:340px;
  height:340px;
}

/* RINGS */
.rb-ring{position:absolute;border-radius:50%}
.outer{
  inset:-12px;
  border:8px solid #00ff99;
  box-shadow:0 0 40px #00ff99, inset 0 0 20px #00ff99;
}
.inner{
  inset:20px;
  border:2px solid rgba(0,255,150,.4);
}

/* WHEEL */
.rb-wheel{
  position:absolute;
  inset:0;
  transition:.5s ease;
}

/* SEGMENTS */
.seg{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center -140px;
  color:#00ff99;
  font-weight:900;
  text-shadow:0 0 12px #00ff99;
  cursor:pointer;
}

/* POSITIONS */
.seg[data-i="0"]{transform:rotate(0deg) translate(-50%,-50%)}
.seg[data-i="1"]{transform:rotate(45deg) translate(-50%,-50%)}
.seg[data-i="2"]{transform:rotate(90deg) translate(-50%,-50%)}
.seg[data-i="3"]{transform:rotate(135deg) translate(-50%,-50%)}
.seg[data-i="4"]{transform:rotate(180deg) translate(-50%,-50%)}
.seg[data-i="5"]{transform:rotate(225deg) translate(-50%,-50%)}
.seg[data-i="6"]{transform:rotate(270deg) translate(-50%,-50%)}
.seg[data-i="7"]{transform:rotate(315deg) translate(-50%,-50%)}

/* CORE */
.rb-core{
  position:absolute;
  top:50%;
  left:50%;
  width:110px;
  height:110px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#00ff99;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 40px #00ff99;
  transition:.2s;
}

/* CHARGE */
.charge{
  animation:charge 0.6s infinite alternate;
}
@keyframes charge{
  from{box-shadow:0 0 20px #00ff99}
  to{box-shadow:0 0 80px #00ff99}
}

/* EFFECT LAYERS */
.energy,.flash,.smoke,.portal{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.energy{
  top:50%;
  left:50%;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#00ff99;
  transform:translate(-50%,-50%);
  opacity:0;
}

.flash{
  background:#00ff99;
  opacity:0;
}

.smoke{
  background:radial-gradient(circle,rgba(0,255,150,.4),transparent 70%);
  opacity:0;
}

.portal{
  background:radial-gradient(circle,#00ff99,transparent 70%);
  opacity:0;
  transform:scale(0);
}

/* GOD MODE ANIMATIONS */
.explode .energy{
  animation:boom .5s forwards;
}

.explode .flash{
  animation:flash .3s;
}

.explode .smoke{
  animation:smoke .7s forwards;
}

.explode .portal{
  animation:portal .8s forwards;
}

@keyframes boom{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(50)}
}

@keyframes flash{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

@keyframes smoke{
  0%{opacity:0}
  100%{opacity:1}
}

@keyframes portal{
  0%{opacity:0;transform:scale(0)}
  100%{opacity:1;transform:scale(6)}
}
</style>
</head>

<body>

<div class="rb-bg"></div>

<div class="rb-wrap" id="wrap">

  <div class="rb-ring outer"></div>
  <div class="rb-ring inner"></div>

  <div class="rb-wheel" id="wheel">
    <div class="seg" data-i="0">LIVE</div>
    <div class="seg" data-i="1">MUSIC</div>
    <div class="seg" data-i="2">GAMING</div>
    <div class="seg" data-i="3">SPORTS</div>
    <div class="seg" data-i="4">GALLERY</div>
    <div class="seg" data-i="5">STORE</div>
    <div class="seg" data-i="6">META</div>
    <div class="seg" data-i="7">UPLOAD</div>
  </div>

  <div class="rb-core" id="core">SELECT</div>

  <div class="energy"></div>
  <div class="flash"></div>
  <div class="smoke"></div>
  <div class="portal"></div>

</div>

<script>
const wheel=document.getElementById("wheel");
const core=document.getElementById("core");
const wrap=document.getElementById("wrap");

let index=0;
let locked=false;

const routes=[
"/live",
"/music",
"/gaming",
"/sports",
"/gallery",
"/store",
"/metaverse",
"/upload"
];

function rotate(i){
  index=i;
  wheel.style.transform=`rotate(${i*-45}deg)`;
}

/* SEG CLICK */
document.querySelectorAll(".seg").forEach(seg=>{
  seg.onclick=()=>{
    if(locked)return;
    rotate(Number(seg.dataset.i));
  }
});

/* CORE */
core.onclick=()=>{
  if(!locked){
    locked=true;
    core.classList.add("charge");
    core.innerText="RUN IT UP 🚀";

    if(navigator.vibrate){
      navigator.vibrate(50);
    }

  }else{
    // 🔊 SOUND (OPTIONAL — add file later)
    // new Audio("/sounds/omni-blast.mp3").play();

    if(navigator.vibrate){
      navigator.vibrate([100,50,200]);
    }

    wrap.classList.add("explode");

    setTimeout(()=>{
      window.location.href=routes[index];
    },800);
  }
};
</script>

</body>
</html>
