<!DOCTYPE html>
<html>
<head>
  <title>Artist Gallery - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadGallery() {
      const grid = document.getElementById("gallery");

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        grid.innerHTML = "Error loading gallery";
        return;
      }

      grid.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.style.background = "#111";
        card.style.borderRadius = "16px";
        card.style.overflow = "hidden";

        const img = document.createElement("img");
        img.src = item.image_url;
        img.style.width = "100%";
        img.style.height = "240px";
        img.style.objectFit = "cover";

        const info = document.createElement("div");
        info.style.padding = "10px";

        const artist = document.createElement("a");
        artist.textContent = item.artist;
        artist.href = `/artist/index.html?name=${encodeURIComponent(item.artist)}`;
        artist.style.color = "#00ffaa";

        const cat = document.createElement("div");
        cat.textContent = item.category;
        cat.style.color = "#aaa";

        info.appendChild(artist);
        info.appendChild(cat);

        card.appendChild(img);
        card.appendChild(info);

        grid.appendChild(card);
      });
    }

    window.addEventListener("DOMContentLoaded", loadGallery);
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 12px;
    }
  </style>
</head>

<body>
  <h1>🔥 Artist Gallery 🔥</h1>

  <div style="text-align:center;">
    <a href="/index.html" style="color:#4da3ff;">Home</a> |
    <a href="/upload.html" style="color:#00ffaa;">Upload</a>
  </div>

  <div id="gallery" class="grid"></div>
</body>
</html>
