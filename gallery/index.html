<!DOCTYPE html>
<html>
<head>
  <title>🔥 Viral Gallery - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 52px;
      margin: 20px 0 10px;
      text-shadow: 0 0 18px rgba(0,255,170,0.3);
    }

    .topnav {
      text-align: center;
      margin-bottom: 20px;
    }

    .topnav a {
      color: #00ffaa;
      text-decoration: none;
      margin: 0 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .info {
      padding: 10px;
      font-size: 14px;
    }

    .artist {
      color: #00ffaa;
      cursor: pointer;
      font-weight: bold;
    }

    .likes {
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="wrap">
  <h1>🔥 Viral Gallery 🔥</h1>

  <div class="topnav">
    <a href="/">Home</a>
    <a href="/upload">Upload</a>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";

  const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const grid = document.getElementById("grid");

  async function loadGallery() {
    const { data, error } = await supabase
      .from("uploads")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      grid.innerHTML = "❌ Error loading gallery";
      console.error(error);
      return;
    }

    grid.innerHTML = "";

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${item.image_url}" />

        <div class="info">
          <div class="artist">${item.artist}</div>
          <div>${item.category}</div>
          <div class="likes">❤️ ${item.likes || 0}</div>
        </div>
      `;

      // 🔥 CLICK ARTIST → GO TO PROFILE
      card.querySelector(".artist").onclick = () => {
        window.location.href =
          "/artist/index.html?name=" + encodeURIComponent(item.artist);
      };

      grid.appendChild(card);
    });
  }

  loadGallery();
</script>

</body>
</html>
