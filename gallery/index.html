<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork Gallery</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .top-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-links a {
      text-decoration: none;
      color: white;
      background: #1b1b1b;
      border: 1px solid #333;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .top-links a:hover {
      color: #7CFC00;
      border-color: #7CFC00;
    }

    h1 {
      margin: 0;
      color: #7CFC00;
      font-size: 2rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 26px;
    }

    .controls input,
    .controls select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #151515;
      color: white;
      font-size: 15px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .card {
      background: #171717;
      border: 1px solid #2c2c2c;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #7CFC00;
    }

    .card-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .card-body {
      padding: 16px;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: bold;
      margin-bottom: 8px;
      color: #fff;
    }

    .card-meta {
      color: #bbb;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .card-price {
      color: #7CFC00;
      font-size: 1.05rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card-category {
      display: inline-block;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(124, 252, 0, 0.12);
      border: 1px solid rgba(124, 252, 0, 0.3);
      color: #baff8a;
      margin-bottom: 12px;
    }

    .card-description {
      color: #d5d5d5;
      font-size: 14px;
      line-height: 1.45;
      min-height: 48px;
    }

    .status-box {
      display: none;
      margin-bottom: 20px;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
    }

    .status-box.error {
      display: block;
      background: rgba(255, 0, 0, 0.08);
      border: 1px solid rgba(255, 80, 80, 0.35);
      color: #ff9c9c;
    }

    .status-box.info {
      display: block;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ddd;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #aaa;
      border: 1px dashed #333;
      border-radius: 16px;
      background: #131313;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .card-image {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Artwork Gallery</h1>

      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="profile.html">Profile</a>
      </div>
    </div>

    <div class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by title, artist, category, or description"
      />

      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Painting">Painting</option>
        <option value="Drawing">Drawing</option>
        <option value="Digital Art">Digital Art</option>
        <option value="Photography">Photography</option>
        <option value="3D Printing">3D Printing</option>
        <option value="Custom Design">Custom Design</option>
        <option value="Other">Other</option>
      </select>

      <select id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="title-az">Title: A to Z</option>
        <option value="title-za">Title: Z to A</option>
      </select>
    </div>

    <div id="statusBox" class="status-box info">Loading artwork...</div>
    <div id="galleryGrid" class="gallery-grid"></div>
  </div>

  <script>
    // =========================
    // SUPABASE CONFIG
    // =========================
    const SUPABASE_URL = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =========================
    // ELEMENTS
    // =========================
    const galleryGrid = document.getElementById("galleryGrid");
    const statusBox = document.getElementById("statusBox");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const sortSelect = document.getElementById("sortSelect");

    // =========================
    // STATE
    // =========================
    let allArtwork = [];

    // =========================
    // HELPERS
    // =========================
    function showStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = "block";
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.className = "status-box";
      statusBox.style.display = "none";
    }

    function formatPrice(value) {
      const number = Number(value || 0);
      return `$${number.toFixed(2)}`;
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getFilteredArtwork() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;
      const sortValue = sortSelect.value;

      let filtered = [...allArtwork];

      if (selectedCategory !== "all") {
        filtered = filtered.filter(item => item.category === selectedCategory);
      }

      if (searchTerm) {
        filtered = filtered.filter(item => {
          const title = (item.title || "").toLowerCase();
          const artist = (item.artist_name || "").toLowerCase();
          const category = (item.category || "").toLowerCase();
          const description = (item.description || "").toLowerCase();

          return (
            title.includes(searchTerm) ||
            artist.includes(searchTerm) ||
            category.includes(searchTerm) ||
            description.includes(searchTerm)
          );
        });
      }

      filtered.sort((a, b) => {
        switch (sortValue) {
          case "oldest":
            return new Date(a.created_at || 0) - new Date(b.created_at || 0);

          case "price-low":
            return Number(a.price || 0) - Number(b.price || 0);

          case "price-high":
            return Number(b.price || 0) - Number(a.price || 0);

          case "title-az":
            return (a.title || "").localeCompare(b.title || "");

          case "title-za":
            return (b.title || "").localeCompare(a.title || "");

          case "newest":
          default:
            return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        }
      });

      return filtered;
    }

    function renderGallery() {
      const filteredArtwork = getFilteredArtwork();

      if (!filteredArtwork.length) {
        galleryGrid.innerHTML = `
          <div class="empty-state">
            <h2>No artwork found</h2>
            <p>Try changing your search, category, or upload some new art.</p>
          </div>
        `;
        return;
      }

      galleryGrid.innerHTML = filteredArtwork.map(item => {
        const title = escapeHtml(item.title || "Untitled");
        const artist = escapeHtml(item.artist_name || "Unknown Artist");
        const category = escapeHtml(item.category || "Other");
        const description = escapeHtml(item.description || "No description added.");
        const imageUrl = escapeHtml(item.image_url || "");
        const price = formatPrice(item.price);

        return `
          <div class="card">
            <img
              class="card-image"
              src="${imageUrl}"
              alt="${title}"
              onerror="this.src='https://placehold.co/600x400?text=No+Image';"
            />
            <div class="card-body">
              <div class="card-title">${title}</div>
              <div class="card-meta">By ${artist}</div>
              <div class="card-price">${price}</div>
              <div class="card-category">${category}</div>
              <div class="card-description">${description}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    // =========================
    // FETCH ARTWORK
    // =========================
    async function loadArtwork() {
      showStatus("Loading artwork...", "info");

      try {
        const { data, error } = await supabaseClient
          .from("artwork")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          throw error;
        }

        allArtwork = data || [];

        if (!allArtwork.length) {
          hideStatus();
          renderGallery();
          return;
        }

        hideStatus();
        renderGallery();
      } catch (error) {
        console.error("Gallery load error:", error);
        showStatus("Failed to load gallery: " + error.message, "error");
      }
    }

    // =========================
    // EVENTS
    // =========================
    searchInput.addEventListener("input", renderGallery);
    categoryFilter.addEventListener("change", renderGallery);
    sortSelect.addEventListener("change", renderGallery);

    // =========================
    // INIT
    // =========================
    loadArtwork();
  </script>
</body>
</html>
