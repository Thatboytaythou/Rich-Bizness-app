<!DOCTYPE html>
<html>
<head>
  <title>Viral Gallery - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 52px;
      margin: 20px 0 10px;
      text-shadow: 0 0 18px rgba(0,255,170,0.3);
    }

    .sub {
      text-align: center;
      color: #bbb;
      font-size: 20px;
      margin-bottom: 24px;
    }

    .topnav {
      text-align: center;
      margin-bottom: 22px;
    }

    .topnav a {
      color: #00ffaa;
      text-decoration: none;
      font-size: 18px;
      margin: 0 10px;
    }

    .search {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .search input {
      width: 100%;
      max-width: 520px;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }

    .filters button {
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      background: #1a1a1a;
      color: white;
    }

    .trending {
      background: #101010;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 28px;
      box-shadow: 0 0 18px rgba(0,255,170,0.08);
    }

    .trend-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .trend-row {
      padding: 12px 0;
      border-top: 1px solid #1f1f1f;
    }

    .trend-row:first-child {
      border-top: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,170,0.08);
    }

    .img-wrap {
      overflow: hidden;
      background: #000;
    }

    .img-wrap img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .img-wrap img:hover {
      transform: scale(1.05);
    }

    .card-body {
      padding: 16px;
    }

    .artist-link {
      color: #00ffaa;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 8px;
    }

    .category {
      color: #aaa;
      margin-bottom: 14px;
      font-size: 15px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions a {
      color: #4da3ff;
      text-decoration: none;
      font-weight: bold;
    }

    .pill {
      background: #181818;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 15px;
    }

    .empty {
      text-align: center;
      color: #888;
      font-size: 22px;
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>🔥 Rich Bizness Viral Feed 🔥</h1>
    <div class="sub">Tattoo. Art. 3D Print. Community.</div>

    <div class="topnav">
      <a href="/index.html">Home</a>
      <a href="/upload.html">Upload</a>
    </div>

    <div class="search">
      <input id="searchInput" type="text" placeholder="Search artist name..." />
    </div>

    <div class="filters">
      <button onclick="setFilter('All')" id="filter-All">All</button>
      <button onclick="setFilter('Tattoo')" id="filter-Tattoo">Tattoo</button>
      <button onclick="setFilter('Art')" id="filter-Art">Art</button>
      <button onclick="setFilter('3D Print')" id="filter-3D Print">3D Print</button>
    </div>

    <div id="trending" class="trending"></div>

    <div id="gallery" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">No uploads yet.</div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allUploads = [];
    let currentFilter = "All";
    let currentSearch = "";

    window.setFilter = function(filter) {
      currentFilter = filter;
      updateFilterButtons();
      renderGallery();
    };

    function updateFilterButtons() {
      ["All", "Tattoo", "Art", "3D Print"].forEach((name) => {
        const btn = document.getElementById(`filter-${name}`);
        if (!btn) return;

        if (name === currentFilter) {
          btn.style.background = "#2563eb";
          btn.style.color = "#fff";
        } else {
          btn.style.background = "#1a1a1a";
          btn.style.color = "#fff";
        }
      });
    }

    function renderTrending() {
      const trending = document.getElementById("trending");
      trending.innerHTML = "";

      const title = document.createElement("div");
      title.className = "trend-title";
      title.textContent = "🔥 Trending";
      trending.appendChild(title);

      const topItems = [...allUploads]
        .sort((a, b) => (b.likes || 0) - (a.likes || 0))
        .slice(0, 3);

      if (!topItems.length) {
        const empty = document.createElement("div");
        empty.textContent = "No trending uploads yet.";
        empty.style.color = "#888";
        trending.appendChild(empty);
        return;
      }

      topItems.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "trend-row";
        row.innerHTML = `
          <div style="font-size:18px; font-weight:bold;">#${i + 1} ${item.artist}</div>
          <div style="color:#aaa; margin-top:4px;">${item.category} • ❤️ ${item.likes || 0}</div>
        `;
        trending.appendChild(row);
      });
    }

    async function likePost(item, likeBtn) {
      const newLikes = (item.likes || 0) + 1;

      const { error } = await supabase
        .from("uploads")
        .update({ likes: newLikes })
        .eq("id", item.id);

      if (!error) {
        item.likes = newLikes;
        likeBtn.textContent = `❤️ ${newLikes}`;
        renderTrending();
      }
    }

    async function sharePost(item) {
      const text = `${item.artist} • ${item.category} • Rich Bizness LLC`;
      const url = item.image_url;

      if (navigator.share) {
        try {
          await navigator.share({ title: "Rich Bizness LLC", text, url });
        } catch (e) {}
      } else {
        await navigator.clipboard.writeText(url);
        alert("Link copied ✅");
      }
    }

    function makeCard(item) {
      const card = document.createElement("div");
      card.className = "card";

      const imgWrap = document.createElement("div");
      imgWrap.className = "img-wrap";

      const img = document.createElement("img");
      img.src = item.image_url;
      img.alt = item.artist;

      imgWrap.appendChild(img);

      const body = document.createElement("div");
      body.className = "card-body";

      const artist = document.createElement("a");
      artist.href = `/artist/index.html?name=${encodeURIComponent(item.artist)}`;
      artist.className = "artist-link";
      artist.textContent = item.artist;

      const category = document.createElement("div");
      category.className = "category";
      category.textContent = item.category;

      const actions = document.createElement("div");
      actions.className = "actions";

      const view = document.createElement("a");
      view.href = item.image_url;
      view.target = "_blank";
      view.textContent = "View Full Image";

      const likeBtn = document.createElement("button");
      likeBtn.className = "pill";
      likeBtn.textContent = `❤️ ${item.likes || 0}`;
      likeBtn.onclick = () => likePost(item, likeBtn);

      const shareBtn = document.createElement("button");
      shareBtn.className = "pill";
      shareBtn.textContent = "📤 Share";
      shareBtn.onclick = () => sharePost(item);

      actions.appendChild(view);
      actions.appendChild(likeBtn);
      actions.appendChild(shareBtn);

      body.appendChild(artist);
      body.appendChild(category);
      body.appendChild(actions);

      card.appendChild(imgWrap);
      card.appendChild(body);

      return card;
    }

    function renderGallery() {
      const gallery = document.getElementById("gallery");
      const empty = document.getElementById("empty");
      gallery.innerHTML = "";

      let filtered = allUploads;

      if (currentFilter !== "All") {
        filtered = filtered.filter(item => item.category === currentFilter);
      }

      if (currentSearch.trim()) {
        filtered = filtered.filter(item =>
          item.artist.toLowerCase().includes(currentSearch.toLowerCase())
        );
      }

      if (!filtered.length) {
        empty.style.display = "block";
      } else {
        empty.style.display = "none";
      }

      filtered.forEach(item => {
        gallery.appendChild(makeCard(item));
      });
    }

    async function loadGallery() {
      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("empty").style.display = "block";
        document.getElementById("empty").textContent = "Error loading gallery";
        return;
      }

      allUploads = data || [];
      updateFilterButtons();
      renderTrending();
      renderGallery();
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      currentSearch = e.target.value;
      renderGallery();
    });

    loadGallery();
  </script>
</body>
</html>
