<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #39ff14;
    }
    .grid {
      max-width: 1200px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }
    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      background: #1d1d1d;
    }
    .content {
      padding: 14px;
    }
    .content h3 {
      margin: 0 0 8px;
      color: #39ff14;
    }
    a {
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <p><a href="index.html">← Home</a></p>
  <h1>Artist Gallery</h1>
  <div id="gallery" class="grid"></div>

  <script src="env.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);
    const gallery = document.getElementById("gallery");

    function escapeHtml(str = "") {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadGallery() {
      const { data, error } = await supabase
        .from("artworks")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        gallery.innerHTML = "<p>Could not load gallery.</p>";
        return;
      }

      if (!data || data.length === 0) {
        gallery.innerHTML = "<p>No artwork yet.</p>";
        return;
      }

      gallery.innerHTML = data.map(item => `
        <div class="card">
          <img src="${escapeHtml(item.image_url || "")}" alt="${escapeHtml(item.title || "art")}" />
          <div class="content">
            <h3>${escapeHtml(item.title || "Untitled")}</h3>
            <p>${escapeHtml(item.description || "")}</p>
          </div>
        </div>
      `).join("");
    }

    loadGallery();
  </script>
</body>
</html>
