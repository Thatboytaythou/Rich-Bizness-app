<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - Rich Bizness LLC</title>
  <style>
    :root {
      --bg:#050505;
      --panel:rgba(15,15,15,.92);
      --border:rgba(255,255,255,.08);
      --text:#f5f5f5;
      --muted:#a8a8a8;
      --primary:#19e68c;
      --primary-dark:#11c775;
      --danger:#ff5a67;
      --input:#ececec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,.07), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      padding: 24px;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toplink,
    .ghost-link {
      text-decoration: none;
      font-weight: 700;
    }

    .toplink {
      color: var(--primary);
    }

    .ghost-link {
      color: #8ecbff;
      background: rgba(255,255,255,.05);
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.07);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px 22px 24px;
      margin-bottom: 28px;
    }

    .headline {
      margin: 0 0 8px;
      font-size: 48px;
      font-weight: 800;
      text-align: center;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
      text-align: center;
    }

    .stats {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .pill {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 14px;
      font-weight: 700;
    }

    .filters {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1.3fr .8fr;
      gap: 14px;
    }

    .input,
    .select {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 16px;
      background: var(--input);
      color: #111;
      outline: none;
    }

    .status {
      min-height: 24px;
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 18px;
    }

    .upload-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px;
      overflow: hidden;
    }

    .media-wrap {
      width: 100%;
      height: 320px;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .upload-body {
      padding: 14px;
    }

    .upload-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .upload-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .caption {
      color: #ddd;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .upload-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .like-btn,
    .artist-btn,
    .watch-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
    }

    .like-btn {
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
    }

    .artist-btn,
    .watch-btn {
      background: rgba(255,255,255,.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
    }

    .empty {
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      color: var(--muted);
      text-align: center;
      border: 1px solid rgba(255,255,255,.07);
    }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .headline { font-size: 36px; }
      .filters { grid-template-columns: 1fr; }
      .media-wrap { height: 270px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="toplink" href="/index.html">← Home</a>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="ghost-link" href="/upload.html">Upload Work</a>
        <a class="ghost-link" href="/profile.html">My Profile</a>
        <a class="ghost-link" href="/watch.html">📺 Watch Live</a>
      </div>
    </div>

    <div class="card">
      <h1 class="headline">🔥 Artist Gallery 🔥</h1>
      <p class="sub">Explore images and videos from artists, tattoo creators, and 3D makers.</p>

      <div class="stats">
        <div class="pill">📸 <span id="totalUploads">0 posts</span></div>
        <div class="pill">👤 <span id="totalArtists">0 artists</span></div>
        <div class="pill">❤️ <span id="totalLikes">0 likes</span></div>
      </div>

      <div class="filters">
        <input id="searchInput" class="input" type="text" placeholder="Search artist name..." />
        <select id="categoryFilter" class="select">
          <option value="all">All Categories</option>
          <option value="Tattoo">Tattoo</option>
          <option value="Art">Art</option>
          <option value="3D Print">3D Print</option>
          <option value="Video">Video</option>
        </select>
      </div>

      <div id="status" class="status">Loading...</div>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const totalUploadsEl = document.getElementById("totalUploads");
    const totalArtistsEl = document.getElementById("totalArtists");
    const totalLikesEl = document.getElementById("totalLikes");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");

    let allUploads = [];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateStats(items) {
      totalUploadsEl.textContent = `${items.length} posts`;
      totalArtistsEl.textContent = `${new Set(items.map(i => (i.artist_name || "").trim()).filter(Boolean)).size} artists`;
      totalLikesEl.textContent = `${items.reduce((sum, item) => sum + (item.likes || 0), 0)} likes`;
    }

    function detectMediaType(item) {
      if (item.media_type) return item.media_type;
      return /\.(mp4|webm|ogg|mov|m4v)$/i.test(item.file_url || "") ? "video" : "image";
    }

    function renderMedia(item) {
      if (detectMediaType(item) === "video") {
        return `
          <div class="media-wrap">
            <video controls playsinline preload="metadata">
              <source src="${item.file_url}">
            </video>
          </div>
        `;
      }

      return `
        <div class="media-wrap">
          <img src="${item.file_url}" alt="${item.artist_name || "Upload"}">
        </div>
      `;
    }

    function getFilteredUploads() {
      const search = searchInput.value.trim().toLowerCase();
      const category = categoryFilter.value;

      return allUploads.filter(item => {
        const matchesSearch = !search || (item.artist_name || "").toLowerCase().includes(search);
        const itemCategory = item.category || (detectMediaType(item) === "video" ? "Video" : "");
        const matchesCategory = category === "all" || itemCategory === category;
        return matchesSearch && matchesCategory;
      });
    }

    async function likePost(id, currentLikes) {
      const { error } = await supabase
        .from("uploads")
        .update({ likes: (currentLikes || 0) + 1 })
        .eq("id", id);

      if (error) {
        setStatus("Like failed: " + error.message);
        return;
      }

      const item = allUploads.find(x => x.id === id);
      if (item) item.likes = (item.likes || 0) + 1;

      refreshGalleryView();
    }

    function refreshGalleryView() {
      const filtered = getFilteredUploads();

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty">No posts match your search yet.</div>`;
        updateStats(filtered);
        return;
      }

      grid.innerHTML = "";

      filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "upload-card";

        card.innerHTML = `
          ${renderMedia(item)}
          <div class="upload-body">
            <div class="upload-name">${item.artist_name || ""}</div>
            <div class="upload-meta">${item.category || ""}</div>
            ${item.caption ? `<div class="caption">${item.caption}</div>` : ""}
            <div class="upload-meta">❤️ ${item.likes || 0}</div>
            <div class="upload-meta">${item.created_at ? new Date(item.created_at).toLocaleDateString() : ""}</div>
            <div class="upload-actions">
              <button class="like-btn">❤️ Like</button>
              <button class="artist-btn">View Artist</button>
              <button class="watch-btn">Watch Live</button>
            </div>
          </div>
        `;

        card.querySelector(".like-btn").addEventListener("click", () => {
          likePost(item.id, item.likes || 0);
        });

        card.querySelector(".artist-btn").addEventListener("click", () => {
          window.location.href = "/artist/index.html?name=" + encodeURIComponent(item.artist_name || "");
        });

        card.querySelector(".watch-btn").addEventListener("click", () => {
          const artist = encodeURIComponent(item.artist_name || "guest");
          window.location.href = "/watch.html?artist=" + artist;
        });

        grid.appendChild(card);
      });

      updateStats(filtered);
      setStatus("");
    }

    async function loadGallery() {
      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        grid.innerHTML = `<div class="empty">${error.message}</div>`;
        return setStatus("Failed to load gallery.");
      }

      allUploads = data || [];
      refreshGalleryView();
    }

    searchInput.addEventListener("input", refreshGalleryView);
    categoryFilter.addEventListener("change", refreshGalleryView);

    await loadGallery();

    supabase
      .channel("uploads-live")
      .on("postgres_changes", { event: "*", schema: "public", table: "uploads" }, () => loadGallery())
      .subscribe();
  </script>
</body>
</html>
