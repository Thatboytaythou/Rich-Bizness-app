<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Rich Bizness LLC</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .brand {
      font-size: 28px;
      font-weight: 900;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-links a {
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
      font-weight: 700;
    }

    .hero {
      display: grid;
      grid-template-columns: 320px 1fr;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0b0b0b;
      margin-bottom: 24px;
    }

    .hero img {
      width: 100%;
      height: 100%;
      min-height: 260px;
      object-fit: cover;
      display: block;
    }

    .hero-copy {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(59,130,246,0.06));
    }

    .hero-copy h1 {
      margin: 0 0 12px;
      font-size: 40px;
      font-weight: 900;
    }

    .hero-copy p {
      margin: 0;
      color: #d4d4d8;
      line-height: 1.7;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.3fr 0.8fr 0.8fr;
      gap: 14px;
      margin-bottom: 22px;
    }

    .controls input,
    .controls select {
      width: 100%;
      background: #111;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .summary-row h2 {
      margin: 0;
      font-size: 30px;
    }

    .summary-row p {
      margin: 4px 0 0;
      color: #a1a1aa;
      font-size: 14px;
    }

    .count-badge {
      padding: 10px 14px;
      border-radius: 14px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      color: #d4d4d8;
      font-size: 14px;
      font-weight: 700;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #090909;
    }

    .card-body {
      padding: 16px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .title-row h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .tag {
      background: #18181b;
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .artist {
      margin: 0 0 10px;
      color: #d4d4d8;
      font-size: 14px;
    }

    .desc {
      margin: 0 0 14px;
      color: #a1a1aa;
      line-height: 1.6;
      font-size: 14px;
      min-height: 44px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: #71717a;
      font-size: 13px;
    }

    .empty-state {
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 24px;
      text-align: center;
      color: #a1a1aa;
    }

    .status-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px 16px;
      color: #d4d4d8;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    @media (max-width: 920px) {
      .hero,
      .controls {
        grid-template-columns: 1fr;
      }

      .hero-copy h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">RICH BIZNESS GALLERY</div>
      <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/artist/">Artist</a>
        <a href="/upload.html">Upload</a>
        <a href="/live.html">Live</a>
        <a href="/profile.html">Profile</a>
        <a href="/auth.html">Auth</a>
      </nav>
    </div>

    <section class="hero">
      <img src="/images/19FB5229-30DD-40B0-9404-5136C27FEF6A.png" alt="Gallery hero" />
      <div class="hero-copy">
        <h1>Real gallery, real uploads</h1>
        <p>
          Browse artwork pulled directly from Supabase. This is now shared across devices and users.
        </p>
      </div>
    </section>

    <div id="statusBox" class="status-box">Loading gallery...</div>

    <section class="controls">
      <input id="searchInput" type="text" placeholder="Search by title, artist, category, or description..." />
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="digital">Digital</option>
        <option value="painting">Painting</option>
        <option value="photography">Photography</option>
        <option value="3d">3D</option>
        <option value="streetwear">Streetwear</option>
      </select>
      <select id="sortFilter">
        <option value="newest">Sort: Newest</option>
        <option value="oldest">Sort: Oldest</option>
        <option value="title-az">Sort: Title A-Z</option>
        <option value="artist-az">Sort: Artist A-Z</option>
      </select>
    </section>

    <section class="summary-row">
      <div>
        <h2>Gallery Collection</h2>
        <p>Search, filter, and browse uploaded work.</p>
      </div>
      <div id="galleryCount" class="count-badge">0 pieces</div>
    </section>

    <section id="galleryGrid" class="gallery-grid"></section>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";
    const DEFAULT_IMAGE = "/images/19FB5229-30DD-40B0-9404-5136C27FEF6A.png";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusBox = document.getElementById("statusBox");
    const galleryGrid = document.getElementById("galleryGrid");
    const galleryCount = document.getElementById("galleryCount");

    let artworks = [];

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function safeImage(src) {
      return src || DEFAULT_IMAGE;
    }

    function formatCategory(category) {
      if (!category) return "Artwork";
      if (category.toLowerCase() === "3d") return "3D";
      return category.charAt(0).toUpperCase() + category.slice(1);
    }

    async function loadArtworks() {
      setStatus("Loading gallery...");

      const { data, error } = await supabase
        .from("artworks")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        setStatus("Gallery error: " + error.message);
        artworks = [];
        renderGallery([]);
        return;
      }

      artworks = data || [];
      setStatus(`Loaded ${artworks.length} artwork piece${artworks.length === 1 ? "" : "s"}.`);
      filterAndRenderGallery();
    }

    function sortArtworks(items, sortValue) {
      const list = [...items];

      if (sortValue === "oldest") {
        return list.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      }

      if (sortValue === "title-az") {
        return list.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
      }

      if (sortValue === "artist-az") {
        return list.sort((a, b) => (a.artist_name || "").localeCompare(b.artist_name || ""));
      }

      return list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }

    function renderGallery(items) {
      galleryCount.textContent = `${items.length} piece${items.length === 1 ? "" : "s"}`;

      if (!items.length) {
        galleryGrid.innerHTML = `
          <div class="empty-state">
            <h3>No artwork found</h3>
            <p>Try a different search or category.</p>
          </div>
        `;
        return;
      }

      galleryGrid.innerHTML = items.map((item) => `
        <article class="card">
          <img src="${safeImage(item.image_url)}" alt="${item.title || "Artwork"}" loading="lazy" />
          <div class="card-body">
            <div class="title-row">
              <h3>${item.title || "Untitled Artwork"}</h3>
              <span class="tag">${formatCategory(item.category)}</span>
            </div>
            <p class="artist">By ${item.artist_name || "Unknown Artist"}</p>
            <p class="desc">${item.description || "Artwork from the Rich Bizness platform."}</p>
            <div class="meta">
              <span>${item.created_at ? item.created_at.slice(0, 10) : ""}</span>
              <span>${item.price || "Contact for price"}</span>
            </div>
          </div>
        </article>
      `).join("");
    }

    function filterAndRenderGallery() {
      const searchValue = document.getElementById("searchInput").value.trim().toLowerCase();
      const categoryValue = document.getElementById("categoryFilter").value;
      const sortValue = document.getElementById("sortFilter").value;

      const filtered = artworks.filter((item) => {
        const title = (item.title || "").toLowerCase();
        const artist = (item.artist_name || "").toLowerCase();
        const category = (item.category || "").toLowerCase();
        const description = (item.description || "").toLowerCase();

        const matchesSearch =
          title.includes(searchValue) ||
          artist.includes(searchValue) ||
          category.includes(searchValue) ||
          description.includes(searchValue);

        const matchesCategory =
          categoryValue === "all" || category === categoryValue;

        return matchesSearch && matchesCategory;
      });

      renderGallery(sortArtworks(filtered, sortValue));
    }

    document.addEventListener("error", function (e) {
      if (e.target.tagName === "IMG") {
        e.target.src = DEFAULT_IMAGE;
      }
    }, true);

    document.getElementById("searchInput").addEventListener("input", filterAndRenderGallery);
    document.getElementById("categoryFilter").addEventListener("change", filterAndRenderGallery);
    document.getElementById("sortFilter").addEventListener("change", filterAndRenderGallery);

    loadArtworks();
  </script>
</body>
</html>
