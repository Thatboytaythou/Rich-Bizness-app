<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness Gallery</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 28px 20px 18px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #050505;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    h1 {
      margin: 0;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .subtext {
      margin: 10px 0 0;
      color: #a1a1aa;
      font-size: 15px;
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto;
    }

    .controls {
      max-width: 1200px;
      margin: 22px auto 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls input,
    .controls select {
      background: #111;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      min-width: 220px;
      outline: none;
    }

    .controls input::placeholder {
      color: #777;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 50px;
    }

    .gallery-stats {
      margin-bottom: 22px;
      color: #a1a1aa;
      font-size: 15px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .card {
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.16);
    }

    .image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      overflow: hidden;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 16px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 8px;
    }

    .art-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .tag {
      background: #18181b;
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .artist {
      color: #d4d4d8;
      margin: 0 0 10px;
      font-size: 14px;
    }

    .desc {
      color: #a1a1aa;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 14px;
      min-height: 42px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: #71717a;
      flex-wrap: wrap;
    }

    .empty-state {
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 24px;
      text-align: center;
      color: #a1a1aa;
    }

    .featured-banner {
      margin-bottom: 24px;
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(59,130,246,0.12));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .featured-banner h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .featured-banner p {
      margin: 0;
      color: #d4d4d8;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 30px;
      }

      .controls input,
      .controls select {
        width: 100%;
        min-width: 100%;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>🎨 Rich Bizness Gallery</h1>
      <p class="subtext">Explore featured artwork, artist uploads, and creative drops.</p>

      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search by title, artist, or style..." />
        <select id="filterSelect">
          <option value="all">All Artwork</option>
          <option value="painting">Painting</option>
          <option value="digital">Digital</option>
          <option value="photography">Photography</option>
          <option value="3d">3D</option>
          <option value="streetwear">Streetwear</option>
        </select>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="featured-banner">
      <h2>Featured Collection</h2>
      <p>Fresh creative work from Rich Bizness artists and collaborators. New uploads appear here automatically when added to local storage from your upload page.</p>
    </section>

    <div id="galleryStats" class="gallery-stats">Loading gallery...</div>
    <div id="galleryGrid" class="gallery-grid"></div>
  </main>

  <script>
    const sampleArtworks = [
      {
        title: "Neon Vision",
        artist: "Rich Bizness",
        category: "digital",
        description: "A bold digital art piece with neon energy and futuristic motion.",
        image: "https://images.unsplash.com/photo-1515405295579-ba7b45403062?auto=format&fit=crop&w=1200&q=80",
        date: "2026-03-25",
        price: "$250"
      },
      {
        title: "Street Dreams",
        artist: "Tay Holmes",
        category: "streetwear",
        description: "Urban-inspired fashion concept art blending luxury and raw street energy.",
        image: "https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=1200&q=80",
        date: "2026-03-21",
        price: "$180"
      },
      {
        title: "Golden Hour Portrait",
        artist: "RB Studios",
        category: "photography",
        description: "Warm natural-light portrait photography designed for brand storytelling.",
        image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1200&q=80",
        date: "2026-03-18",
        price: "$300"
      },
      {
        title: "Canvas Flow",
        artist: "Rich Bizness Artist",
        category: "painting",
        description: "Abstract brush movement and layered color textures on a deep dark base.",
        image: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=1200&q=80",
        date: "2026-03-14",
        price: "$420"
      },
      {
        title: "Sculpt Mode",
        artist: "Creative Lab",
        category: "3d",
        description: "3D visual concept showing a premium product-style render with depth.",
        image: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=80",
        date: "2026-03-11",
        price: "$500"
      },
      {
        title: "Future Motion",
        artist: "Rich Bizness",
        category: "digital",
        description: "A high-contrast motion-inspired digital composition for promo branding.",
        image: "https://images.unsplash.com/photo-1545239351-1141bd82e8a6?auto=format&fit=crop&w=1200&q=80",
        date: "2026-03-09",
        price: "$275"
      }
    ];

    function normalizeUploads(uploadedItems) {
      return uploadedItems.map((item) => ({
        title: item.title || "Untitled Artwork",
        artist: item.artist || item.name || "Unknown Artist",
        category: (item.category || item.type || "digital").toLowerCase(),
        description: item.description || "Artist upload from Rich Bizness gallery.",
        image: item.image || item.imageUrl || item.photo || item.url || "",
        date: item.date || item.createdAt || new Date().toISOString().slice(0, 10),
        price: item.price || "Contact for price"
      }));
    }

    function loadGalleryData() {
      let uploaded = [];

      try {
        const raw = localStorage.getItem("artistUploads");
        if (raw) {
          uploaded = JSON.parse(raw);
        }
      } catch (err) {
        console.error("Could not read artistUploads:", err);
      }

      const normalizedUploads = Array.isArray(uploaded) ? normalizeUploads(uploaded) : [];
      return [...normalizedUploads, ...sampleArtworks].filter(item => item.image);
    }

    function formatCategory(category) {
      if (!category) return "Artwork";
      if (category === "3d") return "3D";
      return category.charAt(0).toUpperCase() + category.slice(1);
    }

    function renderGallery(items) {
      const galleryGrid = document.getElementById("galleryGrid");
      const galleryStats = document.getElementById("galleryStats");

      galleryStats.textContent = `${items.length} piece${items.length === 1 ? "" : "s"} in gallery`;

      if (!items.length) {
        galleryGrid.innerHTML = `
          <div class="empty-state">
            <h3>No artwork found</h3>
            <p>Try a different search or category filter.</p>
          </div>
        `;
        return;
      }

      galleryGrid.innerHTML = items.map(item => `
        <article class="card">
          <div class="image-wrap">
            <img src="${item.image}" alt="${item.title}" loading="lazy" />
          </div>
          <div class="card-body">
            <div class="title-row">
              <h3 class="art-title">${item.title}</h3>
              <span class="tag">${formatCategory(item.category)}</span>
            </div>
            <p class="artist">By ${item.artist}</p>
            <p class="desc">${item.description}</p>
            <div class="meta">
              <span>${item.date}</span>
              <span>${item.price}</span>
            </div>
          </div>
        </article>
      `).join("");
    }

    function filterGallery() {
      const searchValue = document.getElementById("searchInput").value.trim().toLowerCase();
      const filterValue = document.getElementById("filterSelect").value;
      const allItems = loadGalleryData();

      const filtered = allItems.filter(item => {
        const matchesSearch =
          item.title.toLowerCase().includes(searchValue) ||
          item.artist.toLowerCase().includes(searchValue) ||
          item.category.toLowerCase().includes(searchValue) ||
          item.description.toLowerCase().includes(searchValue);

        const matchesFilter =
          filterValue === "all" || item.category.toLowerCase() === filterValue;

        return matchesSearch && matchesFilter;
      });

      renderGallery(filtered);
    }

    document.getElementById("searchInput").addEventListener("input", filterGallery);
    document.getElementById("filterSelect").addEventListener("change", filterGallery);

    filterGallery();
  </script>
</body>
</html>
