<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rich Bizness | Upload Sports</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --green:#7dff71;
      --gold:#f5d76e;
      --blue:#67b7ff;
      --bg:rgba(0,0,0,0.6);
    }

    body {
      margin:0;
      font-family:Arial;
      color:white;
      background:
        linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.95)),
        url("images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png") center/cover fixed;
    }

    .page { max-width:900px; margin:auto; padding:20px; }

    .box {
      background:var(--bg);
      border:1px solid rgba(125,255,113,0.2);
      border-radius:20px;
      padding:20px;
    }

    h1 { color:var(--green); }

    input,select,textarea {
      width:100%;
      padding:14px;
      margin-top:10px;
      border-radius:12px;
      border:none;
      background:#111;
      color:white;
    }

    button {
      margin-top:15px;
      padding:14px;
      border:none;
      border-radius:12px;
      font-weight:900;
      background:var(--green);
      cursor:pointer;
    }

    .status {
      margin-top:15px;
      padding:12px;
      background:#111;
      border-radius:10px;
      white-space:pre-wrap;
    }

    .preview {
      margin-top:15px;
      background:#111;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="box">

    <h1>Upload Sports</h1>

    <input id="title" placeholder="Title (Highlight, Take, Clip)">
    <input id="sport" placeholder="Sport (NBA, NFL, etc)">
    <input id="team" placeholder="Team (optional)">
    <textarea id="caption" placeholder="Caption / take / analysis"></textarea>

    <select id="featured">
      <option value="false">Normal Post</option>
      <option value="true">Featured Post</option>
    </select>

    <input id="media" type="file" accept="video/*,image/*">
    <input id="thumb" type="file" accept="image/*">

    <button id="uploadBtn">Upload Sports Content</button>

    <div id="status" class="status"></div>
    <div id="preview" class="preview"></div>

  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
)

const statusBox = document.getElementById("status")
const previewBox = document.getElementById("preview")

function status(msg){ statusBox.textContent = msg }

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g,"-")
}

async function upload(){

  try{
    status("Uploading sports content...")

    const {data} = await supabase.auth.getSession()
    const user = data.session?.user
    if(!user) throw new Error("Login required")

    const title = document.getElementById("title").value
    const sport = document.getElementById("sport").value
    const team = document.getElementById("team").value
    const caption = document.getElementById("caption").value
    const featured = document.getElementById("featured").value === "true"

    const mediaFile = document.getElementById("media").files[0]
    const thumbFile = document.getElementById("thumb").files[0]

    if(!title || !mediaFile) throw new Error("Missing title or media")

    const slug = slugify(title + "-" + Date.now())

    // upload media
    const mediaPath = `${user.id}/${slug}`
    const {error:mediaErr} = await supabase.storage
      .from("sports-media")
      .upload(mediaPath, mediaFile)

    if(mediaErr) throw mediaErr

    const {data:mediaUrlData} = supabase.storage
      .from("sports-media")
      .getPublicUrl(mediaPath)

    let thumbUrl = ""

    if(thumbFile){
      const thumbPath = `${user.id}/${slug}-thumb`
      await supabase.storage
        .from("sports-thumbnails")
        .upload(thumbPath, thumbFile)

      const {data:thumbUrlData} = supabase.storage
        .from("sports-thumbnails")
        .getPublicUrl(thumbPath)

      thumbUrl = thumbUrlData.publicUrl
    }

    const isVideo = mediaFile.type.startsWith("video")

    // save to DB
    const {error:dbErr} = await supabase
      .from("sports_uploads")
      .insert([{
        user_id:user.id,
        title,
        caption,
        sport_name:sport,
        team_name:team,
        video_url: isVideo ? mediaUrlData.publicUrl : "",
        file_url: !isVideo ? mediaUrlData.publicUrl : "",
        thumbnail_url:thumbUrl,
        is_featured:featured,
        views:0,
        likes:0
      }])

    if(dbErr) throw dbErr

    status("SUCCESS sports uploaded")

    previewBox.innerHTML = `
      <p><strong>${title}</strong></p>
      <p>${caption}</p>
      ${isVideo 
        ? `<video src="${mediaUrlData.publicUrl}" controls width="100%"></video>` 
        : `<img src="${mediaUrlData.publicUrl}" width="100%">`
      }
    `

  }catch(err){
    status("ERROR: "+err.message)
  }
}

document.getElementById("uploadBtn").onclick = upload
</script>

</body>
</html>
