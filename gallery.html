<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness Gallery</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: #ffffff;
      min-height: 100vh;
      padding: 24px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      color: #39ff14;
      text-shadow: 0 0 16px rgba(57,255,20,0.35);
    }

    .top-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-links a {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .top-links a:hover {
      background: rgba(57,255,20,0.18);
      border-color: rgba(57,255,20,0.5);
      color: #39ff14;
    }

    .hero {
      margin-top: 20px;
      margin-bottom: 26px;
      padding: 28px;
      border-radius: 24px;
      background: rgba(10,10,10,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
    }

    .hero h1 {
      font-size: 44px;
      line-height: 1.05;
      color: #39ff14;
      margin-bottom: 12px;
    }

    .hero p {
      color: #d4d4d4;
      font-size: 17px;
      line-height: 1.55;
      max-width: 820px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 14px;
      margin-bottom: 24px;
      background: rgba(12,12,12,0.84);
      padding: 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .controls input,
    .controls select {
      width: 100%;
      background: #121212;
      color: #ffffff;
      border: 1px solid #2c2c2c;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .controls input:focus,
    .controls select:focus {
      border-color: #39ff14;
      box-shadow: 0 0 0 3px rgba(57,255,20,0.15);
    }

    .status-box {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
    }

    .status-box.info {
      display: block;
      background: rgba(57,255,20,0.12);
      border: 1px solid rgba(57,255,20,0.4);
      color: #9dff8a;
    }

    .status-box.error {
      display: block;
      background: rgba(255,60,60,0.12);
      border: 1px solid rgba(255,60,60,0.38);
      color: #ff8d8d;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .card {
      background: rgba(10,10,10,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.48);
    }

    .card-image {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #151515;
    }

    .card-body {
      padding: 16px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      color: #39ff14;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .card-meta {
      font-size: 14px;
      color: #cfcfcf;
      margin-bottom: 8px;
    }

    .card-price {
      font-size: 16px;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .card-category {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #000;
      background: #39ff14;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .card-description {
      color: #dadada;
      font-size: 14px;
      line-height: 1.5;
      min-height: 56px;
    }

    .empty-state {
      grid-column: 1 / -1;
      background: rgba(10,10,10,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 36px 22px;
      text-align: center;
    }

    .empty-state h2 {
      color: #39ff14;
      margin-bottom: 10px;
    }

    .empty-state p {
      color: #d0d0d0;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 36px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .brand {
        font-size: 28px;
      }

      .hero {
        padding: 20px;
      }

      .hero h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">Rich Bizness Gallery</div>

      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="auth.html">Auth</a>
        <a href="profile.html">Profile</a>
        <a href="artist.html">Artist</a>
        <a href="upload.html">Upload Art</a>
        <a href="music.html">Music</a>
        <a href="upload-music.html">Upload Music</a>
        <a href="sports.html">Sports</a>
        <a href="upload-sports.html">Upload Sports</a>
        <a href="live.html">Go Live</a>
        <a href="watch.html">Watch Live</a>
      </div>
    </div>

    <div class="hero">
      <h1>Discover the Artwork</h1>
      <p>
        Browse paintings, drawings, digital art, photography, 3D printing,
        custom design, and more from the Rich Bizness platform.
      </p>
    </div>

    <div class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by title, artist, category, or description"
      />

      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Painting">Painting</option>
        <option value="Drawing">Drawing</option>
        <option value="Digital Art">Digital Art</option>
        <option value="Photography">Photography</option>
        <option value="3D Printing">3D Printing</option>
        <option value="Custom Design">Custom Design</option>
        <option value="Other">Other</option>
      </select>

      <select id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="title-az">Title: A to Z</option>
        <option value="title-za">Title: Z to A</option>
      </select>
    </div>

    <div id="statusBox" class="status-box info">Loading artwork...</div>

    <div id="galleryGrid" class="gallery-grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const galleryGrid = document.getElementById("galleryGrid");
    const statusBox = document.getElementById("statusBox");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const sortSelect = document.getElementById("sortSelect");

    let allArtwork = [];

    function showStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = "block";
    }

    function hideStatus() {
      statusBox.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatPrice(value) {
      const number = Number(value || 0);
      return `$${number.toFixed(2)}`;
    }

    function getFilteredArtwork() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;
      const sortValue = sortSelect.value;

      let filtered = [...allArtwork];

      if (selectedCategory !== "all") {
        filtered = filtered.filter(item => (item.category || "") === selectedCategory);
      }

      if (searchTerm) {
        filtered = filtered.filter(item => {
          const title = (item.title || "").toLowerCase();
          const artist = (item.artist_name || "").toLowerCase();
          const category = (item.category || "").toLowerCase();
          const description = (item.description || "").toLowerCase();

          return (
            title.includes(searchTerm) ||
            artist.includes(searchTerm) ||
            category.includes(searchTerm) ||
            description.includes(searchTerm)
          );
        });
      }

      filtered.sort((a, b) => {
        switch (sortValue) {
          case "oldest":
            return new Date(a.created_at || 0) - new Date(b.created_at || 0);

          case "price-low":
            return Number(a.price || 0) - Number(b.price || 0);

          case "price-high":
            return Number(b.price || 0) - Number(a.price || 0);

          case "title-az":
            return (a.title || "").localeCompare(b.title || "");

          case "title-za":
            return (b.title || "").localeCompare(a.title || "");

          case "newest":
          default:
            return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        }
      });

      return filtered;
    }

    function renderGallery() {
      const filteredArtwork = getFilteredArtwork();

      if (!filteredArtwork.length) {
        galleryGrid.innerHTML = `
          <div class="empty-state">
            <h2>No artwork found</h2>
            <p>Try changing your search, category, or upload some new art.</p>
          </div>
        `;
        return;
      }

      galleryGrid.innerHTML = filteredArtwork.map(item => {
        const title = escapeHtml(item.title || "Untitled");
        const artist = escapeHtml(item.artist_name || "Unknown Artist");
        const category = escapeHtml(item.category || "Other");
        const description = escapeHtml(item.description || "No description added.");
        const imageUrl = escapeHtml(item.image_url || "");
        const price = formatPrice(item.price);

        return `
          <div class="card">
            <img
              class="card-image"
              src="${imageUrl || 'https://placehold.co/600x600?text=No+Image'}"
              alt="${title}"
              onerror="this.src='https://placehold.co/600x600?text=No+Image';"
            />
            <div class="card-body">
              <div class="card-title">${title}</div>
              <div class="card-meta">By ${artist}</div>
              <div class="card-price">${price}</div>
              <div class="card-category">${category}</div>
              <div class="card-description">${description}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadArtwork() {
      showStatus("Loading artwork...", "info");

      try {
        const { data, error } = await supabaseClient
          .from("artworks")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          throw error;
        }

        allArtwork = data || [];
        hideStatus();
        renderGallery();
      } catch (error) {
        console.error("Gallery load error:", error);
        showStatus("Failed to load gallery: " + error.message, "error");
      }
    }

    searchInput.addEventListener("input", renderGallery);
    categoryFilter.addEventListener("change", renderGallery);
    sortSelect.addEventListener("change", renderGallery);

    loadArtwork();
  </script>
</body>
</html>
