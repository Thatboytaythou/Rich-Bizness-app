<!DOCTYPE html>
<html>
<head>
  <title>Artist Gallery – Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="margin:0; background:black; color:white; font-family:sans-serif; padding:20px;">

<h1 style="text-align:center;">🔥 Artist Gallery 🔥</h1>
<p style="text-align:center;">Tattoos, art, and 3D prints from the community</p>

<div style="text-align:center; margin-bottom:20px;">
  <a href="/index.html" style="margin-right:15px; color:#00ffaa;">Home</a>
  <a href="/upload.html" style="color:#00ffaa;">Upload Your Work</a>
</div>

<div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
  <button onclick="setFilter('All')">All</button>
  <button onclick="setFilter('Tattoo')">Tattoo</button>
  <button onclick="setFilter('Art')">Art</button>
  <button onclick="setFilter('3D Print')">3D Print</button>
</div>

<div id="gallery" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:20px;"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allUploads = [];
let currentFilter = "All";

function setFilter(filter) {
  currentFilter = filter;
  renderGallery();
}

function makeCard(item) {
  const card = document.createElement("div");
  card.style.background = "#111";
  card.style.border = "1px solid #222";
  card.style.borderRadius = "16px";
  card.style.overflow = "hidden";

  const img = document.createElement("img");
  img.src = item.image_url;
  img.style.width = "100%";
  img.style.height = "260px";
  img.style.objectFit = "cover";

  const info = document.createElement("div");
  info.style.padding = "10px";

  const artist = document.createElement("a");
  artist.href = `/artist.html?name=${encodeURIComponent(item.artist)}`;
  artist.textContent = item.artist;
  artist.style.color = "#00ffaa";
  artist.style.fontWeight = "bold";
  artist.style.display = "block";

  const category = document.createElement("div");
  category.textContent = item.category;
  category.style.color = "#aaa";

  const view = document.createElement("a");
  view.href = item.image_url;
  view.target = "_blank";
  view.textContent = "View Full Image";
  view.style.color = "#00ffaa";

  info.appendChild(artist);
  info.appendChild(category);
  info.appendChild(view);

  card.appendChild(img);
  card.appendChild(info);

  return card;
}

function renderGallery() {
  const container = document.getElementById("gallery");
  container.innerHTML = "";

  let filtered = allUploads;

  if (currentFilter !== "All") {
    filtered = allUploads.filter(item => item.category === currentFilter);
  }

  filtered.forEach(item => {
    container.appendChild(makeCard(item));
  });
}

async function loadGallery() {
  const { data, error } = await supabase
    .from("uploads")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  allUploads = data;
  renderGallery();
}

loadGallery();
</script>

</body>
</html>
