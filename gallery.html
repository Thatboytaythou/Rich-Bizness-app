<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness Gallery</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial;background:#050505;color:#fff;min-height:100vh}
    a{text-decoration:none;color:inherit}
    .overlay{padding:24px}
    .container{max-width:1320px;margin:0 auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:22px}
    .brand{font-size:34px;font-weight:900;color:#39ff14}
    .top-links{display:flex;gap:12px;flex-wrap:wrap}
    .top-links a{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:10px 16px;border-radius:12px;font-weight:700}
    .hero{margin-top:20px;margin-bottom:26px;padding:28px;border-radius:24px;background:rgba(10,10,10,.72);border:1px solid rgba(255,255,255,.08)}
    .hero h1{font-size:44px;color:#39ff14;margin-bottom:12px}
    .hero p{color:#d4d4d4;font-size:17px;line-height:1.55;max-width:820px}
    .controls{display:grid;grid-template-columns:1.2fr .8fr .8fr;gap:14px;margin-bottom:24px;background:rgba(12,12,12,.84);padding:18px;border-radius:20px;border:1px solid rgba(255,255,255,.08)}
    .controls input,.controls select{width:100%;background:#121212;color:#fff;border:1px solid #2c2c2c;border-radius:14px;padding:14px 16px;font-size:15px}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
    .card{background:rgba(10,10,10,.88);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden}
    .card-image{width:100%;height:260px;object-fit:cover;display:block;background:#151515}
    .card-body{padding:16px}
    .card-title{font-size:20px;font-weight:800;color:#39ff14;margin-bottom:8px}
    .card-meta{font-size:14px;color:#cfcfcf;margin-bottom:8px}
    .card-price{font-size:16px;font-weight:900;color:#fff;margin-bottom:10px}
    .card-category{display:inline-block;font-size:12px;font-weight:800;color:#000;background:#39ff14;padding:6px 10px;border-radius:999px;margin-bottom:12px}
    .card-description{color:#dadada;font-size:14px;line-height:1.5}
  </style>
</head>
<body>
<div class="overlay">
  <div class="container">
    <div class="topbar">
      <div class="brand">Rich Bizness Gallery</div>
      <div class="top-links">
        <a href="../index.html">Home</a>
        <a href="../upload.html">Upload Art</a>
        <a href="../sports.html">Sports</a>
        <a href="../upload-sports.html">Upload Sports</a>
        <a href="../live.html">Go Live</a>
        <a href="../profile.html">Profile</a>
      </div>
    </div>

    <div class="hero">
      <h1>Discover the Artwork</h1>
      <p>Browse paintings, drawings, digital art, photography, 3D printing, custom design, and more.</p>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by title, artist, category, or description" />
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Painting">Painting</option>
        <option value="Drawing">Drawing</option>
        <option value="Digital Art">Digital Art</option>
        <option value="Photography">Photography</option>
        <option value="3D Printing">3D Printing</option>
        <option value="Custom Design">Custom Design</option>
        <option value="Other">Other</option>
      </select>
      <select id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="title-az">Title: A to Z</option>
        <option value="title-za">Title: Z to A</option>
      </select>
    </div>

    <div id="galleryGrid" class="gallery-grid"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const galleryGrid = document.getElementById("galleryGrid");
const searchInput = document.getElementById("searchInput");
const categoryFilter = document.getElementById("categoryFilter");
const sortSelect = document.getElementById("sortSelect");
let allArtwork = [];

function formatPrice(value){ return `$${Number(value || 0).toFixed(2)}`; }
function getFilteredArtwork() {
  const searchTerm = searchInput.value.trim().toLowerCase();
  const selectedCategory = categoryFilter.value;
  const sortValue = sortSelect.value;
  let filtered = [...allArtwork];

  if (selectedCategory !== "all") filtered = filtered.filter(item => (item.category || "") === selectedCategory);
  if (searchTerm) {
    filtered = filtered.filter(item => {
      const title = (item.title || "").toLowerCase();
      const artist = (item.artist_name || "").toLowerCase();
      const category = (item.category || "").toLowerCase();
      const description = (item.description || "").toLowerCase();
      return title.includes(searchTerm) || artist.includes(searchTerm) || category.includes(searchTerm) || description.includes(searchTerm);
    });
  }

  filtered.sort((a, b) => {
    switch (sortValue) {
      case "oldest": return new Date(a.created_at || 0) - new Date(b.created_at || 0);
      case "price-low": return Number(a.price || 0) - Number(b.price || 0);
      case "price-high": return Number(b.price || 0) - Number(a.price || 0);
      case "title-az": return (a.title || "").localeCompare(b.title || "");
      case "title-za": return (b.title || "").localeCompare(a.title || "");
      default: return new Date(b.created_at || 0) - new Date(a.created_at || 0);
    }
  });

  return filtered;
}
function renderGallery() {
  const filteredArtwork = getFilteredArtwork();
  if (!filteredArtwork.length) {
    galleryGrid.innerHTML = `<div>No artwork found.</div>`;
    return;
  }
  galleryGrid.innerHTML = filteredArtwork.map(item => `
    <div class="card">
      <img class="card-image" src="${item.image_url || 'https://placehold.co/600x600?text=No+Image'}" alt="${item.title || 'Untitled'}" />
      <div class="card-body">
        <div class="card-title">${item.title || "Untitled"}</div>
        <div class="card-meta">By ${item.artist_name || "Unknown Artist"}</div>
        <div class="card-price">${formatPrice(item.price)}</div>
        <div class="card-category">${item.category || "Other"}</div>
        <div class="card-description">${item.description || "No description added."}</div>
      </div>
    </div>
  `).join("");
}
async function loadArtwork() {
  const { data, error } = await supabaseClient.from("artworks").select("*").order("created_at", { ascending: false });
  if (!error) { allArtwork = data || []; renderGallery(); }
}
searchInput.addEventListener("input", renderGallery);
categoryFilter.addEventListener("change", renderGallery);
sortSelect.addEventListener("change", renderGallery);
loadArtwork();
</script>
</body>
</html>
