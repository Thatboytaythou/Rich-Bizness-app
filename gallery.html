<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery | Rich Bizness</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
    url("images/brand/logo-music-label.png") center/cover no-repeat fixed;
}

.page { max-width:1400px; margin:auto; padding:20px; }

h1 {
  text-align:center;
  color:#7dff71;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}

.card {
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(125,255,113,0.2);
  border-radius:18px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-body {
  padding:12px;
}

.title {
  font-weight:800;
  color:#7dff71;
}

.meta {
  font-size:0.9rem;
  opacity:0.85;
}

.empty {
  text-align:center;
  margin-top:40px;
}
</style>
</head>

<body>
<div class="page">
<h1>Gallery</h1>
<div id="galleryGrid" class="grid"></div>
</div>

<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const grid = document.getElementById("galleryGrid");

function render(items){
  if(!items.length){
    grid.innerHTML = "<div class='empty'>No artwork yet.</div>";
    return;
  }

  grid.innerHTML = items.map(item=>`
    <div class="card">
      <img src="${item.image_url}" />
      <div class="card-body">
        <div class="title">${item.title}</div>
        <div class="meta">${item.user_email}</div>
        <div>${item.description || ""}</div>
      </div>
    </div>
  `).join("");
}

async function load(){
  const {data,error} = await supabase
    .from("artworks")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    grid.innerHTML="Error loading";
    return;
  }

  render(data || []);
}

load();
</script>
</body>
</html>
