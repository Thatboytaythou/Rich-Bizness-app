<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rich Bizness — Store</title>

  <style>
    :root{
      --bg:#06110b;
      --panel:rgba(8,16,12,.9);
      --line:rgba(93,255,170,.15);
      --text:#ecfff4;
      --muted:#9fbea9;
      --green:#43f59b;
      --shadow:0 24px 60px rgba(0,0,0,.4);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui;
      background:linear-gradient(#030705,#07110c);
      color:var(--text);
    }

    .container{
      width:min(1400px,95%);
      margin:auto;
      padding:20px;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .nav a{
      padding:10px 14px;
      border-radius:12px;
      background:#111;
      border:1px solid #222;
      text-decoration:none;
      color:white;
      font-weight:700;
    }

    h1{
      font-size:40px;
      margin-bottom:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:16px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-body{
      padding:16px;
    }

    .title{
      font-size:18px;
      font-weight:800;
    }

    .price{
      color:var(--green);
      margin:8px 0;
      font-weight:900;
    }

    .btn{
      padding:10px 12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:800;
    }

    .buy{
      background:var(--green);
      color:black;
      width:100%;
    }

    .empty{
      padding:40px;
      text-align:center;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="nav">
      <a href="/index.html">Home</a>
      <a href="/profile.html">Profile</a>
      <a href="/live.html">Live</a>
      <a href="/watch.html">Watch</a>
      <a href="/music.html">Music</a>
      <a href="/gaming.html">Gaming</a>
      <a href="/store.html">Store</a>
    </div>

    <h1>Rich Bizness Store</h1>
    <p style="color:#9fbea9">Merch, digital drops, VIP access, and creator products.</p>

    <div id="products" class="grid"></div>

  </div>

  <script type="module" src="/src/store/store-client.js"></script>
</body>
</html>
