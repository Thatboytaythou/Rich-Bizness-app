<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artist Upload — Rich Bizness</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family:Inter,sans-serif;
      color:#fff;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95)),
        url('/images/brand/A4F9E199-6D52-4DD4-BFAB-3430A9C13074.png') center/cover no-repeat fixed;
    }

    .app{
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:20px;
    }

    .nav a{
      padding:10px 14px;
      border-radius:10px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      text-decoration:none;
      color:#fff;
      font-weight:bold;
    }

    .hero{
      background:rgba(0,0,0,0.6);
      padding:25px;
      border-radius:20px;
      margin-bottom:20px;
    }

    .hero h1{
      margin:0 0 10px;
    }

    .panel{
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
    }

    .field{
      margin-bottom:12px;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      background:rgba(255,255,255,0.1);
      color:#fff;
    }

    .btn{
      padding:12px 16px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-primary{ background:#00ff88; color:#000; }
    .btn-secondary{ background:#333; color:#fff; }
    .btn-gold{ background:gold; color:#000; }

    .preview{
      margin-top:15px;
      padding:15px;
      border-radius:15px;
      background:rgba(255,255,255,0.05);
    }

    audio{
      width:100%;
      margin-top:10px;
    }

    .status{
      margin-top:10px;
      padding:10px;
      border-radius:10px;
      display:none;
    }

    .status.show{ display:block; }
    .success{ background:#00ff88; color:#000; }
    .error{ background:#ff4d4d; }
  </style>
</head>

<body>
<div class="app">

  <div class="topbar nav">
    <a href="/index.html">Home</a>
    <a href="/artist/index.html">Artist</a>
    <a href="/playlist.html">Playlist</a>
    <a href="/live.html">Live</a>
  </div>

  <div class="hero">
    <h1>Upload Music</h1>
    <p>Drop your track into the Rich Bizness system.</p>
  </div>

  <div class="panel">

    <form id="uploadForm">

      <div class="field">
        <input id="title" placeholder="Track Title" required />
      </div>

      <div class="field">
        <input id="artist" placeholder="Artist Name" required />
      </div>

      <div class="field">
        <select id="genre">
          <option>Hip-Hop</option>
          <option>Rap</option>
          <option>R&B</option>
        </select>
      </div>

      <div class="field">
        <textarea id="description" placeholder="Description"></textarea>
      </div>

      <div class="field">
        <input type="file" id="audioFile" accept="audio/*" required />
      </div>

      <div class="field">
        <input type="file" id="coverFile" accept="image/*" />
      </div>

      <button class="btn btn-primary">Upload Track</button>

    </form>

    <div id="status" class="status"></div>

  </div>

  <div class="panel">
    <h3>Preview</h3>

    <div class="preview">
      <strong id="previewTitle">Untitled</strong>
      <div id="previewArtist">Artist</div>
      <audio id="audioPreview" controls></audio>
      <div id="coverPreview"></div>
    </div>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

let user = null;

/* ===================== AUTH ===================== */
async function initUser(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(user){
    document.getElementById("artist").value =
      user.user_metadata?.display_name ||
      user.email.split("@")[0];
  }
}

/* ===================== PREVIEW ===================== */
document.getElementById("audioFile").onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;
  document.getElementById("audioPreview").src = URL.createObjectURL(file);
};

document.getElementById("coverFile").onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;
  document.getElementById("coverPreview").innerHTML =
    `<img src="${URL.createObjectURL(file)}" style="width:100%;border-radius:10px;margin-top:10px;">`;
};

document.getElementById("title").oninput = e=>{
  document.getElementById("previewTitle").innerText = e.target.value;
};

document.getElementById("artist").oninput = e=>{
  document.getElementById("previewArtist").innerText = e.target.value;
};

/* ===================== UPLOAD ===================== */
document.getElementById("uploadForm").onsubmit = async e=>{
  e.preventDefault();

  const status = document.getElementById("status");

  try{
    if(!user) throw "Not logged in";

    const audio = document.getElementById("audioFile").files[0];
    const cover = document.getElementById("coverFile").files[0];

    // upload audio
    const audioPath = `${user.id}/${Date.now()}-${audio.name}`;
    await supabase.storage.from("music_uploads").upload(audioPath, audio);

    const { data: audioUrl } =
      supabase.storage.from("music_uploads").getPublicUrl(audioPath);

    let coverUrl = null;

    if(cover){
      const coverPath = `${user.id}/${Date.now()}-${cover.name}`;
      await supabase.storage.from("cover_art").upload(coverPath, cover);

      const { data } =
        supabase.storage.from("cover_art").getPublicUrl(coverPath);

      coverUrl = data.publicUrl;
    }

    // insert (FIXED TO YOUR DB)
    await supabase.from("tracks").insert([{
      creator_id: user.id,
      title: document.getElementById("title").value,
      artist_name: document.getElementById("artist").value,
      genre: document.getElementById("genre").value,
      description: document.getElementById("description").value,
      audio_url: audioUrl.publicUrl,
      cover_url: coverUrl
    }]);

    status.className = "status show success";
    status.innerText = "Upload complete 🔥";

  }catch(err){
    status.className = "status show error";
    status.innerText = "Upload failed";
    console.error(err);
  }
};

initUser();
</script>

</body>
</html>
