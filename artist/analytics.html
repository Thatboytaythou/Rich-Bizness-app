<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artist Analytics — Rich Bizness</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --green:#43f59b;
  --gold:#ffd86b;
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  color:#fff;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
    url('/images/brand/A4F9E199-6D52-4DD4-BFAB-3430A9C13074.png') center/cover no-repeat fixed;
}

/* GLASS SYSTEM */
.glass{
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
}

/* HERO */
.hero{
  padding:25px;
  margin:15px;
  position:relative;
  overflow:hidden;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle, rgba(67,245,155,0.2), transparent 60%);
  opacity:.3;
}

.hero h1{
  font-size:32px;
  margin:0;
}

.hero p{
  color:#ccc;
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border-radius:12px;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

.primary{ background:var(--green); color:#000; }
.gold{ background:var(--gold); color:#000; }
.ghost{ background:rgba(255,255,255,0.1); color:#fff; }

/* METRICS */
.metrics{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
}

.metric{
  padding:15px;
}

.metric h2{
  margin:0;
  font-size:20px;
}

.metric span{
  font-size:28px;
  font-weight:bold;
}

/* LIVE LIST */
.section{
  margin:15px;
  padding:15px;
}

.live-card{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

/* ANIMATION */
.metric, .live-card{
  transition:.2s;
}

.metric:hover, .live-card:hover{
  transform:translateY(-3px);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero glass">
  <h1>Artist Analytics Dashboard</h1>
  <p>Track your motion, fan growth, live energy, and earnings.</p>

  <div style="margin-top:10px;">
    <button class="btn primary" onclick="goTo('/artist/upload.html')">Upload</button>
    <button class="btn ghost" onclick="goTo('/artist/index.html')">Artist Hub</button>
    <button class="btn gold" onclick="refresh()">Refresh</button>
  </div>

  <div id="artistName" style="margin-top:10px;">Loading...</div>
</div>

<!-- METRICS -->
<div class="metrics">
  <div class="metric glass"><h2>Tracks</h2><span id="tracks">0</span></div>
  <div class="metric glass"><h2>Followers</h2><span id="followers">0</span></div>
  <div class="metric glass"><h2>Live</h2><span id="lives">0</span></div>
  <div class="metric glass"><h2>Unlocks</h2><span id="unlocks">0</span></div>
  <div class="metric glass"><h2>Earnings</h2><span id="earnings">$0</span></div>
</div>

<!-- LIVE -->
<div class="section glass">
  <h2>Live Sessions</h2>
  <div id="liveList">Loading...</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

let user = null;

function goTo(path){ window.location.href = path; }

function formatMoney(cents){
  return "$" + ((cents||0)/100).toFixed(2);
}

async function loadUser(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(user){
    document.getElementById("artistName").innerText =
      user.email.split("@")[0];
  }
}

async function loadData(){
  if(!user) return;

  const uid = user.id;

  // TRACKS
  const { count: tracks } = await supabase
    .from("tracks")
    .select("*",{count:"exact",head:true})
    .eq("creator_id", uid);

  // FOLLOWERS
  const { count: followers } = await supabase
    .from("followers")
    .select("*",{count:"exact",head:true})
    .eq("following_id", uid);

  // LIVE
  const { data: live } = await supabase
    .from("live_streams")
    .select("*")
    .eq("creator_id", uid);

  // UNLOCKS
  const { count: unlocks } = await supabase
    .from("music_unlocks")
    .select("*",{count:"exact",head:true})
    .eq("user_id", uid);

  // EARNINGS (REAL FIX)
  const { data: balance } = await supabase
    .from("creator_available_balances")
    .select("*")
    .eq("artist_user_id", uid)
    .maybeSingle();

  document.getElementById("tracks").innerText = tracks || 0;
  document.getElementById("followers").innerText = followers || 0;
  document.getElementById("lives").innerText = live?.length || 0;
  document.getElementById("unlocks").innerText = unlocks || 0;
  document.getElementById("earnings").innerText =
    formatMoney(balance?.available_cents);

  renderLive(live);
}

function renderLive(list){
  const box = document.getElementById("liveList");

  if(!list.length){
    box.innerHTML = "No live sessions yet";
    return;
  }

  box.innerHTML = list.map(l => `
    <div class="live-card">
      <strong>${l.title || "Live Session"}</strong><br>
      👁 ${l.viewer_count || 0} viewers<br>
      💰 $${(l.total_revenue_cents||0)/100}
    </div>
  `).join("");
}

async function refresh(){
  await loadUser();
  await loadData();
}

refresh();
</script>

</body>
</html>
