<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist Analytics — Rich Bizness</title>

  <!-- GLOBAL STYLES (your real system) -->
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/artist.css" />

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="app">

    <!-- NAV (keep consistent with your system) -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">
          <img src="/images/brand/B1D243AF-EFA5-4DA5-ADC5-D6D31FF7D3CF.png" />
        </div>
        <div>
          <div class="brand-title">Rich Bizness Artist Analytics</div>
          <div class="brand-sub">Performance • Growth • Revenue</div>
        </div>
      </div>

      <nav class="nav">
        <a href="/index.html">Home</a>
        <a href="/music.html">Music</a>
        <a href="/playlist.html">Playlist</a>
        <a href="/live.html">Live</a>
        <a href="/artist/index.html">Artist</a>
        <a href="/artist/upload.html">Upload</a>
        <a href="/artist/analytics.html" class="active">Analytics</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-card">
        <div class="hero-content">
          <h1>Artist Analytics Dashboard</h1>
          <p>Track your music, fans, live sessions, and earnings.</p>

          <div class="hero-actions">
            <button class="btn btn-primary" onclick="goTo('/artist/upload.html')">Upload</button>
            <button class="btn btn-secondary" onclick="goTo('/artist/index.html')">Artist Hub</button>
            <button class="btn btn-gold" onclick="refreshAnalytics()">Refresh</button>
          </div>
        </div>
      </div>

      <div class="side-card">
        <div id="artistName">Loading...</div>
      </div>
    </section>

    <!-- METRICS -->
    <section class="metrics-grid">
      <div class="metric-card">
        <div>Total Tracks</div>
        <div id="metricTracks">0</div>
      </div>

      <div class="metric-card">
        <div>Followers</div>
        <div id="metricFollowers">0</div>
      </div>

      <div class="metric-card">
        <div>Live Sessions</div>
        <div id="metricLives">0</div>
      </div>

      <div class="metric-card">
        <div>Unlocks</div>
        <div id="metricUnlocks">0</div>
      </div>

      <div class="metric-card">
        <div>Earnings</div>
        <div id="metricEarnings">$0</div>
      </div>
    </section>

    <!-- LIVE LIST -->
    <section class="panel">
      <h2>Live Sessions</h2>
      <div id="liveList"></div>
    </section>

  </div>

<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

function goTo(path){
  window.location.href = path;
}

function formatNumber(v){
  return new Intl.NumberFormat().format(v || 0);
}

function formatMoney(cents){
  return "$" + ((cents || 0) / 100).toFixed(2);
}

async function loadUser(){
  const { data } = await supabase.auth.getUser();
  currentUser = data?.user;

  if(currentUser){
    document.getElementById("artistName").textContent =
      currentUser.email.split("@")[0];
  }
}

async function loadMetrics(){
  if(!currentUser) return;

  const uid = currentUser.id;

  // TRACKS (correct column)
  const { count: tracks } = await supabase
    .from("tracks")
    .select("*",{count:"exact",head:true})
    .eq("creator_id", uid);

  // FOLLOWERS
  const { count: followers } = await supabase
    .from("followers")
    .select("*",{count:"exact",head:true})
    .eq("following_id", uid);

  // LIVE
  const { data: livesData } = await supabase
    .from("live_streams")
    .select("*")
    .eq("creator_id", uid);

  const lives = livesData?.length || 0;

  // UNLOCKS
  const { count: unlocks } = await supabase
    .from("music_unlocks")
    .select("*",{count:"exact",head:true})
    .eq("user_id", uid);

  // EARNINGS (REAL FIX)
  let earnings = 0;
  const { data: balance } = await supabase
    .from("creator_available_balances")
    .select("*")
    .eq("artist_user_id", uid)
    .maybeSingle();

  if(balance){
    earnings = balance.available_cents;
  }

  return { tracks, followers, lives, unlocks, earnings, livesData };
}

function renderMetrics(m){
  document.getElementById("metricTracks").textContent = formatNumber(m.tracks);
  document.getElementById("metricFollowers").textContent = formatNumber(m.followers);
  document.getElementById("metricLives").textContent = formatNumber(m.lives);
  document.getElementById("metricUnlocks").textContent = formatNumber(m.unlocks);
  document.getElementById("metricEarnings").textContent = formatMoney(m.earnings);
}

function renderLives(lives){
  const box = document.getElementById("liveList");

  if(!lives.length){
    box.innerHTML = "No live sessions yet";
    return;
  }

  box.innerHTML = lives.map(l => `
    <div class="session-card">
      <div>${l.title || "Live"}</div>
      <div>👁 ${l.viewer_count || 0}</div>
    </div>
  `).join("");
}

async function refreshAnalytics(){
  await loadUser();
  const metrics = await loadMetrics();
  renderMetrics(metrics);
  renderLives(metrics.livesData);
}

refreshAnalytics();
</script>

</body>
</html>
