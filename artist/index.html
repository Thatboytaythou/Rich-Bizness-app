<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Rich Bizness</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial;background:#050505;color:#fff;min-height:100vh;padding:24px}
    a{text-decoration:none;color:inherit}
    .container{max-width:1280px;margin:0 auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
    .brand{font-size:34px;font-weight:900;color:#39ff14}
    .top-links{display:flex;gap:12px;flex-wrap:wrap}
    .top-links a{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:10px 16px;border-radius:12px;font-weight:700}
    .hero{display:grid;grid-template-columns:340px 1fr;gap:22px;margin-bottom:24px}
    .card{background:#0d0d0d;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px}
    .profile-side{text-align:center}
    .avatar{width:190px;height:190px;border-radius:50%;object-fit:cover;background:#141414;border:4px solid #39ff14;display:block;margin:0 auto 18px}
    .display-name{font-size:28px;font-weight:900;color:#39ff14;margin-bottom:10px}
    .email{color:#d0d0d0;font-size:14px;margin-bottom:18px;word-break:break-word}
    .bio-preview{color:#dadada;line-height:1.5;font-size:15px;background:#111;border-radius:16px;padding:14px;min-height:90px;text-align:left}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    .stat-box{background:#111;border-radius:16px;padding:14px;text-align:center}
    .number{font-size:22px;font-weight:900;color:#39ff14;margin-bottom:4px}
    .label{font-size:12px;color:#cfcfcf;text-transform:uppercase}
    h2{color:#39ff14;margin-bottom:16px;font-size:28px}
    .form-group{margin-bottom:14px}
    label{display:block;margin-bottom:8px;font-size:14px;font-weight:800}
    input,textarea{width:100%;background:#121212;color:#fff;border:1px solid #2b2b2b;border-radius:14px;padding:14px 16px;font-size:15px}
    textarea{min-height:130px;resize:vertical}
    .button-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
    button{border:none;border-radius:14px;padding:13px 18px;font-size:15px;font-weight:900;cursor:pointer}
    .btn-green{background:#39ff14;color:#000}
    .btn-dark{background:#1c1c1c;color:#fff}
    .gallery-title{font-size:30px;font-weight:900;color:#39ff14;margin-bottom:16px}
    .art-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}
    .art-card{background:#0d0d0d;border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden}
    .art-card img{width:100%;height:250px;object-fit:cover;display:block;background:#141414}
    .art-card-body{padding:16px}
    .art-card-title{font-size:19px;font-weight:900;color:#39ff14;margin-bottom:8px}
    .art-card-meta{font-size:14px;color:#d6d6d6;margin-bottom:8px}
    .art-card-description{font-size:14px;color:#e0e0e0;line-height:1.45}
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">Rich Bizness Profile</div>
    <div class="top-links">
      <a href="index.html">Home</a>
      <a href="gallery/index.html">Gallery</a>
      <a href="upload.html">Upload Art</a>
      <a href="sports.html">Sports</a>
      <a href="upload-sports.html">Upload Sports</a>
      <a href="live.html">Go Live</a>
    </div>
  </div>

  <div class="hero">
    <div class="card profile-side">
      <img id="avatarPreviewCard" class="avatar" src="https://placehold.co/400x400?text=Artist" alt="Profile Avatar" />
      <div id="displayNameCard" class="display-name">Artist</div>
      <div id="emailCard" class="email">Loading user...</div>
      <div id="bioCard" class="bio-preview">No bio yet.</div>
      <div class="stats">
        <div class="stat-box"><div id="artCount" class="number">0</div><div class="label">Artwork</div></div>
        <div class="stat-box"><div id="sportsCount" class="number">0</div><div class="label">Sports</div></div>
        <div class="stat-box"><div id="profileStatus" class="number">NEW</div><div class="label">Status</div></div>
      </div>
    </div>

    <div class="card">
      <h2>Edit Profile</h2>
      <div class="form-group"><label for="displayNameInput">Display Name</label><input id="displayNameInput" type="text" /></div>
      <div class="form-group"><label for="avatarUrlInput">Avatar Image URL</label><input id="avatarUrlInput" type="text" /></div>
      <div class="form-group"><label for="bioInput">Artist Bio</label><textarea id="bioInput"></textarea></div>
      <div class="button-row">
        <button id="saveProfileBtn" class="btn-green">Save Profile</button>
        <button id="refreshBtn" class="btn-dark" type="button">Refresh</button>
        <button id="logoutBtn" class="btn-dark" type="button">Logout</button>
      </div>
    </div>
  </div>

  <div class="gallery-title">My Artwork</div>
  <div id="artGrid" class="art-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const avatarPreviewCard = document.getElementById("avatarPreviewCard");
const displayNameCard = document.getElementById("displayNameCard");
const emailCard = document.getElementById("emailCard");
const bioCard = document.getElementById("bioCard");
const artCount = document.getElementById("artCount");
const sportsCount = document.getElementById("sportsCount");
const profileStatus = document.getElementById("profileStatus");
const displayNameInput = document.getElementById("displayNameInput");
const avatarUrlInput = document.getElementById("avatarUrlInput");
const bioInput = document.getElementById("bioInput");
const artGrid = document.getElementById("artGrid");
let currentUser = null;
let currentArtwork = [];

function getAvatarUrl(url) { return url && url.trim() ? url.trim() : "https://placehold.co/400x400?text=Artist"; }
function updateProfileCard() {
  displayNameCard.textContent = displayNameInput.value.trim() || "Artist";
  avatarPreviewCard.src = getAvatarUrl(avatarUrlInput.value);
  bioCard.textContent = bioInput.value.trim() || "No bio yet.";
}
async function requireUser() {
  const { data, error } = await supabaseClient.auth.getUser();
  if (error || !data.user) { window.location.href = "auth.html"; return null; }
  currentUser = data.user;
  emailCard.textContent = currentUser.email || "No email found";
  return currentUser;
}
async function loadProfile() {
  const user = await requireUser();
  if (!user) return;
  const { data } = await supabaseClient.from("profiles").select("*").eq("id", user.id).maybeSingle();
  displayNameInput.value = data?.display_name || "";
  avatarUrlInput.value = data?.avatar_url || "";
  bioInput.value = data?.bio || "";
  displayNameCard.textContent = data?.display_name || "Artist";
  avatarPreviewCard.src = getAvatarUrl(data?.avatar_url || "");
  bioCard.textContent = data?.bio || "No bio yet.";
  profileStatus.textContent = (data?.display_name || data?.bio || data?.avatar_url) ? "LIVE" : "NEW";
}
async function loadArtwork() {
  if (!currentUser) return;
  const { data, error } = await supabaseClient.from("artworks").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: false });
  if (error) { artGrid.innerHTML = "<div>Could not load artwork.</div>"; return; }
  currentArtwork = data || [];
  artCount.textContent = currentArtwork.length;
  if (!currentArtwork.length) { artGrid.innerHTML = "<div>No artwork yet.</div>"; return; }
  artGrid.innerHTML = currentArtwork.map(item => `
    <div class="art-card">
      <img src="${item.image_url || 'https://placehold.co/600x600?text=No+Image'}" alt="${item.title || 'Untitled'}" />
      <div class="art-card-body">
        <div class="art-card-title">${item.title || 'Untitled'}</div>
        <div class="art-card-meta">${item.category || 'Other'} • $${Number(item.price || 0).toFixed(2)}</div>
        <div class="art-card-description">${item.description || 'No description added.'}</div>
      </div>
    </div>
  `).join("");
}
async function loadSportsCount() {
  if (!currentUser) return;
  try {
    const { count } = await supabaseClient.from("sports_posts").select("*", { count: "exact", head: true }).eq("user_id", currentUser.id);
    sportsCount.textContent = String(count || 0);
  } catch { sportsCount.textContent = "0"; }
}
async function saveProfile() {
  if (!currentUser) return;
  const payload = {
    id: currentUser.id,
    email: currentUser.email,
    display_name: displayNameInput.value.trim(),
    avatar_url: avatarUrlInput.value.trim(),
    bio: bioInput.value.trim(),
    updated_at: new Date().toISOString()
  };
  const { error } = await supabaseClient.from("profiles").upsert(payload, { onConflict: "id" });
  if (!error) { updateProfileCard(); profileStatus.textContent = "LIVE"; }
}
document.getElementById("saveProfileBtn").onclick = saveProfile;
document.getElementById("refreshBtn").onclick = async () => { await loadProfile(); await loadArtwork(); await loadSportsCount(); };
document.getElementById("logoutBtn").onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = "auth.html"; };
avatarUrlInput.oninput = updateProfileCard;
displayNameInput.oninput = updateProfileCard;
bioInput.oninput = updateProfileCard;
(async function start(){ await loadProfile(); await loadArtwork(); await loadSportsCount(); })();
</script>
</body>
</html>
