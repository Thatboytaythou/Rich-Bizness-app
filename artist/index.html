<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist - Rich Bizness LLC</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(15, 15, 15, 0.92);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #a8a8a8;
      --primary: #19e68c;
      --primary-dark: #11c775;
      --danger: #ff5a67;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,0.07), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      padding: 24px;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .toplink {
      display: inline-block;
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ghost-link {
      text-decoration: none;
      color: #8ecbff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .hero {
      position: relative;
      margin-bottom: 28px;
    }

    .glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(25,230,140,0.16), transparent 55%);
      filter: blur(30px);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
      padding: 28px 22px 24px;
    }

    .artist-header {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: linear-gradient(180deg, #222, #111);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .artist-copy {
      flex: 1;
      min-width: 220px;
    }

    .headline {
      margin: 0 0 8px;
      font-size: 42px;
      line-height: 1.04;
      font-weight: 800;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .stats {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .status {
      min-height: 24px;
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
    }

    .ok {
      color: var(--primary);
    }

    .err {
      color: var(--danger);
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 28px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 18px;
    }

    .upload-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      transition: transform 0.16s ease, border-color 0.16s ease;
    }

    .upload-card:hover {
      transform: translateY(-4px);
      border-color: rgba(25,230,140,0.32);
    }

    .upload-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .upload-body {
      padding: 14px;
    }

    .upload-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .upload-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .like-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .like-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
      box-shadow: 0 12px 24px rgba(25,230,140,0.18);
    }

    .empty {
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.07);
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 22px 16px 18px;
      }

      .headline {
        font-size: 34px;
      }

      .artist-header {
        align-items: flex-start;
      }

      .avatar {
        width: 78px;
        height: 78px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="toplink" href="/gallery/index.html">← Back to Gallery</a>

      <div class="top-actions">
        <a class="ghost-link" href="/upload.html">Upload Work</a>
        <a class="ghost-link" href="/profile.html">My Profile</a>
      </div>
    </div>

    <div class="hero">
      <div class="glow"></div>

      <div class="card">
        <div class="artist-header">
          <div id="avatar" class="avatar">🎨</div>

          <div class="artist-copy">
            <h1 id="artistName" class="headline">Artist</h1>
            <p class="sub">Public artist page on Rich Bizness LLC.</p>

            <div class="stats">
              <div class="pill">📸 <span id="totalUploads">0 uploads</span></div>
              <div class="pill">❤️ <span id="totalLikes">0 likes</span></div>
              <div class="pill">🏷️ <span id="topCategory">No category yet</span></div>
            </div>
          </div>
        </div>

        <div id="status" class="status">Loading artist...</div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Uploads</h2>
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const params = new URLSearchParams(window.location.search);
    const artistNameParam = params.get("name");

    const statusEl = document.getElementById("status");
    const artistNameEl = document.getElementById("artistName");
    const avatarEl = document.getElementById("avatar");
    const totalUploadsEl = document.getElementById("totalUploads");
    const totalLikesEl = document.getElementById("totalLikes");
    const topCategoryEl = document.getElementById("topCategory");
    const grid = document.getElementById("grid");

    let artistUploads = [];

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = "status " + (isError ? "err" : "ok");
    }

    function getInitials(name) {
      if (!name) return "🎨";
      const parts = name.trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "🎨";
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function updateHeader(items) {
      const totalUploads = items.length;
      const totalLikes = items.reduce((sum, item) => sum + (item.likes || 0), 0);

      const categoryCounts = {};
      items.forEach(item => {
        const key = item.category || "Unknown";
        categoryCounts[key] = (categoryCounts[key] || 0) + 1;
      });

      let topCategory = "No category yet";
      let topCount = 0;

      Object.entries(categoryCounts).forEach(([key, count]) => {
        if (count > topCount) {
          topCount = count;
          topCategory = key;
        }
      });

      totalUploadsEl.textContent = `${totalUploads} upload${totalUploads === 1 ? "" : "s"}`;
      totalLikesEl.textContent = `${totalLikes} like${totalLikes === 1 ? "" : "s"}`;
      topCategoryEl.textContent = topCategory;
    }

    async function likePost(id, currentLikes) {
      const { error } = await supabase
        .from("uploads")
        .update({ likes: (currentLikes || 0) + 1 })
        .eq("id", id);

      if (error) {
        setStatus("Like failed: " + error.message, true);
        return;
      }

      const item = artistUploads.find(x => x.id === id);
      if (item) {
        item.likes = (item.likes || 0) + 1;
      }

      renderUploads(artistUploads);
      updateHeader(artistUploads);
      setStatus("");
    }

    function renderUploads(items) {
      if (!items.length) {
        grid.innerHTML = `<div class="empty">No uploads found for this artist yet.</div>`;
        return;
      }

      grid.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "upload-card";

        card.innerHTML = `
          <img src="${item.file_url}" alt="${item.artist_name || "Upload"}">
          <div class="upload-body">
            <div class="upload-name">${item.artist_name || ""}</div>
            <div class="upload-meta">${item.category || ""}</div>
            <div class="upload-meta">${item.created_at ? new Date(item.created_at).toLocaleDateString() : ""}</div>
            <div class="like-row">
              <div class="upload-meta">❤️ ${item.likes || 0}</div>
              <button class="like-btn">Like</button>
            </div>
          </div>
        `;

        card.querySelector(".like-btn").addEventListener("click", () => {
          likePost(item.id, item.likes || 0);
        });

        grid.appendChild(card);
      });
    }

    async function loadArtistPage() {
      if (!artistNameParam) {
        artistNameEl.textContent = "Artist not found";
        avatarEl.textContent = "❓";
        grid.innerHTML = `<div class="empty">Missing artist name in URL.</div>`;
        setStatus("Missing artist name.", true);
        return;
      }

      const cleanName = decodeURIComponent(artistNameParam);
      artistNameEl.textContent = cleanName;
      avatarEl.textContent = getInitials(cleanName);

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .eq("artist_name", cleanName)
        .order("created_at", { ascending: false });

      if (error) {
        grid.innerHTML = `<div class="empty">${error.message}</div>`;
        setStatus("Failed to load artist.", true);
        return;
      }

      artistUploads = data || [];

      renderUploads(artistUploads);
      updateHeader(artistUploads);
      setStatus("");
    }

    await loadArtistPage();
  </script>
</body>
</html>
