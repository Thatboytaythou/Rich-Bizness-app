<!DOCTYPE html>
<html>
<head>
  <title>Artist Profile - Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    a {
      color: #00ffaa;
      text-decoration: none;
    }

    .header {
      margin: 20px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 10px;
    }

    h1 {
      margin: 10px 0;
    }

    .stats {
      color: #aaa;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .info {
      padding: 10px;
    }

    .category {
      color: #aaa;
    }
  </style>
</head>

<body>

<a href="../gallery">← Back to Gallery</a>

<div class="header">
  <div class="avatar">👤</div>
  <h1 id="artistName">Artist</h1>
  <div class="stats" id="stats"></div>
</div>

<div id="grid" class="grid"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

// 🔥 YOUR SUPABASE (LOCKED IN)
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const grid = document.getElementById("grid");
const nameEl = document.getElementById("artistName");
const statsEl = document.getElementById("stats");

// 📌 Get artist name from URL
function getArtist() {
  const params = new URLSearchParams(window.location.search);
  return params.get("name");
}

async function loadArtist() {
  const artist = getArtist();

  if (!artist) {
    nameEl.textContent = "No artist found";
    return;
  }

  nameEl.textContent = artist;

  const { data, error } = await supabase
    .from("uploads")
    .select("*")
    .eq("artist", artist)
    .order("created_at", { ascending: false });

  if (error) {
    grid.innerHTML = "❌ Error loading artist";
    console.error(error);
    return;
  }

  if (!data.length) {
    grid.innerHTML = "No uploads yet.";
    statsEl.textContent = "0 uploads";
    return;
  }

  // 📊 Stats
  const totalUploads = data.length;
  const totalLikes = data.reduce((sum, item) => sum + (item.likes || 0), 0);

  statsEl.textContent = `${totalUploads} uploads • ❤️ ${totalLikes} likes`;

  // 🖼 Render images
  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.image_url}" />
      <div class="info">
        <div class="category">${item.category}</div>
        <div>❤️ ${item.likes || 0}</div>
      </div>
    `;

    grid.appendChild(card);
  });
}

loadArtist();
</script>

</body>
</html>
