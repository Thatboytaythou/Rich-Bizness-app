<!DOCTYPE html>
<html>
<head>
  <title>Artist Profile - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .back {
      color: #4da3ff;
      text-decoration: none;
      font-size: 18px;
    }

    .hero {
      text-align: center;
      margin: 24px 0 34px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 999px;
      background: #111;
      border: 2px solid #222;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 50px;
      margin: 0 0 10px;
      text-shadow: 0 0 16px rgba(0,255,170,0.2);
    }

    .stats {
      color: #aaa;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,170,0.08);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .body {
      padding: 14px;
    }

    .cat {
      color: #4da3ff;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .likes {
      margin-bottom: 10px;
    }

    .view {
      color: #00ffaa;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="/gallery/index.html" class="back">← Back to Gallery</a>

    <div class="hero">
      <div class="avatar">👤</div>
      <h1 id="artistTitle">Artist</h1>
      <div id="artistStats" class="stats"></div>
      <p id="status"></p>
    </div>

    <div id="artistGrid" class="grid"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getArtistName() {
      const params = new URLSearchParams(window.location.search);
      return params.get("name") || "";
    }

    async function loadArtist() {
      const artistName = getArtistName();
      const title = document.getElementById("artistTitle");
      const grid = document.getElementById("artistGrid");
      const status = document.getElementById("status");
      const stats = document.getElementById("artistStats");

      if (!artistName) {
        status.textContent = "No artist selected.";
        return;
      }

      title.textContent = artistName;
      status.textContent = "Loading profile...";

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .eq("artist", artistName)
        .order("created_at", { ascending: false });

      if (error) {
        status.textContent = `Could not load artist: ${error.message}`;
        return;
      }

      status.textContent = "";

      const uploads = data || [];
      const totalLikes = uploads.reduce((sum, item) => sum + (item.likes || 0), 0);
      stats.textContent = `${uploads.length} uploads • ❤️ ${totalLikes} total likes`;

      uploads.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = item.image_url;
        img.alt = item.artist;

        const body = document.createElement("div");
        body.className = "body";

        const cat = document.createElement("div");
        cat.className = "cat";
        cat.textContent = item.category;

        const likes = document.createElement("div");
        likes.className = "likes";
        likes.textContent = `❤️ ${item.likes || 0} likes`;

        const view = document.createElement("a");
        view.className = "view";
        view.href = item.image_url;
        view.target = "_blank";
        view.textContent = "View Full Image";

        body.appendChild(cat);
        body.appendChild(likes);
        body.appendChild(view);

        card.appendChild(img);
        card.appendChild(body);
        grid.appendChild(card);
      });
    }

    window.addEventListener("DOMContentLoaded", loadArtist);
  </script>
</body>
</html>
