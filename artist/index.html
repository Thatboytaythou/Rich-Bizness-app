<!DOCTYPE html>
<html>
<head>
  <title>Artist Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getArtist() {
      const params = new URLSearchParams(window.location.search);
      return params.get("name");
    }

    async function loadArtist() {
      const name = getArtist();
      const title = document.getElementById("title");
      const grid = document.getElementById("grid");

      title.textContent = name;

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .eq("artist", name)
        .order("created_at", { ascending: false });

      if (error) {
        grid.innerHTML = "Error loading artist";
        return;
      }

      data.forEach(item => {
        const img = document.createElement("img");
        img.src = item.image_url;
        img.style.width = "100%";
        img.style.borderRadius = "12px";
        grid.appendChild(img);
      });
    }

    window.addEventListener("DOMContentLoaded", loadArtist);
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 12px;
    }
  </style>
</head>

<body>

  <a href="/gallery/index.html" style="color:#4da3ff;">← Back to Gallery</a>

  <h1 id="title"></h1>

  <div id="grid" class="grid"></div>

</body>
</html>
