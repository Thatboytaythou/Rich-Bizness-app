<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist - Rich Bizness LLC</title>
  <style>
    :root {
      --bg:#050505;
      --panel:rgba(15,15,15,.92);
      --border:rgba(255,255,255,.08);
      --text:#f5f5f5;
      --muted:#a8a8a8;
      --primary:#19e68c;
      --primary-dark:#11c775;
      --danger:#ff5a67;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,.07), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      padding: 24px;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toplink,
    .ghost-link {
      text-decoration: none;
      font-weight: 700;
    }

    .toplink {
      color: var(--primary);
    }

    .ghost-link {
      color: #8ecbff;
      background: rgba(255,255,255,.05);
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.07);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 22px;
    }

    .artist-header {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .headline {
      margin: 0 0 8px;
      font-size: 42px;
      font-weight: 800;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .stats {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 14px;
      font-weight: 700;
    }

    .status {
      min-height: 24px;
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 28px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 18px;
    }

    .upload-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px;
      overflow: hidden;
    }

    .media-wrap {
      width: 100%;
      height: 320px;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .upload-body {
      padding: 14px;
    }

    .upload-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .upload-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .caption {
      color: #ddd;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .like-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .like-btn,
    .watch-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
    }

    .like-btn {
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
    }

    .watch-btn {
      background: rgba(255,255,255,.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
    }

    .empty {
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      color: var(--muted);
      text-align: center;
      border: 1px solid rgba(255,255,255,.07);
    }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .headline { font-size: 34px; }
      .media-wrap { height: 260px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="toplink" href="/gallery/index.html">← Back to Gallery</a>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="ghost-link" href="/watch.html">📺 Watch Live</a>
        <a class="ghost-link" href="/upload.html">Upload Work</a>
      </div>
    </div>

    <div class="card">
      <div class="artist-header">
        <div id="avatar" class="avatar">🎨</div>
        <div>
          <h1 id="artistName" class="headline">Artist</h1>
          <p class="sub">Public artist page on Rich Bizness LLC.</p>
          <div class="stats">
            <div class="pill">📸 <span id="totalUploads">0 uploads</span></div>
            <div class="pill">❤️ <span id="totalLikes">0 likes</span></div>
            <div class="pill">🏷️ <span id="topCategory">No category yet</span></div>
          </div>
        </div>
      </div>
      <div id="status" class="status">Loading artist...</div>
    </div>

    <div class="card">
      <h2 class="section-title">Uploads</h2>
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const params = new URLSearchParams(window.location.search);
    const artistNameParam = params.get("name");

    const statusEl = document.getElementById("status");
    const artistNameEl = document.getElementById("artistName");
    const avatarEl = document.getElementById("avatar");
    const totalUploadsEl = document.getElementById("totalUploads");
    const totalLikesEl = document.getElementById("totalLikes");
    const topCategoryEl = document.getElementById("topCategory");
    const grid = document.getElementById("grid");

    let artistUploads = [];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function getInitials(name) {
      if (!name) return "🎨";
      const parts = name.trim().split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function detectMediaType(item) {
      if (item.media_type) return item.media_type;
      return /\.(mp4|webm|ogg|mov|m4v)$/i.test(item.file_url || "") ? "video" : "image";
    }

    function renderMedia(item) {
      if (detectMediaType(item) === "video") {
        return `
          <div class="media-wrap">
            <video controls playsinline preload="metadata">
              <source src="${item.file_url}">
            </video>
          </div>
        `;
      }

      return `
        <div class="media-wrap">
          <img src="${item.file_url}" alt="${item.artist_name || "Upload"}">
        </div>
      `;
    }

    function updateHeader(items) {
      totalUploadsEl.textContent = `${items.length} uploads`;
      totalLikesEl.textContent = `${items.reduce((sum, item) => sum + (item.likes || 0), 0)} likes`;

      const counts = {};
      items.forEach(item => {
        const key = item.category || "Unknown";
        counts[key] = (counts[key] || 0) + 1;
      });

      let topCategory = "No category yet";
      let topCount = 0;

      Object.entries(counts).forEach(([key, count]) => {
        if (count > topCount) {
          topCount = count;
          topCategory = key;
        }
      });

      topCategoryEl.textContent = topCategory;
    }

    async function likePost(id, currentLikes) {
      const { error } = await supabase
        .from("uploads")
        .update({ likes: (currentLikes || 0) + 1 })
        .eq("id", id);

      if (error) {
        setStatus("Like failed: " + error.message);
        return;
      }

      const item = artistUploads.find(x => x.id === id);
      if (item) item.likes = (item.likes || 0) + 1;

      renderUploads(artistUploads);
      updateHeader(artistUploads);
      setStatus("");
    }

    function renderUploads(items) {
      if (!items.length) {
        grid.innerHTML = `<div class="empty">No uploads found for this artist yet.</div>`;
        return;
      }

      grid.innerHTML = items.map(item => `
        <div class="upload-card">
          ${renderMedia(item)}
          <div class="upload-body">
            <div class="upload-name">${item.artist_name || ""}</div>
            <div class="upload-meta">${item.category || ""}</div>
            ${item.caption ? `<div class="caption">${item.caption}</div>` : ""}
            <div class="upload-meta">${item.created_at ? new Date(item.created_at).toLocaleDateString() : ""}</div>
            <div class="like-row">
              <div class="upload-meta">❤️ ${item.likes || 0}</div>
              <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="like-btn" data-id="${item.id}" data-likes="${item.likes || 0}">Like</button>
                <button class="watch-btn" data-artist="${item.artist_name || ""}">Watch Live</button>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      grid.querySelectorAll(".like-btn").forEach(btn => {
        btn.addEventListener("click", () => likePost(btn.dataset.id, Number(btn.dataset.likes)));
      });

      grid.querySelectorAll(".watch-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          window.location.href = "/watch.html?artist=" + encodeURIComponent(btn.dataset.artist || "guest");
        });
      });
    }

    async function loadArtistPage() {
      if (!artistNameParam) {
        artistNameEl.textContent = "Artist not found";
        avatarEl.textContent = "❓";
        grid.innerHTML = `<div class="empty">Missing artist name in URL.</div>`;
        return setStatus("Missing artist name.");
      }

      const cleanName = decodeURIComponent(artistNameParam);
      artistNameEl.textContent = cleanName;
      avatarEl.textContent = getInitials(cleanName);

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .eq("artist_name", cleanName)
        .order("created_at", { ascending: false });

      if (error) {
        grid.innerHTML = `<div class="empty">${error.message}</div>`;
        return setStatus("Failed to load artist.");
      }

      artistUploads = data || [];
      renderUploads(artistUploads);
      updateHeader(artistUploads);
      setStatus("");
    }

    await loadArtistPage();
  </script>
</body>
</html>
