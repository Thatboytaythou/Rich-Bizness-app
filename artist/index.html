<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist Hub — Rich Bizness</title>

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/artist.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="app">

    <!-- NAV -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">
          <img src="/images/brand/B1D243AF-EFA5-4DA5-ADC5-D6D31FF7D3CF.png" />
        </div>
        <div>
          <div class="brand-title">Rich Bizness Artist Hub</div>
          <div class="brand-sub">Music. Brand. Live. Monetization.</div>
        </div>
      </div>

      <nav class="nav">
        <a href="/index.html">Home</a>
        <a href="/music.html">Music</a>
        <a href="/artist/index.html" class="active">Artist</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-card">
        <div class="hero-content">
          <h1>Build Your Sound. Run Your Brand.</h1>

          <div class="hero-actions">
            <button id="uploadBtn" class="btn btn-primary">Upload Music</button>
            <button id="liveBtn" class="btn btn-gold">Go Live</button>
          </div>
        </div>
      </div>

      <div class="side-stack">
        <div class="side-card">
          <div class="profile-head">
            <div class="avatar" id="artistAvatar"></div>
            <div>
              <div id="artistName">Loading...</div>
              <div id="artistMeta"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- STATS -->
    <section class="stats-grid">
      <div class="stat-card">
        <div>Total Tracks</div>
        <div id="statTracks">0</div>
      </div>

      <div class="stat-card">
        <div>Followers</div>
        <div id="statFollowers">0</div>
      </div>

      <div class="stat-card">
        <div>Live Sessions</div>
        <div id="statLives">0</div>
      </div>
    </section>

    <!-- TRACKS -->
    <section class="panel">
      <h2>Recent Tracks</h2>
      <div id="trackList"></div>
    </section>

  </div>

  <script type="module" src="/core/pages/artist.js"></script>
</body>
</html>
