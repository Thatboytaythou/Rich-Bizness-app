<!DOCTYPE html>
<html>
<head>
  <title>Artist Profile - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    a {
      color: #00ffaa;
      text-decoration: none;
    }

    .header {
      margin-bottom: 20px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 10px;
    }

    #artistName {
      font-size: 26px;
      margin: 10px 0;
    }

    #stats {
      color: #aaa;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 10px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      display: block;
      height: 220px;
      object-fit: cover;
    }

    .info {
      padding: 10px;
      font-size: 14px;
    }

    .category {
      color: #00ffaa;
      margin-bottom: 5px;
    }

    .empty,
    .error {
      text-align: center;
      padding: 30px 15px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <p style="margin-top:20px;">
    <a href="/gallery/index.html">← Back to Gallery</a>
  </p>

  <div class="header">
    <div class="avatar">🎨</div>
    <h1 id="artistName">Artist</h1>
    <div id="stats">Loading...</div>
  </div>

  <div id="grid" class="grid"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const grid = document.getElementById("grid");
    const statsEl = document.getElementById("stats");
    const nameEl = document.getElementById("artistName");

    function getArtist() {
      const params = new URLSearchParams(window.location.search);
      return params.get("name");
    }

    async function loadArtist() {
      const artist = getArtist();

      if (!artist) {
        grid.innerHTML = '<div class="empty">No artist selected.</div>';
        statsEl.textContent = "";
        return;
      }

      nameEl.textContent = artist;

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .eq("artist", artist)
        .order("created_at", { ascending: false });

      if (error) {
        grid.innerHTML = '<div class="error">❌ Error loading artist</div>';
        statsEl.textContent = "";
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        grid.innerHTML = '<div class="empty">No uploads yet.</div>';
        statsEl.textContent = "0 uploads";
        return;
      }

      const totalUploads = data.length;
      const totalLikes = data.reduce((sum, item) => sum + (item.likes || 0), 0);

      statsEl.textContent = `${totalUploads} uploads • ❤️ ${totalLikes} likes`;

      grid.innerHTML = "";

      data.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${item.image_url}" alt="${item.artist}">
          <div class="info">
            <div class="category">${item.category}</div>
            <div>❤️ ${item.likes || 0}</div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    loadArtist();
  </script>

</body>
</html>
