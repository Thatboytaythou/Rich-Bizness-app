<!DOCTYPE html>
<html>
<head>
  <title>Messages</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:black;color:white;font-family:sans-serif">

<h1>Messages</h1>

<input id="username" placeholder="Enter username"/>
<button onclick="startChat()">Start Chat</button>

<div id="status"></div>

<hr>

<div id="threads"></div>

<hr>

<div id="chatBox"></div>

<input id="msg" placeholder="Type message"/>
<button onclick="sendMsg()">Send</button>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

let currentUser;
let currentThread = null;

async function init(){
  const { data } = await supabase.auth.getUser();
  currentUser = data.user;

  loadThreads();
}

async function startChat(){
  const username = document.getElementById("username").value.toLowerCase();

  const { data: userProfile } = await supabase
    .from("profiles")
    .select("*")
    .eq("username", username)
    .single();

  if(!userProfile){
    document.getElementById("status").innerText = "User not found";
    return;
  }

  const { data: thread } = await supabase
    .from("threads")
    .insert({
      user1: currentUser.id,
      user2: userProfile.id
    })
    .select()
    .single();

  currentThread = thread.id;
  loadMessages();
}

async function loadThreads(){
  const { data } = await supabase
    .from("threads")
    .select("*")
    .or(`user1.eq.${currentUser.id},user2.eq.${currentUser.id}`);

  document.getElementById("threads").innerHTML =
    data.map(t => `
      <div onclick="openThread('${t.id}')">
        Thread ${t.id}
      </div>
    `).join("");
}

function openThread(id){
  currentThread = id;
  loadMessages();
}

async function loadMessages(){
  const { data } = await supabase
    .from("messages")
    .select("*")
    .eq("thread_id", currentThread)
    .order("created_at");

  document.getElementById("chatBox").innerHTML =
    data.map(m => `
      <div>
        ${m.sender_id === currentUser.id ? "You" : "Them"}:
        ${m.text}
      </div>
    `).join("");
}

async function sendMsg(){
  const text = document.getElementById("msg").value;

  await supabase.from("messages").insert({
    thread_id: currentThread,
    sender_id: currentUser.id,
    text
  });

  loadMessages();
}

init();
</script>
</body>
</html>
