<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages | Rich Bizness</title>

  <link rel="icon" type="image/png" href="images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url("images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #39ff14; }
      50% { box-shadow: 0 0 25px #39ff14; }
      100% { box-shadow: 0 0 10px #39ff14; }
    }

    .logo img {
      width: 45px;
      height: 45px;
      object-fit: cover;
      border-radius: 10px;
      animation: glow 2s infinite;
    }

    .logo span {
      color: #39ff14;
      font-weight: bold;
      font-size: 22px;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav a, .nav button {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .nav a:hover, .nav button:hover {
      color: #39ff14;
      background: rgba(57,255,20,0.1);
    }

    .user-chip {
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #dfffd8;
      font-size: 13px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 78px);
    }

    .sidebar {
      background: rgba(0,0,0,0.68);
      border-right: 1px solid #222;
      overflow-y: auto;
      padding: 12px;
    }

    .sidebar-title {
      color: #39ff14;
      font-weight: 900;
      font-size: 20px;
      margin: 6px 8px 14px;
    }

    .chat-item {
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      transition: 0.2s ease;
    }

    .chat-item:hover {
      background: rgba(57,255,20,0.1);
    }

    .chat-item.active {
      background: rgba(57,255,20,0.18);
      border-color: rgba(57,255,20,0.25);
    }

    .chat-name {
      font-weight: bold;
      color: #39ff14;
      margin-bottom: 6px;
    }

    .chat-preview {
      font-size: 12px;
      color: #c8c8c8;
      line-height: 1.45;
    }

    .chat-window {
      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.35);
    }

    .chat-header {
      padding: 18px;
      border-bottom: 1px solid #222;
      font-weight: bold;
      color: #39ff14;
      font-size: 20px;
      background: rgba(0,0,0,0.45);
    }

    .messages {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
    }

    .msg {
      margin-bottom: 12px;
      max-width: 74%;
      padding: 12px;
      border-radius: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg-meta {
      display: block;
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .sent {
      background: #39ff14;
      color: black;
      margin-left: auto;
    }

    .received {
      background: #222;
      color: white;
    }

    .system {
      background: rgba(255,255,255,0.06);
      color: #d8ffd0;
      margin: 0 auto 12px;
      text-align: center;
      max-width: 90%;
    }

    .input-box {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid #222;
      background: rgba(0,0,0,0.45);
    }

    .input-box input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #111;
      color: white;
      outline: none;
    }

    .input-box input:focus {
      box-shadow: 0 0 0 2px rgba(57,255,20,0.18);
    }

    .input-box button {
      background: #39ff14;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .status-bar {
      padding: 10px 16px;
      font-size: 13px;
      color: #d8ffd0;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(57,255,20,0.08);
      min-height: 40px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid #222;
      }

      .chat-window {
        min-height: 70vh;
      }
    }
  </style>
</head>

<body>
  <div class="nav">
    <div class="logo">
      <img src="images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png" alt="Rich Bizness">
      <span>Rich Bizness</span>
    </div>

    <div class="nav-links">
      <div id="userChip" class="user-chip">Checking session...</div>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="music.html">Music</a>
      <a href="live.html">Live</a>
      <a href="messages.html">Messages</a>
      <button id="logoutBtn" type="button">Log Out</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-title">Rooms</div>

      <div class="chat-item active" data-room="General" onclick="selectChat('General', this)">
        <div class="chat-name">General</div>
        <div class="chat-preview">Main community room</div>
      </div>

      <div class="chat-item" data-room="Fans" onclick="selectChat('Fans', this)">
        <div class="chat-name">Fans</div>
        <div class="chat-preview">Fan support and updates</div>
      </div>

      <div class="chat-item" data-room="Artists" onclick="selectChat('Artists', this)">
        <div class="chat-name">Artists</div>
        <div class="chat-preview">Creator networking room</div>
      </div>

      <div class="chat-item" data-room="Music" onclick="selectChat('Music', this)">
        <div class="chat-name">Music</div>
        <div class="chat-preview">Music drops and feedback</div>
      </div>
    </div>

    <div class="chat-window">
      <div class="chat-header" id="chatTitle">General</div>
      <div class="messages" id="messages"></div>

      <div class="input-box">
        <input id="msgInput" placeholder="Type message..." maxlength="500">
        <button id="sendBtn" type="button">Send</button>
      </div>

      <div id="statusBar" class="status-bar">Checking account...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const userChip = document.getElementById("userChip");
    const logoutBtn = document.getElementById("logoutBtn");
    const chatTitle = document.getElementById("chatTitle");
    const messagesBox = document.getElementById("messages");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusBar = document.getElementById("statusBar");

    let currentChat = "General";
    let currentUser = null;
    let currentProfile = null;
    let channel = null;

    function setStatus(message) {
      statusBar.textContent = message;
    }

    function formatTime(ts) {
      try {
        return new Date(ts).toLocaleString();
      } catch {
        return "";
      }
    }

    function renderMessage(message) {
      const div = document.createElement("div");
      const isMine = currentUser && message.sender_id === currentUser.id;

      div.className = "msg " + (message.sender_name === "System" ? "system" : (isMine ? "sent" : "received"));

      const sender = message.sender_name || message.sender_email || "User";
      const time = message.created_at ? formatTime(message.created_at) : "";

      div.innerHTML = `
        <span class="msg-meta">${sender}${time ? " · " + time : ""}</span>
        <span>${message.message}</span>
      `;

      messagesBox.appendChild(div);
    }

    function clearMessages() {
      messagesBox.innerHTML = "";
    }

    async function ensureAuth() {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;

      const user = data.session?.user;
      if (!user) {
        window.location.href = "auth.html";
        return null;
      }

      currentUser = user;
      userChip.textContent = user.email || "Signed in";
      return user;
    }

    async function loadProfileName() {
      const { data, error } = await supabase
        .from("profiles")
        .select("display_name, username")
        .eq("id", currentUser.id)
        .maybeSingle();

      if (error) {
        console.error(error);
        currentProfile = null;
        return;
      }

      currentProfile = data || null;
    }

    async function loadMessages() {
      try {
        clearMessages();
        setStatus(`Loading ${currentChat} messages...`);

        const { data, error } = await supabase
          .from("messages")
          .select("*")
          .eq("room", currentChat)
          .order("created_at", { ascending: true });

        if (error) throw error;

        if (!data || data.length === 0) {
          renderMessage({
            sender_name: "System",
            message: `No messages yet in ${currentChat}. Be the first to send one.`,
            created_at: new Date().toISOString()
          });
        } else {
          data.forEach(renderMessage);
        }

        messagesBox.scrollTop = messagesBox.scrollHeight;
        setStatus(`Connected to ${currentChat}.`);
      } catch (error) {
        console.error(error);
        setStatus("Failed to load messages: " + error.message);
      }
    }

    function subscribeToMessages() {
      if (channel) {
        supabase.removeChannel(channel);
        channel = null;
      }

      channel = supabase
        .channel(`messages-room-${currentChat}`)
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "messages",
            filter: `room=eq.${currentChat}`
          },
          (payload) => {
            renderMessage(payload.new);
            messagesBox.scrollTop = messagesBox.scrollHeight;
          }
        )
        .subscribe((status) => {
          if (status === "SUBSCRIBED") {
            setStatus(`Realtime connected to ${currentChat}.`);
          }
        });
    }

    async function selectChat(name, el) {
      currentChat = name;
      chatTitle.textContent = name;

      document.querySelectorAll(".chat-item").forEach((item) => {
        item.classList.remove("active");
      });
      if (el) el.classList.add("active");

      await loadMessages();
      subscribeToMessages();
    }

    async function sendMsg() {
      try {
        const text = msgInput.value.trim();
        if (!text) return;

        if (!currentUser) {
          setStatus("You must be logged in.");
          return;
        }

        const senderName =
          currentProfile?.display_name ||
          currentProfile?.username ||
          currentUser.email?.split("@")[0] ||
          "User";

        const { error } = await supabase
          .from("messages")
          .insert({
            room: currentChat,
            sender_id: currentUser.id,
            sender_email: currentUser.email,
            sender_name: senderName,
            message: text
          });

        if (error) throw error;

        msgInput.value = "";
        setStatus(`Message sent to ${currentChat}.`);
      } catch (error) {
        console.error(error);
        setStatus("Send failed: " + error.message);
      }
    }

    async function logOut() {
      try {
        const { error } = await supabase.auth.signOut();
        if (error) throw error;
        window.location.href = "auth.html";
      } catch (error) {
        console.error(error);
        setStatus("Logout failed: " + error.message);
      }
    }

    window.selectChat = selectChat;

    sendBtn.addEventListener("click", sendMsg);
    logoutBtn.addEventListener("click", logOut);

    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMsg();
      }
    });

    supabase.auth.onAuthStateChange((_event, session) => {
      if (!session?.user) {
        window.location.href = "auth.html";
      }
    });

    async function init() {
      try {
        setStatus("Checking account...");
        await ensureAuth();
        await loadProfileName();
        await loadMessages();
        subscribeToMessages();
      } catch (error) {
        console.error(error);
        setStatus("Startup failed: " + error.message);
      }
    }

    init();
  </script>
</body>
</html>
