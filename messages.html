<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages | Rich Bizness</title>

  <link rel="icon" type="image/png" href="images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url("images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png");
      background-size: cover;
      background-position: center;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(0,0,0,0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 45px;
      border-radius: 10px;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #39ff14; }
      50% { box-shadow: 0 0 25px #39ff14; }
      100% { box-shadow: 0 0 10px #39ff14; }
    }

    .logo span {
      color: #39ff14;
      font-weight: bold;
      font-size: 22px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      margin-left: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 70px);
    }

    .sidebar {
      background: rgba(0,0,0,0.7);
      border-right: 1px solid #222;
      overflow-y: auto;
    }

    .chat-item {
      padding: 15px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .chat-item:hover {
      background: rgba(57,255,20,0.1);
    }

    .chat-item.active {
      background: rgba(57,255,20,0.2);
    }

    .chat-name {
      font-weight: bold;
      color: #39ff14;
    }

    .chat-preview {
      font-size: 12px;
      color: gray;
    }

    .chat-window {
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 15px;
      border-bottom: 1px solid #222;
      font-weight: bold;
      color: #39ff14;
    }

    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .msg {
      margin-bottom: 10px;
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
    }

    .sent {
      background: #39ff14;
      color: black;
      margin-left: auto;
    }

    .received {
      background: #222;
    }

    .input-box {
      display: flex;
      padding: 10px;
      border-top: 1px solid #222;
    }

    .input-box input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-right: 10px;
      background: #111;
      color: white;
    }

    .input-box button {
      background: #39ff14;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="logo">
      <img src="images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
      <span>Rich Bizness</span>
    </div>

    <div>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="music.html">Music</a>
      <a href="live.html">Live</a>
      <a href="messages.html">Messages</a>
    </div>
  </div>

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="chatList">
      <div class="chat-item active" onclick="selectChat('General')">
        <div class="chat-name">General</div>
        <div class="chat-preview">Tap to chat</div>
      </div>

      <div class="chat-item" onclick="selectChat('Fans')">
        <div class="chat-name">Fans</div>
        <div class="chat-preview">Community chat</div>
      </div>

      <div class="chat-item" onclick="selectChat('Artists')">
        <div class="chat-name">Artists</div>
        <div class="chat-preview">Creator network</div>
      </div>
    </div>

    <!-- CHAT WINDOW -->
    <div class="chat-window">
      <div class="chat-header" id="chatTitle">General</div>

      <div class="messages" id="messages"></div>

      <div class="input-box">
        <input id="msgInput" placeholder="Type message...">
        <button onclick="sendMsg()">Send</button>
      </div>
    </div>

  </div>

  <script>
    let currentChat = "General";

    const chats = {
      General: [],
      Fans: [],
      Artists: []
    };

    function selectChat(name) {
      currentChat = name;
      document.getElementById("chatTitle").innerText = name;
      renderMessages();
    }

    function renderMessages() {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      chats[currentChat].forEach(m => {
        const div = document.createElement("div");
        div.className = "msg " + (m.type === "sent" ? "sent" : "received");
        div.innerText = m.text;
        box.appendChild(div);
      });
    }

    function sendMsg() {
      const input = document.getElementById("msgInput");
      const text = input.value.trim();
      if (!text) return;

      chats[currentChat].push({ text, type: "sent" });

      setTimeout(() => {
        chats[currentChat].push({ text: "Auto reply 🔥", type: "received" });
        renderMessages();
      }, 500);

      input.value = "";
      renderMessages();
    }

    renderMessages();
  </script>

</body>
</html>
