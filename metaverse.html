<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — Metaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;height:100%;background:#000;overflow:hidden;
  font-family:system-ui;
}

/* 🌌 CAMERA */
.camera{
  position:fixed;
  inset:0;
  perspective:1200px;
}

/* 🌍 WORLD */
.world{
  position:absolute;
  width:200vw;
  height:200vh;
  left:-50vw;
  top:-50vh;
  transform-style:preserve-3d;
}

/* DEPTH */
.layer{
  position:absolute;
  inset:0;
}

.layer.far{
  transform:translateZ(-300px) scale(1.4);
  opacity:.3;
}

.layer.mid{
  transform:translateZ(-120px) scale(1.1);
}

.layer.front{
  transform:translateZ(0);
}

/* 🧿 AVATAR (FIXED + ALIVE) */
.avatar{
  position:fixed;
  width:110px;height:110px;
  border-radius:50%;
  overflow:hidden;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  z-index:20;

  box-shadow:
    0 0 25px #00ffcc,
    0 0 60px rgba(0,255,200,.4);

  animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe{
  0%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.05)}
  100%{transform:translate(-50%,-50%) scale(1)}
}

.avatar img{
  width:100%;height:100%;object-fit:cover;
}

/* 🌐 NODES (FIXED ALIGNMENT) */
.node{
  position:absolute;
  width:150px;height:150px;
  border-radius:24px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(0,255,200,.08);
  color:#00ffcc;
  font-weight:700;
  font-size:16px;

  backdrop-filter:blur(12px);

  transition:.3s;
}

/* spacing FIX */
.node.music{ left:50%; top:25%; transform:translate(-50%,-50%); }
.node.gaming{ left:30%; top:65%; transform:translate(-50%,-50%); }
.node.live{ left:70%; top:60%; transform:translate(-50%,-50%); }

.node.active{
  transform:translate(-50%,-50%) scale(1.25);
  box-shadow:0 0 50px #00ffcc;
}

/* 🎮 JOYSTICK */
.joystick{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:130px;height:130px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
}

.stick{
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  background:#00ffcc;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="camera">
  <div class="world" id="world">

    <div class="layer front" id="front">
      <div class="node music" data-url="/music.html">MUSIC</div>
      <div class="node gaming" data-url="/gaming.html">GAMING</div>
      <div class="node live" data-url="/live.html">LIVE</div>
    </div>

  </div>
</div>

<!-- 🧿 AVATAR -->
<div class="avatar">
  <img src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
</div>

<!-- 🎮 JOYSTICK -->
<div class="joystick" id="joy">
  <div class="stick" id="stick"></div>
</div>

<script>
let vx=0,vy=0;
let posX=0,posY=0;

const world=document.getElementById("world");
const stick=document.getElementById("stick");
const joy=document.getElementById("joy");

let dragging=false;

joy.addEventListener("pointerdown",()=>dragging=true);

document.addEventListener("pointermove",e=>{
  if(!dragging)return;

  let rect=joy.getBoundingClientRect();
  let x=e.clientX-rect.left-65;
  let y=e.clientY-rect.top-65;

  let dist=Math.sqrt(x*x+y*y);
  if(dist>45){
    x=x/dist*45;
    y=y/dist*45;
  }

  stick.style.transform=`translate(${x}px,${y}px)`;

  vx=x*0.12;
  vy=y*0.12;
});

document.addEventListener("pointerup",()=>{
  dragging=false;
  stick.style.transform="translate(-50%,-50%)";
  vx=0;vy=0;
});

function loop(){

  posX+=vx;
  posY+=vy;

  world.style.transform=`translate(${posX}px,${posY}px)`;

  document.querySelectorAll(".node").forEach(node=>{
    let rect=node.getBoundingClientRect();
    let cx=window.innerWidth/2;
    let cy=window.innerHeight/2;

    let dx=rect.left+75-cx;
    let dy=rect.top+75-cy;

    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<170){
      node.classList.add("active");

      if(dist<70){
        location.href=node.dataset.url;
      }

    }else{
      node.classList.remove("active");
    }
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
