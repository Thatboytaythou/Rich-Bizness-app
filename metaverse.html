<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness | Metaverse</title>

  <link rel="stylesheet" href="/styles/main.css" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .page {
      padding: 20px;
    }

    .topbar {
      margin-bottom: 20px;
    }

    #metaverse-canvas {
      width: 100%;
      max-width: 800px;
      height: 400px;
      background: #111;
      border: 1px solid #333;
      display: block;
    }

    .panel {
      margin-top: 20px;
      padding: 16px;
      background: #111;
      border: 1px solid #333;
    }

    .btn {
      padding: 10px 14px;
      margin-right: 10px;
      background: #7dff71;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-danger {
      background: red;
      color: white;
    }

    #metaverse-users {
      margin-top: 10px;
    }

    .meta-user {
      padding: 4px 0;
    }

    #metaverse-chat-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .meta-chat-msg {
      padding: 4px 0;
    }

    #metaverse-status {
      margin-top: 10px;
      color: #7dff71;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div id="elite-platform-nav"></div>

  <div class="page">

    <div class="topbar">
      <h1>Meta Vision 🌐</h1>
    </div>

    <!-- CANVAS -->
    <canvas id="metaverse-canvas" width="800" height="400"></canvas>

    <!-- CONTROLS -->
    <div class="panel">
      <button id="enter-meta-vision-btn" class="btn">Enter Space</button>
      <button id="exit-meta-vision-btn" class="btn btn-danger">Exit</button>

      <div id="metaverse-status">Loading...</div>
    </div>

    <!-- USERS -->
    <div class="panel">
      <h3>Players</h3>
      <div id="metaverse-users"></div>
    </div>

    <!-- CHAT -->
    <div class="panel">
      <h3>Chat</h3>

      <div id="metaverse-chat-list"></div>

      <input
        id="metaverse-chat-input"
        type="text"
        placeholder="Talk in the metaverse..."
      />

      <button id="metaverse-chat-send-btn" class="btn">Send</button>
    </div>

  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initApp } from "/core/app.js";
    import { mountEliteNav } from "/core/nav.js";
    import { bootMetaverseSpace } from "/core/features/metaverse/space.js";

    await initApp();

    mountEliteNav({ target: "#elite-platform-nav" });

    bootMetaverseSpace();
  </script>

</body>
</html>
