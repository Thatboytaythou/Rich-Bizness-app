<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — Avatar Core</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;height:100%;background:#000;overflow:hidden;
}

/* WORLD */
.world{
  position:absolute;
  width:200vw;height:200vh;
  left:-50vw;top:-50vh;
}

/* AVATAR */
.avatar{
  position:fixed;
  width:110px;height:110px;
  border-radius:50%;
  overflow:hidden;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  z-index:20;

  box-shadow:0 0 30px #00ffcc;
  transition:.15s;
}

.avatar img{
  width:100%;height:100%;object-fit:cover;
}

/* VOICE */
.voice{
  position:fixed;
  bottom:160px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 18px;
  border-radius:14px;
  background:rgba(0,0,0,.7);
  color:#00ffcc;
  font-size:14px;
  opacity:0;
  transition:.3s;
}

.voice.show{opacity:1}

/* NODES */
.node{
  position:absolute;
  width:150px;height:150px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,255,200,.1);
  color:#00ffcc;
}

/* POSITIONS */
.music{ left:50%; top:25%; transform:translate(-50%,-50%) }
.gaming{ left:30%; top:65%; transform:translate(-50%,-50%) }
.live{ left:70%; top:60%; transform:translate(-50%,-50%) }
.sports{ left:75%; top:25%; transform:translate(-50%,-50%) }

/* JOYSTICK */
.joystick{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:130px;height:130px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
}

.stick{
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  background:#00ffcc;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="world" id="world">
  <div class="node music">🎵 MUSIC</div>
  <div class="node gaming">🎮 GAMING</div>
  <div class="node live">📡 LIVE</div>
  <div class="node sports">🏆 SPORTS</div>
</div>

<div class="avatar" id="avatar">
  <img id="avatar-img" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
</div>

<div class="voice" id="voice"></div>

<div class="joystick" id="joy">
  <div class="stick" id="stick"></div>
</div>

<script type="module">

/* SUPABASE */
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

/* LOAD REAL AVATAR */
async function loadAvatar(){
  const { data: { user } } = await supabase.auth.getUser();
  if(!user) return;

  const { data } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", user.id)
    .single();

  if(data?.avatar_url){
    document.getElementById("avatar-img").src = data.avatar_url;
  }
}
loadAvatar();

/* VOICE SYSTEM */
const voice = document.getElementById("voice");

function speak(text){
  voice.innerText = text;
  voice.classList.add("show");

  /* 🔊 REAL VOICE */
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speech.pitch = 1.1;
  speech.volume = 1;
  speechSynthesis.speak(speech);

  setTimeout(()=>{
    voice.classList.remove("show");
  },2000);
}

/* MOVEMENT */
let vx=0,vy=0;
let posX=0,posY=0;

const world=document.getElementById("world");
const joy=document.getElementById("joy");
const stick=document.getElementById("stick");

let dragging=false;

joy.addEventListener("pointerdown",()=>dragging=true);

document.addEventListener("pointermove",e=>{
  if(!dragging)return;

  let rect=joy.getBoundingClientRect();
  let x=e.clientX-rect.left-65;
  let y=e.clientY-rect.top-65;

  let dist=Math.sqrt(x*x+y*y);
  if(dist>45){
    x=x/dist*45;
    y=y/dist*45;
  }

  stick.style.transform=`translate(${x}px,${y}px)`;

  vx=x*0.15;
  vy=y*0.15;
});

document.addEventListener("pointerup",()=>{
  dragging=false;
  stick.style.transform="translate(-50%,-50%)";
  vx=0;vy=0;
});

/* AI ZONE BRAIN */
let currentZone="";

function getZone(){
  let x = posX;
  let y = posY;

  if(y < -200 && Math.abs(x) < 200) return "MUSIC";
  if(x < -200) return "GAMING";
  if(x > 200 && y > 0) return "LIVE";
  if(x > 200 && y < -150) return "SPORTS";

  return "";
}

/* LOOP */
function loop(){

  posX+=vx;
  posY+=vy;

  world.style.transform=`translate(${posX}px,${posY}px)`;

  const zone = getZone();

  if(zone !== currentZone){
    currentZone = zone;

    if(zone === "MUSIC") speak("🎵 You entered the music world");
    if(zone === "GAMING") speak("🎮 Game time. Let’s run it.");
    if(zone === "LIVE") speak("📡 WE LIT 🔥");
    if(zone === "SPORTS") speak("🏆 Welcome to Sports Center. Let’s make some plays.");
  }

  requestAnimationFrame(loop);
}

loop();

/* TAP AVATAR */
document.getElementById("avatar").onclick = ()=>{
  speak("I am you inside the world.");
};

</script>

</body>
</html>
