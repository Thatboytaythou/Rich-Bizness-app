<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — 3D Metaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;height:100%;background:#000;overflow:hidden;
  font-family:system-ui;
}

/* CAMERA */
.camera{
  position:fixed;
  inset:0;
  perspective:1200px;
  overflow:hidden;
}

/* WORLD */
.world{
  position:absolute;
  width:200vw;
  height:200vh;
  left:-50vw;
  top:-50vh;
  transform-style:preserve-3d;
}

/* DEPTH LAYERS */
.layer{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
}

.layer.far{
  transform:translateZ(-300px) scale(1.4);
  opacity:.4;
}

.layer.mid{
  transform:translateZ(-120px) scale(1.15);
}

.layer.front{
  transform:translateZ(0);
}

/* AVATAR */
.avatar{
  position:fixed;
  width:90px;height:90px;
  border-radius:50%;
  overflow:hidden;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  box-shadow:0 0 30px #00ffcc;
}

.avatar img{
  width:100%;height:100%;object-fit:cover;
}

/* NODES */
.node{
  position:absolute;
  width:140px;height:140px;
  border-radius:20px;
  background:rgba(0,255,200,.08);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#00ffcc;
  font-weight:bold;
  backdrop-filter:blur(10px);
  transition:.25s;
}

.node.active{
  transform:scale(1.3);
  box-shadow:0 0 50px #00ffcc;
}

/* JOYSTICK */
.joystick{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:120px;height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
}

.stick{
  position:absolute;
  width:60px;height:60px;
  border-radius:50%;
  background:#00ffcc;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  transition:.1s;
}
</style>
</head>

<body>

<div class="camera">
  <div class="world" id="world">

    <!-- FAR -->
    <div class="layer far" id="far">
      <div class="node" style="left:20%;top:20%">VOID</div>
      <div class="node" style="left:80%;top:70%">SPACE</div>
    </div>

    <!-- MID -->
    <div class="layer mid" id="mid">
      <div class="node" style="left:50%;top:30%" data-url="/music.html">MUSIC</div>
      <div class="node" style="left:30%;top:60%" data-url="/gaming.html">GAMING</div>
    </div>

    <!-- FRONT -->
    <div class="layer front" id="front">
      <div class="node" style="left:70%;top:50%" data-url="/live.html">LIVE</div>
      <div class="node" style="left:40%;top:75%" data-url="/gallery.html">GALLERY</div>
    </div>

  </div>
</div>

<!-- AVATAR -->
<div class="avatar">
  <img src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
</div>

<!-- JOYSTICK -->
<div class="joystick" id="joy">
  <div class="stick" id="stick"></div>
</div>

<script>
let vx=0,vy=0;
let posX=0,posY=0;

const world=document.getElementById("world");
const stick=document.getElementById("stick");
const joy=document.getElementById("joy");

const far=document.getElementById("far");
const mid=document.getElementById("mid");
const front=document.getElementById("front");

let dragging=false;

/* JOYSTICK */
joy.addEventListener("pointerdown",()=>dragging=true);

document.addEventListener("pointermove",e=>{
  if(!dragging)return;

  let rect=joy.getBoundingClientRect();
  let x=e.clientX-rect.left-60;
  let y=e.clientY-rect.top-60;

  let dist=Math.sqrt(x*x+y*y);
  if(dist>40){
    x=x/dist*40;
    y=y/dist*40;
  }

  stick.style.transform=`translate(${x}px,${y}px)`;

  vx=x*0.15;
  vy=y*0.15;
});

document.addEventListener("pointerup",()=>{
  dragging=false;
  stick.style.transform="translate(-50%,-50%)";
  vx=0;vy=0;
});

/* LOOP */
function loop(){

  posX+=vx;
  posY+=vy;

  /* PARALLAX DEPTH */
  far.style.transform =
    `translate(${posX*0.2}px,${posY*0.2}px) translateZ(-300px) scale(1.4)`;

  mid.style.transform =
    `translate(${posX*0.5}px,${posY*0.5}px) translateZ(-120px) scale(1.15)`;

  front.style.transform =
    `translate(${posX}px,${posY}px)`;

  /* NODE INTERACTION */
  document.querySelectorAll(".node").forEach(node=>{
    let rect=node.getBoundingClientRect();
    let cx=window.innerWidth/2;
    let cy=window.innerHeight/2;

    let dx=rect.left+70-cx;
    let dy=rect.top+70-cy;

    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<150){
      node.classList.add("active");

      if(dist<60 && node.dataset.url){
        setTimeout(()=>{
          location.href=node.dataset.url;
        },200);
      }

    }else{
      node.classList.remove("active");
    }
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
