<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — Metaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

#ui{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  color:#00ffcc;
  font-family:sans-serif;
  z-index:10;
}

.portal-btn{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  border-radius:10px;
  background:rgba(0,255,200,.2);
  color:#00ffcc;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">🌐 METAVERSE HUB</div>
<div class="portal-btn" onclick="goBack()">EXIT</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

/* CAMERA */
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.PointLight(0x00ffcc, 2);
light.position.set(0,5,5);
scene.add(light);

/* FLOOR */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x001a12})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* PORTALS (YOUR APP SECTIONS) */
const worlds = [
{ name:"LIVE", url:"/live.html", x:-4 },
{ name:"MUSIC", url:"/music.html", x:-2 },
{ name:"GAMING", url:"/gaming.html", x:0 },
{ name:"SPORTS", url:"/sports.html", x:2 },
{ name:"META", url:"/index.html", x:4 }
];

const portals = [];

worlds.forEach(w=>{
  const geo = new THREE.BoxGeometry(1.5,2,0.2);
  const mat = new THREE.MeshStandardMaterial({
    color:0x00ffcc,
    emissive:0x00ffcc,
    emissiveIntensity:0.3
  });

  const box = new THREE.Mesh(geo,mat);
  box.position.set(w.x,1,0);

  box.userData = w;

  scene.add(box);
  portals.push(box);
});

/* RAYCAST CLICK */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

addEventListener("click",(e)=>{
  mouse.x = (e.clientX / innerWidth)*2 - 1;
  mouse.y = -(e.clientY / innerHeight)*2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const hit = raycaster.intersectObjects(portals);

  if(hit.length){
    const world = hit[0].object.userData;
    location.href = world.url;
  }
});

/* SIMPLE MOVEMENT (PHONE + DESKTOP) */
addEventListener("keydown",(e)=>{
  if(e.key==="w") camera.position.z -= 0.3;
  if(e.key==="s") camera.position.z += 0.3;
  if(e.key==="a") camera.position.x -= 0.3;
  if(e.key==="d") camera.position.x += 0.3;
});

/* LOOP */
function animate(){
  requestAnimationFrame(animate);

  portals.forEach(p=>{
    p.rotation.y += 0.01;
  });

  renderer.render(scene,camera);
}
animate();

/* EXIT */
window.goBack = ()=>{
  location.href = "/index.html";
};

/* RESIZE */
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
