<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rich Bizness — Podcast Upload</title>

  <style>
    :root {
      --bg:#050505;
      --panel:rgba(10,10,10,0.78);
      --line:rgba(255,201,109,0.16);
      --line-strong:rgba(255,201,109,0.32);
      --text:#f8f1e7;
      --muted:#c7b79d;
      --gold:#ffcb6b;
      --gold-2:#c98a1a;
      --shadow:0 22px 60px rgba(0,0,0,0.44);
      --radius:20px;
      --max:1200px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        linear-gradient(180deg, rgba(0,0,0,0.68), rgba(0,0,0,0.92)),
        radial-gradient(circle at top, rgba(255,203,107,0.12), transparent 24%),
        url('/images/brand/logo-music-label.png') center/cover no-repeat fixed;
      background-color:#050505;
    }

    a { color:inherit; text-decoration:none; }

    .page {
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 40px;
    }

    .nav {
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:20px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(8,8,8,0.76);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
    }

    .nav-group {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav a, .btn, .tab-btn {
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
      color:var(--text);
      font-weight:800;
      cursor:pointer;
    }

    .btn {
      background:linear-gradient(135deg,var(--gold),var(--gold-2));
      color:#201202;
      border:none;
    }

    .tab-btn.active {
      border-color:var(--line-strong);
      background:linear-gradient(135deg, rgba(255,203,107,0.18), rgba(201,138,26,0.10));
    }

    .hero, .panel {
      background:rgba(10,10,10,0.78);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .hero {
      padding:30px;
      margin-bottom:18px;
    }

    .hero h1 {
      margin:0;
      font-size:42px;
    }

    .hero p {
      color:var(--muted);
      margin-top:10px;
      max-width:760px;
      line-height:1.8;
    }

    .tabs {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .tab-panel {
      display:none;
    }

    .tab-panel.active {
      display:block;
    }

    .panel {
      padding:20px;
      margin-bottom:18px;
    }

    .panel h2 {
      margin-top:0;
      margin-bottom:14px;
    }

    .form-grid {
      display:grid;
      gap:14px;
    }

    .field-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .field {
      display:grid;
      gap:8px;
    }

    .field label {
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .field input,
    .field textarea,
    .field select {
      width:100%;
      padding:13px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
      color:var(--text);
      outline:none;
    }

    .field textarea {
      min-height:120px;
      resize:vertical;
    }

    .notice {
      display:none;
      margin-bottom:14px;
      padding:14px 16px;
      border-radius:14px;
    }

    .error { background:#7f2233; }
    .success { background:#1e6a46; }

    .show-list {
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .show-item {
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      cursor:pointer;
    }

    .show-item.active {
      border-color:var(--line-strong);
      background:linear-gradient(135deg, rgba(255,203,107,0.12), rgba(201,138,26,0.08));
    }

    .show-item strong {
      display:block;
      margin-bottom:6px;
    }

    .show-item span {
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      display:block;
    }

    .preview {
      margin-top:14px;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
    }

    .preview h3 {
      margin-top:0;
    }

    @media (max-width: 900px) {
      .field-grid {
        grid-template-columns:1fr;
      }

      .nav a, .btn, .tab-btn {
        width:100%;
      }

      #global-session-nav {
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="nav">
      <div class="nav-group">
        <a href="/index.html">Home</a>
        <a href="/podcast.html">Podcast</a>
        <a href="/radio.html">Radio</a>
        <a href="/upload.html">Upload</a>
      </div>
      <div class="nav-group">
        <a href="/live.html" class="btn">WE LIT 🔥</a>
        <div id="global-session-nav"></div>
      </div>
    </div>

    <div id="podcast-upload-error" class="notice error"></div>
    <div id="podcast-upload-success" class="notice success"></div>

    <div class="hero">
      <h1>Podcast Upload System</h1>
      <p>Create a show, upload episodes, and build the talk-content side of Rich Bizness with real audio files and show organization.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" type="button" data-tab="show">Create Show</button>
      <button class="tab-btn" type="button" data-tab="episode">Upload Episode</button>
    </div>

    <div class="tab-panel active" data-panel="show">
      <div class="panel">
        <h2>Create Podcast Show</h2>
        <div class="form-grid">
          <div class="field">
            <label for="show-title">Show Title</label>
            <input id="show-title" type="text" placeholder="Rich Bizness Talks" />
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="show-category">Category</label>
              <input id="show-category" type="text" placeholder="talk" />
            </div>

            <div class="field">
              <label for="show-visibility">Visibility</label>
              <select id="show-visibility">
                <option value="public">public</option>
                <option value="private">private</option>
                <option value="unlisted">unlisted</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="show-description">Description</label>
            <textarea id="show-description" placeholder="Show description..."></textarea>
          </div>

          <div class="field">
            <label for="show-cover-url">Cover URL</label>
            <input id="show-cover-url" type="text" placeholder="https://..." />
          </div>

          <label style="display:flex;align-items:center;gap:10px;">
            <input id="show-featured" type="checkbox" />
            <span>Featured show</span>
          </label>

          <div>
            <button id="create-show-btn" class="btn" type="button">Create Show</button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" data-panel="episode">
      <div class="panel">
        <h2>Select Show</h2>
        <div id="podcast-show-list" class="show-list"></div>
      </div>

      <div class="panel">
        <h2>Upload Episode</h2>
        <div class="form-grid">
          <div class="field">
            <label for="episode-title">Episode Title</label>
            <input id="episode-title" type="text" placeholder="Episode 01 — Label Vision" />
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="episode-number">Episode Number</label>
              <input id="episode-number" type="number" min="1" step="1" value="1" />
            </div>

            <div class="field">
              <label for="episode-duration">Duration (seconds)</label>
              <input id="episode-duration" type="number" min="0" step="1" placeholder="1800" />
            </div>
          </div>

          <div class="field">
            <label for="episode-description">Description</label>
            <textarea id="episode-description" placeholder="Episode description..."></textarea>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="episode-cover-url">Episode Cover URL</label>
              <input id="episode-cover-url" type="text" placeholder="https://..." />
            </div>

            <div class="field">
              <label for="episode-audio-file">Episode Audio File</label>
              <input id="episode-audio-file" type="file" accept="audio/*" />
            </div>
          </div>

          <label style="display:flex;align-items:center;gap:10px;">
            <input id="episode-featured" type="checkbox" />
            <span>Featured episode</span>
          </label>

          <label style="display:flex;align-items:center;gap:10px;">
            <input id="episode-published" type="checkbox" checked />
            <span>Published</span>
          </label>

          <div>
            <button id="upload-episode-btn" class="btn" type="button">Upload Episode</button>
          </div>
        </div>

        <div class="preview">
          <h3>Selected Show</h3>
          <p id="selected-show-preview">No show selected yet.</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      getPodcastShows,
      createPodcastShow,
      uploadPodcastAudio,
      createPodcastEpisode
    } from "/src/podcast/podcast-api.js";

    function el(id) {
      return document.getElementById(id);
    }

    function showError(message) {
      const node = el("podcast-upload-error");
      if (!node) return;
      node.textContent = message || "";
      node.style.display = message ? "block" : "none";
      const success = el("podcast-upload-success");
      if (success && message) success.style.display = "none";
    }

    function showSuccess(message) {
      const node = el("podcast-upload-success");
      if (!node) return;
      node.textContent = message || "";
      node.style.display = message ? "block" : "none";
      const error = el("podcast-upload-error");
      if (error && message) error.style.display = "none";
    }

    function clearMessages() {
      showError("");
      showSuccess("");
    }

    const state = {
      shows: [],
      selectedShowId: null
    };

    function renderShows() {
      const list = el("podcast-show-list");
      if (!list) return;

      if (!state.shows.length) {
        list.innerHTML = `
          <div class="show-item">
            <strong>No podcast shows yet</strong>
            <span>Create a show first, then upload episodes into it.</span>
          </div>
        `;
        el("selected-show-preview").textContent = "No show selected yet.";
        return;
      }

      list.innerHTML = state.shows.map((show) => `
        <div class="show-item ${show.id === state.selectedShowId ? "active" : ""}" data-show-id="${show.id}">
          <strong>${show.title}</strong>
          <span>${show.description || "Podcast show ready for episodes."}</span>
        </div>
      `).join("");

      list.querySelectorAll("[data-show-id]").forEach((item) => {
        item.addEventListener("click", () => {
          state.selectedShowId = item.getAttribute("data-show-id");
          const selected = state.shows.find((show) => show.id === state.selectedShowId);
          el("selected-show-preview").textContent = selected
            ? `${selected.title} • ${selected.category || "talk"} • ${selected.visibility || "public"}`
            : "No show selected yet.";
          renderShows();
        });
      });

      if (!state.selectedShowId && state.shows[0]) {
        state.selectedShowId = state.shows[0].id;
        el("selected-show-preview").textContent =
          `${state.shows[0].title} • ${state.shows[0].category || "talk"} • ${state.shows[0].visibility || "public"}`;
        renderShows();
      }
    }

    async function loadShows() {
      try {
        state.shows = await getPodcastShows();
        renderShows();
      } catch (error) {
        console.error("[podcast-upload] loadShows error:", error);
      }
    }

    async function handleCreateShow() {
      try {
        clearMessages();

        const title = el("show-title").value.trim();
        const description = el("show-description").value.trim();
        const cover_url = el("show-cover-url").value.trim();
        const category = el("show-category").value.trim();
        const visibility = el("show-visibility").value;
        const is_featured = !!el("show-featured").checked;

        if (!title) {
          throw new Error("Show title is required.");
        }

        const show = await createPodcastShow({
          title,
          description,
          cover_url,
          category,
          visibility,
          is_featured
        });

        showSuccess("Podcast show created.");
        el("show-title").value = "";
        el("show-description").value = "";
        el("show-cover-url").value = "";
        el("show-category").value = "";
        el("show-visibility").value = "public";
        el("show-featured").checked = false;

        await loadShows();
        state.selectedShowId = show.id;
        renderShows();
      } catch (error) {
        console.error("[podcast-upload] create show error:", error);
        showError(error.message || "Could not create show.");
      }
    }

    async function handleUploadEpisode() {
      try {
        clearMessages();

        if (!state.selectedShowId) {
          throw new Error("Select a podcast show first.");
        }

        const title = el("episode-title").value.trim();
        const description = el("episode-description").value.trim();
        const cover_url = el("episode-cover-url").value.trim();
        const episode_number = Number(el("episode-number").value || 1);
        const duration_seconds = Number(el("episode-duration").value || 0);
        const is_featured = !!el("episode-featured").checked;
        const is_published = !!el("episode-published").checked;
        const audioFile = el("episode-audio-file").files?.[0];

        if (!title) {
          throw new Error("Episode title is required.");
        }

        if (!audioFile) {
          throw new Error("Choose an audio file first.");
        }

        const userIdHolder = state.shows.find((show) => show.id === state.selectedShowId)?.creator_id;
        const audio_url = await uploadPodcastAudio(audioFile, userIdHolder || "podcasts");

        await createPodcastEpisode({
          show_id: state.selectedShowId,
          title,
          description,
          audio_url,
          cover_url,
          episode_number,
          duration_seconds,
          is_featured,
          is_published
        });

        showSuccess("Podcast episode uploaded.");

        el("episode-title").value = "";
        el("episode-description").value = "";
        el("episode-cover-url").value = "";
        el("episode-number").value = "1";
        el("episode-duration").value = "";
        el("episode-audio-file").value = "";
        el("episode-featured").checked = false;
        el("episode-published").checked = true;
      } catch (error) {
        console.error("[podcast-upload] upload episode error:", error);
        showError(error.message || "Could not upload episode.");
      }
    }

    document.querySelectorAll(".tab-btn").forEach((button) => {
      button.addEventListener("click", () => {
        const tab = button.getAttribute("data-tab");

        document.querySelectorAll(".tab-btn").forEach((btn) => btn.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.remove("active"));

        button.classList.add("active");
        document.querySelector(`.tab-panel[data-panel="${tab}"]`)?.classList.add("active");
      });
    });

    el("create-show-btn")?.addEventListener("click", handleCreateShow);
    el("upload-episode-btn")?.addEventListener("click", handleUploadEpisode);

    loadShows();
  </script>

  <script type="module" src="/src/shared/navbar-session.js"></script>
</body>
</html>
