<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist Upload</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 42px;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      color: #a1a1aa;
      font-size: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }

    .card {
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .card h2 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 14px;
      color: #d4d4d8;
      margin-bottom: 8px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      background: #111;
      color: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #71717a;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    #submitBtn {
      background: #22c55e;
      color: #000;
    }

    #clearBtn {
      background: #27272a;
      color: #fff;
    }

    .status {
      margin-top: 16px;
      min-height: 22px;
      color: #a1a1aa;
      font-size: 14px;
    }

    .preview-box {
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 18px;
    }

    .preview-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #090909;
      display: block;
    }

    .preview-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #71717a;
      text-align: center;
      padding: 20px;
      background: #090909;
    }

    .preview-meta {
      padding: 16px;
    }

    .preview-meta h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .preview-meta p {
      margin: 0 0 8px;
      color: #d4d4d8;
      line-height: 1.5;
    }

    .mini-tag {
      display: inline-block;
      margin-top: 6px;
      background: #18181b;
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }

    .saved-list {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .saved-item {
      padding: 14px;
      border-radius: 16px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .saved-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .saved-item span {
      color: #a1a1aa;
      font-size: 14px;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>⬆️ Artist Upload</h1>
      <p>Upload new artwork to the Rich Bizness gallery.</p>
    </div>

    <div class="layout">
      <section class="card">
        <h2>Upload Artwork</h2>

        <div class="field">
          <label for="artistName">Artist Name</label>
          <input id="artistName" type="text" placeholder="Enter artist name" />
        </div>

        <div class="field">
          <label for="artTitle">Artwork Title</label>
          <input id="artTitle" type="text" placeholder="Enter artwork title" />
        </div>

        <div class="field">
          <label for="artCategory">Category</label>
          <select id="artCategory">
            <option value="digital">Digital</option>
            <option value="painting">Painting</option>
            <option value="photography">Photography</option>
            <option value="3d">3D</option>
            <option value="streetwear">Streetwear</option>
          </select>
        </div>

        <div class="field">
          <label for="artDescription">Description</label>
          <textarea id="artDescription" placeholder="Tell people about the artwork"></textarea>
        </div>

        <div class="field">
          <label for="artPrice">Price</label>
          <input id="artPrice" type="text" placeholder="$200 or Contact for price" />
        </div>

        <div class="field">
          <label for="artImageFile">Upload Image</label>
          <input id="artImageFile" type="file" accept="image/*" />
        </div>

        <div class="field">
          <label for="artImageUrl">Or Image URL</label>
          <input id="artImageUrl" type="url" placeholder="https://example.com/image.jpg" />
        </div>

        <div class="actions">
          <button id="submitBtn" type="button">Save Artwork</button>
          <button id="clearBtn" type="button">Clear Form</button>
        </div>

        <div id="status" class="status">Ready for upload.</div>
      </section>

      <aside class="card">
        <h2>Live Preview</h2>

        <div class="preview-box">
          <div id="previewMedia"></div>
          <div class="preview-meta">
            <h3 id="previewTitle">Untitled Artwork</h3>
            <p id="previewArtist">By Unknown Artist</p>
            <p id="previewDescription">Your artwork preview will appear here.</p>
            <span id="previewTag" class="mini-tag">Digital</span>
          </div>
        </div>

        <h2>Recent Uploads</h2>
        <div id="savedList" class="saved-list"></div>
      </aside>
    </div>
  </div>

  <script>
    const artistNameEl = document.getElementById("artistName");
    const artTitleEl = document.getElementById("artTitle");
    const artCategoryEl = document.getElementById("artCategory");
    const artDescriptionEl = document.getElementById("artDescription");
    const artPriceEl = document.getElementById("artPrice");
    const artImageFileEl = document.getElementById("artImageFile");
    const artImageUrlEl = document.getElementById("artImageUrl");
    const statusEl = document.getElementById("status");
    const previewMediaEl = document.getElementById("previewMedia");
    const previewTitleEl = document.getElementById("previewTitle");
    const previewArtistEl = document.getElementById("previewArtist");
    const previewDescriptionEl = document.getElementById("previewDescription");
    const previewTagEl = document.getElementById("previewTag");
    const savedListEl = document.getElementById("savedList");

    let uploadedImageData = "";

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function getUploads() {
      try {
        const raw = localStorage.getItem("artistUploads");
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (err) {
        console.error("Error reading uploads:", err);
        return [];
      }
    }

    function saveUploads(items) {
      localStorage.setItem("artistUploads", JSON.stringify(items));
    }

    function renderSavedList() {
      const uploads = getUploads();

      if (!uploads.length) {
        savedListEl.innerHTML = `
          <div class="saved-item">
            <strong>No uploads yet</strong>
            <span>Your saved artwork will appear here.</span>
          </div>
        `;
        return;
      }

      savedListEl.innerHTML = uploads
        .slice()
        .reverse()
        .slice(0, 5)
        .map(item => `
          <div class="saved-item">
            <strong>${escapeHtml(item.title || "Untitled Artwork")}</strong>
            <span>By ${escapeHtml(item.artist || "Unknown Artist")} · ${escapeHtml(item.category || "digital")}</span>
          </div>
        `)
        .join("");
    }

    function renderPreview() {
      const title = artTitleEl.value.trim() || "Untitled Artwork";
      const artist = artistNameEl.value.trim() || "Unknown Artist";
      const description = artDescriptionEl.value.trim() || "Your artwork preview will appear here.";
      const category = artCategoryEl.value || "digital";
      const imageUrl = artImageUrlEl.value.trim() || uploadedImageData;

      previewTitleEl.textContent = title;
      previewArtistEl.textContent = `By ${artist}`;
      previewDescriptionEl.textContent = description;
      previewTagEl.textContent = category === "3d"
        ? "3D"
        : category.charAt(0).toUpperCase() + category.slice(1);

      if (imageUrl) {
        previewMediaEl.innerHTML = `<img class="preview-image" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" />`;
      } else {
        previewMediaEl.innerHTML = `<div class="preview-placeholder">Upload an image or paste an image URL to preview your artwork.</div>`;
      }
    }

    function clearForm() {
      artistNameEl.value = "";
      artTitleEl.value = "";
      artCategoryEl.value = "digital";
      artDescriptionEl.value = "";
      artPriceEl.value = "";
      artImageFileEl.value = "";
      artImageUrlEl.value = "";
      uploadedImageData = "";
      setStatus("Form cleared.");
      renderPreview();
    }

    function handleFileUpload(file) {
      if (!file) {
        uploadedImageData = "";
        renderPreview();
        return;
      }

      const reader = new FileReader();
      reader.onload = function (event) {
        uploadedImageData = event.target.result;
        artImageUrlEl.value = "";
        renderPreview();
        setStatus("Image loaded and ready to save.");
      };
      reader.onerror = function () {
        setStatus("Could not read image file.");
      };
      reader.readAsDataURL(file);
    }

    function saveArtwork() {
      const artist = artistNameEl.value.trim();
      const title = artTitleEl.value.trim();
      const category = artCategoryEl.value;
      const description = artDescriptionEl.value.trim();
      const price = artPriceEl.value.trim() || "Contact for price";
      const image = artImageUrlEl.value.trim() || uploadedImageData;

      if (!artist) {
        setStatus("Artist name is required.");
        return;
      }

      if (!title) {
        setStatus("Artwork title is required.");
        return;
      }

      if (!image) {
        setStatus("Add an image file or image URL.");
        return;
      }

      const uploads = getUploads();

      uploads.push({
        artist,
        title,
        category,
        description,
        price,
        image,
        createdAt: new Date().toISOString(),
        date: new Date().toISOString().slice(0, 10)
      });

      saveUploads(uploads);
      setStatus("Artwork saved to gallery storage.");
      renderSavedList();
      clearForm();
    }

    [
      artistNameEl,
      artTitleEl,
      artCategoryEl,
      artDescriptionEl,
      artPriceEl,
      artImageUrlEl
    ].forEach(el => {
      el.addEventListener("input", renderPreview);
      el.addEventListener("change", renderPreview);
    });

    artImageFileEl.addEventListener("change", (event) => {
      const file = event.target.files[0];
      handleFileUpload(file);
    });

    document.getElementById("submitBtn").addEventListener("click", saveArtwork);
    document.getElementById("clearBtn").addEventListener("click", clearForm);

    renderPreview();
    renderSavedList();
  </script>
</body>
</html>
