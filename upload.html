<!DOCTYPE html>
<html>
<head>
  <title>Upload - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-top: 20px;
    }

    input, select, button {
      width: 90%;
      max-width: 400px;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
    }

    button {
      background: #00ffaa;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    a {
      color: #4da3ff;
      text-decoration: none;
    }

    #welcome {
      color: #00ffaa;
      margin-bottom: 20px;
    }

    #status {
      margin-top: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h1>🔥 Upload Your Work 🔥</h1>
  <p id="welcome"></p>

  <form id="uploadForm">
    <input id="artistName" type="text" placeholder="Artist Name" required />
    <input id="fileInput" type="file" accept="image/*" required />

    <select id="category">
      <option value="Tattoo">Tattoo</option>
      <option value="Art">Art</option>
      <option value="3D Print">3D Print</option>
    </select>

    <button type="submit">Upload</button>
  </form>

  <p id="status"></p>

  <p>
    <a href="gallery">View Gallery</a>
  </p>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";
    const BUCKET = "Artist-uploads";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    async function loadUser() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError) {
        document.getElementById("status").textContent = "Auth error: " + authError.message;
        return;
      }

      currentUser = authData.user;

      if (!currentUser) {
        window.location.href = "auth";
        return;
      }

      document.getElementById("welcome").textContent = "Logged in as " + currentUser.email;

      const { data: profile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

      if (profile) {
        document.getElementById("artistName").value =
          profile.display_name || profile.username || "";
      }
    }

    async function handleUpload(e) {
      e.preventDefault();

      const status = document.getElementById("status");
      const artist = document.getElementById("artistName").value.trim();
      const category = document.getElementById("category").value;
      const file = document.getElementById("fileInput").files[0];

      if (!currentUser) {
        status.textContent = "You must be signed in.";
        return;
      }

      if (!artist || !file) {
        status.textContent = "Please fill out all fields.";
        return;
      }

      status.textContent = "Uploading...";

      const safeName = file.name.replace(/\s+/g, "-").toLowerCase();
      const filePath = `${Date.now()}-${safeName}`;

      const { error: uploadError } = await supabase.storage
        .from(BUCKET)
        .upload(filePath, file);

      if (uploadError) {
        status.textContent = "Upload failed: " + uploadError.message;
        return;
      }

      const { data: publicData } = supabase.storage
        .from(BUCKET)
        .getPublicUrl(filePath);

      const imageUrl = publicData.publicUrl;

      const { error: dbError } = await supabase
        .from("uploads")
        .insert([
          {
            user_id: currentUser.id,
            artist: artist,
            category: category,
            image_url: imageUrl,
            likes: 0
          }
        ]);

      if (dbError) {
        status.textContent = "Database error: " + dbError.message;
        return;
      }

      status.innerHTML = `
        ✅ Upload complete!<br><br>
        <a href="${imageUrl}" target="_blank">View Image</a><br><br>
        <a href="gallery">Go to Gallery</a>
      `;

      document.getElementById("fileInput").value = "";
    }

    document.getElementById("uploadForm").addEventListener("submit", handleUpload);

    loadUser();
  </script>
</body>
</html>
