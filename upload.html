<!DOCTYPE html>
<html>
<head>
  <title>Upload Your Work – Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

  <h1>🔥 Upload Your Work 🔥</h1>
  <p>Show your tattoos, art, and 3D prints</p>

  <form id="uploadForm" style="max-width:500px; margin:auto;">

    <!-- Artist Name -->
    <input
      id="artistName"
      type="text"
      placeholder="Artist Name"
      required
      style="width:100%; padding:14px; margin-bottom:16px; font-size:16px;"
    />

    <!-- File -->
    <input
      id="fileInput"
      type="file"
      accept="image/*"
      required
      style="width:100%; padding:14px; margin-bottom:16px;"
    />

    <!-- Category -->
    <select
      id="category"
      style="width:100%; padding:14px; margin-bottom:16px; font-size:16px;"
    >
      <option value="Tattoo">Tattoo</option>
      <option value="3D Print">3D Print</option>
      <option value="Art">Art</option>
    </select>

    <!-- Upload Button -->
    <button
      type="submit"
      style="padding:15px 25px; font-size:18px; cursor:pointer;"
    >
      Upload
    </button>

  </form>

  <p id="status" style="margin-top:30px;"></p>

  <!-- RESULT -->
  <div id="result" style="margin-top:20px;"></div>

  <!-- NAV -->
  <div style="margin-top:30px;">
    <a href="/gallery/" style="color:#00ff99; font-size:18px;">
      Go to Gallery
    </a>
  </div>

  <!-- SUPABASE SCRIPT -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_KEY_HERE"; // keep yours

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BUCKET = "Artist-uploads";

    async function handleUpload(e) {
      e.preventDefault();

      const artistName = document.getElementById("artistName").value;
      const category = document.getElementById("category").value;
      const file = document.getElementById("fileInput").files[0];
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      if (!artistName || !file) {
        status.textContent = "Please fill everything out";
        return;
      }

      status.textContent = "Uploading...";

      const safeName = file.name.replace(/\s+/g, "-").toLowerCase();
      const filePath = `${Date.now()}-${safeName}`;

      // Upload file
      const { error: uploadError } = await supabase.storage
        .from(BUCKET)
        .upload(filePath, file);

      if (uploadError) {
        status.textContent = "Upload failed: " + uploadError.message;
        return;
      }

      // Get public URL
      const { data } = supabase.storage
        .from(BUCKET)
        .getPublicUrl(filePath);

      const imageUrl = data.publicUrl;

      // Save to DB
      const { error: insertError } = await supabase
        .from("uploads")
        .insert([
          {
            artist: artistName,
            category: category,
            image_url: imageUrl,
            likes: 0
          }
        ]);

      if (insertError) {
        status.textContent = "DB error: " + insertError.message;
        return;
      }

      status.textContent = "Upload complete ✅";

      result.innerHTML = `
        <p>Artist: ${artistName}</p>
        <p>Category: ${category}</p>
        <a href="${imageUrl}" target="_blank">View Upload</a>
      `;
    }

    document
      .getElementById("uploadForm")
      .addEventListener("submit", handleUpload);
  </script>

</body>
</html>
