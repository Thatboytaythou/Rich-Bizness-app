<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Music — Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/music.css" />
</head>

<body>

<div id="elite-platform-nav"></div>

<div class="music-bg"></div>

<div class="music-page">

  <div class="music-hero">
    <h1>🎤 Upload Track</h1>
    <p>Drop heat • Build your empire</p>
  </div>

  <form id="upload-form" class="rb-track-card" style="flex-direction:column; gap:12px;">

    <input type="text" id="title" placeholder="Track Title" required />
    <input type="text" id="artist" placeholder="Artist Name" required />
    <input type="text" id="genre" placeholder="Genre" />

    <label>Audio File</label>
    <input type="file" id="audio" accept="audio/*" required />

    <label>Cover Image</label>
    <input type="file" id="cover" accept="image/*" />

    <button class="rb-unlock" type="submit">UPLOAD 🔥</button>

  </form>

  <div id="upload-status" class="status-box"></div>

  <audio id="preview-player" controls style="display:none;"></audio>

</div>

<script type="module" src="/core/pages/upload.js"></script>

</body>
</html>
