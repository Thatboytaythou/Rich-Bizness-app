<!DOCTYPE html>
<html>
<head>
  <title>Upload - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    input, select, button {
      width: 90%;
      max-width: 400px;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }
    button {
      background: #00ffaa;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    a { color: #4da3ff; }
  </style>
</head>
<body>
  <h1>🔥 Upload Your Work 🔥</h1>
  <p id="welcome"></p>

  <form id="uploadForm">
    <input id="artistName" type="text" placeholder="Artist Name" required />
    <input id="fileInput" type="file" accept="image/*" required />

    <select id="category">
      <option value="Tattoo">Tattoo</option>
      <option value="Art">Art</option>
      <option value="3D Print">3D Print</option>
    </select>

    <button type="submit">Upload</button>
  </form>

  <p id="status"></p>
  <a href="/gallery/index.html">View Gallery</a>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "REPLACE_WITH_YOUR_REAL_ANON_KEY";
    const BUCKET = "Artist-uploads";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function loadUser() {
      const { data: authData } = await supabase.auth.getUser();
      currentUser = authData.user;

      if (!currentUser) {
        window.location.href = "/auth.html";
        return;
      }

      const { data: profile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

      document.getElementById("artistName").value =
        profile?.display_name || profile?.username || "";
      document.getElementById("welcome").textContent = `Logged in as ${currentUser.email}`;
    }

    async function handleUpload(e) {
      e.preventDefault();

      const artist = document.getElementById("artistName").value.trim();
      const category = document.getElementById("category").value;
      const file = document.getElementById("fileInput").files[0];
      const status = document.getElementById("status");

      if (!artist || !file || !currentUser) {
        status.textContent = "Missing info";
        return;
      }

      status.textContent = "Uploading...";

      const filePath = `${Date.now()}-${file.name}`;

      const { error: uploadError } = await supabase.storage
        .from(BUCKET)
        .upload(filePath, file);

      if (uploadError) {
        status.textContent = "Upload failed: " + uploadError.message;
        return;
      }

      const { data } = supabase.storage.from(BUCKET).getPublicUrl(filePath);
      const imageUrl = data.publicUrl;

      const { error: dbError } = await supabase
        .from("uploads")
        .insert([
          {
            user_id: currentUser.id,
            artist,
            category,
            image_url: imageUrl,
            likes: 0
          }
        ]);

      if (dbError) {
        status.textContent = "Database error: " + dbError.message;
        return;
      }

      status.innerHTML = `
        ✅ Upload complete!<br><br>
        <a href="${imageUrl}" target="_blank">View Image</a><br><br>
        <a href="/gallery/index.html">Go to Gallery</a>
      `;
    }

    document.getElementById("uploadForm").addEventListener("submit", handleUpload);
    loadUser();
  </script>
</body>
</html>
