<!DOCTYPE html>
<html>
<head>
  <title>Upload — Rich Bizness</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/motion.css" />
  <link rel="stylesheet" href="/styles/upload.css" />

  <style>
    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
    }

    /* 🌌 BACKGROUND */
    .upload-bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
        url("/images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png") center / cover no-repeat;
      z-index:0;
    }

    /* 🌫 SMOKE */
    .smoke-layer{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
    }

    .smoke-layer::before,
    .smoke-layer::after{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      background:radial-gradient(circle, rgba(0,255,156,0.18), transparent 70%);
      filter:blur(80px);
      animation:smokeFloat 18s linear infinite;
    }

    .smoke-layer::after{
      left:60%;
      animation-duration:26s;
    }

    @keyframes smokeFloat{
      0%{transform:translateY(80px);opacity:0}
      20%{opacity:.4}
      50%{transform:translateY(-200px);opacity:.2}
      100%{transform:translateY(-420px);opacity:0}
    }

    /* ✨ PARTICLES */
    .particles span{
      position:absolute;
      width:4px;
      height:4px;
      background:#00ffcc;
      border-radius:50%;
      animation:floatUp linear infinite;
    }

    @keyframes floatUp{
      from{transform:translateY(100vh);opacity:0}
      to{transform:translateY(-10vh);opacity:1}
    }

    /* STAGE */
    #upload-root{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
    }

    .upload-stage{
      width:95vw;
      max-width:520px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;

      backdrop-filter:blur(10px);
      background:rgba(0,0,0,0.25);
      border-radius:20px;
      padding:16px;

      box-shadow:0 20px 60px rgba(0,0,0,0.7);
    }

    /* 🧿 AVATAR */
    .upload-avatar{
      position:fixed;
      top:120px;
      left:50%;
      transform:translateX(-50%);
      width:90px;
      height:90px;
      border-radius:50%;
      overflow:hidden;
      z-index:10;
      box-shadow:0 0 25px #00ffcc;

      animation:avatarFloat 3s ease-in-out infinite alternate;
    }

    .upload-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    @keyframes avatarFloat{
      from{transform:translate(-50%,0)}
      to{transform:translate(-50%,-12px)}
    }

    .upload-avatar::after{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,255,156,0.4), transparent 70%);
      filter:blur(20px);
      z-index:-1;
      animation:pulseGlow 3s infinite;
    }

    @keyframes pulseGlow{
      0%,100%{opacity:.4; transform:scale(1)}
      50%{opacity:.8; transform:scale(1.2)}
    }

    /* PREVIEW */
    #upload-preview{
      position:relative;
      min-height:120px;
    }

    #upload-preview img,
    #upload-preview video{
      max-width:100%;
      border-radius:12px;
      box-shadow:0 0 25px rgba(0,255,156,0.3);
    }

    /* ABSORB */
    .absorb{
      position:fixed !important;
      z-index:20;
      animation:absorbToAvatar .8s forwards;
    }

    @keyframes absorbToAvatar{
      0%{transform:scale(1);opacity:1}
      100%{transform:scale(.1) translate(0,-300px);opacity:0}
    }

    .avatar-pulse{
      animation:avatarPulse .5s;
    }

    @keyframes avatarPulse{
      0%{box-shadow:0 0 20px #00ffcc}
      50%{box-shadow:0 0 80px #00ffcc}
      100%{box-shadow:0 0 20px #00ffcc}
    }

  </style>
</head>

<body>

  <div class="upload-bg"></div>
  <div class="smoke-layer"></div>
  <div class="particles" id="particles"></div>

  <div class="upload-avatar" id="avatar">
    <img id="avatar-img" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
  </div>

  <div id="upload-root">
    <div class="upload-stage" id="upload-stage"></div>
  </div>

  <script>
    window.NEXT_PUBLIC_SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";
  </script>

  <script type="module">

    import { mountUploadUI } from "/core/features/upload/upload-ui.js";
    import { getAvatar } from "/core/features/avatar/avatar-state.js";

    const stage = document.getElementById("upload-stage");
    mountUploadUI(stage);

    (async () => {
      const avatar = await getAvatar();
      if (avatar) {
        document.getElementById("avatar-img").src = avatar;
      }
    })();

    const avatarEl = document.getElementById("avatar");

    const container = document.getElementById("particles");
    for (let i = 0; i < 40; i++) {
      const p = document.createElement("span");
      p.style.left = Math.random() * 100 + "%";
      p.style.animationDuration = (8 + Math.random() * 6) + "s";
      container.appendChild(p);
    }

    let currentPreview = null;

    document.addEventListener("change",(e)=>{
      if(e.target.id === "upload-input"){
        setTimeout(()=>{
          const preview = document.querySelector("#upload-preview img, #upload-preview video");
          if(preview){
            currentPreview = preview;
          }
        },100);
      }
    });

    document.addEventListener("click",(e)=>{
      if(e.target.id === "run-upload" && currentPreview){

        const rect = currentPreview.getBoundingClientRect();

        const clone = currentPreview.cloneNode(true);
        clone.style.position = "fixed";
        clone.style.left = rect.left + "px";
        clone.style.top = rect.top + "px";
        clone.style.width = rect.width + "px";
        clone.style.height = rect.height + "px";

        document.body.appendChild(clone);

        requestAnimationFrame(()=>{
          clone.classList.add("absorb");
          avatarEl.classList.add("avatar-pulse");
        });

        setTimeout(()=>{
          clone.remove();
          avatarEl.classList.remove("avatar-pulse");
        },800);
      }
    });

  </script>

</body>
</html>
