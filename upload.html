<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload | Rich Bizness LLC</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .brand {
      font-size: 28px;
      font-weight: 900;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-links a {
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }

    .panel {
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #d4d4d8;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      background: #111;
      color: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #22c55e;
      color: #000;
    }

    .btn-secondary {
      background: #27272a;
      color: #fff;
    }

    .status {
      margin-top: 16px;
      min-height: 22px;
      color: #a1a1aa;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .preview-box {
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 18px;
    }

    .preview-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #090909;
    }

    .preview-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #71717a;
      background: #090909;
      text-align: center;
      padding: 20px;
    }

    .preview-meta {
      padding: 16px;
    }

    .preview-meta h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .saved-list {
      display: grid;
      gap: 12px;
    }

    .saved-item {
      padding: 14px;
      border-radius: 16px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">RICH BIZNESS UPLOAD</div>
      <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/artist/">Artist</a>
        <a href="/gallery/">Gallery</a>
        <a href="/live.html">Live</a>
        <a href="/profile.html">Profile</a>
        <a href="/auth.html">Auth</a>
      </nav>
    </div>

    <section class="layout">
      <section class="panel">
        <h2>Upload Artwork</h2>

        <div class="field">
          <label for="artistName">Artist Name</label>
          <input id="artistName" type="text" placeholder="Enter artist name" />
        </div>

        <div class="field">
          <label for="artTitle">Artwork Title</label>
          <input id="artTitle" type="text" placeholder="Enter artwork title" />
        </div>

        <div class="field">
          <label for="artCategory">Category</label>
          <select id="artCategory">
            <option value="digital">Digital</option>
            <option value="painting">Painting</option>
            <option value="photography">Photography</option>
            <option value="3d">3D</option>
            <option value="streetwear">Streetwear</option>
          </select>
        </div>

        <div class="field">
          <label for="artDescription">Description</label>
          <textarea id="artDescription" placeholder="Tell people about the artwork"></textarea>
        </div>

        <div class="field">
          <label for="artPrice">Price</label>
          <input id="artPrice" type="text" placeholder="$200 or Contact for price" />
        </div>

        <div class="field">
          <label for="artImageFile">Upload Image File</label>
          <input id="artImageFile" type="file" accept="image/*" />
        </div>

        <div class="field">
          <label for="artImageUrl">Or Paste Image URL</label>
          <input id="artImageUrl" type="url" placeholder="https://example.com/image.png" />
        </div>

        <div class="actions">
          <button id="submitBtn" class="btn btn-primary" type="button">Upload & Save Artwork</button>
          <button id="clearBtn" class="btn btn-secondary" type="button">Clear Form</button>
        </div>

        <div id="status" class="status">Ready for upload.</div>
      </section>

      <aside class="panel">
        <h2>Live Preview</h2>

        <div class="preview-box">
          <div id="previewMedia"></div>
          <div class="preview-meta">
            <h3 id="previewTitle">Untitled Artwork</h3>
            <p id="previewArtist">By Unknown Artist</p>
            <p id="previewDescription">Your artwork preview will appear here.</p>
          </div>
        </div>

        <h2>Recent Uploads</h2>
        <div id="savedList" class="saved-list"></div>
      </aside>
    </section>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";
    const DEFAULT_IMAGE = "/images/19FB5229-30DD-40B0-9404-5136C27FEF6A.png";
    const BUCKET = "Artist-uploads";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const artistNameEl = document.getElementById("artistName");
    const artTitleEl = document.getElementById("artTitle");
    const artCategoryEl = document.getElementById("artCategory");
    const artDescriptionEl = document.getElementById("artDescription");
    const artPriceEl = document.getElementById("artPrice");
    const artImageFileEl = document.getElementById("artImageFile");
    const artImageUrlEl = document.getElementById("artImageUrl");
    const statusEl = document.getElementById("status");
    const previewMediaEl = document.getElementById("previewMedia");
    const previewTitleEl = document.getElementById("previewTitle");
    const previewArtistEl = document.getElementById("previewArtist");
    const previewDescriptionEl = document.getElementById("previewDescription");
    const savedListEl = document.getElementById("savedList");

    let localPreviewData = "";
    let uploadedPublicUrl = "";

    async function syncUser() {
      const { data: { session } } = await supabase.auth.getSession();

      if (session?.user?.email) {
        const email = session.user.email;
        const username = email.split("@")[0];
        localStorage.setItem("username", username);
        localStorage.setItem("userEmail", email);
        localStorage.setItem("isLoggedIn", "true");
        if (!artistNameEl.value) artistNameEl.value = username;
      } else {
        const localUser = localStorage.getItem("username");
        if (localUser && !artistNameEl.value) artistNameEl.value = localUser;
      }
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function getUploads() {
      try {
        const raw = localStorage.getItem("artistUploads");
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveUploads(items) {
      localStorage.setItem("artistUploads", JSON.stringify(items));
    }

    function safeImage(src) {
      return src || DEFAULT_IMAGE;
    }

    function renderSavedList() {
      const uploads = getUploads();

      if (!uploads.length) {
        savedListEl.innerHTML = `<div class="saved-item">No uploads yet</div>`;
        return;
      }

      savedListEl.innerHTML = uploads.slice().reverse().slice(0, 5).map(item => `
        <div class="saved-item">
          <strong>${item.title || "Untitled Artwork"}</strong>
          <div>${item.artist || "Unknown Artist"} · ${item.category || "digital"}</div>
        </div>
      `).join("");
    }

    function renderPreview() {
      const title = artTitleEl.value.trim() || "Untitled Artwork";
      const artist = artistNameEl.value.trim() || "Unknown Artist";
      const description = artDescriptionEl.value.trim() || "Your artwork preview will appear here.";
      const image = safeImage(uploadedPublicUrl || artImageUrlEl.value.trim() || localPreviewData);

      previewTitleEl.textContent = title;
      previewArtistEl.textContent = `By ${artist}`;
      previewDescriptionEl.textContent = description;

      if (uploadedPublicUrl || artImageUrlEl.value.trim() || localPreviewData) {
        previewMediaEl.innerHTML = `<img class="preview-image" src="${image}" alt="${title}">`;
      } else {
        previewMediaEl.innerHTML = `<div class="preview-placeholder">Upload an image or paste a URL to preview.</div>`;
      }
    }

    function readLocalPreview(file) {
      if (!file) {
        localPreviewData = "";
        renderPreview();
        return;
      }

      const reader = new FileReader();
      reader.onload = (event) => {
        localPreviewData = event.target.result;
        uploadedPublicUrl = "";
        artImageUrlEl.value = "";
        renderPreview();
        setStatus("Preview loaded. Tap upload to send file to Supabase.");
      };
      reader.readAsDataURL(file);
    }

    async function uploadFileToSupabase(file) {
      const cleanedName = file.name.replace(/[^a-zA-Z0-9._-]/g, "-");
      const filePath = `artwork-${Date.now()}-${cleanedName}`;

      const { error } = await supabase.storage
        .from(BUCKET)
        .upload(filePath, file, { cacheControl: "3600", upsert: false });

      if (error) throw error;

      const { data } = supabase.storage.from(BUCKET).getPublicUrl(filePath);
      return data.publicUrl;
    }

    async function saveArtwork() {
      try {
        await syncUser();

        const artist = artistNameEl.value.trim() || localStorage.getItem("username") || "Unknown Artist";
        const title = artTitleEl.value.trim();
        const category = artCategoryEl.value;
        const description = artDescriptionEl.value.trim();
        const price = artPriceEl.value.trim() || "Contact for price";
        const file = artImageFileEl.files[0];
        let image = artImageUrlEl.value.trim();

        if (!title) {
          setStatus("Artwork title is required.");
          return;
        }

        if (file) {
          setStatus("Uploading file to Supabase...");
          image = await uploadFileToSupabase(file);
          uploadedPublicUrl = image;
        } else if (!image) {
          image = DEFAULT_IMAGE;
        }

        const uploads = getUploads();
        uploads.push({
          artist,
          title,
          category,
          description,
          price,
          image,
          createdAt: new Date().toISOString(),
          date: new Date().toISOString().slice(0, 10)
        });

        saveUploads(uploads);
        setStatus("Artwork uploaded and saved.");
        renderSavedList();
        renderPreview();
        artImageFileEl.value = "";
        localPreviewData = "";
      } catch (err) {
        console.error(err);
        setStatus("Upload failed: " + err.message);
      }
    }

    function clearForm() {
      artistNameEl.value = "";
      artTitleEl.value = "";
      artCategoryEl.value = "digital";
      artDescriptionEl.value = "";
      artPriceEl.value = "";
      artImageFileEl.value = "";
      artImageUrlEl.value = "";
      localPreviewData = "";
      uploadedPublicUrl = "";
      setStatus("Form cleared.");
      renderPreview();
      syncUser();
    }

    [
      artistNameEl,
      artTitleEl,
      artCategoryEl,
      artDescriptionEl,
      artPriceEl,
      artImageUrlEl
    ].forEach(el => {
      el.addEventListener("input", renderPreview);
      el.addEventListener("change", renderPreview);
    });

    artImageFileEl.addEventListener("change", (event) => {
      readLocalPreview(event.target.files[0]);
    });

    document.getElementById("submitBtn").addEventListener("click", saveArtwork);
    document.getElementById("clearBtn").addEventListener("click", clearForm);

    await syncUser();
    renderPreview();
    renderSavedList();
  </script>
</body>
</html>
