<!DOCTYPE html>
<html>
<head>
  <title>Upload - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-top: 20px;
    }

    input, select, button {
      width: 90%;
      max-width: 400px;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #00ffaa;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    a {
      color: #4da3ff;
      display: inline-block;
      margin-top: 20px;
    }
  </style>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const BUCKET = "Artist-uploads";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleUpload(e) {
      e.preventDefault();

      const artist = document.getElementById("artistName").value.trim();
      const category = document.getElementById("category").value;
      const file = document.getElementById("fileInput").files[0];
      const status = document.getElementById("status");

      if (!artist || !file) {
        status.textContent = "Please fill everything out";
        return;
      }

      status.textContent = "Uploading...";

      const filePath = `${Date.now()}-${file.name}`;

      // Upload to storage
      const { error: uploadError } = await supabase.storage
        .from(BUCKET)
        .upload(filePath, file);

      if (uploadError) {
        status.textContent = "Upload failed: " + uploadError.message;
        return;
      }

      // Get public URL
      const { data } = supabase.storage
        .from(BUCKET)
        .getPublicUrl(filePath);

      const imageUrl = data.publicUrl;

      // Save to database
      const { error: dbError } = await supabase
        .from("uploads")
        .insert([
          {
            artist: artist,
            category: category,
            image_url: imageUrl,
            likes: 0
          }
        ]);

      if (dbError) {
        status.textContent = "Database error: " + dbError.message;
        return;
      }

      status.innerHTML = `
        ✅ Upload complete!<br><br>
        <a href="${imageUrl}" target="_blank">View Image</a><br><br>
        <a href="/gallery/index.html">Go to Gallery</a>
      `;
    }

    window.addEventListener("DOMContentLoaded", () => {
      document
        .getElementById("uploadForm")
        .addEventListener("submit", handleUpload);
    });
  </script>
</head>

<body>

  <h1>🔥 Upload Your Work 🔥</h1>
  <p>Show your tattoos, art, and 3D prints</p>

  <form id="uploadForm">

    <input
      id="artistName"
      type="text"
      placeholder="Artist Name"
      required
    />

    <input
      id="fileInput"
      type="file"
      accept="image/*"
      required
    />

    <select id="category">
      <option value="Tattoo">Tattoo</option>
      <option value="Art">Art</option>
      <option value="3D Print">3D Print</option>
    </select>

    <button type="submit">Upload</button>

  </form>

  <p id="status"></p>

  <a href="/gallery/index.html">View Gallery</a>

</body>
</html>
