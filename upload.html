<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Capital — Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/upload.css" />
</head>

<body>

<!-- BACKGROUND -->
<div class="upload-bg"></div>
<div class="smoke-layer"></div>

<div class="particles">
  <span style="left:10%"></span>
  <span style="left:30%"></span>
  <span style="left:50%"></span>
  <span style="left:70%"></span>
  <span style="left:90%"></span>
</div>

<!-- NAV -->
<div id="elite-platform-nav"></div>

<!-- MAIN WRAPPER -->
<div class="upload-wrapper">

  <div class="upload-card">

    <!-- HEADER -->
    <h1 class="upload-title">🚀 Upload Capital</h1>
    <p class="upload-sub">Create. Upload. Monetize. Control Everything.</p>

    <!-- CATEGORY HUB -->
    <div class="upload-hub">
      <button onclick="setType('music')">🎵 Music</button>
      <button onclick="setType('podcast')">🎙 Podcast</button>
      <button onclick="setType('gaming')">🎮 Gaming</button>
      <button onclick="setType('sports')">🏈 Sports</button>
      <button onclick="setType('art')">🎨 Art</button>
      <button onclick="setType('metaverse')">🌐 Metaverse</button>
      <button onclick="setType('receipt')">💳 Receipt</button>
    </div>

    <!-- PREVIEW PANEL -->
    <div class="preview-panel">
      <p id="preview-label">Preview</p>

      <audio id="audio-preview" controls style="display:none;"></audio>
      <video id="video-preview" controls style="display:none;"></video>
      <img id="image-preview" style="display:none;" />
    </div>

    <!-- FORM -->
    <form id="upload-form">

      <input id="title" placeholder="Title" required />
      <input id="subtitle" placeholder="Artist / Creator" />
      <input id="category" placeholder="Category / Genre" />

      <label>Main File</label>
      <input type="file" id="main-file" required />

      <label>Cover / Thumbnail</label>
      <input type="file" id="cover-file" />

      <button class="upload-btn">UPLOAD 🔥</button>

    </form>

    <!-- STATUS -->
    <div id="upload-status"></div>

  </div>

</div>

<script type="module" src="/core/pages/upload.js"></script>

<script>
// =========================
// LIVE PREVIEW ENGINE 🔥
// =========================

const fileInput = document.getElementById("main-file");

const audioPreview = document.getElementById("audio-preview");
const videoPreview = document.getElementById("video-preview");
const imagePreview = document.getElementById("image-preview");

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  // RESET
  audioPreview.style.display = "none";
  videoPreview.style.display = "none";
  imagePreview.style.display = "none";

  // DETECT TYPE
  if (file.type.startsWith("audio")) {
    audioPreview.src = url;
    audioPreview.style.display = "block";
  }
  else if (file.type.startsWith("video")) {
    videoPreview.src = url;
    videoPreview.style.display = "block";
  }
  else if (file.type.startsWith("image")) {
    imagePreview.src = url;
    imagePreview.style.display = "block";
  }
});
</script>

</body>
</html>
