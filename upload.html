<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Music — Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/styles/main.css" />
</head>

<body>

<div id="elite-platform-nav"></div>

<div class="page-shell">
  <h1>🎵 Upload Track</h1>

  <form id="upload-form">
    <input type="text" id="title" placeholder="Track Title" required />
    <input type="text" id="artist" placeholder="Artist Name" required />
    <input type="text" id="genre" placeholder="Genre" />

    <label>Audio File</label>
    <input type="file" id="audio" accept="audio/*" required />

    <label>Cover Image</label>
    <input type="file" id="cover" accept="image/*" />

    <button type="submit">UPLOAD 🔥</button>
  </form>

  <div id="upload-status"></div>

  <audio id="preview-player" controls style="display:none;"></audio>
</div>

<script type="module" src="/core/pages/upload.js"></script>

</body>
</html>
