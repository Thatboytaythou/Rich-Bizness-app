<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Hub | Rich Bizness</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
  url("images/brand/logo-music-label.png") center/cover no-repeat fixed;
}

.page { max-width:1400px; margin:auto; padding:20px; }

h1 { color:#7dff71; font-size:3rem; }

.tabs { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.tab {
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  background:#111;
  border:1px solid #333;
}
.tab.active { background:#7dff71; color:black; }

.panel {
  background:#111;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #333;
  background:black;
  color:white;
}

button {
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-green { background:#7dff71; color:black; }
.btn-dark { background:#222; color:white; }

.dropzone {
  border:2px dashed #7dff71;
  padding:30px;
  text-align:center;
  border-radius:16px;
  margin-top:10px;
}

.preview img, .preview video {
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.status { margin-top:10px; }
</style>
</head>

<body>
<div class="page">

<h1>Upload Hub 🚀</h1>
<div id="status" class="status">Loading...</div>

<div class="tabs">
  <div class="tab active" data-type="art">Artwork</div>
  <div class="tab" data-type="music">Music</div>
  <div class="tab" data-type="gaming">Gaming</div>
  <div class="tab" data-type="sports">Sports</div>
</div>

<div class="panel">

<input id="title" placeholder="Title">

<input id="extra1" placeholder="Extra Field 1">
<input id="extra2" placeholder="Extra Field 2">

<textarea id="desc" placeholder="Description"></textarea>

<div class="dropzone" id="dropzone">
  Drop file here or click
  <input type="file" id="file" style="display:none;">
</div>

<div class="preview" id="preview"></div>

<button class="btn-green" id="uploadBtn">UPLOAD 🚀</button>
<button class="btn-dark" id="clearBtn">CLEAR</button>

</div>

<div class="panel">
<h2>Recent Uploads</h2>
<div id="recent"></div>
</div>

</div>

<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentType = "art";
let file = null;
let user = null;

const statusBox = document.getElementById("status");

function setStatus(msg){ statusBox.textContent = msg; }

async function checkUser(){
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if(!user){
    setStatus("Redirecting...");
    location.href="auth.html";
  } else {
    setStatus("Ready");
  }
}

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    currentType=t.dataset.type;
  }
});

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");

dropzone.onclick=()=>fileInput.click();

fileInput.onchange=(e)=>{
  file = e.target.files[0];
  showPreview();
};

dropzone.ondrop=(e)=>{
  e.preventDefault();
  file = e.dataTransfer.files[0];
  showPreview();
};

dropzone.ondragover=(e)=>e.preventDefault();

function showPreview(){
  const preview=document.getElementById("preview");
  preview.innerHTML="";
  if(!file) return;

  const url=URL.createObjectURL(file);

  if(file.type.includes("video")){
    preview.innerHTML=`<video controls src="${url}"></video>`;
  } else {
    preview.innerHTML=`<img src="${url}">`;
  }
}

async function upload(){
  try{
    if(!file) throw "No file";

    setStatus("Uploading...");

    const path = `${user.id}/${Date.now()}-${file.name}`;

    let bucket = {
      art:"artwork",
      music:"music-files",
      gaming:"gaming-media",
      sports:"sports-media"
    }[currentType];

    await supabase.storage.from(bucket).upload(path,file);

    const { data } = supabase.storage.from(bucket).getPublicUrl(path);

    let table = {
      art:"artworks",
      music:"music_tracks",
      gaming:"gaming_posts",
      sports:"sports_posts"
    }[currentType];

    await supabase.from(table).insert({
      user_id:user.id,
      title:document.getElementById("title").value,
      description:document.getElementById("desc").value,
      media_url:data.publicUrl
    });

    setStatus("UPLOAD COMPLETE 🔥");
    loadRecent();

  }catch(e){
    setStatus("ERROR: "+e);
  }
}

async function loadRecent(){
  const tableMap={
    art:"artworks",
    music:"music_tracks",
    gaming:"gaming_posts",
    sports:"sports_posts"
  };

  const { data } = await supabase
    .from(tableMap[currentType])
    .select("*")
    .eq("user_id",user.id)
    .limit(5);

  document.getElementById("recent").innerHTML =
    data?.map(x=>`<div>${x.title}</div>`).join("") || "None";
}

document.getElementById("uploadBtn").onclick=upload;
document.getElementById("clearBtn").onclick=()=>location.reload();

checkUser();
</script>
</body>
</html>
