<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Work - Rich Bizness LLC</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(15, 15, 15, 0.92);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #a8a8a8;
      --primary: #19e68c;
      --primary-dark: #11c775;
      --danger: #ff5a67;
      --input: #ececec;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 680px;
      position: relative;
    }

    .glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(25,230,140,0.18), transparent 55%);
      filter: blur(28px);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
      padding: 28px 22px 24px;
    }

    .toplink {
      display: inline-block;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .headline {
      margin: 0;
      font-size: 40px;
      line-height: 1.05;
      font-weight: 800;
      text-align: center;
    }

    .sub {
      margin: 12px 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
    }

    .field {
      text-align: left;
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 8px 4px;
      font-weight: 600;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 16px;
      background: var(--input);
      color: #111;
      outline: none;
    }

    .textarea {
      min-height: 110px;
      resize: vertical;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      box-shadow: 0 0 0 3px rgba(25,230,140,0.28);
    }

    .filebox {
      background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px;
    }

    .filebox input[type="file"] {
      width: 100%;
      color: white;
      font-size: 15px;
    }

    .preview {
      margin-top: 14px;
      display: none;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .preview img,
    .preview video {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .cta {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 8px;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
      box-shadow: 0 16px 34px rgba(25,230,140,0.22);
    }

    .cta:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      min-height: 26px;
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 600;
      text-align: center;
      white-space: pre-wrap;
    }

    .message.ok {
      color: var(--primary);
    }

    .message.err {
      color: var(--danger);
    }

    .footer {
      padding-top: 18px;
      text-align: center;
    }

    .ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 13px 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      color: #8ecbff;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.07);
      margin: 0 6px;
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .headline {
        font-size: 32px;
      }

      .card {
        padding: 24px 16px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="glow"></div>

    <div class="card">
      <a class="toplink" href="/index.html">← Home</a>

      <h1 class="headline">🔥 Upload Your Work 🔥</h1>
      <p class="sub">Post images or videos to your artist page and public gallery.</p>

      <div class="field">
        <label class="label" for="artistName">Artist Name</label>
        <input id="artistName" class="input" type="text" placeholder="Artist Name" />
      </div>

      <div class="field">
        <label class="label" for="category">Category</label>
        <select id="category" class="select">
          <option value="Tattoo">Tattoo</option>
          <option value="Art">Art</option>
          <option value="3D Print">3D Print</option>
          <option value="Video">Video</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="caption">Caption</label>
        <textarea id="caption" class="textarea" placeholder="Say something about this post..."></textarea>
      </div>

      <div class="field">
        <label class="label" for="fileInput">Choose Image or Video</label>
        <div class="filebox">
          <input id="fileInput" type="file" accept="image/*,video/*" />
          <div id="preview" class="preview"></div>
        </div>
      </div>

      <button id="uploadBtn" class="cta" type="button">Upload</button>

      <div id="msg" class="message"></div>

      <div class="footer">
        <a class="ghost" href="/profile.html">My Profile</a>
        <a class="ghost" href="/gallery/index.html">View Gallery</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const BUCKET = "Artist-uploads";

    const artistNameInput = document.getElementById("artistName");
    const categoryInput = document.getElementById("category");
    const captionInput = document.getElementById("caption");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const msg = document.getElementById("msg");
    const preview = document.getElementById("preview");

    function setMsg(text, error = false) {
      msg.textContent = text;
      msg.className = "message " + (error ? "err" : "ok");
    }

    function setLoading(on) {
      uploadBtn.disabled = on;
      uploadBtn.textContent = on ? "Uploading..." : "Upload";
    }

    function getMediaType(file) {
      if (!file) return null;
      if (file.type.startsWith("image/")) return "image";
      if (file.type.startsWith("video/")) return "video";
      return "file";
    }

    function showPreview(file) {
      preview.innerHTML = "";
      preview.style.display = "none";

      if (!file) return;

      const mediaType = getMediaType(file);
      const url = URL.createObjectURL(file);

      if (mediaType === "image") {
        const img = document.createElement("img");
        img.src = url;
        img.alt = "Preview";
        preview.appendChild(img);
        preview.style.display = "block";
      } else if (mediaType === "video") {
        const video = document.createElement("video");
        video.src = url;
        video.controls = true;
        video.muted = true;
        video.playsInline = true;
        preview.appendChild(video);
        preview.style.display = "block";
      }
    }

    fileInput.addEventListener("change", () => {
      showPreview(fileInput.files[0]);
    });

    async function getSessionUser() {
      const {
        data: { session },
        error
      } = await supabase.auth.getSession();

      if (error) throw error;
      return session?.user || null;
    }

    async function prefillArtistName() {
      try {
        const user = await getSessionUser();

        if (!user) {
          setMsg("Please log in first.", true);
          setTimeout(() => {
            window.location.href = "/auth.html";
          }, 900);
          return;
        }

        const { data: profile } = await supabase
          .from("profiles")
          .select("username, display_name")
          .eq("id", user.id)
          .maybeSingle();

        artistNameInput.value =
          profile?.display_name ||
          profile?.username ||
          user.email?.split("@")[0] ||
          "";
      } catch (err) {
        setMsg("Load failed: " + err.message, true);
      }
    }

    async function uploadWork() {
      try {
        const user = await getSessionUser();

        if (!user) {
          setMsg("Not logged in.", true);
          setTimeout(() => {
            window.location.href = "/auth.html";
          }, 900);
          return;
        }

        const artistName = artistNameInput.value.trim();
        const category = categoryInput.value;
        const caption = captionInput.value.trim();
        const file = fileInput.files[0];

        if (!artistName) {
          setMsg("Enter your artist name.", true);
          return;
        }

        if (!file) {
          setMsg("Select a file first.", true);
          return;
        }

        const mediaType = getMediaType(file);
        if (mediaType !== "image" && mediaType !== "video") {
          setMsg("Only image and video uploads are supported.", true);
          return;
        }

        setLoading(true);
        setMsg("Uploading...");

        const cleanName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        const filePath = `${user.id}/${Date.now()}-${cleanName}`;

        const { error: storageError } = await supabase.storage
          .from(BUCKET)
          .upload(filePath, file, {
            cacheControl: "3600",
            upsert: false,
            contentType: file.type
          });

        if (storageError) {
          setMsg("Storage error: " + storageError.message, true);
          return;
        }

        const { data: publicData } = supabase.storage
          .from(BUCKET)
          .getPublicUrl(filePath);

        const fileUrl = publicData.publicUrl;

        const payload = {
          user_id: user.id,
          artist_name: artistName,
          file_url: fileUrl,
          category: category,
          media_type: mediaType,
          caption: caption,
          likes: 0
        };

        let { error: insertError } = await supabase
          .from("uploads")
          .insert([payload]);

        if (insertError && insertError.message.includes("media_type")) {
          delete payload.media_type;
          ({ error: insertError } = await supabase.from("uploads").insert([payload]));
        }

        if (insertError && insertError.message.includes("caption")) {
          delete payload.caption;
          ({ error: insertError } = await supabase.from("uploads").insert([payload]));
        }

        if (insertError) {
          setMsg("Database error: " + insertError.message, true);
          return;
        }

        setMsg("Upload complete ✅");
        fileInput.value = "";
        captionInput.value = "";
        preview.innerHTML = "";
        preview.style.display = "none";

        setTimeout(() => {
          window.location.href = "/profile.html";
        }, 800);
      } catch (err) {
        setMsg("Load failed: " + err.message, true);
      } finally {
        setLoading(false);
      }
    }

    uploadBtn.addEventListener("click", uploadWork);

    await prefillArtistName();
  </script>
</body>
</html>
