<!DOCTYPE html>
<html>
<head>
  <title>Upload — Rich Bizness</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/motion.css" />
  <link rel="stylesheet" href="/styles/upload.css" />

  <style>
    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
    }

    /* 🎬 ROOT */
    #upload-root{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* 🎬 STAGE */
    .upload-stage{
      width:95vw;
      max-width:520px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
      z-index:5;
    }

    .upload-shell{
      width:100%;
      max-width:520px;
    }

    /* 🧿 AVATAR */
    .upload-avatar{
      position:fixed;
      top:120px;
      left:50%;
      transform:translateX(-50%);
      width:90px;
      height:90px;
      border-radius:50%;
      overflow:hidden;
      z-index:10;

      box-shadow:
        0 0 25px #00ffcc,
        0 0 60px rgba(0,255,200,.5);

      animation:avatarFloat 4s ease-in-out infinite;
      transition:.3s;
    }

    .upload-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    @keyframes avatarFloat{
      0%{transform:translate(-50%,0)}
      50%{transform:translate(-50%,-10px)}
      100%{transform:translate(-50%,0)}
    }

    /* ⚡ AVATAR REACTIONS */
    .upload-avatar.active{
      transform:translate(-50%,-10px) scale(1.1);
      box-shadow:
        0 0 40px #00ffcc,
        0 0 100px rgba(0,255,200,.8);
    }

    /* 🔊 VOICE TEXT */
    .upload-voice{
      position:fixed;
      top:230px;
      left:50%;
      transform:translateX(-50%);
      color:#00ffcc;
      font-size:14px;
      opacity:0;
      transition:.3s;
      z-index:10;
    }

    .upload-voice.show{
      opacity:1;
    }

    /* 🔥 PREVIEW FIX */
    #upload-preview img,
    #upload-preview video{
      max-width:100%;
      border-radius:12px;
    }

  </style>
</head>

<body>

  <!-- 🌫 BACKGROUND -->
  <div class="upload-bg"></div>
  <div class="smoke-layer"></div>
  <div class="particles" id="particles"></div>

  <!-- 🧿 AVATAR -->
  <div class="upload-avatar" id="upload-avatar">
    <img id="upload-avatar-img" src="/images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
  </div>

  <!-- 🔊 VOICE -->
  <div class="upload-voice" id="upload-voice"></div>

  <!-- 🎬 MAIN -->
  <div id="upload-root">
    <div class="upload-stage" id="upload-stage"></div>
  </div>

  <script>
    window.NEXT_PUBLIC_SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";
  </script>

  <script type="module">

    import { mountUploadUI } from "/core/features/upload/upload-ui.js";
    import { getAvatar } from "/core/features/avatar/avatar-state.js";

    const stage = document.getElementById("upload-stage");
    mountUploadUI(stage);

    /* 🔥 LOAD REAL USER AVATAR */
    (async () => {
      const avatar = await getAvatar();
      if (avatar) {
        document.getElementById("upload-avatar-img").src = avatar;
      }
    })();

    /* 🔊 VOICE SYSTEM */
    const voice = document.getElementById("upload-voice");
    const avatarEl = document.getElementById("upload-avatar");

    function speak(text){
      voice.innerText = text;
      voice.classList.add("show");

      const speech = new SpeechSynthesisUtterance(text);
      speech.rate = 1;
      speech.pitch = 1.1;
      speechSynthesis.speak(speech);

      setTimeout(()=>{
        voice.classList.remove("show");
      },2000);
    }

    /* 🔥 REACT TO FILE SELECT */
    document.addEventListener("change",(e)=>{
      if(e.target.id === "upload-input"){
        avatarEl.classList.add("active");
        speak("File loaded. Ready to upload.");

        setTimeout(()=>avatarEl.classList.remove("active"),1000);
      }
    });

    /* 🚀 REACT TO RUN IT UP */
    document.addEventListener("click",(e)=>{
      if(e.target.id === "run-upload"){
        avatarEl.classList.add("active");
        speak("Uploading now. Run it up.");

        setTimeout(()=>avatarEl.classList.remove("active"),1200);
      }
    });

    /* ✨ PARTICLES */
    const container = document.getElementById("particles");
    for (let i = 0; i < 40; i++) {
      const p = document.createElement("span");
      p.style.left = Math.random() * 100 + "%";
      p.style.animationDuration = (8 + Math.random() * 6) + "s";
      container.appendChild(p);
    }

  </script>

</body>
</html>
