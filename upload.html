<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Center — Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/styles/main.css" />
</head>

<body>
  <div class="upload-bg"></div>

<div id="elite-platform-nav"></div>

<div class="page-shell">

  <h1>🚀 Upload Center</h1>

  <!-- CATEGORY HUB -->
  <div class="upload-hub">
    <button onclick="setType('music')">🎵 Music</button>
    <button onclick="setType('gaming')">🎮 Gaming</button>
    <button onclick="setType('sports')">🏈 Sports</button>
    <button onclick="setType('art')">🎨 Art</button>
    <button onclick="setType('podcast')">🎙 Podcast</button>
    <button onclick="setType('receipt')">💳 Receipt</button>
  </div>

  <!-- DYNAMIC FORM -->
  <form id="upload-form">

    <input id="title" placeholder="Title" required />
    <input id="subtitle" placeholder="Artist / Creator" />
    <input id="category" placeholder="Category" />

    <label>Main File</label>
    <input type="file" id="main-file" required />

    <label>Thumbnail / Cover</label>
    <input type="file" id="cover-file" />

    <button type="submit">UPLOAD 🔥</button>

  </form>

  <div id="upload-status"></div>

</div>

<script type="module" src="/core/pages/upload.js"></script>

</body>
</html>
