<!DOCTYPE html>
<html>
<head>
  <title>Upload Your Work - Rich Bizness LLC</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

  <h1>🔥 Upload Your Work 🔥</h1>
  <p>Show your tattoos, art, and 3D prints</p>

  <form>
    <input type="text" placeholder="Artist Name" required><br><br>

    <input type="file" accept="image/*"><br><br>

    <select>
      <option>Tattoo</option>
      <option>3D Print</option>
      <option>Art</option>
    </select><br><br>

    <button type="submit">Upload</button>
  </form>

</body>
</html>
