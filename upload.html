<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload - Rich Bizness LLC</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(15, 15, 15, 0.9);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #a8a8a8;
      --primary: #19e68c;
      --primary-dark: #11c775;
      --danger: #ff5a67;
      --input: #ececec;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,0.07), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 620px;
      position: relative;
    }

    .glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(25,230,140,0.16), transparent 55%);
      filter: blur(30px);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
      padding: 28px 22px 24px;
    }

    .toplink {
      display: inline-block;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.05;
      text-align: center;
      font-weight: 800;
    }

    .sub {
      color: var(--muted);
      text-align: center;
      margin: 0 0 24px;
      font-size: 15px;
    }

    .field {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      margin: 0 0 8px 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .input,
    .select,
    .fileWrap,
    .btn {
      width: 100%;
      border-radius: 18px;
      border: none;
      font-size: 16px;
    }

    .input,
    .select {
      padding: 18px;
      background: var(--input);
      color: #111;
      outline: none;
    }

    .input:focus,
    .select:focus {
      box-shadow: 0 0 0 3px rgba(25,230,140,0.28);
    }

    .fileWrap {
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.14);
      padding: 16px;
    }

    input[type="file"] {
      width: 100%;
      color: #fff;
      font-size: 15px;
    }

    .btn {
      padding: 18px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
      box-shadow: 0 16px 34px rgba(25,230,140,0.22);
      margin-top: 8px;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      min-height: 26px;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      text-align: center;
      white-space: pre-wrap;
    }

    .ok {
      color: var(--primary);
    }

    .err {
      color: var(--danger);
    }

    .footerLink {
      text-align: center;
      margin-top: 18px;
    }

    .footerLink a {
      color: #8ecbff;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 24px 16px 20px;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="glow"></div>

    <div class="card">
      <a class="toplink" href="/index.html">← Home</a>

      <h1>🔥 Upload Your Work 🔥</h1>
      <p class="sub">Post your latest tattoo, art, or 3D print to your artist profile.</p>

      <div class="field">
        <label class="label" for="artistName">Artist Name</label>
        <input id="artistName" class="input" type="text" placeholder="Artist Name" />
      </div>

      <div class="field">
        <label class="label" for="fileInput">Choose Image</label>
        <div class="fileWrap">
          <input id="fileInput" type="file" accept="image/*" />
        </div>
      </div>

      <div class="field">
        <label class="label" for="category">Category</label>
        <select id="category" class="select">
          <option value="Tattoo">Tattoo</option>
          <option value="Art">Art</option>
          <option value="3D Print">3D Print</option>
        </select>
      </div>

      <button id="uploadBtn" class="btn" type="button">Upload</button>

      <div id="status" class="status"></div>

      <div class="footerLink">
        <a href="/gallery/index.html">View Gallery</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";
    const BUCKET = "ARTIST-UPLOADS";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const artistNameInput = document.getElementById("artistName");
    const fileInput = document.getElementById("fileInput");
    const categoryInput = document.getElementById("category");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusEl = document.getElementById("status");

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = "status " + (isError ? "err" : "ok");
    }

    function setButtonLoading(on) {
      uploadBtn.disabled = on;
      uploadBtn.textContent = on ? "Uploading..." : "Upload";
    }

    async function getCurrentUser() {
      const {
        data: { session },
        error
      } = await supabase.auth.getSession();

      if (error) {
        console.error(error);
        return null;
      }

      return session?.user || null;
    }

    async function loadArtistName() {
      setStatus("Checking login...");

      const user = await getCurrentUser();

      if (!user) {
        setStatus("Please log in first.", true);
        setTimeout(() => {
          window.location.href = "/auth.html";
        }, 900);
        return;
      }

      const { data: profile, error } = await supabase
        .from("profiles")
        .select("username, display_name")
        .eq("id", user.id)
        .maybeSingle();

      if (error) {
        console.error(error);
      }

      artistNameInput.value =
        profile?.display_name ||
        profile?.username ||
        user.email?.split("@")[0] ||
        "";

      setStatus("");
    }

    async function uploadWork() {
      const user = await getCurrentUser();

      if (!user) {
        setStatus("Auth error: Auth session missing!", true);
        setTimeout(() => {
          window.location.href = "/auth.html";
        }, 900);
        return;
      }

      const artistName = artistNameInput.value.trim();
      const category = categoryInput.value;
      const file = fileInput.files[0];

      if (!artistName) {
        setStatus("Enter your artist name.", true);
        return;
      }

      if (!file) {
        setStatus("Choose an image first.", true);
        return;
      }

      setButtonLoading(true);
      setStatus("Uploading...");

      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const filePath = `${user.id}/${Date.now()}-${safeName}`;

      const { error: storageError } = await supabase.storage
        .from(BUCKET)
        .upload(filePath, file, { upsert: false });

      if (storageError) {
        setButtonLoading(false);
        setStatus("Storage upload failed: " + storageError.message, true);
        return;
      }

      const { data: publicData } = supabase.storage
        .from(BUCKET)
        .getPublicUrl(filePath);

      const imageUrl = publicData.publicUrl;

      const { error: insertError } = await supabase
        .from("uploads")
        .insert([
          {
            artist: artistName,
            image_url: imageUrl,
            category: category,
            likes: 0,
            user_id: user.id
          }
        ]);

      setButtonLoading(false);

      if (insertError) {
        setStatus("Database save failed: " + insertError.message, true);
        return;
      }

      setStatus("Upload complete ✅");
      fileInput.value = "";

      setTimeout(() => {
        window.location.href = "/gallery/index.html";
      }, 1000);
    }

    uploadBtn.addEventListener("click", uploadWork);

    await loadArtistName();
  </script>
</body>
</html>
