<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Work - Rich Bizness LLC</title>
  <style>
    :root {
      --bg:#050505; --panel:rgba(15,15,15,.92); --border:rgba(255,255,255,.08);
      --text:#f5f5f5; --muted:#a8a8a8; --primary:#19e68c; --primary-dark:#11c775;
      --danger:#ff5a67; --input:#ececec;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; font-family:Arial,sans-serif; color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,.16), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .shell{width:100%;max-width:680px}
    .card{background:var(--panel); border:1px solid var(--border); border-radius:28px; padding:28px 22px 24px}
    .toplink{display:inline-block; color:var(--primary); text-decoration:none; margin-bottom:14px; font-weight:700}
    .headline{margin:0; font-size:40px; font-weight:800; text-align:center}
    .sub{margin:12px 0 22px; color:var(--muted); font-size:15px; line-height:1.5; text-align:center}
    .field{text-align:left; margin-bottom:14px}
    .label{display:block; font-size:13px; color:var(--muted); margin:0 0 8px 4px; font-weight:600}
    .input,.select,.textarea{width:100%; border:0; border-radius:18px; padding:18px; font-size:16px; background:var(--input); color:#111; outline:none}
    .textarea{min-height:110px; resize:vertical}
    .filebox{background:rgba(255,255,255,.05); border:1px dashed rgba(255,255,255,.12); border-radius:18px; padding:18px}
    .preview{margin-top:14px; display:none; border-radius:18px; overflow:hidden; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08)}
    .preview img,.preview video{width:100%; max-height:420px; object-fit:cover; display:block; background:#000}
    .cta{width:100%; border:0; border-radius:18px; padding:18px; font-size:18px; font-weight:800; cursor:pointer; margin-top:8px; background:linear-gradient(180deg, var(--primary), var(--primary-dark)); color:#000}
    .message{min-height:26px; margin-top:16px; font-size:15px; line-height:1.5; font-weight:600; text-align:center; white-space:pre-wrap}
    .message.ok{color:var(--primary)}
    .message.err{color:var(--danger)}
    .footer{padding-top:18px; text-align:center}
    .ghost{display:inline-flex; text-decoration:none; padding:13px 18px; border-radius:14px; background:rgba(255,255,255,.05); color:#8ecbff; font-size:15px; border:1px solid rgba(255,255,255,.07); margin:0 6px}
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <a class="toplink" href="/index.html">← Home</a>
      <h1 class="headline">🔥 Upload Your Work 🔥</h1>
      <p class="sub">Post images or videos to your artist page and public gallery.</p>

      <div class="field">
        <label class="label" for="artistName">Artist Name</label>
        <input id="artistName" class="input" type="text" />
      </div>

      <div class="field">
        <label class="label" for="category">Category</label>
        <select id="category" class="select">
          <option value="Tattoo">Tattoo</option>
          <option value="Art">Art</option>
          <option value="3D Print">3D Print</option>
          <option value="Video">Video</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="caption">Caption</label>
        <textarea id="caption" class="textarea"></textarea>
      </div>

      <div class="field">
        <label class="label" for="fileInput">Choose Image or Video</label>
        <div class="filebox">
          <input id="fileInput" type="file" accept="image/*,video/*" />
          <div id="preview" class="preview"></div>
        </div>
      </div>

      <button id="uploadBtn" class="cta" type="button">Upload</button>
      <div id="msg" class="message"></div>

      <div class="footer">
        <a class="ghost" href="/profile.html">My Profile</a>
        <a class="ghost" href="/gallery/index.html">View Gallery</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const BUCKET = "Artist-uploads";

    const artistNameInput = document.getElementById("artistName");
    const categoryInput = document.getElementById("category");
    const captionInput = document.getElementById("caption");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const msg = document.getElementById("msg");
    const preview = document.getElementById("preview");

    function setMsg(text, error = false) {
      msg.textContent = text;
      msg.className = "message " + (error ? "err" : "ok");
    }

    function setLoading(on) {
      uploadBtn.disabled = on;
      uploadBtn.textContent = on ? "Uploading..." : "Upload";
    }

    function getMediaType(file) {
      if (!file) return null;
      if (file.type.startsWith("image/")) return "image";
      if (file.type.startsWith("video/")) return "video";
      return "file";
    }

    function showPreview(file) {
      preview.innerHTML = "";
      preview.style.display = "none";
      if (!file) return;

      const mediaType = getMediaType(file);
      const url = URL.createObjectURL(file);

      if (mediaType === "image") {
        preview.innerHTML = `<img src="${url}" alt="Preview">`;
        preview.style.display = "block";
      } else if (mediaType === "video") {
        preview.innerHTML = `<video src="${url}" controls muted playsinline></video>`;
        preview.style.display = "block";
      }
    }

    fileInput.addEventListener("change", () => showPreview(fileInput.files[0]));

    async function getSessionUser() {
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error) throw error;
      return session?.user || null;
    }

    async function prefillArtistName() {
      try {
        const user = await getSessionUser();
        if (!user) {
          setMsg("Please log in first.", true);
          setTimeout(() => window.location.href = "/auth.html", 900);
          return;
        }

        const { data: profile } = await supabase
          .from("profiles")
          .select("username, display_name")
          .eq("id", user.id)
          .maybeSingle();

        artistNameInput.value =
          profile?.display_name ||
          profile?.username ||
          user.email?.split("@")[0] ||
          "";
      } catch (err) {
        setMsg("Load failed: " + err.message, true);
      }
    }

    async function uploadWork() {
      try {
        const user = await getSessionUser();
        if (!user) {
          setMsg("Not logged in.", true);
          setTimeout(() => window.location.href = "/auth.html", 900);
          return;
        }

        const artistName = artistNameInput.value.trim();
        const category = categoryInput.value;
        const caption = captionInput.value.trim();
        const file = fileInput.files[0];

        if (!artistName) return setMsg("Enter your artist name.", true);
        if (!file) return setMsg("Select a file first.", true);

        const mediaType = getMediaType(file);
        if (mediaType !== "image" && mediaType !== "video") {
          return setMsg("Only image and video uploads are supported.", true);
        }

        setLoading(true);
        setMsg("Uploading...");

        const cleanName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        const filePath = `${user.id}/${Date.now()}-${cleanName}`;

        const { error: storageError } = await supabase.storage
          .from(BUCKET)
          .upload(filePath, file, {
            cacheControl: "3600",
            upsert: false,
            contentType: file.type
          });

        if (storageError) return setMsg("Storage error: " + storageError.message, true);

        const { data: publicData } = supabase.storage.from(BUCKET).getPublicUrl(filePath);

        const payload = {
          user_id: user.id,
          artist_name: artistName,
          file_url: publicData.publicUrl,
          category,
          media_type: mediaType,
          caption,
          likes: 0
        };

        const { error: insertError } = await supabase.from("uploads").insert([payload]);
        if (insertError) return setMsg("Database error: " + insertError.message, true);

        setMsg("Upload complete ✅");
        fileInput.value = "";
        captionInput.value = "";
        preview.innerHTML = "";
        preview.style.display = "none";

        setTimeout(() => window.location.href = "/profile.html", 800);
      } catch (err) {
        setMsg("Load failed: " + err.message, true);
      } finally {
        setLoading(false);
      }
    }

    uploadBtn.addEventListener("click", uploadWork);
    await prefillArtistName();
  </script>
</body>
</html>
