<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Artwork | Rich Bizness</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial;background:#050505;color:#fff;min-height:100vh;padding:24px}
    a{text-decoration:none;color:inherit}
    .container{max-width:1150px;margin:0 auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
    .brand{font-size:34px;font-weight:900;color:#39ff14}
    .top-links{display:flex;gap:12px;flex-wrap:wrap}
    .top-links a{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:10px 16px;border-radius:12px;font-weight:700}
    .layout{display:grid;grid-template-columns:1fr 420px;gap:22px}
    .card{background:#0d0d0d;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px}
    h1,h2{color:#39ff14;margin-bottom:16px}
    .form-group{margin-bottom:14px}
    label{display:block;margin-bottom:8px;font-size:14px;font-weight:800}
    input,select,textarea{width:100%;background:#121212;color:#fff;border:1px solid #2b2b2b;border-radius:14px;padding:14px 16px;font-size:15px}
    textarea{min-height:130px;resize:vertical}
    .button-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
    button{border:none;border-radius:14px;padding:13px 18px;font-size:15px;font-weight:900;cursor:pointer}
    .btn-green{background:#39ff14;color:#000}
    .btn-dark{background:#1c1c1c;color:#fff}
    .preview-box{width:100%;aspect-ratio:1/1;border-radius:20px;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center}
    .preview-box img{width:100%;height:100%;object-fit:cover;display:none}
    .preview-placeholder{color:#bfbfbf;text-align:center;padding:20px}
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">Rich Bizness Upload</div>
    <div class="top-links">
      <a href="index.html">Home</a>
      <a href="gallery/index.html">Gallery</a>
      <a href="profile.html">Profile</a>
      <a href="sports.html">Sports</a>
      <a href="live.html">Go Live</a>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <h1>Upload Artwork</h1>
      <div class="form-group"><label>Artwork Title</label><input id="titleInput" type="text" /></div>
      <div class="form-group"><label>Artist Name</label><input id="artistNameInput" type="text" /></div>
      <div class="form-group">
        <label>Category</label>
        <select id="categoryInput">
          <option value="Painting">Painting</option>
          <option value="Drawing">Drawing</option>
          <option value="Digital Art">Digital Art</option>
          <option value="Photography">Photography</option>
          <option value="3D Printing">3D Printing</option>
          <option value="Custom Design">Custom Design</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group"><label>Price</label><input id="priceInput" type="number" min="0" step="0.01" /></div>
      <div class="form-group"><label>Description</label><textarea id="descriptionInput"></textarea></div>
      <div class="form-group"><label>Choose Image</label><input id="fileInput" type="file" accept="image/*" /></div>
      <div class="button-row">
        <button id="uploadBtn" class="btn-green">Upload Artwork</button>
        <button id="clearBtn" class="btn-dark" type="button">Clear</button>
      </div>
      <div id="statusBox"></div>
    </div>

    <div class="card">
      <h2>Preview</h2>
      <div class="preview-box">
        <img id="previewImage" alt="Artwork Preview" />
        <div id="previewPlaceholder" class="preview-placeholder">Your image preview will show here.</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
const STORAGE_BUCKET = "uploads";
const ARTWORK_TABLE = "artworks";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const titleInput = document.getElementById("titleInput");
const artistNameInput = document.getElementById("artistNameInput");
const categoryInput = document.getElementById("categoryInput");
const priceInput = document.getElementById("priceInput");
const descriptionInput = document.getElementById("descriptionInput");
const fileInput = document.getElementById("fileInput");
const previewImage = document.getElementById("previewImage");
const previewPlaceholder = document.getElementById("previewPlaceholder");
const statusBox = document.getElementById("statusBox");

function showStatus(msg){ statusBox.textContent = msg; }
function makePreview(file){
  if(!file){ previewImage.style.display="none"; previewPlaceholder.style.display="block"; return; }
  const reader = new FileReader();
  reader.onload = e => { previewImage.src = e.target.result; previewImage.style.display="block"; previewPlaceholder.style.display="none"; };
  reader.readAsDataURL(file);
}
function getSafeFileName(fileName){ return fileName.replace(/[^a-zA-Z0-9.\-_]/g, "_"); }
async function requireUser() {
  const { data, error } = await supabaseClient.auth.getUser();
  if (error || !data.user) { window.location.href = "auth.html"; return null; }
  return data.user;
}
async function uploadArtwork() {
  const user = await requireUser();
  if (!user) return;
  const file = fileInput.files[0];
  if (!titleInput.value.trim()) return showStatus("Please enter a title.");
  if (!artistNameInput.value.trim()) return showStatus("Please enter the artist name.");
  if (!file) return showStatus("Please choose an image file.");
  showStatus("Uploading artwork...");

  try {
    const originalName = getSafeFileName(file.name);
    const fileExt = originalName.includes(".") ? originalName.split(".").pop() : "jpg";
    const filePath = `${user.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;

    const { error: storageError } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(filePath, file, { cacheControl: "3600", upsert: false });
    if (storageError) throw storageError;

    const { data: publicUrlData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(filePath);
    const imageUrl = publicUrlData.publicUrl;

    const { error: insertError } = await supabaseClient.from(ARTWORK_TABLE).insert([{
      user_id: user.id,
      title: titleInput.value.trim(),
      artist_name: artistNameInput.value.trim(),
      category: categoryInput.value,
      price: Number(priceInput.value || 0),
      description: descriptionInput.value.trim(),
      image_url: imageUrl
    }]);
    if (insertError) throw insertError;

    showStatus("Artwork uploaded successfully.");
    setTimeout(() => window.location.href = "gallery/index.html", 1200);
  } catch (error) {
    showStatus("Upload failed: " + error.message);
  }
}
fileInput.addEventListener("change", () => makePreview(fileInput.files[0]));
document.getElementById("clearBtn").onclick = () => window.location.reload();
document.getElementById("uploadBtn").onclick = uploadArtwork;
</script>
</body>
</html>
