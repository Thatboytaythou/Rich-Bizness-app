<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #111;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid #1f1f1f;
    }
    h1 {
      color: #39ff14;
      margin-top: 0;
    }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
    }
    input, textarea {
      background: #1d1d1d;
      color: white;
    }
    button {
      background: #39ff14;
      color: black;
      font-weight: 800;
      cursor: pointer;
    }
    #msg {
      margin-top: 14px;
      color: #39ff14;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Artwork</h1>
    <input id="title" placeholder="Title" />
    <textarea id="description" placeholder="Description"></textarea>
    <input id="fileInput" type="file" accept="image/*" />
    <button id="uploadBtn">Upload</button>
    <div id="msg"></div>
    <p><a href="artist.html" style="color:#fff;">Back to artist page</a></p>
  </div>

  <script src="env.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);
    const msg = document.getElementById("msg");

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      msg.textContent = "";

      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const file = document.getElementById("fileInput").files[0];

      if (!file) {
        msg.textContent = "Choose an image first.";
        return;
      }

      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        msg.textContent = "You must be logged in.";
        return;
      }

      const ext = file.name.split(".").pop();
      const fileName = `${user.id}/${Date.now()}.${ext}`;

      const { error: uploadError } = await supabase.storage
        .from("artworks")
        .upload(fileName, file, { upsert: false });

      if (uploadError) {
        msg.textContent = uploadError.message;
        return;
      }

      const { data: publicData } = supabase.storage
        .from("artworks")
        .getPublicUrl(fileName);

      const image_url = publicData.publicUrl;

      const { error: insertError } = await supabase
        .from("artworks")
        .insert({
          user_id: user.id,
          title,
          description,
          image_url
        });

      msg.textContent = insertError ? insertError.message : "Artwork uploaded successfully.";
    });
  </script>
</body>
</html>
