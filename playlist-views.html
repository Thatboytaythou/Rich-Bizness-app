<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playlist View</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      color: white;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
        url('/images/brand/logo-music-label.png') center/cover no-repeat fixed;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav a {
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .hero {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .cover {
      width: 100%;
      border-radius: 20px;
    }

    .info h1 {
      margin: 0;
      font-size: 36px;
    }

    .controls {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .play { background: gold; color: black; }
    .radio { background: purple; }

    .track {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .track button {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    audio {
      width: 100%;
      margin-top: 20px;
    }

  </style>
</head>

<body>
  <div class="container">

    <div class="nav">
      <div>
        <a href="/index.html">Home</a>
        <a href="/playlist.html">Back</a>
      </div>
      <div id="global-session-nav"></div>
    </div>

    <div class="hero">
      <img id="cover" class="cover" src="/images/brand/logo-music-label.png"/>

      <div class="info">
        <h1 id="title">Loading...</h1>
        <p id="desc"></p>

        <div class="controls">
          <button class="play" id="play-all">Play All</button>
          <button class="radio" id="start-radio">Start Radio</button>
        </div>
      </div>
    </div>

    <div id="tracks"></div>

    <audio id="player" controls></audio>

  </div>

  <script type="module">
    import {
      getPlaylistById,
      getPlaylistTracks
    } from "/src/music/playlist-api.js";

    const url = new URL(location.href);
    const id = url.searchParams.get("id");

    const cover = document.getElementById("cover");
    const title = document.getElementById("title");
    const desc = document.getElementById("desc");
    const tracksEl = document.getElementById("tracks");
    const player = document.getElementById("player");

    let tracks = [];
    let index = 0;

    function playTrack(i) {
      const t = tracks[i];
      if (!t?.audio_url) return;
      index = i;
      player.src = t.audio_url;
      player.play();
    }

    function renderTracks() {
      tracksEl.innerHTML = tracks.map((t, i) => `
        <div class="track">
          <div>
            <strong>${t.title}</strong><br/>
            <small>${t.artist_name}</small>
          </div>
          <button onclick="playTrack(${i})">Play</button>
        </div>
      `).join("");
    }

    window.playTrack = playTrack;

    async function load() {
      const p = await getPlaylistById(id);
      const t = await getPlaylistTracks(id);

      cover.src = p.cover_url || cover.src;
      title.textContent = p.title;
      desc.textContent = p.description;

      tracks = t;
      renderTracks();
    }

    document.getElementById("play-all").onclick = () => playTrack(0);

    document.getElementById("start-radio").onclick = () => {
      window.location.href = "/radio.html";
    };

    player.onended = () => {
      index++;
      if (index < tracks.length) playTrack(index);
    };

    load();
  </script>

  <script type="module" src="/src/shared/navbar-session.js"></script>
</body>
</html>
