<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled | Rich Bizness</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --green: #7dff71;
      --gold: #f5d76e;
      --danger: #ef5b55;
      --bg: rgba(0,0,0,0.50);
      --soft: rgba(255,255,255,0.08);
      --border: rgba(125,255,113,0.18);
      --text: #f3f3f3;
      --muted: #cfcfcf;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.60), rgba(0,0,0,0.86)),
        url("images/brand/logo-music-label.png") center center / cover no-repeat fixed;
    }

    .page {
      max-width: 1250px;
      margin: 0 auto;
      padding: 18px;
      padding-bottom: 40px;
    }

    .topbar,
    .hero,
    .status-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 14px 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--green);
      font-size: 1.8rem;
      font-weight: 900;
    }

    .brand img {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      object-fit: cover;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .nav a,
    .nav button {
      text-decoration: none;
      color: white;
      background: var(--soft);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .user-chip {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
    }

    .hero {
      padding: 24px;
      text-align: center;
    }

    .cancel-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 999px;
      background: rgba(239,91,85,0.16);
      border: 1px solid rgba(239,91,85,0.30);
      color: #ff9f9b;
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 3rem;
      line-height: 1.02;
      color: var(--danger);
    }

    .subtle {
      color: var(--text);
      line-height: 1.75;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
      justify-content: center;
    }

    .btn-green,
    .btn-dark,
    .btn-gold,
    .btn-danger {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 900;
      border: none;
      cursor: pointer;
    }

    .btn-green { background: var(--green); color: black; }
    .btn-dark { background: var(--soft); color: white; border: 1px solid rgba(255,255,255,0.08); }
    .btn-gold { background: var(--gold); color: black; }
    .btn-danger { background: var(--danger); color: white; }

    .status-box {
      margin-top: 16px;
      padding: 14px;
      font-weight: 700;
      line-height: 1.6;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img src="images/brand/logo-music-label.png" alt="Rich Bizness">
        <span>Payment Cancelled</span>
      </div>

      <div class="nav">
        <span id="userChip" class="user-chip">Checking session...</span>
        <a href="index.html">Home</a>
        <a href="music.html">Music</a>
        <a href="live.html">Live</a>
        <a href="watch.html">Watch</a>
        <a href="monetization.html">Monetize</a>
        <button id="logoutBtn" class="btn-dark" type="button">Log Out</button>
      </div>
    </div>

    <div class="hero">
      <div class="cancel-badge">×</div>
      <h1 id="heroTitle">Checkout Was Cancelled</h1>
      <div id="heroSubtitle" class="subtle">
        No payment was completed. Nothing broke — you can go back and try again.
      </div>

      <div class="hero-actions">
        <a id="primaryRetryBtn" class="btn-danger" href="monetization.html">Back To Monetization</a>
        <a id="watchRetryBtn" class="btn-dark" href="watch.html" style="display:none;">Back To Watch Page</a>
        <a class="btn-gold" href="music.html">Back To Music</a>
      </div>

      <div id="statusBox" class="status-box">Loading cancel page...</div>
    </div>
  </div>

  <script>
    try {
      const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

      const userChip = document.getElementById("userChip");
      const logoutBtn = document.getElementById("logoutBtn");
      const statusBox = document.getElementById("statusBox");
      const heroTitle = document.getElementById("heroTitle");
      const heroSubtitle = document.getElementById("heroSubtitle");
      const primaryRetryBtn = document.getElementById("primaryRetryBtn");
      const watchRetryBtn = document.getElementById("watchRetryBtn");

      function setStatus(message) {
        statusBox.textContent = message;
      }

      function getParams() {
        const params = new URLSearchParams(window.location.search);
        return {
          vip: params.get("vip") === "1",
          live: params.get("live") === "1",
          room: params.get("room") || ""
        };
      }

      async function loadSession() {
        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;

        const user = data?.session?.user || null;
        userChip.textContent = user?.email || "Guest mode";
      }

      async function logOut() {
        try {
          const { error } = await supabase.auth.signOut();
          if (error) throw error;
          window.location.href = "auth.html";
        } catch (error) {
          setStatus("Logout error: " + error.message);
        }
      }

      async function initPage() {
        try {
          await loadSession();

          const { vip, live, room } = getParams();

          if (vip) {
            heroTitle.textContent = "VIP Live Checkout Cancelled";
            heroSubtitle.textContent = "Your VIP live payment was cancelled. You can go back and unlock access whenever you want.";
            primaryRetryBtn.textContent = "Retry VIP Flow";
            primaryRetryBtn.href = room
              ? `watch.html?room=${encodeURIComponent(room)}`
              : "watch.html";

            watchRetryBtn.style.display = "inline-block";
            watchRetryBtn.href = room
              ? `watch.html?room=${encodeURIComponent(room)}`
              : "watch.html";

            setStatus("VIP checkout was cancelled. No charge was completed.");
            return;
          }

          if (live) {
            heroTitle.textContent = "Live Tip Cancelled";
            heroSubtitle.textContent = "Your live support checkout was cancelled. You can still go back to the stream.";
            primaryRetryBtn.textContent = "Back To Watch";
            primaryRetryBtn.href = room
              ? `watch.html?room=${encodeURIComponent(room)}`
              : "watch.html";

            setStatus("Live tip checkout was cancelled. No charge was completed.");
            return;
          }

          setStatus("Checkout was cancelled. No payment was completed.");
        } catch (error) {
          setStatus("Cancel page error: " + error.message);
        }
      }

      logoutBtn.addEventListener("click", logOut);
      initPage();
    } catch (error) {
      document.body.innerHTML = `
        <div style="padding:30px;color:white;font-family:Arial;background:#111;min-height:100vh;">
          <h1 style="color:#ef5b55;">Cancel Page Startup Error</h1>
          <p>${error.message}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
