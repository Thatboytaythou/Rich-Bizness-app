<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rich Bizness — Pro League Leaderboard</title>

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />

  <style>
    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,.62), rgba(0,0,0,.9)),
        url("/images/83FAD785-46D7-4EB3-8A3F-1E4A8BB78C90.png") center/cover fixed;
      color: #fff;
    }

    .leaderboard-shell {
      display: grid;
      gap: 20px;
      padding-bottom: 40px;
    }

    .leaderboard-hero,
    .leaderboard-panel {
      border: 1px solid rgba(105,255,180,.18);
      background: rgba(5, 12, 9, .82);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 22px 60px rgba(0,0,0,.38);
    }

    .leaderboard-hero {
      padding: 28px;
      min-height: 260px;
      display: grid;
      align-items: end;
      overflow: hidden;
      position: relative;
    }

    .leaderboard-hero::before {
      content: "";
      position: absolute;
      inset: -8%;
      background: url("/images/83FAD785-46D7-4EB3-8A3F-1E4A8BB78C90.png") center/cover no-repeat;
      opacity: .3;
      animation: bgMove 12s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes bgMove {
      from { transform: scale(1.05) translate(-10px, -8px); }
      to { transform: scale(1.14) translate(18px, 12px); }
    }

    .kicker {
      display: inline-flex;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(105,255,180,.12);
      border: 1px solid rgba(105,255,180,.25);
      color: #69ffb4;
      font-size: .78rem;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 5.4rem);
      line-height: .9;
      letter-spacing: -.06em;
      margin: 0 0 12px;
    }

    .leaderboard-hero p {
      max-width: 720px;
      color: rgba(255,255,255,.72);
      margin: 0;
    }

    .leaderboard-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px;
    }

    .game-filter {
      min-height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(0,0,0,.42);
      color: #fff;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .game-filter.active {
      background: linear-gradient(135deg, #69ffb4, #32e08d);
      color: #031108;
    }

    .leaderboard-panel {
      overflow: hidden;
    }

    .panel-head {
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-head h2 {
      margin: 0;
    }

    .leaderboard-list {
      display: grid;
      gap: 10px;
      padding: 18px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 70px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(0,0,0,.38);
      border: 1px solid rgba(255,255,255,.08);
    }

    .rank {
      font-size: 1.4rem;
      font-weight: 1000;
      color: #ffce58;
    }

    .player strong {
      display: block;
      font-size: 1rem;
    }

    .player span {
      display: block;
      color: rgba(255,255,255,.64);
      font-size: .84rem;
      margin-top: 4px;
    }

    .score {
      color: #69ffb4;
      font-size: 1.35rem;
      font-weight: 1000;
    }

    .status-box {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: rgba(255,255,255,.72);
    }

    @media (max-width: 640px) {
      .rank-row {
        grid-template-columns: 48px 1fr;
      }

      .score {
        grid-column: 2;
      }
    }
  </style>
</head>

<body>
  <div class="page-shell leaderboard-shell">
    <div id="elite-platform-nav"></div>

    <section class="leaderboard-hero">
      <div>
        <span class="kicker">Rich Bizness Pro League</span>
        <h1>Leaderboard</h1>
        <p>Track the top players across Ride, Chess, Money Road Runner, Studio Showdown, and every Rich Bizness game.</p>
      </div>
    </section>

    <section class="leaderboard-panel">
      <div class="leaderboard-controls">
        <button class="game-filter active" data-game="">All Games</button>
        <button class="game-filter" data-game="ride">Ride</button>
        <button class="game-filter" data-game="rich-chess">Rich Chess</button>
        <button class="game-filter" data-game="money-road-runner">Money Road Runner</button>
        <button class="game-filter" data-game="studio-showdown">Studio Showdown</button>
        <button class="game-filter" data-game="smoke-city-hustle">Smoke City Hustle</button>
      </div>
    </section>

    <section class="leaderboard-panel">
      <div class="panel-head">
        <div>
          <h2 id="leaderboard-title">Top Scores</h2>
          <p id="leaderboard-status">Loading leaderboard...</p>
        </div>
        <a class="btn btn-gold" href="/gaming.html">Back to Gaming</a>
      </div>

      <div id="leaderboard-list" class="leaderboard-list">
        <div class="status-box">Loading scores...</div>
      </div>
    </section>
  </div>

  <script>
    window.NEXT_PUBLIC_SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";
    window.SUPABASE_URL = window.NEXT_PUBLIC_SUPABASE_URL;
    window.SUPABASE_PUBLISHABLE_KEY = window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;
    window.NEXT_PUBLIC_SUPABASE_ANON_KEY = window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;
    window.SUPABASE_ANON_KEY = window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;
  </script>

  <script type="module">
    import { initApp, getSupabase } from "/core/app.js";
    import { mountEliteNav } from "/core/nav.js";

    await initApp();
    mountEliteNav({ target: "#elite-platform-nav", collapsed: false });

    const supabase = getSupabase();

    const list = document.getElementById("leaderboard-list");
    const status = document.getElementById("leaderboard-status");
    const title = document.getElementById("leaderboard-title");

    const params = new URLSearchParams(window.location.search);
    let activeGame = params.get("game") || "";

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeDate(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString();
    }

    function gameLabel(slug) {
      const labels = {
        "ride": "Ride",
        "rich-chess": "Rich Chess",
        "money-road-runner": "Money Road Runner",
        "studio-showdown": "Studio Showdown",
        "smoke-city-hustle": "Smoke City Hustle"
      };
      return labels[slug] || slug || "All Games";
    }

    async function loadLeaderboard() {
      status.textContent = "Loading scores...";
      title.textContent = activeGame ? `${gameLabel(activeGame)} Leaderboard` : "Top Scores";

      let query = supabase
        .from("game_scores")
        .select("*")
        .order("score", { ascending: false })
        .limit(50);

      if (activeGame) query = query.eq("game_slug", activeGame);

      const { data, error } = await query;

      if (error) {
        console.error("[leaderboard] error:", error);
        status.textContent = error.message || "Could not load leaderboard.";
        list.innerHTML = `<div class="status-box">Could not load scores.</div>`;
        return;
      }

      if (!data?.length) {
        status.textContent = "No scores yet.";
        list.innerHTML = `<div class="status-box">No scores yet. Play a game and claim the board.</div>`;
        return;
      }

      status.textContent = `${data.length} score${data.length === 1 ? "" : "s"} loaded.`;

      list.innerHTML = data.map((row, index) => `
        <article class="rank-row">
          <div class="rank">#${index + 1}</div>
          <div class="player">
            <strong>${escapeHtml(row.game_slug || "game")}</strong>
            <span>${escapeHtml(row.mode || "arcade")} • ${safeDate(row.created_at)}</span>
          </div>
          <div class="score">${Number(row.score || 0).toLocaleString()}</div>
        </article>
      `).join("");
    }

    document.querySelectorAll(".game-filter").forEach((btn) => {
      const game = btn.dataset.game || "";
      if (game === activeGame) btn.classList.add("active");
      else btn.classList.remove("active");

      btn.addEventListener("click", async () => {
        activeGame = game;

        document.querySelectorAll(".game-filter").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        const url = new URL(window.location.href);
        if (activeGame) url.searchParams.set("game", activeGame);
        else url.searchParams.delete("game");
        history.replaceState({}, "", url);

        await loadLeaderboard();
      });
    });

    await loadLeaderboard();

    supabase
      .channel("rb-pro-league-leaderboard")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "game_scores" }, loadLeaderboard)
      .subscribe();
  </script>
</body>
</html>
