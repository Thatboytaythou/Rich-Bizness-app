<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Rich Bizness</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: #ffffff;
      min-height: 100vh;
      padding: 24px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      color: #39ff14;
      text-shadow: 0 0 16px rgba(57,255,20,0.25);
    }

    .top-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-links a {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .top-links a:hover {
      color: #39ff14;
      border-color: rgba(57,255,20,0.45);
      background: rgba(57,255,20,0.12);
    }

    .hero {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      margin-bottom: 24px;
    }

    .card {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .profile-side {
      text-align: center;
    }

    .avatar {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      object-fit: cover;
      background: #141414;
      border: 4px solid #39ff14;
      display: block;
      margin: 0 auto 18px;
    }

    .display-name {
      font-size: 28px;
      font-weight: 900;
      color: #39ff14;
      margin-bottom: 10px;
    }

    .email {
      color: #d0d0d0;
      font-size: 14px;
      margin-bottom: 18px;
      word-break: break-word;
    }

    .bio-preview {
      color: #dadada;
      line-height: 1.5;
      font-size: 15px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 14px;
      min-height: 90px;
      text-align: left;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .stat-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
    }

    .number {
      font-size: 22px;
      font-weight: 900;
      color: #39ff14;
      margin-bottom: 4px;
    }

    .label {
      font-size: 12px;
      color: #cfcfcf;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    h2 {
      color: #39ff14;
      margin-bottom: 16px;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #f2f2f2;
    }

    input,
    textarea {
      width: 100%;
      background: #121212;
      color: #ffffff;
      border: 1px solid #2b2b2b;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #39ff14;
      box-shadow: 0 0 0 3px rgba(57,255,20,0.15);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn-green {
      background: #39ff14;
      color: #000;
    }

    .btn-dark {
      background: #1c1c1c;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-red {
      background: #8f1d2c;
      color: #fff;
    }

    .btn-green:hover,
    .btn-dark:hover,
    .btn-red:hover {
      transform: translateY(-1px);
    }

    .status-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
      line-height: 1.5;
      word-break: break-word;
    }

    .status-box.success {
      display: block;
      background: rgba(57,255,20,0.12);
      border: 1px solid rgba(57,255,20,0.35);
      color: #98ff83;
    }

    .status-box.error {
      display: block;
      background: rgba(255,70,70,0.12);
      border: 1px solid rgba(255,70,70,0.35);
      color: #ff9b9b;
    }

    .status-box.info {
      display: block;
      background: rgba(57,255,20,0.08);
      border: 1px solid rgba(57,255,20,0.20);
      color: #d8ffd0;
    }

    .gallery-title {
      font-size: 30px;
      font-weight: 900;
      color: #39ff14;
      margin-bottom: 16px;
    }

    .art-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .art-card {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }

    .art-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      background: #141414;
    }

    .art-card-body {
      padding: 16px;
    }

    .art-card-title {
      font-size: 19px;
      font-weight: 900;
      color: #39ff14;
      margin-bottom: 8px;
    }

    .art-card-meta {
      font-size: 14px;
      color: #d6d6d6;
      margin-bottom: 8px;
    }

    .art-card-description {
      font-size: 14px;
      color: #e0e0e0;
      line-height: 1.45;
    }

    .empty-state {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 34px 22px;
      text-align: center;
      color: #d7d7d7;
    }

    .empty-state h3 {
      color: #39ff14;
      margin-bottom: 10px;
      font-size: 24px;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .brand {
        font-size: 28px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .display-name {
        font-size: 24px;
      }

      h2,
      .gallery-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">Rich Bizness Profile</div>

      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="upload.html">Upload Art</a>
        <a href="music.html">Music</a>
        <a href="upload-music.html">Upload Music</a>
        <a href="sports.html">Sports</a>
        <a href="upload-sports.html">Upload Sports</a>
        <a href="live.html">Go Live</a>
        <a href="watch.html">Watch Live</a>
      </div>
    </div>

    <div class="hero">
      <div class="card profile-side">
        <img
          id="avatarPreviewCard"
          class="avatar"
          src="https://placehold.co/400x400?text=Artist"
          alt="Profile Avatar"
        />

        <div id="displayNameCard" class="display-name">Artist</div>
        <div id="emailCard" class="email">Loading user...</div>

        <div id="bioCard" class="bio-preview">
          No bio yet.
        </div>

        <div class="stats">
          <div class="stat-box">
            <div id="artCount" class="number">0</div>
            <div class="label">Artwork</div>
          </div>

          <div class="stat-box">
            <div id="musicCount" class="number">0</div>
            <div class="label">Music</div>
          </div>

          <div class="stat-box">
            <div id="sportsCount" class="number">0</div>
            <div class="label">Sports</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Edit Profile</h2>

        <div class="form-group">
          <label for="displayNameInput">Display Name</label>
          <input id="displayNameInput" type="text" placeholder="Enter your artist name" />
        </div>

        <div class="form-group">
          <label for="avatarUrlInput">Avatar Image URL</label>
          <input id="avatarUrlInput" type="text" placeholder="Paste image URL here" />
        </div>

        <div class="form-group">
          <label for="bioInput">Artist Bio</label>
          <textarea id="bioInput" placeholder="Tell people about your art, music, and brand"></textarea>
        </div>

        <div class="button-row">
          <button id="saveProfileBtn" class="btn-green">Save Profile</button>
          <button id="refreshBtn" class="btn-dark" type="button">Refresh</button>
          <button id="artistBtn" class="btn-dark" type="button">Artist Page</button>
          <button id="logoutBtn" class="btn-red" type="button">Logout</button>
        </div>

        <div id="statusBox" class="status-box info">Checking profile...</div>
      </div>
    </div>

    <div class="gallery-title">My Artwork</div>
    <div id="artGrid" class="art-grid"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const avatarPreviewCard = document.getElementById("avatarPreviewCard");
    const displayNameCard = document.getElementById("displayNameCard");
    const emailCard = document.getElementById("emailCard");
    const bioCard = document.getElementById("bioCard");

    const artCount = document.getElementById("artCount");
    const musicCount = document.getElementById("musicCount");
    const sportsCount = document.getElementById("sportsCount");

    const displayNameInput = document.getElementById("displayNameInput");
    const avatarUrlInput = document.getElementById("avatarUrlInput");
    const bioInput = document.getElementById("bioInput");

    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const artistBtn = document.getElementById("artistBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusBox = document.getElementById("statusBox");
    const artGrid = document.getElementById("artGrid");

    let currentUser = null;
    let currentArtwork = [];

    function showStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = "block";
    }

    function getAvatarUrl(url) {
      return url && url.trim()
        ? url.trim()
        : "https://placehold.co/400x400?text=Artist";
    }

    function updateProfileCard() {
      const displayName = displayNameInput.value.trim() || "Artist";
      const avatarUrl = getAvatarUrl(avatarUrlInput.value);
      const bio = bioInput.value.trim() || "No bio yet.";

      displayNameCard.textContent = displayName;
      avatarPreviewCard.src = avatarUrl;
      bioCard.textContent = bio;
    }

    async function requireUser() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        window.location.href = "auth.html";
        return null;
      }

      currentUser = data.user;
      emailCard.textContent = currentUser.email || "No email found";
      return currentUser;
    }

    async function loadProfile() {
      showStatus("Loading profile...", "info");

      const user = await requireUser();
      if (!user) return;

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      if (error) {
        console.error("Profile load error:", error);
        showStatus("Failed to load profile: " + error.message, "error");
        return;
      }

      displayNameInput.value = data?.display_name || "";
      avatarUrlInput.value = data?.avatar_url || "";
      bioInput.value = data?.bio || "";

      displayNameCard.textContent = data?.display_name || "Artist";
      avatarPreviewCard.src = getAvatarUrl(data?.avatar_url || "");
      bioCard.textContent = data?.bio || "No bio yet.";
    }

    async function loadArtwork() {
      if (!currentUser) return;

      const { data, error } = await supabaseClient
        .from("artworks")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Artwork load error:", error);
        artGrid.innerHTML = `
          <div class="empty-state">
            <h3>Could not load artwork</h3>
            <p>${error.message}</p>
          </div>
        `;
        return;
      }

      currentArtwork = data || [];
      artCount.textContent = String(currentArtwork.length);

      if (!currentArtwork.length) {
        artGrid.innerHTML = `
          <div class="empty-state">
            <h3>No artwork yet</h3>
            <p>Upload art from your upload page and it will show here.</p>
          </div>
        `;
        return;
      }

      artGrid.innerHTML = currentArtwork.map(item => `
        <div class="art-card">
          <img
            src="${item.image_url || 'https://placehold.co/600x600?text=No+Image'}"
            alt="${item.title || 'Untitled'}"
            onerror="this.src='https://placehold.co/600x600?text=No+Image';"
          />
          <div class="art-card-body">
            <div class="art-card-title">${item.title || "Untitled"}</div>
            <div class="art-card-meta">${item.category || "Other"} • $${Number(item.price || 0).toFixed(2)}</div>
            <div class="art-card-description">${item.description || "No description added."}</div>
          </div>
        </div>
      `).join("");
    }

    async function loadMusicCount() {
      if (!currentUser) return;

      try {
        const { count, error } = await supabaseClient
          .from("music")
          .select("*", { count: "exact", head: true })
          .eq("user_id", currentUser.id);

        if (error) {
          musicCount.textContent = "0";
          return;
        }

        musicCount.textContent = String(count || 0);
      } catch (error) {
        console.error("Music count error:", error);
        musicCount.textContent = "0";
      }
    }

    async function loadSportsCount() {
      if (!currentUser) return;

      try {
        const { count, error } = await supabaseClient
          .from("sports_posts")
          .select("*", { count: "exact", head: true })
          .eq("user_id", currentUser.id);

        if (error) {
          sportsCount.textContent = "0";
          return;
        }

        sportsCount.textContent = String(count || 0);
      } catch (error) {
        console.error("Sports count error:", error);
        sportsCount.textContent = "0";
      }
    }

    async function saveProfile() {
      if (!currentUser) {
        showStatus("No logged in user found.", "error");
        return;
      }

      const payload = {
        id: currentUser.id,
        email: currentUser.email,
        display_name: displayNameInput.value.trim(),
        avatar_url: avatarUrlInput.value.trim(),
        bio: bioInput.value.trim(),
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("profiles")
        .upsert(payload, { onConflict: "id" });

      if (error) {
        console.error("Profile save error:", error);
        showStatus("Failed to save profile: " + error.message, "error");
        return;
      }

      updateProfileCard();
      showStatus("Profile saved successfully.", "success");
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "auth.html";
    }

    saveProfileBtn.addEventListener("click", saveProfile);
    refreshBtn.addEventListener("click", async () => {
      await loadProfile();
      await loadArtwork();
      await loadMusicCount();
      await loadSportsCount();
      showStatus("Profile refreshed.", "success");
    });

    artistBtn.addEventListener("click", () => {
      window.location.href = "artist.html";
    });

    logoutBtn.addEventListener("click", logout);

    avatarUrlInput.addEventListener("input", updateProfileCard);
    displayNameInput.addEventListener("input", updateProfileCard);
    bioInput.addEventListener("input", updateProfileCard);

    async function startPage() {
      await loadProfile();
      await loadArtwork();
      await loadMusicCount();
      await loadSportsCount();
      showStatus("Profile ready.", "success");
    }

    startPage();
  </script>
</body>
</html>
