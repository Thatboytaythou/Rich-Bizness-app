<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Rich Bizness LLC</title>
  <style>
    :root {
      --bg:#050505; --panel:rgba(15,15,15,.92); --border:rgba(255,255,255,.08);
      --text:#f5f5f5; --muted:#a8a8a8; --primary:#19e68c; --danger:#ff5a67; --input:#ececec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: Arial, sans-serif; color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,.07), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      padding: 24px;
    }
    .page { max-width: 1180px; margin: 0 auto; }
    .topbar { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
    .toplink,.ghost-link { text-decoration:none; font-weight:700; }
    .toplink { color: var(--primary); }
    .ghost-link { color:#8ecbff; background:rgba(255,255,255,.05); padding:12px 16px; border-radius:14px; border:1px solid rgba(255,255,255,.07); }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:28px; padding:24px; margin-bottom:22px; }
    .profile-top { display:grid; grid-template-columns:170px 1fr; gap:24px; align-items:center; }
    .avatar {
      width:170px; height:170px; border-radius:50%; background:#111; border:1px solid rgba(255,255,255,.08);
      display:flex; align-items:center; justify-content:center; font-size:68px; margin:auto;
    }
    .headline { margin:0 0 8px; font-size:46px; font-weight:800; }
    .sub { margin:0; color:var(--muted); font-size:16px; line-height:1.5; }
    .status { min-height:24px; margin-top:16px; font-size:15px; font-weight:700; }
    .ok { color: var(--primary); }
    .err { color: var(--danger); }
    .fields { display:grid; gap:14px; margin-top:12px; }
    .label { display:block; font-size:13px; color:var(--muted); margin:0 0 8px 4px; font-weight:600; }
    .input,.textarea {
      width:100%; border:0; border-radius:18px; padding:18px; font-size:16px;
      background:var(--input); color:#111; outline:none;
    }
    .textarea { min-height:140px; resize:vertical; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
    .btn { border:0; border-radius:16px; padding:16px 18px; font-size:15px; font-weight:800; cursor:pointer; min-width:150px; }
    .btn-primary { background:linear-gradient(180deg, #19e68c, #11c775); color:#000; }
    .btn-secondary { background:rgba(255,255,255,.05); color:#fff; border:1px solid rgba(255,255,255,.08); }
    .section-title { margin:0 0 6px; font-size:34px; font-weight:900; }
    .section-copy { margin:0 0 18px; color:var(--muted); font-size:15px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(270px, 1fr)); gap:18px; }
    .upload-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:20px; overflow:hidden; }
    .media-wrap { width:100%; height:320px; background:#080808; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .media-wrap img,.media-wrap video { width:100%; height:100%; object-fit:cover; display:block; background:#000; }
    .upload-body { padding:14px; }
    .upload-name { font-size:18px; font-weight:800; margin-bottom:6px; }
    .upload-meta { color:var(--muted); font-size:14px; margin-bottom:8px; }
    .empty { padding:22px; border-radius:18px; background:rgba(255,255,255,.04); color:var(--muted); text-align:center; border:1px solid rgba(255,255,255,.07); }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="toplink" href="/index.html">← Home</a>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="ghost-link" href="/upload.html">Upload Work</a>
        <a class="ghost-link" href="/gallery/index.html">View Gallery</a>
        <a class="ghost-link" href="/live.html">🔴 Go Live</a>
      </div>
    </div>

    <div class="card">
      <div class="profile-top">
        <div class="avatar">👤</div>
        <div>
          <h1 class="headline">My Profile</h1>
          <p class="sub">Manage your artist identity, save your profile, and review everything you’ve uploaded.</p>
          <div id="status" class="status">Loading...</div>
        </div>
      </div>

      <div class="fields">
        <div>
          <label class="label" for="username">Username</label>
          <input id="username" class="input" />
        </div>
        <div>
          <label class="label" for="displayName">Display Name</label>
          <input id="displayName" class="input" />
        </div>
        <div>
          <label class="label" for="bio">Bio</label>
          <textarea id="bio" class="textarea"></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn btn-primary">Save Profile</button>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">My Uploads</h2>
      <p class="section-copy">Everything you’ve posted to the platform will appear here.</p>
      <div id="uploadsGrid" class="grid"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const usernameInput = document.getElementById("username");
    const displayNameInput = document.getElementById("displayName");
    const bioInput = document.getElementById("bio");
    const statusEl = document.getElementById("status");
    const uploadsGrid = document.getElementById("uploadsGrid");
    const saveBtn = document.getElementById("saveBtn");

    let currentUser = null;

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = "status " + (isError ? "err" : "ok");
    }

    function detectMediaType(item) {
      if (item.media_type) return item.media_type;
      return /\.(mp4|webm|ogg|mov|m4v)$/i.test(item.file_url || "") ? "video" : "image";
    }

    function renderMedia(item) {
      if (detectMediaType(item) === "video") {
        return `<div class="media-wrap"><video controls playsinline preload="metadata"><source src="${item.file_url}"></video></div>`;
      }
      return `<div class="media-wrap"><img src="${item.file_url}" alt="${item.artist_name || "Upload"}"></div>`;
    }

    async function ensureProfile(user) {
      const { data: existing, error } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      if (error) throw error;
      if (existing) return existing;

      const fallback = user.email?.split("@")[0] || "artist";
      await supabase.from("profiles").insert([{
        id: user.id,
        username: fallback,
        display_name: fallback,
        bio: ""
      }]);

      const { data: created } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      return created;
    }

    async function loadProfile() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user) {
        window.location.href = "/auth.html";
        return;
      }

      currentUser = session.user;
      const profile = await ensureProfile(currentUser);

      usernameInput.value = profile.username || "";
      displayNameInput.value = profile.display_name || "";
      bioInput.value = profile.bio || "";

      localStorage.setItem("username", profile.username || profile.display_name || "guest");
      setStatus("");
    }

    async function saveProfile() {
      if (!currentUser) return;
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";
      setStatus("Saving...");

      try {
        const username = usernameInput.value.trim();
        const displayName = displayNameInput.value.trim();

        const { error } = await supabase
          .from("profiles")
          .update({
            username,
            display_name: displayName,
            bio: bioInput.value.trim()
          })
          .eq("id", currentUser.id);

        if (error) throw error;

        localStorage.setItem("username", username || displayName || "guest");
        setStatus("Profile saved ✅");
      } catch (err) {
        setStatus(err.message, true);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save Profile";
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "/auth.html";
    }

    async function loadMyUploads() {
      if (!currentUser) return;

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        uploadsGrid.innerHTML = `<div class="empty">${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        uploadsGrid.innerHTML = `<div class="empty">No uploads yet.</div>`;
        return;
      }

      uploadsGrid.innerHTML = data.map(item => `
        <div class="upload-card">
          ${renderMedia(item)}
          <div class="upload-body">
            <div class="upload-name">${item.artist_name || ""}</div>
            <div class="upload-meta">${item.category || ""}</div>
            <div class="upload-meta">❤️ ${item.likes || 0}</div>
            <div class="upload-meta">${item.created_at ? new Date(item.created_at).toLocaleDateString() : ""}</div>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("saveBtn").addEventListener("click", saveProfile);
    document.getElementById("logoutBtn").addEventListener("click", logout);

    await loadProfile();
    await loadMyUploads();
  </script>
</body>
</html>
