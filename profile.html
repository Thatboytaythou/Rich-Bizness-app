<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Bizness | Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.95)),
    url("images/brand/19FB5229-30DD-40B0-9404-5136C27FEF6A.png") center/cover fixed;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:rgba(0,0,0,.6);
  border:1px solid rgba(125,255,113,.2);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

h1 { color:#7dff71; }

input, textarea {
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button {
  padding:12px 16px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-green { background:#7dff71; color:black; }
.btn-dark { background:#222; color:white; }

.avatar {
  width:150px;
  height:150px;
  border-radius:20px;
  object-fit:cover;
  border:2px solid #7dff71;
}
</style>
</head>

<body>
<div class="container">

<h1>Profile Editor</h1>

<div class="card">
  <img id="avatarPreview" class="avatar" src="" alt="avatar">
  <input type="file" id="avatarInput">
</div>

<div class="card">
  <label>Username</label>
  <input id="username">

  <label>Display Name</label>
  <input id="displayName">

  <label>Bio</label>
  <textarea id="bio"></textarea>

  <label>Favorite Team</label>
  <input id="team">

  <button class="btn-green" onclick="saveProfile()">Save Profile</button>
</div>

<div class="card" id="statusBox">Loading...</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos"
);

let user;
let profile = {};

const avatarPreview = document.getElementById("avatarPreview");
const avatarInput = document.getElementById("avatarInput");

async function init() {
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if (!user) {
    location.href = "auth.html";
    return;
  }

  await loadProfile();
}

async function loadProfile() {
  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (!data) {
    // CREATE PROFILE IF MISSING
    await supabase.from("profiles").insert([{
      id: user.id,
      username: "user_" + user.id.slice(0,6)
    }]);
    return loadProfile();
  }

  profile = data;

  document.getElementById("username").value = data.username || "";
  document.getElementById("displayName").value = data.display_name || "";
  document.getElementById("bio").value = data.bio || "";
  document.getElementById("team").value = data.favorite_team || "";

  if (data.avatar_url) avatarPreview.src = data.avatar_url;

  document.getElementById("statusBox").innerText = "Profile loaded";
}

avatarInput.addEventListener("change", async () => {
  const file = avatarInput.files[0];
  if (!file) return;

  const path = `${user.id}/${Date.now()}_${file.name}`;

  const { error } = await supabase.storage
    .from("profile-images")
    .upload(path, file);

  if (error) {
    alert(error.message);
    return;
  }

  const { data } = supabase.storage
    .from("profile-images")
    .getPublicUrl(path);

  avatarPreview.src = data.publicUrl;
  profile.avatar_url = data.publicUrl;
});

async function saveProfile() {
  try {
    const username = document.getElementById("username").value.trim();

    // CHECK USERNAME UNIQUE
    const { data: existing } = await supabase
      .from("profiles")
      .select("id")
      .eq("username", username)
      .neq("id", user.id);

    if (existing.length) {
      alert("Username taken");
      return;
    }

    const updates = {
      username,
      display_name: document.getElementById("displayName").value,
      bio: document.getElementById("bio").value,
      favorite_team: document.getElementById("team").value,
      avatar_url: profile.avatar_url || null,
      updated_at: new Date()
    };

    const { error } = await supabase
      .from("profiles")
      .update(updates)
      .eq("id", user.id);

    if (error) throw error;

    document.getElementById("statusBox").innerText = "✅ Profile updated across app";

  } catch (err) {
    document.getElementById("statusBox").innerText = "❌ " + err.message;
  }
}

init();
</script>
</body>
</html>
