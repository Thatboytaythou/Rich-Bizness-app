<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Rich Bizness LLC</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(15, 15, 15, 0.92);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #a8a8a8;
      --primary: #19e68c;
      --primary-dark: #11c775;
      --danger: #ff5a67;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --input: #ececec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,0.07), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      padding: 24px;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .toplink {
      display: inline-block;
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ghost-link {
      text-decoration: none;
      color: #8ecbff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .hero {
      position: relative;
      margin-bottom: 28px;
    }

    .glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(25,230,140,0.16), transparent 55%);
      filter: blur(30px);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
      padding: 28px 22px 24px;
    }

    .profile-top {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 24px;
      align-items: center;
      margin-bottom: 22px;
    }

    .avatar {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: linear-gradient(180deg, #222, #111);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 68px;
      margin: 0 auto;
    }

    .headline {
      margin: 0 0 8px;
      font-size: 46px;
      line-height: 1.04;
      font-weight: 800;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 700;
    }

    .ok {
      color: var(--primary);
    }

    .err {
      color: var(--danger);
    }

    .fields {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .field {
      text-align: left;
    }

    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 8px 4px;
      font-weight: 600;
    }

    .input,
    .textarea {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 16px;
      background: var(--input);
      color: #111;
      outline: none;
    }

    .input:focus,
    .textarea:focus {
      box-shadow: 0 0 0 3px rgba(25,230,140,0.28);
    }

    .textarea {
      min-height: 140px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.18s ease;
      min-width: 150px;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
      box-shadow: 0 16px 34px rgba(25,230,140,0.22);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .section-card {
      padding: 24px 22px;
      margin-bottom: 22px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 34px;
      font-weight: 900;
    }

    .section-copy {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 680px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 18px;
    }

    .upload-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      transition: transform 0.16s ease, border-color 0.16s ease;
    }

    .upload-card:hover {
      transform: translateY(-4px);
      border-color: rgba(25,230,140,0.32);
    }

    .upload-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .upload-body {
      padding: 14px;
    }

    .upload-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .upload-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .upload-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
    }

    .like-btn {
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
      box-shadow: 0 12px 24px rgba(25,230,140,0.18);
    }

    .empty {
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.07);
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .card,
      .section-card {
        padding: 22px 16px 18px;
      }

      .profile-top {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .headline {
        font-size: 36px;
      }

      .avatar {
        width: 140px;
        height: 140px;
        font-size: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="toplink" href="/index.html">← Home</a>

      <div class="top-actions">
        <a class="ghost-link" href="/upload.html">Upload Work</a>
        <a class="ghost-link" href="/gallery/index.html">View Gallery</a>
      </div>
    </div>

    <div class="hero">
      <div class="glow"></div>

      <div class="card">
        <div class="profile-top">
          <div class="avatar">👤</div>

          <div>
            <h1 class="headline">My Profile</h1>
            <p class="sub">Manage your artist identity, save your profile, and review everything you’ve uploaded.</p>
            <div id="status" class="status">Loading...</div>
          </div>
        </div>

        <div class="fields">
          <div class="field">
            <label class="label" for="username">Username</label>
            <input id="username" class="input" placeholder="Username" />
          </div>

          <div class="field">
            <label class="label" for="displayName">Display Name</label>
            <input id="displayName" class="input" placeholder="Display Name" />
          </div>

          <div class="field">
            <label class="label" for="bio">Bio</label>
            <textarea id="bio" class="textarea" placeholder="Tell people who you are and what you create..."></textarea>
          </div>
        </div>

        <div class="actions">
          <button id="saveBtn" class="btn btn-primary" type="button">Save Profile</button>
          <button id="logoutBtn" class="btn btn-secondary" type="button">Logout</button>
        </div>
      </div>
    </div>

    <div class="card section-card">
      <div class="section-head">
        <div>
          <h2 class="section-title">My Uploads</h2>
          <p class="section-copy">Everything you’ve posted to the platform will appear here.</p>
        </div>
      </div>

      <div id="uploadsGrid" class="grid"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const usernameInput = document.getElementById("username");
    const displayNameInput = document.getElementById("displayName");
    const bioInput = document.getElementById("bio");
    const statusEl = document.getElementById("status");
    const uploadsGrid = document.getElementById("uploadsGrid");
    const saveBtn = document.getElementById("saveBtn");

    let currentUser = null;

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = "status " + (isError ? "err" : "ok");
    }

    function setSaveLoading(on) {
      saveBtn.disabled = on;
      saveBtn.textContent = on ? "Saving..." : "Save Profile";
    }

    async function ensureProfile(user) {
      const { data: existing, error: existingError } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      if (existingError) {
        throw existingError;
      }

      if (existing) {
        return existing;
      }

      const fallbackName = user.email?.split("@")[0] || "artist";

      const { error: insertError } = await supabase
        .from("profiles")
        .insert([
          {
            id: user.id,
            username: fallbackName,
            display_name: fallbackName,
            bio: ""
          }
        ]);

      if (insertError) {
        throw insertError;
      }

      const { data: created, error: createdError } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      if (createdError) {
        throw createdError;
      }

      return created;
    }

    async function loadProfile() {
      try {
        const {
          data: { session },
          error: sessionError
        } = await supabase.auth.getSession();

        if (sessionError) {
          setStatus(sessionError.message, true);
          return;
        }

        if (!session?.user) {
          window.location.href = "/auth.html";
          return;
        }

        currentUser = session.user;

        const profile = await ensureProfile(currentUser);

        usernameInput.value = profile.username || "";
        displayNameInput.value = profile.display_name || "";
        bioInput.value = profile.bio || "";

        setStatus("");
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    async function saveProfile() {
      if (!currentUser) return;

      setSaveLoading(true);
      setStatus("Saving...");

      try {
        const { error } = await supabase
          .from("profiles")
          .update({
            username: usernameInput.value.trim(),
            display_name: displayNameInput.value.trim(),
            bio: bioInput.value.trim()
          })
          .eq("id", currentUser.id);

        if (error) {
          throw error;
        }

        setStatus("Profile saved ✅");
      } catch (err) {
        setStatus(err.message, true);
      } finally {
        setSaveLoading(false);
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "/auth.html";
    }

    async function likePost(id, currentLikes) {
      const { error } = await supabase
        .from("uploads")
        .update({ likes: (currentLikes || 0) + 1 })
        .eq("id", id);

      if (error) {
        setStatus("Like failed: " + error.message, true);
        return;
      }

      await loadMyUploads();
      setStatus("");
    }

    async function loadMyUploads() {
      if (!currentUser) return;

      const { data, error } = await supabase
        .from("uploads")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        uploadsGrid.innerHTML = `<div class="empty">${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        uploadsGrid.innerHTML = `<div class="empty">No uploads yet.</div>`;
        return;
      }

      uploadsGrid.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "upload-card";

        card.innerHTML = `
          <img src="${item.file_url}" alt="${item.artist_name || "Upload"}">
          <div class="upload-body">
            <div class="upload-name">${item.artist_name || ""}</div>
            <div class="upload-meta">${item.category || ""}</div>
            <div class="upload-meta">❤️ ${item.likes || 0}</div>
            <div class="upload-meta">${item.created_at ? new Date(item.created_at).toLocaleDateString() : ""}</div>
            <div class="upload-actions">
              <button class="mini-btn like-btn" type="button">Like</button>
            </div>
          </div>
        `;

        card.querySelector(".like-btn").addEventListener("click", () => {
          likePost(item.id, item.likes || 0);
        });

        uploadsGrid.appendChild(card);
      });
    }

    document.getElementById("saveBtn").addEventListener("click", saveProfile);
    document.getElementById("logoutBtn").addEventListener("click", logout);

    await loadProfile();
    await loadMyUploads();
  </script>
</body>
</html>
