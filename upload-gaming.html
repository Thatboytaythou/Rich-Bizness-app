<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Gaming | Rich Bizness</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url("images/brand/7F5D6348-B3DF-4584-A206-7F98B8BB0D53.png") center/cover no-repeat fixed;
}

.container {
  max-width:700px;
  margin:60px auto;
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(125,255,113,0.2);
}

h1 {
  color:#7dff71;
  margin-bottom:20px;
}

input, textarea, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button {
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#7dff71;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.status {
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 Upload Gaming Content</h1>

  <input id="title" placeholder="Title" />
  <input id="game" placeholder="Game Name (COD, 2K, GTA, etc)" />
  
  <select id="type">
    <option value="clip">Clip</option>
    <option value="stream">Stream</option>
    <option value="highlight">Highlight</option>
  </select>

  <textarea id="caption" placeholder="Caption"></textarea>

  <input type="file" id="file" />

  <button onclick="upload()">Upload</button>

  <div id="status" class="status"></div>
</div>

<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function upload() {
  const status = document.getElementById("status");

  try {
    status.innerText = "Uploading...";

    const { data: { user } } = await supabase.auth.getUser();

    if (!user) {
      status.innerText = "You must be logged in";
      return;
    }

    const file = document.getElementById("file").files[0];

    if (!file) {
      status.innerText = "Select a file first";
      return;
    }

    const fileName = `${Date.now()}-${file.name}`;

    // Upload to storage
    const { error: uploadError } = await supabase.storage
      .from("gaming-uploads")
      .upload(fileName, file);

    if (uploadError) throw uploadError;

    // Get public URL
    const { data } = supabase.storage
      .from("gaming-uploads")
      .getPublicUrl(fileName);

    const fileUrl = data.publicUrl;

    // Insert into DB
    const { error: dbError } = await supabase
      .from("gaming_uploads")
      .insert([{
        user_id: user.id,
        title: document.getElementById("title").value,
        caption: document.getElementById("caption").value,
        game_title: document.getElementById("game").value,
        content_type: document.getElementById("type").value,
        file_url: fileUrl,
        thumbnail_url: fileUrl
      }]);

    if (dbError) throw dbError;

    status.innerText = "✅ Upload successful";

  } catch (err) {
    console.error(err);
    status.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
