<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Go Live - Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#000;color:#fff;padding:20px;text-align:center}
    .wrap{max-width:900px;margin:0 auto}
    video{width:100%;max-width:700px;border-radius:18px;background:#111}
    .btn{border:0;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:800;cursor:pointer;margin:8px}
    .primary{background:#19e68c;color:#000}
    .secondary{background:#222;color:#fff}
    .status{margin-top:12px;min-height:24px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔴 Go Live</h1>
    <p>Start your live room.</p>
    <div>
      <button id="startBtn" class="btn primary">Start Live</button>
      <button id="stopBtn" class="btn secondary">Stop Live</button>
    </div>
    <div class="status" id="status"></div>
    <video id="localVideo" autoplay muted playsinline></video>
  </div>

  <script type="module">
    import { connect } from "https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.esm.min.js";

    const statusEl = document.getElementById("status");
    const videoEl = document.getElementById("localVideo");
    let room;
    let stream;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function startLive() {
      try {
        const username = localStorage.getItem("username") || "guest";
        const roomName = "live-" + username;

        setStatus("Getting token...");
        const res = await fetch(`/api/livekit-token?room=${encodeURIComponent(roomName)}&username=${encodeURIComponent(username)}&canPublish=true`);
        const data = await res.json();

        room = await connect(data.url, data.token);

        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        stream.getTracks().forEach(track => {
          room.localParticipant.publishTrack(track);
        });

        videoEl.srcObject = stream;
        setStatus("You are live.");
      } catch (err) {
        setStatus("Live error: " + err.message);
      }
    }

    function stopLive() {
      if (room) room.disconnect();
      if (stream) stream.getTracks().forEach(track => track.stop());
      videoEl.srcObject = null;
      setStatus("Live ended.");
    }

    document.getElementById("startBtn").addEventListener("click", startLive);
    document.getElementById("stopBtn").addEventListener("click", stopLive);
  </script>
</body>
</html>
