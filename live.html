<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Go Live | Rich Bizness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url("images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 45px;
      height: 45px;
      border-radius: 10px;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #39ff14; }
      50% { box-shadow: 0 0 25px #39ff14; }
      100% { box-shadow: 0 0 10px #39ff14; }
    }

    .logo span {
      color: #39ff14;
      font-weight: bold;
      font-size: 22px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
      font-weight: bold;
    }

    .nav a:hover {
      color: #39ff14;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      padding: 40px;
    }

    .panel {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #39ff14;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }

    .start {
      background: #39ff14;
      color: black;
    }

    .end {
      background: #222;
      color: white;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(57,255,20,0.2);
    }

    .video-box {
      height: 400px;
      background: black;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: gray;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">
      <img src="images/brand/1E7155FE-1726-4D71-964F-B0337A2E80A1.png">
      <span>Rich Bizness</span>
    </div>

    <div>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="watch.html">Watch</a>
      <a href="music.html">Music</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- LEFT PANEL -->
    <div class="panel">
      <h1>Start Live Stream</h1>
      <p>Enter your room + name</p>

      <input id="room" placeholder="Room Name" value="richbizness-live-room">
      <input id="name" placeholder="Host Name" value="richbizness-host">

      <button class="btn start" onclick="startLive()">Start Live</button>
      <button class="btn end" onclick="endLive()">End Live</button>

      <div class="status" id="status">Ready</div>

      <br>

      <h3>Live Setup</h3>
      <p style="font-size:12px;">
        Route: /api/livekit-token<br>
        Method: POST<br>
        Body: roomName, participantName
      </p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel">
      <h1>Host Preview</h1>

      <div class="video-box" id="video">
        Camera preview will appear here
      </div>
    </div>

  </div>

  <script>
    async function startLive() {
      const room = document.getElementById("room").value;
      const name = document.getElementById("name").value;

      document.getElementById("status").innerText = "Connecting...";

      try {
        const res = await fetch("/api/livekit-token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            roomName: room,
            participantName: name
          })
        });

        const data = await res.json();

        console.log("TOKEN:", data);

        document.getElementById("status").innerText = "LIVE 🔴";

      } catch (err) {
        document.getElementById("status").innerText = "Error starting live";
      }
    }

    function endLive() {
      document.getElementById("status").innerText = "Stream Ended";
    }
  </script>

</body>
</html>
