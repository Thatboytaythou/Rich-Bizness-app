<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Live</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }
    .panel, .stage {
      background: #111;
      border-radius: 18px;
      border: 1px solid #1f1f1f;
      padding: 20px;
    }
    h1, h2 {
      color: #39ff14;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
    }
    input {
      background: #1d1d1d;
      color: white;
    }
    button {
      font-weight: 800;
      cursor: pointer;
    }
    .green {
      background: #39ff14;
      color: #000;
    }
    .dark {
      background: #222;
      color: #fff;
    }
    #videoContainer video {
      width: 100%;
      max-height: 70vh;
      border-radius: 12px;
      background: black;
    }
    #status {
      margin-top: 14px;
      color: #39ff14;
    }
    #errorBox {
      margin-top: 10px;
      color: #ff6b6b;
    }
    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <p><a href="index.html" style="color:white;">← Home</a></p>

  <div class="wrap">
    <div class="panel">
      <h1>Host Live</h1>
      <input id="roomName" value="richbizness-live-room" placeholder="Room name" />
      <input id="identity" value="host-main" placeholder="Host identity" />
      <input id="displayName" value="Rich Bizness" placeholder="Display name" />
      <button id="startBtn" class="green">Start Live</button>
      <button id="endBtn" class="dark">End Live</button>
      <div id="status">Not connected</div>
      <div id="errorBox"></div>
    </div>

    <div class="stage">
      <h2>Live Stage</h2>
      <div id="videoContainer"></div>
    </div>
  </div>

  <script type="module">
    import {
      Room,
      RoomEvent,
      createLocalVideoTrack,
      createLocalAudioTrack
    } from "https://esm.sh/livekit-client";

    const startBtn = document.getElementById("startBtn");
    const endBtn = document.getElementById("endBtn");
    const status = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const videoContainer = document.getElementById("videoContainer");

    let room = null;
    let localVideoTrack = null;
    let localAudioTrack = null;

    startBtn.addEventListener("click", async () => {
      errorBox.textContent = "";

      try {
        const roomName = document.getElementById("roomName").value.trim();
        const identity = document.getElementById("identity").value.trim();
        const displayName = document.getElementById("displayName").value.trim();

        const response = await fetch("/get-livekit-token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            roomName,
            identity,
            name: displayName,
            role: "host"
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to get token");
        }

        room = new Room();

        room.on(RoomEvent.Disconnected, () => {
          status.textContent = "Disconnected";
        });

        await room.connect(data.url, data.token);

        localVideoTrack = await createLocalVideoTrack();
        localAudioTrack = await createLocalAudioTrack();

        await room.localParticipant.publishTrack(localVideoTrack);
        await room.localParticipant.publishTrack(localAudioTrack);

        const el = localVideoTrack.attach();
        videoContainer.innerHTML = "";
        videoContainer.appendChild(el);

        status.textContent = "Live and connected";
      } catch (error) {
        console.error(error);
        status.textContent = "Connection failed";
        errorBox.textContent = error.message;
      }
    });

    endBtn.addEventListener("click", () => {
      try {
        if (localVideoTrack) {
          localVideoTrack.stop();
          localVideoTrack.detach().forEach(el => el.remove());
        }

        if (localAudioTrack) {
          localAudioTrack.stop();
        }

        if (room) {
          room.disconnect();
        }

        room = null;
        localVideoTrack = null;
        localAudioTrack = null;
        videoContainer.innerHTML = "";
        status.textContent = "Live ended";
      } catch (error) {
        errorBox.textContent = error.message;
      }
    });
  </script>
</body>
</html>
