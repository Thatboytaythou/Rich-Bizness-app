<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Live | Rich Bizness</title>
  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#050505;color:#fff;padding:24px}
    .container{max-width:1200px;margin:0 auto}
    .topbar{display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:24px}
    .brand{font-size:32px;font-weight:900;color:#39ff14}
    .top-links{display:flex;gap:10px;flex-wrap:wrap}
    .top-links a{padding:10px 14px;border-radius:10px;background:#111;border:1px solid #222;text-decoration:none;color:#fff}
    .card{background:#0d0d0d;border:1px solid #222;border-radius:22px;padding:22px;margin-bottom:20px}
    h1,h2{color:#39ff14;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    input{width:100%;padding:14px;border-radius:12px;border:1px solid #333;background:#111;color:#fff}
    button{padding:13px 18px;border:none;border-radius:12px;font-weight:900;cursor:pointer}
    .green{background:#39ff14;color:#000}
    .dark{background:#171717;color:#fff;border:1px solid #333}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
    #status{margin-top:14px;padding:12px 14px;background:#111;border:1px solid #222;border-radius:12px}
    #videoWrap{margin-top:18px;border-radius:22px;overflow:hidden;background:#000;min-height:420px;display:flex;align-items:center;justify-content:center}
    #localVideo video{width:100%;max-height:70vh;object-fit:cover;display:block}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">Go Live</div>
      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="watch.html">Watch</a>
        <a href="messages.html">Messages</a>
      </div>
    </div>

    <div class="card">
      <h1>Start Live Stream</h1>
      <div class="grid">
        <input id="roomName" placeholder="Room name" />
        <input id="participantName" placeholder="Your name / host name" />
      </div>
      <div class="row">
        <button id="joinBtn" class="green">Start Live</button>
        <button id="leaveBtn" class="dark">End Live</button>
      </div>
      <div id="status">Ready.</div>
    </div>

    <div class="card">
      <h2>Camera Preview</h2>
      <div id="videoWrap">
        <div id="localVideo">Your stream preview will show here.</div>
      </div>
    </div>
  </div>

  <script>
    const { Room, RoomEvent, createLocalVideoTrack, createLocalAudioTrack } = LivekitClient;

    let room = null;
    let localVideoTrack = null;
    let localAudioTrack = null;

    const roomNameInput = document.getElementById("roomName");
    const participantNameInput = document.getElementById("participantName");
    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const statusBox = document.getElementById("status");
    const localVideoWrap = document.getElementById("localVideo");

    function setStatus(message) {
      statusBox.textContent = message;
    }

    async function startLive() {
      try {
        const roomName = roomNameInput.value.trim();
        const participantName = participantNameInput.value.trim();

        if (!roomName || !participantName) {
          setStatus("Enter room name and host name.");
          return;
        }

        setStatus("Creating host token...");

        const res = await fetch("/api/livekit-token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            roomName,
            participantName,
            role: "host"
          })
        });

        const json = await res.json();

        if (!res.ok) {
          throw new Error(json.error || "Failed to get LiveKit token");
        }

        room = new Room();

        room.on(RoomEvent.Disconnected, () => {
          setStatus("Disconnected.");
          localVideoWrap.innerHTML = "Your stream preview will show here.";
        });

        setStatus("Connecting to LiveKit...");

        await room.connect(json.url, json.token);

        setStatus("Creating local camera and mic...");

        localVideoTrack = await createLocalVideoTrack();
        localAudioTrack = await createLocalAudioTrack();

        await room.localParticipant.publishTrack(localVideoTrack);
        await room.localParticipant.publishTrack(localAudioTrack);

        localVideoWrap.innerHTML = "";
        const el = localVideoTrack.attach();
        el.style.width = "100%";
        el.style.height = "100%";
        el.style.objectFit = "cover";
        localVideoWrap.appendChild(el);

        setStatus(`Live now in room: ${roomName}`);
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Could not start live stream.");
      }
    }

    async function endLive() {
      try {
        if (localVideoTrack) {
          localVideoTrack.stop();
          localVideoTrack = null;
        }

        if (localAudioTrack) {
          localAudioTrack.stop();
          localAudioTrack = null;
        }

        if (room) {
          await room.disconnect();
          room = null;
        }

        localVideoWrap.innerHTML = "Your stream preview will show here.";
        setStatus("Live ended.");
      } catch (error) {
        console.error(error);
        setStatus("Error ending live.");
      }
    }

    joinBtn.addEventListener("click", startLive);
    leaveBtn.addEventListener("click", endLive);
  </script>
</body>
</html>
