<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rich Bizness — Notifications</title>

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/notifications.css" />
</head>

<body class="notifications-page">
  <div class="notifications-bg"></div>

  <div class="page-shell notifications-shell">
    <div id="elite-platform-nav"></div>

    <section class="notifications-hero">
      <div>
        <span class="notifications-kicker">Rich Bizness Alerts</span>
        <h1>Everything happening in your empire.</h1>
        <p>
          Likes, messages, purchases, live events, challenges, followers, uploads,
          and system alerts — all in one place.
        </p>

        <div class="notifications-actions">
          <button id="refresh-notifications-btn" class="btn btn-primary">Refresh</button>
          <button id="mark-all-read-btn" class="btn btn-dark">Mark All Read</button>
        </div>
      </div>
    </section>

    <section id="notifications-status" class="notifications-status">
      Loading notifications...
    </section>

    <main class="notifications-layout">
      <aside class="notifications-filters">
        <h3>Filter</h3>

        <button data-filter="all" class="filter-btn active">All</button>
        <button data-filter="social" class="filter-btn">Social</button>
        <button data-filter="messages" class="filter-btn">Messages</button>
        <button data-filter="live" class="filter-btn">Live</button>
        <button data-filter="gaming" class="filter-btn">Gaming</button>
        <button data-filter="sports" class="filter-btn">Sports</button>
        <button data-filter="music" class="filter-btn">Music</button>
        <button data-filter="gallery" class="filter-btn">Gallery</button>
        <button data-filter="store" class="filter-btn">Store</button>
        <button data-filter="system" class="filter-btn">System</button>
      </aside>

      <section class="notifications-main">
        <div id="notifications-list" class="notifications-list">
          <div class="status-box">Loading...</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.NEXT_PUBLIC_SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

    window.SUPABASE_URL = window.NEXT_PUBLIC_SUPABASE_URL;
    window.SUPABASE_PUBLISHABLE_KEY = window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;

    window.NEXT_PUBLIC_SUPABASE_ANON_KEY = window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;
    window.SUPABASE_ANON_KEY = window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;
  </script>

  <script type="module" src="/core/pages/notifications.js"></script>
</body>
</html>
