<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Studio Showdown</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#081b12;
  color:white;
  text-align:center;
}

h1 {
  margin-top:20px;
}

#game {
  margin-top:30px;
}

.pad {
  width:120px;
  height:120px;
  margin:10px;
  display:inline-block;
  border-radius:12px;
  cursor:pointer;
  opacity:0.7;
}

.active {
  opacity:1;
  transform:scale(1.1);
}

#score {
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>🎧 Studio Showdown</h1>
<p>Tap the beat. Don’t miss.</p>

<div id="game">
  <div class="pad" id="pad1" style="background:#00ff99"></div>
  <div class="pad" id="pad2" style="background:#00ccff"></div>
  <div class="pad" id="pad3" style="background:#ffcc00"></div>
</div>

<div id="score">Score: 0</div>

<script>
let score = 0;
let activePad = null;

function activatePad() {
  const pads = document.querySelectorAll(".pad");

  if (activePad) activePad.classList.remove("active");

  const rand = Math.floor(Math.random() * pads.length);
  activePad = pads[rand];
  activePad.classList.add("active");

  setTimeout(activatePad, 800);
}

document.querySelectorAll(".pad").forEach(pad => {
  pad.onclick = () => {
    if (pad === activePad) {
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    } else {
      alert("Missed beat! Final Score: " + score);
      score = 0;
      document.getElementById("score").innerText = "Score: 0";
    }
  };
});

activatePad();
</script>

</body>
</html>
