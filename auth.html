<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness Auth</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(15, 15, 15, 0.92);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #a8a8a8;
      --primary: #19e68c;
      --primary-dark: #11c775;
      --danger: #ff5a67;
      --input: #ececec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25,230,140,0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(180deg, #080808 0%, #020202 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      overflow: hidden;
    }

    .top {
      padding: 28px 26px 10px;
      text-align: center;
    }

    .headline {
      margin: 0;
      font-size: 36px;
      line-height: 1.05;
      font-weight: 800;
    }

    .sub {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .tabs {
      margin: 24px 20px 0;
      padding: 6px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .tab {
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      background: transparent;
    }

    .tab.active {
      background: #fff;
      color: #000;
    }

    .content {
      padding: 22px 20px 22px;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 800;
    }

    .panel-copy {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      text-align: left;
      margin-bottom: 12px;
    }

    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 8px 4px;
      font-weight: 600;
    }

    .input {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 16px;
      background: var(--input);
      color: #111;
      outline: none;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cta {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }

    .cta.primary {
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: #000;
    }

    .cta.secondary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 18px 0 2px;
    }

    .message {
      min-height: 26px;
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 600;
      white-space: pre-wrap;
    }

    .message.ok {
      color: var(--primary);
    }

    .message.err {
      color: var(--danger);
    }

    .footer {
      padding: 0 20px 24px;
      text-align: center;
    }

    .ghost {
      display: inline-flex;
      text-decoration: none;
      padding: 13px 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      color: #8ecbff;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    @media (max-width: 520px) {
      body { padding: 14px; }
      .headline { font-size: 30px; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="top">
        <h1 class="headline">Create. Upload. Build your name.</h1>
        <p class="sub">Premium artist access for tattoos, 3D printing, design, and digital work.</p>
      </div>

      <div class="tabs">
        <button id="tabSignup" class="tab active" type="button">Create account</button>
        <button id="tabLogin" class="tab" type="button">Log in</button>
      </div>

      <div class="content">
        <div id="signupPanel" class="panel active">
          <h2 class="panel-title">Join the platform</h2>
          <p class="panel-copy">Set up your artist profile and get your page live.</p>

          <div class="field">
            <label class="label" for="signupEmail">Email</label>
            <input id="signupEmail" class="input" type="email" />
          </div>

          <div class="field">
            <label class="label" for="signupPassword">Password</label>
            <input id="signupPassword" class="input" type="password" />
          </div>

          <div class="row">
            <div class="field">
              <label class="label" for="signupUsername">Username</label>
              <input id="signupUsername" class="input" type="text" />
            </div>

            <div class="field">
              <label class="label" for="signupDisplayName">Display Name</label>
              <input id="signupDisplayName" class="input" type="text" />
            </div>
          </div>

          <button id="signupBtn" class="cta primary" type="button">Sign Up</button>
        </div>

        <div id="loginPanel" class="panel">
          <h2 class="panel-title">Welcome back</h2>
          <p class="panel-copy">Log in to manage your profile, uploads, and artist page.</p>

          <div class="field">
            <label class="label" for="loginEmail">Email</label>
            <input id="loginEmail" class="input" type="email" />
          </div>

          <div class="field">
            <label class="label" for="loginPassword">Password</label>
            <input id="loginPassword" class="input" type="password" />
          </div>

          <button id="loginBtn" class="cta secondary" type="button">Log In</button>
        </div>

        <div class="divider"></div>
        <div id="msg" class="message"></div>
      </div>

      <div class="footer">
        <a class="ghost" href="/index.html">← Back Home</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ksvdequymkceevocgpdj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
    );

    const msg = document.getElementById("msg");
    const signupPanel = document.getElementById("signupPanel");
    const loginPanel = document.getElementById("loginPanel");
    const tabSignup = document.getElementById("tabSignup");
    const tabLogin = document.getElementById("tabLogin");

    function setMsg(text, error = false) {
      msg.textContent = text;
      msg.className = "message " + (error ? "err" : "ok");
    }

    function showSignup() {
      signupPanel.classList.add("active");
      loginPanel.classList.remove("active");
      tabSignup.classList.add("active");
      tabLogin.classList.remove("active");
      setMsg("");
    }

    function showLogin() {
      loginPanel.classList.add("active");
      signupPanel.classList.remove("active");
      tabLogin.classList.add("active");
      tabSignup.classList.remove("active");
      setMsg("");
    }

    async function ensureProfile(user, username, displayName) {
      const { data: existing } = await supabase
        .from("profiles")
        .select("id")
        .eq("id", user.id)
        .maybeSingle();

      if (existing) return;

      const fallback = user.email?.split("@")[0] || "artist";

      await supabase.from("profiles").insert([
        {
          id: user.id,
          username: username || fallback,
          display_name: displayName || fallback,
          bio: ""
        }
      ]);
    }

    async function signUp() {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const username = document.getElementById("signupUsername").value.trim();
      const displayName = document.getElementById("signupDisplayName").value.trim();

      if (!email || !password || !username || !displayName) {
        return setMsg("Fill out all sign up fields.", true);
      }

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: "https://rich-bizness-app.vercel.app/auth.html",
          data: {
            username,
            display_name: displayName
          }
        }
      });

      if (error) return setMsg(error.message, true);

      if (data.user && data.session) {
        await ensureProfile(data.user, username, displayName);
        localStorage.setItem("username", username || displayName || "guest");
        window.location.href = "/profile.html";
        return;
      }

      setMsg("Check your email to confirm your account.");
      showLogin();
      document.getElementById("loginEmail").value = email;
    }

    async function logIn() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!email || !password) {
        return setMsg("Enter your email and password.", true);
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) return setMsg(error.message, true);

      await ensureProfile(data.user);

      const username =
        data.user.user_metadata?.username ||
        data.user.email?.split("@")[0] ||
        "guest";

      localStorage.setItem("username", username);
      window.location.href = "/profile.html";
    }

    tabSignup.addEventListener("click", showSignup);
    tabLogin.addEventListener("click", showLogin);
    document.getElementById("signupBtn").addEventListener("click", signUp);
    document.getElementById("loginBtn").addEventListener("click", logIn);

    const {
      data: { session }
    } = await supabase.auth.getSession();

    if (session?.user) {
      window.location.href = "/profile.html";
    }
  </script>
</body>
</html>
