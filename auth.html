<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness | Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      padding: 24px;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    .box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 18px;
    }
    h1 {
      margin: 0 0 10px;
      color: #7dff71;
    }
    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #000;
      color: white;
      font-size: 16px;
      margin-top: 10px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #7dff71;
      color: black;
      font-weight: 700;
      border: none;
    }
    .dark-btn {
      background: #1c1c1c;
      color: white;
      border: 1px solid #333;
    }
    #statusBox {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>Rich Bizness Auth Test</h1>
      <div>This page tests raw Supabase Auth only.</div>
    </div>

    <div class="box">
      <h1>Sign Up</h1>
      <input id="signupEmail" type="email" placeholder="Email" />
      <input id="signupPassword" type="password" placeholder="Password" />
      <button id="signupBtn" type="button">Create Account</button>
    </div>

    <div class="box">
      <h1>Login</h1>
      <input id="loginEmail" type="email" placeholder="Email" />
      <input id="loginPassword" type="password" placeholder="Password" />
      <button id="loginBtn" type="button">Sign In</button>
      <button id="checkBtn" class="dark-btn" type="button">Check Session</button>
      <button id="logoutBtn" class="dark-btn" type="button">Log Out</button>
    </div>

    <div class="box">
      <h1>Status</h1>
      <div id="statusBox">Ready.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const statusBox = document.getElementById("statusBox");
    const signupEmail = document.getElementById("signupEmail");
    const signupPassword = document.getElementById("signupPassword");
    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");

    function setStatus(message) {
      statusBox.textContent = message;
      console.log(message);
    }

    document.getElementById("signupBtn").addEventListener("click", async () => {
      try {
        setStatus("Creating account...");
        const email = signupEmail.value.trim().toLowerCase();
        const password = loginPassword.value.trim() || signupPassword.value.trim();

        if (!email) throw new Error("Email is required.");
        if (!password || password.length < 6) throw new Error("Password must be at least 6 characters.");

        const { data, error } = await supabase.auth.signUp({
          email,
          password
        });

        if (error) throw error;

        setStatus("✅ Sign up worked.\n" + JSON.stringify({
          user_id: data.user?.id || null,
          has_session: !!data.session
        }, null, 2));
      } catch (error) {
        console.error(error);
        setStatus("❌ Sign up failed:\n" + error.message);
      }
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        setStatus("Signing in...");
        const email = loginEmail.value.trim().toLowerCase();
        const password = loginPassword.value.trim();

        if (!email) throw new Error("Email is required.");
        if (!password) throw new Error("Password is required.");

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        setStatus("✅ Login worked.\n" + JSON.stringify({
          user_id: data.user?.id || null,
          email: data.user?.email || null,
          has_session: !!data.session
        }, null, 2));
      } catch (error) {
        console.error(error);
        setStatus("❌ Login failed:\n" + error.message);
      }
    });

    document.getElementById("checkBtn").addEventListener("click", async () => {
      try {
        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;

        setStatus("Session check:\n" + JSON.stringify({
          has_session: !!data.session,
          user_id: data.session?.user?.id || null,
          email: data.session?.user?.email || null
        }, null, 2));
      } catch (error) {
        console.error(error);
        setStatus("❌ Session check failed:\n" + error.message);
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        const { error } = await supabase.auth.signOut();
        if (error) throw error;
        setStatus("✅ Logged out.");
      } catch (error) {
        console.error(error);
        setStatus("❌ Logout failed:\n" + error.message);
      }
    });
  </script>
</body>
</html>
