<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth | Rich Bizness</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Arial; background:#050505; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .shell { width:100%; max-width:1100px; display:grid; grid-template-columns:1fr 460px; gap:22px; }
    .card { background:#0d0d0d; border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:26px; }
    .hero { display:flex; flex-direction:column; justify-content:center; min-height:620px; }
    .brand { font-size:42px; font-weight:900; color:#39ff14; margin-bottom:14px; }
    .hero h1 { font-size:40px; line-height:1.08; margin-bottom:14px; }
    .hero p { color:#d5d5d5; font-size:17px; line-height:1.6; max-width:560px; margin-bottom:24px; }
    .hero-links { display:flex; gap:12px; flex-wrap:wrap; }
    .hero-links a { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); padding:12px 16px; border-radius:12px; font-weight:700; }
    .auth-panel h2 { color:#39ff14; font-size:32px; margin-bottom:10px; }
    .subtext { color:#d3d3d3; margin-bottom:22px; line-height:1.5; }
    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
    .tab-btn { border:1px solid rgba(255,255,255,.08); background:#151515; color:#fff; border-radius:14px; padding:12px; font-size:15px; font-weight:800; cursor:pointer; }
    .tab-btn.active { background:#39ff14; color:#000; }
    .form-group { margin-bottom:14px; }
    label { display:block; margin-bottom:8px; font-size:14px; font-weight:800; }
    input { width:100%; background:#121212; color:#fff; border:1px solid #2b2b2b; border-radius:14px; padding:14px 16px; font-size:15px; }
    .button-row { display:grid; gap:12px; margin-top:10px; }
    button { border:none; border-radius:14px; padding:14px 18px; font-size:15px; font-weight:900; cursor:pointer; }
    .btn-green { background:#39ff14; color:#000; }
    .btn-dark { background:#1c1c1c; color:#fff; border:1px solid rgba(255,255,255,.08); }
    .status-box { margin-top:16px; padding:14px 16px; border-radius:14px; font-weight:700; }
    .mini-links { margin-top:16px; display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; font-size:14px; color:#d8d8d8; }
    .mini-links a, .mini-links button { background:none; border:none; color:#d8d8d8; cursor:pointer; padding:0; font-size:14px; font-weight:700; }
    .session-box { margin-top:18px; padding:14px; border-radius:14px; background:#111; border:1px solid rgba(255,255,255,.06); color:#d7d7d7; font-size:14px; line-height:1.5; }
  </style>
</head>
<body>
<div class="shell">
  <div class="card hero">
    <div class="brand">Rich Bizness</div>
    <h1>Sign in and build your platform.</h1>
    <p>Log in, edit your profile, upload artwork, upload sports clips, go live, and let people watch.</p>
    <div class="hero-links">
      <a href="index.html">Home</a>
      <a href="gallery/index.html">Gallery</a>
      <a href="sports.html">Sports</a>
      <a href="live.html">Go Live</a>
      <a href="watch.html">Watch Live</a>
    </div>
  </div>

  <div class="card auth-panel">
    <h2>Artist Auth</h2>
    <p class="subtext">Create an account or log in with your email and password.</p>

    <div class="tabs">
      <button id="signupTab" class="tab-btn active" type="button">Sign Up</button>
      <button id="loginTab" class="tab-btn" type="button">Login</button>
    </div>

    <div class="form-group">
      <label for="emailInput">Email</label>
      <input id="emailInput" type="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label for="passwordInput">Password</label>
      <input id="passwordInput" type="password" placeholder="Enter your password" />
    </div>

    <div class="form-group" id="confirmWrap">
      <label for="confirmPasswordInput">Confirm Password</label>
      <input id="confirmPasswordInput" type="password" placeholder="Confirm your password" />
    </div>

    <div class="button-row">
      <button id="mainActionBtn" class="btn-green" type="button">Create Account</button>
      <button id="goProfileBtn" class="btn-dark" type="button">Go To Profile</button>
    </div>

    <div id="statusBox" class="status-box">Ready.</div>

    <div class="mini-links">
      <button id="resetPasswordBtn" type="button">Forgot password?</button>
      <a href="profile.html">Profile</a>
    </div>

    <div id="sessionBox" class="session-box">Checking login state...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const signupTab = document.getElementById("signupTab");
const loginTab = document.getElementById("loginTab");
const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const confirmPasswordInput = document.getElementById("confirmPasswordInput");
const confirmWrap = document.getElementById("confirmWrap");
const mainActionBtn = document.getElementById("mainActionBtn");
const goProfileBtn = document.getElementById("goProfileBtn");
const resetPasswordBtn = document.getElementById("resetPasswordBtn");
const statusBox = document.getElementById("statusBox");
const sessionBox = document.getElementById("sessionBox");
let mode = "signup";

function showStatus(message) { statusBox.textContent = message; }
function setMode(nextMode) {
  mode = nextMode;
  if (mode === "signup") {
    signupTab.classList.add("active"); loginTab.classList.remove("active");
    confirmWrap.style.display = "block"; mainActionBtn.textContent = "Create Account";
    showStatus("Create a new artist account.");
  } else {
    loginTab.classList.add("active"); signupTab.classList.remove("active");
    confirmWrap.style.display = "none"; mainActionBtn.textContent = "Login";
    showStatus("Log in to your account.");
  }
}
async function updateSessionBox() {
  const { data, error } = await supabaseClient.auth.getUser();
  sessionBox.textContent = (error || !data.user) ? "Not logged in." : "Logged in as " + data.user.email;
}
function validateEmail(email) { return /\S+@\S+\.\S+/.test(email); }

async function handleSignup() {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  const confirmPassword = confirmPasswordInput.value.trim();
  if (!email || !password || !confirmPassword) return showStatus("Please fill in all fields.");
  if (!validateEmail(email)) return showStatus("Enter a valid email address.");
  if (password.length < 6) return showStatus("Password must be at least 6 characters.");
  if (password !== confirmPassword) return showStatus("Passwords do not match.");

  showStatus("Creating account...");
  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) return showStatus(error.message);
  showStatus("Account created. Check your email if confirmations are enabled.");
  await updateSessionBox();
  if (data.user) setTimeout(() => window.location.href = "profile.html", 900);
}

async function handleLogin() {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if (!email || !password) return showStatus("Please enter your email and password.");
  showStatus("Logging in...");
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) return showStatus(error.message);
  showStatus("Login successful.");
  await updateSessionBox();
  setTimeout(() => window.location.href = "profile.html", 700);
}

async function handleResetPassword() {
  const email = emailInput.value.trim();
  if (!email) return showStatus("Enter your email first for password reset.");
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/auth.html"
  });
  showStatus(error ? error.message : "Password reset email sent.");
}

async function goToProfile() {
  const { data, error } = await supabaseClient.auth.getUser();
  if (error || !data.user) return showStatus("Log in first before opening profile.");
  window.location.href = "profile.html";
}

signupTab.onclick = () => setMode("signup");
loginTab.onclick = () => setMode("login");
mainActionBtn.onclick = () => mode === "signup" ? handleSignup() : handleLogin();
resetPasswordBtn.onclick = handleResetPassword;
goProfileBtn.onclick = goToProfile;
setMode("signup");
updateSessionBox();
</script>
</body>
</html>
