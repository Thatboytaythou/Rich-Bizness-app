<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth | Rich Bizness LLC</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .card {
      max-width: 420px;
      margin: auto;
      background: #111;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #222;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .signin {
      background: #22c55e;
      color: #000;
    }

    .signup {
      background: #333;
      color: #fff;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Welcome back</h1>
  <p>Sign in or create an account</p>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button class="signin" id="signInBtn">Sign In</button>
  <button class="signup" id="signUpBtn">Create Account</button>

  <div class="status" id="status">Ready</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* 🔥 YOUR REAL SUPABASE KEYS */
const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const statusEl = document.getElementById("status");

const signInBtn = document.getElementById("signInBtn");
const signUpBtn = document.getElementById("signUpBtn");

/* 🔥 SIGN IN */
signInBtn.onclick = async () => {
  const email = emailEl.value;
  const password = passwordEl.value;

  statusEl.textContent = "Signing in...";

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    statusEl.textContent = "❌ " + error.message;
    return;
  }

  const user = data.user;

  localStorage.setItem("username", user.email.split("@")[0]);
  localStorage.setItem("userEmail", user.email);
  localStorage.setItem("isLoggedIn", "true");

  statusEl.textContent = "✅ Logged in";

  window.location.href = "/profile.html";
};

/* 🔥 SIGN UP */
signUpBtn.onclick = async () => {
  const email = emailEl.value;
  const password = passwordEl.value;

  statusEl.textContent = "Creating account...";

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    statusEl.textContent = "❌ " + error.message;
    return;
  }

  statusEl.textContent = "✅ Account created! Now sign in.";
};
</script>

</body>
</html>
