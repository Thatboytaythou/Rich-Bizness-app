<!DOCTYPE html>
<html>
<head>
  <title>Login - Rich Bizness LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    .box {
      max-width: 420px;
      margin: 40px auto;
      background: #111;
      border: 1px solid #222;
      border-radius: 18px;
      padding: 22px;
    }
    input, button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      font-weight: bold;
    }
    .primary { background: #00ffaa; color: black; }
    .secondary { background: #222; color: white; }
    a { color: #4da3ff; }
  </style>
</head>
<body>
  <h1>🔥 Rich Bizness Login 🔥</h1>

  <div class="box">
    <h2>Create Account</h2>
    <input id="signupEmail" type="email" placeholder="Email" />
    <input id="signupPassword" type="password" placeholder="Password" />
    <input id="signupUsername" type="text" placeholder="Username" />
    <input id="signupDisplayName" type="text" placeholder="Display Name" />
    <button id="signupBtn" class="primary">Sign Up</button>

    <hr style="border-color:#222; margin:24px 0;">

    <h2>Log In</h2>
    <input id="loginEmail" type="email" placeholder="Email" />
    <input id="loginPassword" type="password" placeholder="Password" />
    <button id="loginBtn" class="secondary">Log In</button>

    <p id="status"></p>
    <p><a href="/index.html">Back Home</a></p>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "REPLACE_WITH_YOUR_REAL_ANON_KEY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const status = document.getElementById("status");

    document.getElementById("signupBtn").onclick = async () => {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const username = document.getElementById("signupUsername").value.trim();
      const displayName = document.getElementById("signupDisplayName").value.trim();

      status.textContent = "Creating account...";

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      });

      if (error) {
        status.textContent = error.message;
        return;
      }

      if (data.user) {
        const { error: profileError } = await supabase.from("profiles").insert([
          {
            id: data.user.id,
            username,
            display_name: displayName
          }
        ]);

        if (profileError) {
          status.textContent = "Account created, but profile failed: " + profileError.message;
          return;
        }
      }

      status.textContent = "Account created ✅ You can log in now.";
    };

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      status.textContent = "Logging in...";

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        status.textContent = error.message;
        return;
      }

      window.location.href = "/profile.html";
    };
  </script>
</body>
</html>
