<!DOCTYPE html>
<html>
<head>
  <title>Rich Bizness Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 24px;
      text-align: center;
    }

    .box {
      max-width: 720px;
      margin: 0 auto;
      background: #0b0b0b;
      border: 1px solid #222;
      border-radius: 28px;
      padding: 28px 22px 32px;
    }

    h1 {
      font-size: 34px;
      margin: 8px 0 28px;
    }

    h2 {
      font-size: 28px;
      margin: 20px 0 18px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 18px 20px;
      margin: 12px 0;
      border-radius: 18px;
      border: none;
      font-size: 18px;
    }

    input {
      background: #e9e9e9;
      color: #111;
    }

    button {
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #11f0a5;
      color: #000;
    }

    .secondary {
      background: #1b1b1b;
      color: #fff;
    }

    .divider {
      height: 1px;
      background: #555;
      margin: 28px 0;
    }

    .msg {
      margin-top: 16px;
      min-height: 24px;
      color: #fff;
      font-size: 16px;
      white-space: pre-wrap;
    }

    a {
      color: #5da8ff;
      text-decoration: underline;
      font-size: 16px;
    }

    .sub {
      color: #bbb;
      margin-top: -10px;
      margin-bottom: 18px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🔥 Rich Bizness Login 🔥</h1>

    <h2>Create Account</h2>
    <div class="sub">Make your artist account and profile</div>

    <input id="signupEmail" type="email" placeholder="Email" />
    <input id="signupPassword" type="password" placeholder="Password" />
    <input id="signupUsername" type="text" placeholder="Username" />
    <input id="signupDisplayName" type="text" placeholder="Display Name" />

    <button id="signupBtn" class="primary">Sign Up</button>

    <div class="divider"></div>

    <h2>Log In</h2>

    <input id="loginEmail" type="email" placeholder="Email" />
    <input id="loginPassword" type="password" placeholder="Password" />

    <button id="loginBtn" class="secondary">Log In</button>

    <div id="msg" class="msg"></div>

    <p style="margin-top: 18px;">
      <a href="/index.html">Back Home</a>
    </p>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const msg = document.getElementById("msg");

    function setMsg(text, isError = false) {
      msg.textContent = text;
      msg.style.color = isError ? "#ff6b6b" : "#ffffff";
    }

    function savePendingProfile(username, displayName) {
      localStorage.setItem(
        "rb_pending_profile",
        JSON.stringify({ username, displayName })
      );
    }

    function getPendingProfile() {
      try {
        return JSON.parse(localStorage.getItem("rb_pending_profile") || "null");
      } catch {
        return null;
      }
    }

    function clearPendingProfile() {
      localStorage.removeItem("rb_pending_profile");
    }

    async function upsertProfileForCurrentUser(fallbackEmail = "") {
      const {
        data: { user },
        error: userError
      } = await supabase.auth.getUser();

      if (userError || !user) {
        return { ok: false, message: "No logged-in user found." };
      }

      const pending = getPendingProfile();
      const emailName = fallbackEmail && fallbackEmail.includes("@")
        ? fallbackEmail.split("@")[0]
        : "artist";

      const username = pending?.username || emailName;
      const displayName = pending?.displayName || emailName;

      const { data: existing, error: selectError } = await supabase
        .from("profiles")
        .select("id")
        .eq("id", user.id)
        .maybeSingle();

      if (selectError) {
        return { ok: false, message: selectError.message };
      }

      if (!existing) {
        const { error: insertError } = await supabase
          .from("profiles")
          .insert([
            {
              id: user.id,
              username: username,
              display_name: displayName
            }
          ]);

        if (insertError) {
          return { ok: false, message: insertError.message };
        }
      }

      clearPendingProfile();
      return { ok: true };
    }

    async function signUp() {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const username = document.getElementById("signupUsername").value.trim();
      const displayName = document.getElementById("signupDisplayName").value.trim();

      if (!email || !password || !username || !displayName) {
        setMsg("Fill out all sign up fields.", true);
        return;
      }

      savePendingProfile(username, displayName);
      setMsg("Creating account...");

      const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
        email,
        password
      });

      if (signUpError) {
        setMsg(signUpError.message, true);
        return;
      }

      if (signUpData.session) {
        const result = await upsertProfileForCurrentUser(email);

        if (!result.ok) {
          setMsg("Account created, but profile save failed: " + result.message, true);
          return;
        }

        setMsg("Account created and profile saved.");
        return;
      }

      setMsg("Account created. Check your email to confirm, then log in to finish your profile.");
    }

    async function logIn() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!email || !password) {
        setMsg("Enter email and password.", true);
        return;
      }

      setMsg("Logging in...");

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setMsg(error.message, true);
        return;
      }

      const result = await upsertProfileForCurrentUser(email);
      if (!result.ok) {
        setMsg("Login worked, but profile setup failed: " + result.message, true);
        return;
      }

      setMsg("Login successful.");
      window.location.href = "/profile.html";
    }

    document.getElementById("signupBtn").addEventListener("click", signUp);
    document.getElementById("loginBtn").addEventListener("click", logIn);
  </script>
</body>
</html>
