<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rich Bizness Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f0c;
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
      max-width: 400px;
      margin: auto;
    }

    h1 {
      color: #7dff71;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .green {
      background: #7dff71;
      color: black;
    }

    .red {
      background: #ff4d4d;
      color: white;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(125,255,113,0.1);
    }

    .user-info {
      margin-top: 20px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Rich Bizness Login</h1>

  <input id="emailInput" type="email" placeholder="Email" />
  <input id="passwordInput" type="password" placeholder="Password" />

  <button id="signUpBtn" class="green">Sign Up</button>
  <button id="loginBtn" class="green">Login</button>
  <button id="logoutBtn" class="red">Log Out</button>

  <div id="statusBox" class="status">Ready.</div>
  <div id="userInfo" class="user-info"></div>
</div>

<script>
  // 🔥 LOCKED SUPABASE CONFIG
  const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  });

  const emailInput = document.getElementById("emailInput");
  const passwordInput = document.getElementById("passwordInput");
  const signUpBtn = document.getElementById("signUpBtn");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const statusBox = document.getElementById("statusBox");
  const userInfo = document.getElementById("userInfo");

  function setStatus(msg) {
    statusBox.textContent = msg;
  }

  function setUser(user) {
    if (!user) {
      userInfo.innerHTML = "No user signed in.";
      return;
    }

    userInfo.innerHTML = `
      <div><strong>Email:</strong> ${user.email}</div>
      <div><strong>ID:</strong> ${user.id}</div>
    `;
  }

  // ✅ SIGN UP
  signUpBtn.onclick = async () => {
    setStatus("Creating account...");

    const { data, error } = await supabase.auth.signUp({
      email: emailInput.value,
      password: passwordInput.value
    });

    if (error) {
      setStatus("Error: " + error.message);
    } else {
      setStatus("Account created! Check email if confirmation is on.");
      setUser(data.user);
    }
  };

  // ✅ LOGIN
  loginBtn.onclick = async () => {
    setStatus("Logging in...");

    const { data, error } = await supabase.auth.signInWithPassword({
      email: emailInput.value,
      password: passwordInput.value
    });

    if (error) {
      setStatus("Error: " + error.message);
    } else {
      setStatus("Logged in successfully.");
      setUser(data.user);
    }
  };

  // ✅ LOGOUT
  logoutBtn.onclick = async () => {
    await supabase.auth.signOut();
    setStatus("Logged out.");
    setUser(null);
  };

  // ✅ CHECK SESSION ON LOAD
  async function checkSession() {
    setStatus("Checking session...");

    const { data, error } = await supabase.auth.getSession();

    if (error) {
      setStatus("Error checking session.");
      return;
    }

    const user = data?.session?.user || null;

    if (user) {
      setStatus("Session active.");
      setUser(user);
    } else {
      setStatus("No active session.");
      setUser(null);
    }
  }

  checkSession();
</script>

</body>
</html>
