<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed | Rich Bizness</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.25));
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      color: #7dff71;
      font-size: 1.2rem;
      text-shadow: 0 0 10px rgba(125,255,113,0.3);
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      object-fit: cover;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .top-actions a,
    .top-actions button,
    .top-actions span {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      font-size: 14px;
    }

    .user-chip {
      color: #7dff71;
    }

    .feed-shell {
      margin-top: 74px;
    }

    .feed-card {
      position: relative;
      min-height: calc(100vh - 74px);
      display: grid;
      align-items: end;
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: black;
      overflow: hidden;
    }

    .feed-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: black;
    }

    .feed-bg img,
    .feed-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: black;
    }

    .feed-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.35) 38%, rgba(0,0,0,0.86));
    }

    .feed-content {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 16px;
      align-items: end;
      width: 100%;
    }

    .content-main {
      max-width: 820px;
    }

    .pill {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(125,255,113,0.14);
      border: 1px solid rgba(125,255,113,0.2);
      color: #7dff71;
      font-weight: 900;
      font-size: 0.88rem;
      letter-spacing: 0.2px;
    }

    .feed-title {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: #7dff71;
      text-shadow: 0 0 16px rgba(125,255,113,0.25);
      line-height: 1.1;
    }

    .feed-meta {
      margin-bottom: 10px;
      color: #f5f5f5;
      line-height: 1.6;
      font-size: 1rem;
    }

    .feed-meta a {
      color: #7dff71;
      font-weight: 900;
      text-decoration: none;
    }

    .feed-text {
      color: #f2f2f2;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 760px;
    }

    .audio-wrap {
      margin-top: 14px;
      max-width: 520px;
    }

    .audio-wrap audio {
      width: 100%;
    }

    .side-actions {
      display: grid;
      gap: 12px;
      justify-items: stretch;
      align-self: end;
    }

    .side-actions a,
    .side-actions button {
      width: 100%;
      padding: 12px 10px;
      border: none;
      border-radius: 14px;
      background: rgba(0,0,0,0.58);
      color: white;
      font-weight: 900;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
    }

    .side-actions .primary {
      background: #7dff71;
      color: black;
      box-shadow: 0 0 18px rgba(125,255,113,0.24);
      border: none;
    }

    .status-box,
    .empty-box {
      margin: 94px 16px 16px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 800;
    }

    .video-inline {
      position: absolute;
      inset: 0;
    }

    .video-inline video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 860px) {
      .feed-content {
        grid-template-columns: 1fr;
      }

      .side-actions {
        grid-template-columns: repeat(2, 1fr);
        display: grid;
      }

      .feed-title {
        font-size: 1.65rem;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding: 12px;
      }

      .brand {
        font-size: 1rem;
      }

      .top-actions {
        gap: 6px;
      }

      .top-actions a,
      .top-actions button,
      .top-actions span {
        font-size: 12px;
        padding: 8px 10px;
      }

      .feed-card {
        padding: 16px;
      }

      .side-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img src="images/brand/logo-music-label.png" alt="Rich Bizness">
      <span>Rich Bizness Feed</span>
    </div>

    <div class="top-actions">
      <span id="userChip" class="user-chip">Checking session...</span>
      <a href="index.html">Home</a>
      <a href="watch.html?room=richbizness-live-room">Live</a>
      <a href="messages.html">Messages</a>
      <button id="logoutBtn" type="button">Log Out</button>
    </div>
  </div>

  <div id="statusBox" class="status-box">Loading feed...</div>
  <div id="feedShell" class="feed-shell"></div>

  <script>
    try {
      const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_bRhd0yC-gBTWTPC26IZHlw_sda85zos";

      if (!window.supabase) {
        throw new Error("Supabase CDN did not load.");
      }

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

      const userChip = document.getElementById("userChip");
      const logoutBtn = document.getElementById("logoutBtn");
      const statusBox = document.getElementById("statusBox");
      const feedShell = document.getElementById("feedShell");

      let currentUser = null;
      let profilesMap = {};

      function setStatus(message) {
        statusBox.textContent = message;
        console.log(message);
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function loadSession() {
        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;

        currentUser = data?.session?.user || null;
        userChip.textContent = currentUser?.email || "Guest mode";
      }

      async function logOut() {
        try {
          const { error } = await supabase.auth.signOut();
          if (error) throw error;
          window.location.href = "auth.html";
        } catch (error) {
          setStatus("Logout error: " + error.message);
        }
      }

      async function createNotification(userId, type, title, body, link = "#") {
        try {
          await supabase.from("notifications").insert({
            user_id: userId,
            type,
            title,
            body,
            link
          });
        } catch (error) {
          console.error("Notification insert failed:", error);
        }
      }

      async function followArtist(targetUserId) {
        try {
          if (!currentUser) {
            window.location.href = "auth.html";
            return;
          }

          if (currentUser.id === targetUserId) {
            setStatus("That’s your own page.");
            return;
          }

          const { error } = await supabase
            .from("followers")
            .insert({
              follower_id: currentUser.id,
              following_id: targetUserId
            });

          if (error) throw error;

          setStatus("Artist followed.");

          await createNotification(
            targetUserId,
            "follow",
            "New Follower",
            `${currentUser.email} followed you.`,
            "profile.html"
          );
        } catch (error) {
          setStatus("Follow error: " + error.message);
        }
      }

      function messageArtist(email) {
        if (!email) {
          setStatus("Artist email not found.");
          return;
        }
        window.location.href = `messages.html?email=${encodeURIComponent(email)}`;
      }

      async function loadProfiles(userIds) {
        const uniqueIds = [...new Set(userIds.filter(Boolean))];
        profilesMap = {};

        if (!uniqueIds.length) return;

        const { data, error } = await supabase
          .from("profiles")
          .select("id,email,display_name,avatar_url,bio,favorite_genre")
          .in("id", uniqueIds);

        if (error) throw error;

        (data || []).forEach(profile => {
          profilesMap[profile.id] = profile;
        });
      }

      function buildFeedItems(artworks, tracks, gaming, sports) {
        const artItems = (artworks || []).map(item => ({
          ...item,
          _kind: "ART",
          _mediaType: "image",
          _mediaUrl: item.image_url || item.media_url || "",
          _title: item.title || "Untitled Artwork",
          _text: item.description || ""
        }));

        const trackItems = (tracks || []).map(item => ({
          ...item,
          _kind: "MUSIC",
          _mediaType: "image",
          _mediaUrl: item.cover_url || "",
          _audioUrl: item.audio_url || "",
          _title: item.title || "Untitled Track",
          _text: item.description || ""
        }));

        const gamingItems = (gaming || []).map(item => ({
          ...item,
          _kind: "GAMING",
          _mediaType: item.media_type || "image",
          _mediaUrl: item.media_url || "",
          _title: item.title || "Untitled Gaming Post",
          _text: item.caption || ""
        }));

        const sportsItems = (sports || []).map(item => ({
          ...item,
          _kind: "SPORTS",
          _mediaType: item.media_type || "image",
          _mediaUrl: item.media_url || "",
          _title: item.title || "Untitled Sports Post",
          _text: item.caption || ""
        }));

        return [...trackItems, ...gamingItems, ...sportsItems, ...artItems]
          .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      }

      function renderFeed(items) {
        if (!items.length) {
          feedShell.innerHTML = `<div class="empty-box">No feed content yet.</div>`;
          return;
        }

        feedShell.innerHTML = items.map((item, index) => {
          const profile = profilesMap[item.user_id] || {};
          const artistName = profile.display_name || profile.email || "Artist";
          const artistEmail = profile.email || "";
          const artistLink = `artist.html?id=${encodeURIComponent(item.user_id || "")}`;

          const mediaHtml = item._mediaType === "video"
            ? `<div class="feed-bg"><video ${index < 2 ? "autoplay muted loop playsinline" : "controls playsinline"} src="${escapeHtml(item._mediaUrl)}"></video></div>`
            : item._mediaUrl
              ? `<div class="feed-bg"><img src="${escapeHtml(item._mediaUrl)}" alt="feed media"></div>`
              : `<div class="feed-bg" style="background:linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.85)), url('images/brand/logo-music-label.png') center/cover no-repeat;"></div>`;

          return `
            <section class="feed-card">
              ${mediaHtml}
              <div class="feed-overlay"></div>

              <div class="feed-content">
                <div class="content-main">
                  <div class="pill">${escapeHtml(item._kind)}</div>

                  <div class="feed-title">${escapeHtml(item._title)}</div>

                  <div class="feed-meta">
                    By
                    <a href="${artistLink}">${escapeHtml(artistName)}</a>
                    ${profile.favorite_genre ? `• ${escapeHtml(profile.favorite_genre)}` : ""}
                  </div>

                  <div class="feed-text">${escapeHtml(item._text)}</div>

                  ${
                    item._audioUrl
                      ? `<div class="audio-wrap"><audio controls preload="none" src="${escapeHtml(item._audioUrl)}"></audio></div>`
                      : ""
                  }
                </div>

                <div class="side-actions">
                  <a class="primary" href="${artistLink}">Artist</a>
                  <button type="button" onclick="window.__feedFollow('${escapeHtml(item.user_id || "")}')">Follow</button>
                  <button type="button" onclick="window.__feedMessage('${escapeHtml(artistEmail)}')">Message</button>
                  <a href="${escapeHtml(item._mediaUrl || artistLink)}" target="_blank" rel="noopener noreferrer">Open</a>
                </div>
              </div>
            </section>
          `;
        }).join("");
      }

      async function loadFeed() {
        try {
          setStatus("Loading short-form feed...");
          await loadSession();

          const [artRes, trackRes, gamingRes, sportsRes] = await Promise.all([
            supabase.from("artworks").select("*").order("created_at", { ascending: false }).limit(20),
            supabase.from("music_tracks").select("*").order("created_at", { ascending: false }).limit(20),
            supabase.from("gaming_posts").select("*").order("created_at", { ascending: false }).limit(20),
            supabase.from("sports_posts").select("*").order("created_at", { ascending: false }).limit(20)
          ]);

          if (artRes.error) throw artRes.error;
          if (trackRes.error) throw trackRes.error;
          if (gamingRes.error) throw gamingRes.error;
          if (sportsRes.error) throw sportsRes.error;

          const items = buildFeedItems(
            artRes.data || [],
            trackRes.data || [],
            gamingRes.data || [],
            sportsRes.data || []
          );

          await loadProfiles(items.map(item => item.user_id));
          renderFeed(items);
          setStatus("Feed loaded. Swipe the platform energy.");
        } catch (error) {
          setStatus("Feed error: " + error.message);
          feedShell.innerHTML = `<div class="empty-box">Could not load feed.</div>`;
        }
      }

      window.__feedFollow = (userId) => followArtist(userId);
      window.__feedMessage = (email) => messageArtist(email);

      logoutBtn.addEventListener("click", logOut);

      supabase.auth.onAuthStateChange((_event, session) => {
        userChip.textContent = session?.user?.email || "Guest mode";
        currentUser = session?.user || null;
      });

      loadFeed();
    } catch (error) {
      document.body.innerHTML = `
        <div style="padding:30px;color:white;font-family:Arial;background:#000;min-height:100vh;">
          <h1 style="color:#7dff71;">Feed Startup Error</h1>
          <p>${error.message}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
