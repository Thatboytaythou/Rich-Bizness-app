<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rich Bizness — 3D Metaverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;}
#exit{
  position:fixed;bottom:20px;right:20px;
  background:#00ffcc;padding:10px;border-radius:10px;
  cursor:pointer;font-weight:bold;
}
</style>
</head>

<body>

<div id="exit" onclick="location.href='/index.html'">EXIT</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,6);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.PointLight(0x00ffcc,2);
light.position.set(0,5,5);
scene.add(light);

const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x001a12})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* PLAYER */
const player=new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x00ffcc})
);
player.position.y=1;
scene.add(player);

const keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) player.position.z-=0.1;
  if(keys["s"]) player.position.z+=0.1;
  if(keys["a"]) player.position.x-=0.1;
  if(keys["d"]) player.position.x+=0.1;

  camera.position.x=player.position.x;
  camera.position.z=player.position.z+6;
  camera.lookAt(player.position);

  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
