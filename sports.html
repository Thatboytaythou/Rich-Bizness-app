<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports | Rich Bizness</title>

  <style>
    body {
      background:#050505;
      color:#fff;
      font-family:Arial;
      padding:20px;
    }

    .title {
      font-size:40px;
      color:#39ff14;
      font-weight:900;
      margin-bottom:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:16px;
    }

    .card {
      background:#0d0d0d;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
    }

    video {
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .content {
      padding:14px;
    }

    .title-sm {
      font-weight:900;
      color:#39ff14;
    }
  </style>
</head>
<body>

<div class="title">🔥 Sports Section</div>

<div id="feed" class="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzdmRlcXV5bWtjZWV2b2NncGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDY4ODIsImV4cCI6MjA5MDQyMjg4Mn0._tOoDMsaoe5ysxrSch2ednHdCtGwdwxVSN5uxoQZVpY"
);

async function loadSports() {
  const { data } = await supabase
    .from("sports_posts")
    .select("*")
    .order("created_at", { ascending:false });

  const feed = document.getElementById("feed");

  feed.innerHTML = data.map(post => `
    <div class="card">
      <video src="${post.video_url}" controls></video>
      <div class="content">
        <div class="title-sm">${post.title}</div>
        <div>${post.description}</div>
      </div>
    </div>
  `).join("");
}

loadSports();
</script>

</body>
</html>
