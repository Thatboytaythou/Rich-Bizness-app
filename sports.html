<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports | Rich Bizness</title>
  <style>
    body{background:#050505;color:#fff;font-family:Arial;padding:20px}
    .title{font-size:40px;color:#39ff14;font-weight:900;margin-bottom:20px}
    .top-links{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
    .top-links a{background:rgba(255,255,255,.08);padding:10px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.12);font-weight:700;color:#fff;text-decoration:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
    .card{background:#0d0d0d;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
    video{width:100%;height:220px;object-fit:cover}
    .content{padding:14px}
    .title-sm{font-weight:900;color:#39ff14;margin-bottom:8px}
  </style>
</head>
<body>
<div class="top-links">
  <a href="index.html">Home</a>
  <a href="upload-sports.html">Upload Sports</a>
  <a href="gallery/index.html">Gallery</a>
  <a href="live.html">Go Live</a>
</div>

<div class="title">Sports Section</div>
<div id="feed" class="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://ksvdequymkceevocgpdj.supabase.co",
  "YOUR_SUPABASE_ANON_KEY"
);

async function loadSports() {
  const { data } = await supabase.from("sports_posts").select("*").order("created_at", { ascending:false });
  const feed = document.getElementById("feed");
  feed.innerHTML = (data || []).map(post => `
    <div class="card">
      <video src="${post.video_url}" controls></video>
      <div class="content">
        <div class="title-sm">${post.title || ""}</div>
        <div>${post.description || ""}</div>
        <div style="margin-top:8px;color:#bbb">${post.category || ""}</div>
      </div>
    </div>
  `).join("");
}
loadSports();
</script>
</body>
</html>
