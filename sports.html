<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports | Rich Bizness</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: #ffffff;
      min-height: 100vh;
      padding: 24px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 32px;
      font-weight: 900;
      color: #39ff14;
      text-shadow: 0 0 16px rgba(57,255,20,0.25);
    }

    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 18px;
      background: #111;
      padding: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .top-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-links a {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .top-links a:hover {
      color: #39ff14;
      border-color: rgba(57,255,20,0.45);
      background: rgba(57,255,20,0.12);
    }

    .hero {
      min-height: 320px;
      border-radius: 28px;
      padding: 36px;
      background:
        linear-gradient(rgba(0,0,0,0.40), rgba(0,0,0,0.75)),
        url("images/brand/logo-fire.png") center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
    }

    .hero-card {
      max-width: 760px;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(8px);
      padding: 24px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .hero-card h1 {
      font-size: 44px;
      color: #39ff14;
      margin-bottom: 12px;
      line-height: 1.05;
    }

    .hero-card p {
      color: #e6e6e6;
      line-height: 1.6;
      font-size: 17px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 14px;
      margin-bottom: 24px;
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .controls input,
    .controls select {
      width: 100%;
      background: #121212;
      color: #ffffff;
      border: 1px solid #2b2b2b;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .controls input:focus,
    .controls select:focus {
      border-color: #39ff14;
      box-shadow: 0 0 0 3px rgba(57,255,20,0.15);
    }

    .status-box {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
      line-height: 1.5;
      word-break: break-word;
    }

    .status-box.success {
      display: block;
      background: rgba(57,255,20,0.12);
      border: 1px solid rgba(57,255,20,0.35);
      color: #98ff83;
    }

    .status-box.error {
      display: block;
      background: rgba(255,70,70,0.12);
      border: 1px solid rgba(255,70,70,0.35);
      color: #ff9b9b;
    }

    .status-box.info {
      display: block;
      background: rgba(57,255,20,0.08);
      border: 1px solid rgba(57,255,20,0.20);
      color: #d8ffd0;
    }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
    }

    .card {
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      transition: transform 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .media-wrap {
      width: 100%;
      height: 240px;
      background: #111;
      overflow: hidden;
      position: relative;
    }

    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .category-pill {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      z-index: 2;
    }

    .views-pill {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      z-index: 2;
    }

    .card-body {
      padding: 18px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 900;
      color: #39ff14;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .creator-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .creator-avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      object-fit: cover;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .creator-meta {
      min-width: 0;
      flex: 1;
    }

    .creator-name {
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }

    .creator-link {
      color: #bfbfbf;
      font-size: 13px;
      margin-top: 3px;
    }

    .creator-link a {
      color: #bfbfbf;
    }

    .creator-link a:hover {
      color: #39ff14;
    }

    .card-desc {
      color: #e1e1e1;
      font-size: 14px;
      line-height: 1.6;
      min-height: 62px;
      white-space: pre-wrap;
      margin-bottom: 14px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .price {
      color: #39ff14;
      font-weight: 900;
      font-size: 16px;
    }

    .free {
      color: #d0d0d0;
      font-weight: 900;
      font-size: 16px;
    }

    .media-type {
      color: #bfbfbf;
      font-size: 13px;
      font-weight: 700;
    }

    .card-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn-green {
      background: #39ff14;
      color: #000;
    }

    .btn-dark {
      background: #1c1c1c;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-green:hover,
    .btn-dark:hover {
      transform: translateY(-1px);
    }

    .empty-state {
      grid-column: 1 / -1;
      background: #0d0d0d;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 40px 24px;
      text-align: center;
      color: #cfcfcf;
    }

    .empty-state h2 {
      color: #39ff14;
      margin-bottom: 10px;
    }

    @media (max-width: 1000px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .brand {
        font-size: 28px;
      }

      .hero {
        padding: 20px;
      }

      .hero-card h1 {
        font-size: 32px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .card-btn-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <img src="images/brand/logo-fire.png" alt="Sports Logo" />
        <span>Rich Bizness Sports</span>
      </div>

      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="auth.html">Auth</a>
        <a href="profile.html">Profile</a>
        <a href="artist.html">Artist</a>
        <a href="gallery.html">Gallery</a>
        <a href="upload.html">Upload Art</a>
        <a href="music.html">Music</a>
        <a href="upload-music.html">Upload Music</a>
        <a href="sports.html">Sports</a>
        <a href="upload-sports.html">Upload Sports</a>
        <a href="gaming.html">Gaming</a>
        <a href="upload-gaming.html">Upload Gaming</a>
        <a href="live.html">Go Live</a>
        <a href="watch.html">Watch Live</a>
        <a href="messages.html">Messages</a>
      </div>
    </div>

    <div class="hero">
      <div class="hero-card">
        <h1>Sports Feed</h1>
        <p>
          Share sports clips, reactions, analysis, highlights, and premium content with your audience.
        </p>
      </div>
    </div>

    <div class="controls">
      <input id="searchInput" type="text" placeholder="Search by title, creator, category, or description" />

      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="NBA">NBA</option>
        <option value="NFL">NFL</option>
        <option value="Boxing">Boxing</option>
        <option value="Soccer">Soccer</option>
        <option value="Street Ball">Street Ball</option>
        <option value="Baseball">Baseball</option>
        <option value="Other">Other</option>
      </select>

      <select id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="views-high">Most Views</option>
        <option value="views-low">Least Views</option>
        <option value="price-high">Highest Price</option>
        <option value="price-low">Lowest Price</option>
        <option value="title-az">Title A-Z</option>
      </select>
    </div>

    <div id="statusBox" class="status-box info">Loading sports posts...</div>
    <div id="feedGrid" class="feed-grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusBox = document.getElementById("statusBox");
    const feedGrid = document.getElementById("feedGrid");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const sortSelect = document.getElementById("sortSelect");

    let allPosts = [];
    let profileMap = {};

    function showStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = "block";
    }

    function hideStatus() {
      statusBox.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatPrice(cents) {
      return `$${(Number(cents || 0) / 100).toFixed(2)}`;
    }

    function formatViews(value) {
      return `${Number(value || 0).toLocaleString()} views`;
    }

    async function loadProfilesForUserIds(userIds) {
      const uniqueIds = [...new Set((userIds || []).filter(Boolean))];
      const missingIds = uniqueIds.filter(id => !profileMap[id]);

      if (!missingIds.length) return;

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, display_name, avatar_url")
        .in("id", missingIds);

      if (error) {
        console.error("Profile load error:", error);
        return;
      }

      (data || []).forEach(profile => {
        profileMap[profile.id] = profile;
      });
    }

    function getProfileName(userId) {
      return profileMap[userId]?.display_name?.trim() || "Unknown Creator";
    }

    function getProfileAvatar(userId) {
      return profileMap[userId]?.avatar_url?.trim() || "https://placehold.co/200x200?text=Creator";
    }

    async function openArtistChat(targetUserId) {
      if (!targetUserId) {
        alert("Creator ID missing.");
        return;
      }

      const { data: authData, error: authError } = await supabaseClient.auth.getUser();

      if (authError || !authData.user) {
        window.location.href = "auth.html";
        return;
      }

      const currentUserId = authData.user.id;

      if (currentUserId === targetUserId) {
        window.location.href = "messages.html";
        return;
      }

      try {
        const { data: myMemberships, error: myMembershipsError } = await supabaseClient
          .from("conversation_members")
          .select("conversation_id")
          .eq("user_id", currentUserId);

        if (myMembershipsError) throw myMembershipsError;

        const myConversationIds = (myMemberships || []).map(row => row.conversation_id);
        let existingConversationId = null;

        if (myConversationIds.length) {
          const { data: targetMemberships, error: targetMembershipsError } = await supabaseClient
            .from("conversation_members")
            .select("conversation_id")
            .eq("user_id", targetUserId)
            .in("conversation_id", myConversationIds);

          if (targetMembershipsError) throw targetMembershipsError;

          if (targetMemberships && targetMemberships.length) {
            existingConversationId = targetMemberships[0].conversation_id;
          }
        }

        if (!existingConversationId) {
          const { data: newConversation, error: newConversationError } = await supabaseClient
            .from("conversations")
            .insert([{}])
            .select()
            .single();

          if (newConversationError) throw newConversationError;

          existingConversationId = newConversation.id;

          const { error: membersError } = await supabaseClient
            .from("conversation_members")
            .insert([
              { conversation_id: existingConversationId, user_id: currentUserId },
              { conversation_id: existingConversationId, user_id: targetUserId }
            ]);

          if (membersError) throw membersError;
        }

        localStorage.setItem("openConversationId", String(existingConversationId));
        window.location.href = "messages.html";
      } catch (error) {
        console.error("Open creator chat error:", error);
        alert(error.message || "Could not open chat.");
      }
    }

    async function buyNow({ sellerUserId, contentType, contentId, title, amountCents }) {
      const { data: authData } = await supabaseClient.auth.getUser();

      if (!authData.user) {
        window.location.href = "auth.html";
        return;
      }

      try {
        const res = await fetch("/api/create-checkout-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            buyerUserId: authData.user.id,
            sellerUserId,
            contentType,
            contentId,
            title,
            amountCents,
            currency: "usd"
          })
        });

        const json = await res.json();

        if (!res.ok) {
          throw new Error(json.error || "Checkout failed");
        }

        window.location.href = json.url;
      } catch (error) {
        alert(error.message || "Could not start checkout.");
      }
    }

    function getFilteredPosts() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;
      const sortValue = sortSelect.value;

      let filtered = [...allPosts];

      if (selectedCategory !== "all") {
        filtered = filtered.filter(item => (item.category || "") === selectedCategory);
      }

      if (searchTerm) {
        filtered = filtered.filter(item => {
          const title = (item.title || "").toLowerCase();
          const creator = getProfileName(item.user_id).toLowerCase();
          const category = (item.category || "").toLowerCase();
          const description = (item.description || "").toLowerCase();

          return (
            title.includes(searchTerm) ||
            creator.includes(searchTerm) ||
            category.includes(searchTerm) ||
            description.includes(searchTerm)
          );
        });
      }

      filtered.sort((a, b) => {
        switch (sortValue) {
          case "oldest":
            return new Date(a.created_at || 0) - new Date(b.created_at || 0);
          case "views-high":
            return Number(b.views || 0) - Number(a.views || 0);
          case "views-low":
            return Number(a.views || 0) - Number(b.views || 0);
          case "price-high":
            return Number(b.price_cents || 0) - Number(a.price_cents || 0);
          case "price-low":
            return Number(a.price_cents || 0) - Number(b.price_cents || 0);
          case "title-az":
            return (a.title || "").localeCompare(b.title || "");
          case "newest":
          default:
            return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        }
      });

      return filtered;
    }

    function renderFeed() {
      const filteredPosts = getFilteredPosts();

      if (!filteredPosts.length) {
        feedGrid.innerHTML = `
          <div class="empty-state">
            <h2>No sports posts found</h2>
            <p>Try changing your search, category, or sort options.</p>
          </div>
        `;
        return;
      }

      feedGrid.innerHTML = filteredPosts.map(item => {
        const title = escapeHtml(item.title || "Untitled");
        const creatorName = escapeHtml(getProfileName(item.user_id));
        const creatorAvatar = escapeHtml(getProfileAvatar(item.user_id));
        const category = escapeHtml(item.category || "Other");
        const description = escapeHtml(item.description || "No description added.");
        const mediaType = item.media_type || "image";
        const mediaUrl = escapeHtml(item.media_url || "");
        const thumbUrl = escapeHtml(item.thumbnail_url || item.media_url || "");
        const isForSale = !!item.is_for_sale && Number(item.price_cents || 0) > 0;

        const mediaHtml = mediaType === "video"
          ? `<video controls poster="${thumbUrl}">
               <source src="${mediaUrl}" />
             </video>`
          : `<img
               src="${thumbUrl || "https://placehold.co/600x400?text=Sports"}"
               alt="${title}"
               onerror="this.src='https://placehold.co/600x400?text=Sports';"
             />`;

        return `
          <div class="card">
            <div class="media-wrap">
              <div class="category-pill">${category}</div>
              <div class="views-pill">${formatViews(item.views)}</div>
              ${mediaHtml}
            </div>

            <div class="card-body">
              <div class="card-title">${title}</div>

              <div class="creator-row">
                <img
                  class="creator-avatar"
                  src="${creatorAvatar}"
                  alt="${creatorName}"
                  onerror="this.src='https://placehold.co/200x200?text=Creator';"
                />
                <div class="creator-meta">
                  <div class="creator-name">${creatorName}</div>
                  <div class="creator-link">
                    <a href="artist.html?id=${item.user_id}">View creator page</a>
                  </div>
                </div>
              </div>

              <div class="card-desc">${description}</div>

              <div class="meta-row">
                ${
                  isForSale
                    ? `<div class="price">${formatPrice(item.price_cents)}</div>`
                    : `<div class="free">Free</div>`
                }
                <div class="media-type">${escapeHtml(mediaType)}</div>
              </div>

              <div class="card-btn-row">
                <button class="btn-dark" onclick="openArtistChat('${item.user_id}')">Message Creator</button>
                ${
                  isForSale
                    ? `<button class="btn-green" onclick='buyNow({
                        sellerUserId: "${item.user_id}",
                        contentType: "sports_posts",
                        contentId: ${Number(item.id)},
                        title: ${JSON.stringify(item.title || "Sports Content")},
                        amountCents: ${Number(item.price_cents || 0)}
                      })'>Buy Now</button>`
                    : `<button class="btn-green" onclick="window.location.href='artist.html?id=${item.user_id}'">View More</button>`
                }
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadSportsPosts() {
      showStatus("Loading sports posts...", "info");

      try {
        const { data, error } = await supabaseClient
          .from("sports_posts")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          throw error;
        }

        allPosts = data || [];
        await loadProfilesForUserIds(allPosts.map(item => item.user_id));
        hideStatus();
        renderFeed();
      } catch (error) {
        console.error("Sports load error:", error);
        showStatus("Failed to load sports feed: " + error.message, "error");
      }
    }

    searchInput.addEventListener("input", renderFeed);
    categoryFilter.addEventListener("change", renderFeed);
    sortSelect.addEventListener("change", renderFeed);

    loadSportsPosts();
  </script>
</body>
</html>
