<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports | Rich Bizness</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: #ffffff;
      min-height: 100vh;
      padding: 24px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      color: #39ff14;
      text-shadow: 0 0 16px rgba(57,255,20,0.25);
    }

    .top-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-links a {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .top-links a:hover {
      background: rgba(57,255,20,0.18);
      border-color: rgba(57,255,20,0.5);
      color: #39ff14;
    }

    .hero {
      margin-bottom: 24px;
      padding: 28px;
      border-radius: 24px;
      background: rgba(10,10,10,0.82);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
    }

    .hero h1 {
      font-size: 44px;
      color: #39ff14;
      margin-bottom: 12px;
      line-height: 1.05;
    }

    .hero p {
      color: #d4d4d4;
      font-size: 17px;
      line-height: 1.55;
      max-width: 840px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 14px;
      margin-bottom: 24px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(12,12,12,0.84);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .controls input,
    .controls select {
      width: 100%;
      background: #121212;
      color: #fff;
      border: 1px solid #2c2c2c;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .controls input:focus,
    .controls select:focus {
      border-color: #39ff14;
      box-shadow: 0 0 0 3px rgba(57,255,20,0.15);
    }

    .status-box {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
      line-height: 1.5;
      word-break: break-word;
    }

    .status-box.info {
      display: block;
      background: rgba(57,255,20,0.12);
      border: 1px solid rgba(57,255,20,0.4);
      color: #9dff8a;
    }

    .status-box.error {
      display: block;
      background: rgba(255,60,60,0.12);
      border: 1px solid rgba(255,60,60,0.38);
      color: #ff8d8d;
    }

    .sports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.48);
    }

    .video-box {
      width: 100%;
      background: #111;
    }

    .video-box video {
      width: 100%;
      height: 230px;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .card-body {
      padding: 16px;
    }

    .post-title {
      font-size: 20px;
      font-weight: 800;
      color: #39ff14;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .post-category {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #000;
      background: #39ff14;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .post-description {
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.5;
      min-height: 48px;
    }

    .post-date {
      margin-top: 12px;
      color: #bdbdbd;
      font-size: 12px;
    }

    .empty {
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 36px 22px;
      text-align: center;
      color: #d7d7d7;
      grid-column: 1 / -1;
    }

    .empty h2 {
      color: #39ff14;
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 36px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .brand {
        font-size: 28px;
      }

      .hero {
        padding: 20px;
      }

      .hero h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">Rich Bizness Sports</div>

      <div class="top-links">
        <a href="index.html">Home</a>
        <a href="auth.html">Auth</a>
        <a href="profile.html">Profile</a>
        <a href="artist.html">Artist</a>
        <a href="upload.html">Upload Art</a>
        <a href="gallery.html">Gallery</a>
        <a href="music.html">Music</a>
        <a href="upload-music.html">Upload Music</a>
        <a href="upload-sports.html">Upload Sports</a>
        <a href="live.html">Go Live</a>
        <a href="watch.html">Watch Live</a>
      </div>
    </div>

    <div class="hero">
      <h1>Sports Section</h1>
      <p>
        Upload highlights, reactions, edits, and sports content to build a creator-driven sports feed.
      </p>
    </div>

    <div class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by title, category, or description"
      />

      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="NBA">NBA</option>
        <option value="NFL">NFL</option>
        <option value="Boxing">Boxing</option>
        <option value="Soccer">Soccer</option>
        <option value="Street Ball">Street Ball</option>
        <option value="Other">Other</option>
      </select>

      <select id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="title-az">Title A to Z</option>
        <option value="title-za">Title Z to A</option>
      </select>
    </div>

    <div id="statusBox" class="status-box info">Loading sports posts...</div>

    <div id="sportsGrid" class="sports-grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ksvdequymkceevocgpdj.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const sportsGrid = document.getElementById("sportsGrid");
    const statusBox = document.getElementById("statusBox");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const sortSelect = document.getElementById("sortSelect");

    let allPosts = [];

    function showStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status-box ${type}`;
      statusBox.style.display = "block";
    }

    function hideStatus() {
      statusBox.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      return date.toLocaleString();
    }

    function getFilteredPosts() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;
      const sortValue = sortSelect.value;

      let filtered = [...allPosts];

      if (selectedCategory !== "all") {
        filtered = filtered.filter(item => (item.category || "") === selectedCategory);
      }

      if (searchTerm) {
        filtered = filtered.filter(item => {
          const title = (item.title || "").toLowerCase();
          const category = (item.category || "").toLowerCase();
          const description = (item.description || "").toLowerCase();

          return (
            title.includes(searchTerm) ||
            category.includes(searchTerm) ||
            description.includes(searchTerm)
          );
        });
      }

      filtered.sort((a, b) => {
        switch (sortValue) {
          case "oldest":
            return new Date(a.created_at || 0) - new Date(b.created_at || 0);
          case "title-az":
            return (a.title || "").localeCompare(b.title || "");
          case "title-za":
            return (b.title || "").localeCompare(a.title || "");
          case "newest":
          default:
            return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        }
      });

      return filtered;
    }

    function renderSports() {
      const filtered = getFilteredPosts();

      if (!filtered.length) {
        sportsGrid.innerHTML = `
          <div class="empty">
            <h2>No sports posts found</h2>
            <p>Try another search or upload some clips.</p>
          </div>
        `;
        return;
      }

      sportsGrid.innerHTML = filtered.map(post => {
        const title = escapeHtml(post.title || "Untitled");
        const category = escapeHtml(post.category || "Other");
        const description = escapeHtml(post.description || "No description added.");
        const videoUrl = escapeHtml(post.video_url || "");
        const dateText = escapeHtml(formatDate(post.created_at));

        return `
          <div class="card">
            <div class="video-box">
              <video controls src="${videoUrl}"></video>
            </div>
            <div class="card-body">
              <div class="post-title">${title}</div>
              <div class="post-category">${category}</div>
              <div class="post-description">${description}</div>
              <div class="post-date">${dateText}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadSports() {
      showStatus("Loading sports posts...", "info");

      try {
        const { data, error } = await supabaseClient
          .from("sports_posts")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          throw error;
        }

        allPosts = data || [];
        hideStatus();
        renderSports();
      } catch (error) {
        console.error("Sports load error:", error);
        showStatus("Failed to load sports posts: " + error.message, "error");
      }
    }

    searchInput.addEventListener("input", renderSports);
    categoryFilter.addEventListener("change", renderSports);
    sortSelect.addEventListener("change", renderSports);

    loadSports();
  </script>
</body>
</html>
